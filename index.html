    ctx.clearRect(0,0,W,H);
    var pl=52,pr=16,pt=20,pb=32,cW=W-pl-pr,cH=H-pt-pb;
    var maxV=Math.max.apply(null,weeklyVals.concat([1]));
    ctx.fillStyle='#0a0a0a'; ctx.fillRect(0,0,W,H);
    for(var i=0;i<=4;i++){ var gy=pt+cH*(1-i/4); ctx.strokeStyle='rgba(255,255,255,.04)'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(pl,gy); ctx.lineTo(pl+cW,gy); ctx.stroke(); }
    var bw=Math.max(4,cW/weeklyLabels.length*0.55);
    for(var j=0;j<weeklyVals.length;j++){
      var v=weeklyVals[j], bx=pl+(j+0.5)*(cW/weeklyLabels.length), bh=v/maxV*cH, by=pt+cH-bh;
      var g=ctx.createLinearGradient(0,by,0,by+bh); g.addColorStop(0,'#e31b23'); g.addColorStop(1,'rgba(179,18,23,.2)');
      ctx.fillStyle=g; ctx.beginPath(); ctx.rect(bx-bw/2,by,bw,bh); ctx.fill();
    }
    ctx.fillStyle='#444'; ctx.font='9px sans-serif'; ctx.textAlign='center';
    for(var k=0;k<weeklyLabels.length;k++){ ctx.fillText(weeklyLabels[k], pl+(k+0.5)*(cW/weeklyLabels.length), H-6); }
    ctx.textAlign='right';
    for(var m=0;m<=4;m++){ var mv=Math.round(maxV*m/4); ctx.fillStyle='#444'; ctx.font='9px sans-serif'; ctx.fillText(mv>999?(mv/1000).toFixed(1)+'t':mv+'kg', pl-4, pt+cH*(1-m/4)+3); }

  var share = function(){
    if(!selStudent){ setToast('Selecione um aluno'); return; }

    try {
      var W=720,H=880,sc=document.createElement('canvas'); sc.width=W; sc.height=H;
      var ctx=sc.getContext('2d');
      ctx.fillStyle='#080808'; ctx.fillRect(0,0,W,H);
      ctx.fillStyle='#e31b23'; ctx.fillRect(0,0,W,6);
      ctx.font='900 32px sans-serif'; ctx.textAlign='left';
      ctx.fillStyle='#f0f0f0'; ctx.fillText('DARK',40,65);
      ctx.fillStyle='#e31b23'; ctx.fillText('SET',40+ctx.measureText('DARK').width,65);
      ctx.fillStyle='#555'; ctx.font='13px sans-serif'; ctx.fillText('Personal: '+(personalName||'Personal'),40,90);
      ctx.fillStyle='#f0f0f0'; ctx.font='bold 42px sans-serif'; ctx.fillText((selStudent.name||'Aluno').toUpperCase(),40,145);
      var stats=[{l:'Treinos',v:String(totalWorkouts)},{l:'Volume',v:(totalVol/1000).toFixed(1)+'t'},{l:'Último',v:lastDate.slice(5).split('-').reverse().join('/')}];
      for(var si2=0;si2<stats.length;si2++){
        var sx=40+si2*(W-80)/3, sy=165, sbw=(W-80)/3-12;
        ctx.fillStyle='#111'; ctx.fillRect(sx,sy,sbw,72);
        ctx.fillStyle='#e31b23'; ctx.font='bold 30px sans-serif'; ctx.textAlign='left'; ctx.fillText(stats[si2].v,sx+12,sy+36);
        ctx.fillStyle='#555'; ctx.font='12px sans-serif'; ctx.fillText(stats[si2].l,sx+12,sy+58);
      }
      ctx.fillStyle='#444'; ctx.font='11px sans-serif'; ctx.textAlign='left'; ctx.fillText('VOLUME SEMANAL — ÚLTIMAS 12 SEMANAS',40,272);
      if(canvasRef.current && weeklyLabels.length){ ctx.drawImage(canvasRef.current,40,285,W-80,200); }
      else { ctx.fillStyle='#111'; ctx.fillRect(40,285,W-80,200); }
      ctx.fillStyle='#444'; ctx.font='11px sans-serif'; ctx.fillText('ÚLTIMOS TREINOS',40,515);
      var last5=entries.slice(-5).reverse();
      for(var li=0;li<last5.length;li++){
        var ey=530+li*58;
        ctx.fillStyle='#111'; ctx.fillRect(40,ey,W-80,50);
        var evol=(last5[li][1].entries||[]).reduce(function(a,en){ return a+(en.sets||[]).reduce(function(b,s){ return b+(parseFloat(s.w)||0)*(parseInt(s.r)||0); },0); },0);
        ctx.fillStyle='#f0f0f0'; ctx.font='bold 15px sans-serif'; ctx.fillText(last5[li][1].planName||'Treino Livre',56,ey+18);
        ctx.fillStyle='#555'; ctx.font='11px sans-serif'; ctx.fillText(last5[li][0]+' · '+(last5[li][1].entries||[]).length+' ex · '+Math.round(evol)+'kg',56,ey+38);
      }
      ctx.fillStyle='#222'; ctx.font='11px sans-serif'; ctx.textAlign='center'; ctx.fillText('darksetapp.com · DarkSet Personal',W/2,H-16);
      sc.toBlob(function(blob){
        var file=new File([blob],'progresso-'+selStudent.name+'.png',{type:'image/png'});
        if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
          navigator.share({files:[file],title:'Progresso '+selStudent.name})
            .then(function(){ setToast('Compartilhado!'); setSharing(false); })
            .catch(function(){ setSharing(false); });
        } else {
          var url=URL.createObjectURL(blob),a=document.createElement('a');
          a.href=url; a.download='progresso-'+selStudent.name+'.png';
          document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
          setToast('Imagem salva!'); setSharing(false);
        }
      },'image/png');
    } catch(e){ setToast('Erro ao gerar imagem'); setSharing(false); }
  };

  return (
    <div style={{padding:'1rem',maxWidth:'520px',margin:'0 auto'}}>
      <PersonalStudentPicker students={students} selectedUid={selUid} onSelect={setSelUid}/>
      {!selUid ? (
        <div style={{textAlign:'center',padding:'3rem 1rem',color:'#333',borderRadius:'12px',border:'1px dashed #1e1e1e'}}>
          <div style={{fontSize:'2.5rem',marginBottom:'.6rem'}}>📊</div>
          <div style={{fontSize:'.88rem',color:'#555',fontWeight:600}}>Selecione um aluno</div>
          <div style={{fontSize:'.75rem',color:'#333',marginTop:'.3rem'}}>para ver os gráficos de evolução</div>
        </div>
      ) : loading ? <div style={{textAlign:'center',padding:'2rem',color:'#444'}}>Carregando…</div>
      : entries.length===0 ? (
        <div style={{textAlign:'center',padding:'2.5rem 1rem',color:'#444',borderRadius:'12px',border:'1px dashed #1e1e1e'}}>
          <div style={{fontSize:'2rem',marginBottom:'.5rem'}}>📭</div>
          <div style={{fontSize:'.85rem'}}>Nenhum treino registrado ainda</div>
        </div>
      ) : (
        <div>
          {/* Stats */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'.5rem',marginBottom:'1rem'}}>
            {[{l:'Treinos',v:totalWorkouts},{l:'Volume',v:Math.round(totalVol/1000)+'t'},{l:'Último',v:lastDate.slice(5).split('-').reverse().join('/')}].map(function(s,i){ return (
              <div key={i} style={{background:'rgba(255,255,255,.02)',border:'1px solid rgba(255,255,255,.06)',borderRadius:'12px',padding:'.75rem',textAlign:'center'}}>
                <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:'1.5rem',color:'var(--color-accent)',lineHeight:1}}>{s.v}</div>
                <div style={{fontSize:'.62rem',color:'var(--color-text-sub)',textTransform:'uppercase',letterSpacing:'.08em',marginTop:'.2rem'}}>{s.l}</div>
              </div>
            ); })}
          </div>

          {/* Chart */}
          <div style={{background:'rgba(255,255,255,.02)',border:'1px solid rgba(255,255,255,.06)',borderRadius:'12px',padding:'1rem',marginBottom:'1rem'}}>
            <div style={{fontSize:'.62rem',color:'var(--color-text-sub)',textTransform:'uppercase',letterSpacing:'.1em',marginBottom:'.6rem',fontWeight:700}}>Volume Semanal (kg)</div>
            {weeklyLabels.length
              ? <canvas ref={canvasRef} width={600} height={180} style={{width:'100%',height:'180px',borderRadius:'6px'}}/>
              : <div style={{textAlign:'center',padding:'1.5rem',color:'#333',fontSize:'.82rem'}}>Dados insuficientes</div>}

          {/* Recent workouts */}
          <div style={{marginBottom:'1rem'}}>

const StudentDetailPanel = ({student, personalName, onBack, setToast}) => {
  const [plans, setPlans] = React.useState([]);
  const [hist, setHist] = React.useState({});
  const [loading, setLoading] = React.useState(true);
  const [editingPlan, setEditingPlan] = React.useState(null); // plan obj being edited
  const [editByDay, setEditByDay] = React.useState(null);
  const [editName, setEditName] = React.useState('');
  const [activeEditDay, setActiveEditDay] = React.useState('Segunda');
  const [editTab, setEditTab] = React.useState('ficha');
  const [editFilters, setEditFilters] = React.useState({q:'',m:'',e:''});
  const [saving, setSaving] = React.useState(false);

  React.useEffect(function(){
    if(!student||!window._db){ setLoading(false); return; }
    setLoading(true);
    setPlans([]);
    setHist({});
    var uid = student.studentUid;
    // Load both in parallel, setLoading false when both done
    var plansPromise = window._db.collection('personal_plans').doc(uid).collection('plans').get()
      .then(function(snap){
        var list = snap.docs.map(function(d){ return d.data(); });
        setPlans(list);
      }).catch(function(e){
        console.warn('[StudentDetail] plans error:', e.code, e.message);
      });
    var histPromise = window._db.collection('users').doc(uid).collection('data').doc('history').get()
      .then(function(doc){
        if(doc.exists){ try{ setHist(JSON.parse(doc.data().payload||'{}')); }catch(_){} }
      }).catch(function(){});
    Promise.all([plansPromise, histPromise]).then(function(){ setLoading(false); });
  }, [student && student.studentUid]);

  var entries = Object.entries(hist).sort(function(a,b){ return a[0].localeCompare(b[0]); });
  var totalWorkouts = entries.length;
  var totalVol = entries.reduce(function(a,e){ return a+(e[1].entries||[]).reduce(function(b,en){ return b+(en.sets||[]).reduce(function(c,s){ return c+(parseFloat(s.w)||0)*(parseInt(s.r)||0); },0); },0); },0);
  var lastDate = entries.length ? entries[entries.length-1][0] : '—';

  var MUSCLES_LIST = [...new Set(EXS.map(function(ex){ return ex.primary; }).filter(Boolean))].sort();
  var equipments = [...new Set(EXS.map(function(ex){ return ex.equipment; }).filter(Boolean))].sort();

  // Builder helpers para edição
  var editDayItems = editByDay ? (editByDay[activeEditDay]||[]) : [];
  var editTotalExs = editByDay ? Object.values(editByDay).reduce(function(a,b){ return a+b.length; },0) : 0;
  var {q,m,e} = editFilters;
  var filteredExs = EXS.filter(function(ex){
    return ex.name.toLowerCase().includes(q.toLowerCase()) && (!m||ex.primary===m) && (!e||ex.equipment===e);
  }).sort(function(a,b){
    var GROUP_ORDER=["Peito","Ombro","Trapézio","Costas","Bíceps","Tríceps","Antebraço","Lombar","Quadríceps","Posterior de Coxa","Glúteo","Abdutores","Adutores","Panturrilha","Abdômen"];
    var gi=GROUP_ORDER.indexOf(a.primary)-GROUP_ORDER.indexOf(b.primary);
    return gi!==0?gi:a.name.localeCompare(b.name,'pt');
  });

  var startEdit = function(plan){
    setEditingPlan(plan);
    setEditByDay(JSON.parse(JSON.stringify(plan.byDay||{})));
    setEditName(plan.name);
    setActiveEditDay('Segunda');
    setEditTab('ficha');
    setEditFilters({q:'',m:'',e:''});
  };

  var addEditEx = function(ex){
    setEditByDay(function(p){ var n=JSON.parse(JSON.stringify(p)); if(!n[activeEditDay]) n[activeEditDay]=[]; if(!n[activeEditDay].some(function(it){ return it.name===ex.name; })) n[activeEditDay].push({exId:ex.id||ex.name,name:ex.name,setsPlanned:3,repsTarget:'12'}); return n; });
    setToast('+ '+ex.name);
  };
  var removeEditEx = function(idx){ setEditByDay(function(p){ var n=JSON.parse(JSON.stringify(p)); n[activeEditDay].splice(idx,1); return n; }); };
  var updateEditSets = function(idx,val){ setEditByDay(function(p){ var n=JSON.parse(JSON.stringify(p)); n[activeEditDay][idx].setsPlanned=Math.max(1,Math.min(10,parseInt(val)||1)); return n; }); };
  var updateEditReps = function(idx,val){ setEditByDay(function(p){ var n=JSON.parse(JSON.stringify(p)); n[activeEditDay][idx].repsTarget=val; return n; }); };
  var moveEditEx = function(idx,dir){ setEditByDay(function(p){ var n=JSON.parse(JSON.stringify(p)); var arr=n[activeEditDay]; var j=idx+dir; if(j<0||j>=arr.length) return p; var tmp=arr[idx]; arr[idx]=arr[j]; arr[j]=tmp; return n; }); };

  var saveEdit = function(){
    if(!editingPlan||!window._db) return;
    setSaving(true);
    var updated = Object.assign({},editingPlan,{name:editName.trim()||editingPlan.name, byDay:editByDay, updatedAt:Date.now()});
    window._db.collection('personal_plans').doc(student.studentUid).collection('plans').doc(editingPlan.id).set(updated)
      .then(function(){
        setPlans(function(prev){ return prev.map(function(p){ return p.id===editingPlan.id?updated:p; }); });
        setToast('✅ Ficha atualizada!');
        setEditingPlan(null);
        setSaving(false);
      }).catch(function(err){ setToast('Erro: '+(err.message||'')); setSaving(false); });
  };

  var deletePlan = function(plan){
    if(!confirm('Remover a ficha "'+plan.name+'"?')) return;
    window._db.collection('personal_plans').doc(student.studentUid).collection('plans').doc(plan.id).delete()
      .then(function(){ setPlans(function(prev){ return prev.filter(function(p){ return p.id!==plan.id; }); }); setToast('Ficha removida'); })
      .catch(function(){ setToast('Erro ao remover'); });
  };

  // ── EDIT VIEW ──
  if(editingPlan) return (

// ── PersonalPanel — entry point ──
const PersonalPanel = ({setToast, prefs, onExit}) => {
  const uid = getUID();
  const [unlocked, setUnlocked] = React.useState(false);
  const [ptTab, setPtTab] = React.useState('alunos');
  const [students, setStudents] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [ptDrawerOpen, setPtDrawerOpen] = React.useState(false);
  const [selectedStudent, setSelectedStudent] = React.useState(null);

  React.useEffect(function(){
    if(!unlocked||!uid||!window._db){ setLoading(false); return; }
    var unsub = window._db.collection('personal_links')
      .where('personalUid','==',uid).where('active','==',true)
      .onSnapshot(function(snap){
        var links = snap.docs.map(function(d){ return Object.assign({id:d.id},d.data()); });
        Promise.all(links.map(function(link){
          // Nome já salvo no link doc — sem necessidade de ler users/{uid}
          var name = link.studentName || '';
          var photo = link.photoURL || null;
          return window._db.collection('users').doc(link.studentUid).collection('data').doc('history').get()
            .then(function(hDoc){
              var lw=null;
              if(hDoc.exists){ var p=hDoc.data().payload?JSON.parse(hDoc.data().payload):{};lw=Object.keys(p).sort().reverse()[0]||null; }
              return Object.assign({},link,{name:name,photoURL:photo,lastWorkout:lw});
            }).catch(function(){ return Object.assign({},link,{name:name,photoURL:photo,lastWorkout:null}); });
        })).then(function(enriched){
          // Garante que todo aluno tem nome — fallback: Aluno 1, Aluno 2...
          var named = enriched.map(function(s,i){
            return Object.assign({},s,{name: s.name && s.name.trim() ? s.name : ('Aluno '+(i+1))});
          });
          setStudents(named); setLoading(false);
        });
      }, function(){ setLoading(false); });
    return function(){ unsub(); };
  }, [unlocked, uid]);

  if(!unlocked) return React.createElement(PersonalLogin, {onUnlock:function(){ setUnlocked(true); }, setToast:setToast});

  var cref = localStorage.getItem('ds.pt_cref') || '';

  var PT_NAV = [
    {id:'alunos',  icon:'👥', label:'Alunos',   section:'PERSONAL'},
    {id:'fichas',  icon:'📋', label:'Fichas'},
    {id:'graficos',icon:'📊', label:'Gráficos'},

  var PtDrawer = function(){
    return (
      <>
        {ptDrawerOpen && <div className="ds-drawer-overlay" onClick={function(){ setPtDrawerOpen(false); }}/>}
        <div className={'ds-drawer'+(ptDrawerOpen?' open':'')}>
          <div style={{padding:'1.25rem 1.1rem .75rem',borderBottom:'1px solid rgba(227,27,35,.15)',display:'flex',alignItems:'center',gap:'.85rem'}}>
            <div style={{width:'36px',height:'36px',borderRadius:'50%',background:'linear-gradient(135deg,#e31b23,#8b0000)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'.85rem',flexShrink:0}}>👨‍💼</div>
            <div>
              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:'1.3rem',lineHeight:1,textTransform:'uppercase'}}>
                DARK<span style={{color:'var(--color-accent)'}}>SET</span> <span style={{color:'#444',fontWeight:400,fontSize:'1rem'}}>PT</span>
              </div>
              {prefs.name && <div style={{fontSize:'.7rem',color:'#555',marginTop:'.1rem'}}>{prefs.name}{cref?' · CREF '+cref:''}</div>}
            </div>
          </div>
          <div style={{flex:1,paddingBottom:'1rem'}}>
            {PT_NAV.map(function(item,i){ return (
              <div key={i}>
                {item.section && <div className="ds-drawer-section">{item.section}</div>}
                <button
                  className={'ds-drawer-item'+(ptTab===item.id?' active':'')}
                  onClick={function(){ setPtTab(item.id); setPtDrawerOpen(false); setSelectedStudent(null); }}>
                  <span className="ds-drawer-icon">{item.icon}</span>
                  <span>{item.label}</span>
                  {ptTab===item.id && <span style={{marginLeft:'auto',width:'6px',height:'6px',borderRadius:'50%',background:'var(--color-accent)',flexShrink:0}}/>}
                </button>
              </div>
            ); })}
          </div>
          <div style={{padding:'.75rem 1.1rem',borderTop:'1px solid #111'}}>
            <button onClick={function(){ setUnlocked(false); setPtDrawerOpen(false); if(onExit) onExit(); }}
              style={{width:'100%',background:'rgba(227,27,35,.06)',border:'1px solid rgba(227,27,35,.15)',borderRadius:'10px',padding:'.6rem',color:'#e31b23',fontWeight:700,fontSize:'.82rem',cursor:'pointer',fontFamily:"'Barlow Condensed',sans-serif",textTransform:'uppercase',letterSpacing:'.06em'}}>
              Sair do modo Personal
            </button>
            <div style={{fontSize:'.6rem',color:'#222',textTransform:'uppercase',letterSpacing:'.06em',textAlign:'center',marginTop:'.5rem'}}>DarkSet Personal · {students.length}/10 alunos</div>
          </div>
        </div>
      </>
    );
  };

  // ── Personal Header ──
  var PtHeader = function(){
    return (
      <header className="ds-hdr" style={{justifyContent:'space-between',borderBottom:'1px solid rgba(227,27,35,.12)'}}>
        <div style={{display:'flex',alignItems:'center',gap:'.75rem'}}>
          <button className="ds-hamburger" onClick={function(){ setPtDrawerOpen(true); }} aria-label="Menu">
            <span/><span/><span/>

          </div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:'.5rem'}}>

      {ptTab==='graficos' && <PersonalChartsTab   students={students} personalName={prefs.name} setToast={setToast}/>}
    </div>
  );
};

// ── MeuPersonalSection: shown in Profile for all users (to link with a personal) ──
const MeuPersonalSection = ({setToast}) => {
  const uid = getUID();
  const [personalInfo, setPersonalInfo] = React.useState(null);
  const [inputCode, setInputCode] = React.useState('');
  const [linking, setLinking] = React.useState(false);
  const [loading, setLoading] = React.useState(true);

  React.useEffect(() => {
    if(!uid || !window._db) { setLoading(false); return; }
    // Check if already linked
    window._db.collection('personal_links')
      .where('studentUid', '==', uid)
      .where('active', '==', true)
      .limit(1)
      .get()
      .then(async snap => {
        if(!snap.empty){
          const link = snap.docs[0].data();
          try {
            const pDoc = await window._db.collection('users').doc(link.personalUid).get();
            const pData = pDoc.exists ? pDoc.data() : {};
            setPersonalInfo({ name: pData.name || pData.displayName || 'Personal', photoURL: pData.photoURL || null, linkId: snap.docs[0].id });
          } catch(_){ setPersonalInfo({ name: 'Personal', photoURL: null, linkId: snap.docs[0].id }); }
        }
        setLoading(false);
      })
      .catch(() => setLoading(false));
  }, [uid]);

  const linkPersonal = async () => {
    const code = inputCode.trim().toUpperCase();
    if(!code) return;
    if(!window._db) return;
    setLinking(true);
    try {
      const inviteDoc = await window._db.collection('personal_invites').doc(code).get();
      if(!inviteDoc.exists){ setToast('Código inválido'); setLinking(false); return; }
      const invite = inviteDoc.data();
      if(invite.used){ setToast('Código já utilizado'); setLinking(false); return; }
      if(invite.expiresAt < Date.now()){ setToast('Código expirado'); setLinking(false); return; }
      if(invite.personalUid === uid){ setToast('Você não pode se vincular a si mesmo'); setLinking(false); return; }
      // Create link — salva nome do aluno para o personal poder ler sem regra especial
      var _studentName = (function(){ try{ return JSON.parse(localStorage.getItem('ds.prefs')||'{}').name||''; }catch(_){ return ''; } })();
      var _studentEmail = (function(){ try{ var u=JSON.parse(localStorage.getItem('darkset.user')||'null'); return u&&u.email?u.email:''; }catch(_){ return ''; } })();
      await window._db.collection('personal_links').add({
        personalUid: invite.personalUid, studentUid: uid,
        studentName: _studentName, studentEmail: _studentEmail,
        active: true, linkedAt: Date.now(),
      });
      // Mark invite as used
      await window._db.collection('personal_invites').doc(code).update({ used: true });
      setPersonalInfo({ name: invite.personalName || 'Personal', photoURL: null });
      setToast('Vinculado com sucesso! ✅');
      setInputCode('');
    } catch(e){ setToast('Erro ao vincular: ' + (e.message||'')); }
    setLinking(false);
  };

  const unlinkPersonal = async () => {
    if(!personalInfo?.linkId || !window._db) return;
    if(!confirm('Desvincular do seu personal?')) return;
    try {
      await window._db.collection('personal_links').doc(personalInfo.linkId).update({ active: false });
      setPersonalInfo(null);
      setToast('Desvinculado');
    } catch(_){ setToast('Erro ao desvincular'); }
  };

  if(loading) return null;

  return (
    <div className="ds-card" style={{padding:'1rem 1.1rem',display:'grid',gap:'.6rem',marginBottom:'.75rem'}}>
      <div style={{fontSize:'.65rem',color:'var(--color-text-sub)',textTransform:'uppercase',letterSpacing:'.07em'}}>Meu Personal</div>
      {personalInfo ? (
        <div style={{display:'flex',alignItems:'center',gap:'.75rem'}}>
          <div style={{width:'38px',height:'38px',borderRadius:'50%',background:'#1a1a1a',border:'2px solid #222',overflow:'hidden',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1.1rem',flexShrink:0}}>
            {personalInfo.photoURL ? <img src={personalInfo.photoURL} style={{width:'100%',height:'100%',objectFit:'cover'}}/> : '👨‍💼'}
          </div>
          <div style={{flex:1}}>
            <div style={{fontWeight:700,fontSize:'.88rem'}}>{personalInfo.name}</div>
            <div style={{fontSize:'.72rem',color:'var(--color-text-sub)'}}>Personal vinculado</div>
          </div>
          <button onClick={unlinkPersonal} style={{background:'rgba(248,113,113,.08)',border:'1px solid rgba(248,113,113,.2)',borderRadius:'8px',padding:'.3rem .65rem',color:'#f87171',fontSize:'.75rem',cursor:'pointer'}}>Desvincular</button>
        </div>
      ) : (
        <div>
          <div style={{fontSize:'.8rem',color:'var(--color-text-sub)',marginBottom:'.6rem'}}>Cole o código do seu personal para receber fichas diretamente no app.</div>
          <div style={{display:'flex',gap:'.5rem'}}>
            <input
              value={inputCode} onChange={e=>setInputCode(e.target.value.toUpperCase())}
              placeholder="PT-XXXXX" maxLength={8}
              style={{flex:1,background:'rgba(0,0,0,.4)',border:'1px solid #1e1e1e',borderRadius:'8px',padding:'.5rem .75rem',color:'#fff',fontSize:'.9rem',fontFamily:'monospace',letterSpacing:'.08em'}}
            />
            <button onClick={linkPersonal} disabled={linking||!inputCode.trim()}
              style={{background:'var(--color-accent)',border:'none',borderRadius:'8px',padding:'.5rem 1rem',color:'#fff',fontWeight:800,fontSize:'.85rem',cursor:linking?'wait':'pointer',opacity:!inputCode.trim()?.5:1}}>
              {linking ? '…' : 'Vincular'}
            </button>
          </div>
        </div>
      )}
    </div>
  );
};


// ── PlanBuilderModal — Personal cria ficha para o aluno ──
const PlanBuilderModal = ({studentUid, studentName, personalName, onClose, setToast}) => {
  const [planName, setPlanName] = React.useState('');
  const [byDay, setByDay] = React.useState({'Segunda':[],'Terça':[],'Quarta':[],'Quinta':[],'Sexta':[],'Sábado':[],'Domingo':[]});
  const [activeDay, setActiveDay] = React.useState('Segunda');
  const [search, setSearch] = React.useState('');
  const [saving, setSaving] = React.useState(false);

  const addExercise = (name) => { setByDay(prev=>({...prev,[activeDay]:[...prev[activeDay],{name,setsPlanned:3}]})); setSearch(''); };
  const removeExercise = (day,idx) => setByDay(prev=>({...prev,[day]:prev[day].filter((_,i)=>i!==idx)}));
  const updateSets = (day,idx,val) => setByDay(prev=>({...prev,[day]:prev[day].map((ex,i)=>i===idx?{...ex,setsPlanned:Math.max(1,parseInt(val)||1)}:ex)}));
  const totalExs = Object.values(byDay).reduce((a,b)=>a+b.length,0);
  const suggestions = search.length>=1 ? EXS.filter(e=>e.name.toLowerCase().includes(search.toLowerCase())).slice(0,8) : [];

  const save = async () => {
    if(!planName.trim()){ setToast('Dê um nome para a ficha'); return; }
    if(totalExs===0){ setToast('Adicione ao menos um exercício'); return; }
    if(!window._db){ setToast('Banco de dados indisponível'); return; }
    setSaving(true);
    try {
      const newPlan = { id:'pt_'+Date.now(), name:planName.trim(), byDay, fromPersonal:true, personalName:personalName||'Personal', createdAt:Date.now() };
      await window._db.collection('personal_plans').doc(studentUid).collection('plans').doc(newPlan.id).set(newPlan);
      setToast('✅ Ficha enviada para '+studentName+'!');
      onClose();
    } catch(e){ setToast('Erro ao salvar. Verifique as regras do Firestore.'); console.warn(e); }
    setSaving(false);
  };

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.92)',zIndex:9999,display:'flex',flexDirection:'column',overflowY:'auto'}}>
      <div style={{background:'#0f0f0f',borderBottom:'1px solid #1e1e1e',padding:'.9rem 1rem',display:'flex',alignItems:'center',gap:'.75rem',position:'sticky',top:0,zIndex:10}}>
        <button onClick={onClose} style={{background:'rgba(255,255,255,.06)',border:'1px solid #1e1e1e',borderRadius:'8px',padding:'.4rem .7rem',color:'var(--color-text)',cursor:'pointer',fontSize:'1rem'}}>←</button>
        <div style={{flex:1}}>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:'1.1rem',textTransform:'uppercase'}}>Nova Ficha para {studentName}</div>
          <div style={{fontSize:'.68rem',color:'var(--color-text-sub)'}}>{totalExs} exercício(s)</div>
        </div>
        <button onClick={save} disabled={saving} style={{background:'var(--color-accent)',border:'none',borderRadius:'8px',padding:'.45rem .9rem',color:'#fff',fontWeight:800,fontSize:'.82rem',cursor:saving?'wait':'pointer',opacity:saving?.6:1}}>
          {saving?'Salvando…':'Enviar'}
        </button>
      </div>
      <div style={{padding:'1rem',maxWidth:'480px',margin:'0 auto',width:'100%'}}>
        <input value={planName} onChange={e=>setPlanName(e.target.value)} placeholder="Nome da ficha (ex: Treino A — Peito)"
          style={{width:'100%',background:'rgba(0,0,0,.4)',border:'1px solid #2a2a2a',borderRadius:'10px',padding:'.65rem .9rem',color:'#fff',fontSize:'.88rem',marginBottom:'1rem'}}/>
        <div style={{display:'flex',gap:'.3rem',marginBottom:'1rem',overflowX:'auto',paddingBottom:'.3rem'}}>
          {DAYS.map(d=>(
            <button key={d} onClick={()=>setActiveDay(d)}
              style={{flexShrink:0,background:activeDay===d?'var(--color-accent)':'rgba(255,255,255,.04)',border:'1px solid '+(activeDay===d?'var(--color-accent)':'#1e1e1e'),borderRadius:'8px',padding:'.35rem .6rem',color:activeDay===d?'#fff':'#888',fontWeight:700,fontSize:'.72rem',cursor:'pointer',position:'relative'}}>
              {d.slice(0,3)}
              {byDay[d].length>0&&<span style={{position:'absolute',top:'-4px',right:'-4px',background:'var(--color-accent)',color:'#fff',borderRadius:'50%',width:'14px',height:'14px',fontSize:'.55rem',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:900}}>{byDay[d].length}</span>}
            </button>
          ))}
        </div>
        <div style={{position:'relative',marginBottom:'.75rem'}}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Buscar exercício para adicionar…"
            style={{width:'100%',background:'rgba(0,0,0,.4)',border:'1px solid #2a2a2a',borderRadius:'10px',padding:'.6rem .9rem',color:'#fff',fontSize:'.85rem'}}/>
          {suggestions.length>0&&(
            <div style={{position:'absolute',top:'100%',left:0,right:0,background:'#141414',border:'1px solid #2a2a2a',borderRadius:'10px',zIndex:20,maxHeight:'200px',overflowY:'auto',marginTop:'2px'}}>
              {suggestions.map((ex,i)=>(
                <button key={i} onClick={()=>addExercise(ex.name)}
                  style={{display:'block',width:'100%',background:'none',border:'none',textAlign:'left',padding:'.55rem .9rem',color:'#f0f0f0',fontSize:'.82rem',cursor:'pointer',borderBottom:'1px solid #1a1a1a'}}>
                  {ex.name}{ex.muscle&&<span style={{color:'#555',fontSize:'.7rem',marginLeft:'.4rem'}}>· {ex.muscle}</span>}
                </button>
              ))}
            </div>
          )}
        </div>
        {byDay[activeDay].length===0
          ? <div style={{textAlign:'center',padding:'1.5rem',color:'#333',fontSize:'.82rem'}}>Busque um exercício acima para adicionar em {activeDay}.</div>
          : byDay[activeDay].map((ex,i)=>(
            <div key={i} style={{background:'rgba(255,255,255,.03)',border:'1px solid #1e1e1e',borderRadius:'10px',padding:'.65rem .85rem',marginBottom:'.4rem',display:'flex',alignItems:'center',gap:'.75rem'}}>
              <div style={{flex:1,fontSize:'.85rem',fontWeight:600}}>{ex.name}</div>
              <div style={{display:'flex',alignItems:'center',gap:'.4rem'}}>
                <span style={{fontSize:'.72rem',color:'#555'}}>Séries:</span>
                <input type="number" value={ex.setsPlanned} min="1" max="10" onChange={e=>updateSets(activeDay,i,e.target.value)}
                  style={{width:'44px',background:'rgba(0,0,0,.4)',border:'1px solid #2a2a2a',borderRadius:'6px',padding:'.2rem .3rem',color:'#fff',fontSize:'.82rem',textAlign:'center'}}/>
              </div>
              <button onClick={()=>removeExercise(activeDay,i)} style={{background:'none',border:'none',color:'#555',cursor:'pointer',fontSize:'.9rem',padding:'.2rem'}}>✕</button>
            </div>
          ))
        }
      </div>
    </div>
  );
};

// ── StudentView ──
const StudentView = ({student, setToast, prefs, onBack}) => {
  const [tab, setTab] = React.useState('history');
  const [history, setHistory] = React.useState({});
  const [fichas, setFichas] = React.useState([]);
  const [personalPlans, setPersonalPlans] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [showBuilder, setShowBuilder] = React.useState(false);
  const [deletingId, setDeletingId] = React.useState(null);

  const loadData = React.useCallback(async () => {
    if(!window._db || !student.studentUid) return;
    setLoading(true);
    try {
      const histDoc = await window._db.collection('users').doc(student.studentUid).collection('data').doc('history').get();
      if(histDoc.exists){ const p = histDoc.data().payload ? JSON.parse(histDoc.data().payload) : {}; setHistory(p); }
      const plansDoc = await window._db.collection('users').doc(student.studentUid).collection('data').doc('plans').get();
      if(plansDoc.exists){ const p = plansDoc.data().payload ? JSON.parse(plansDoc.data().payload) : {}; setFichas(p.list||[]); }
      const ptSnap = await window._db.collection('personal_plans').doc(student.studentUid).collection('plans').get();
      setPersonalPlans(ptSnap.docs.map(d=>d.data()));
    } catch(_){ setToast('Erro ao carregar dados'); }
    setLoading(false);
  }, [student.studentUid]);

  React.useEffect(() => { loadData(); }, [loadData]);

  const deletePlan = async (planId) => {
    if(!window._db||!confirm('Remover esta ficha do aluno?')) return;
    setDeletingId(planId);
    try {
      await window._db.collection('personal_plans').doc(student.studentUid).collection('plans').doc(planId).delete();
      setPersonalPlans(prev=>prev.filter(p=>p.id!==planId));
      setToast('Ficha removida');
    } catch(_){ setToast('Erro ao remover'); }
    setDeletingId(null);
  };

  const calcVolume = (entries) => { let v=0; (entries||[]).forEach(ex=>(ex.sets||[]).forEach(s=>{v+=(parseFloat(s.w)||0)*(parseInt(s.r)||0);})); return v; };
  const histEntries = Object.entries(history).sort((a,b)=>b[0]>a[0]?1:-1).slice(0,20);
  const TABS = [{id:'history',label:'📊 Histórico'},{id:'fichas',label:'📋 Fichas'},{id:'diet',label:'🥗 Dieta'}];

  if(showBuilder) return (
    <PlanBuilderModal studentUid={student.studentUid} studentName={student.name} personalName={prefs.name}
      onClose={()=>{ setShowBuilder(false); loadData(); }} setToast={setToast}/>
  );

  return (
    <div style={{padding:'1rem',maxWidth:'480px',margin:'0 auto'}}>
      <div style={{display:'flex',alignItems:'center',gap:'.75rem',marginBottom:'1.2rem'}}>
        <button onClick={onBack} style={{background:'rgba(255,255,255,.06)',border:'1px solid #1e1e1e',borderRadius:'8px',padding:'.4rem .7rem',color:'var(--color-text)',cursor:'pointer',fontSize:'1rem'}}>←</button>
        <div style={{width:'38px',height:'38px',borderRadius:'50%',background:'#1a1a1a',border:'2px solid #222',overflow:'hidden',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1.1rem',flexShrink:0}}>
          {student.photoURL ? <img src={student.photoURL} style={{width:'100%',height:'100%',objectFit:'cover'}}/> : '👤'}
        </div>
        <div>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:'1.1rem',textTransform:'uppercase'}}>{student.name}</div>
          <div style={{fontSize:'.7rem',color:'var(--color-text-sub)'}}>{histEntries.length} treinos registrados</div>
        </div>
      </div>

      <div style={{display:'flex',gap:'.4rem',marginBottom:'1rem',background:'rgba(0,0,0,.3)',borderRadius:'10px',padding:'.3rem'}}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)}
            style={{flex:1,background:tab===t.id?'var(--color-accent)':'none',border:'none',borderRadius:'7px',padding:'.45rem .3rem',color:tab===t.id?'#fff':'var(--color-text-sub)',fontWeight:700,fontSize:'.72rem',cursor:'pointer',transition:'all .2s'}}>
            {t.label}
          </button>
        ))}
      </div>

      {loading ? <div style={{textAlign:'center',padding:'2rem',color:'#444'}}>Carregando…</div>
      : tab==='history' ? (
        histEntries.length===0
          ? <div style={{textAlign:'center',padding:'2rem',color:'#444',fontSize:'.85rem'}}>Nenhum treino ainda.</div>
          : histEntries.map(([date,entry],i)=>{
              const vol=calcVolume(entry.entries);
              return (
                <div key={i} className="ds-card" style={{padding:'.75rem 1rem',marginBottom:'.4rem'}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                    <div>
                      <div style={{fontWeight:700,fontSize:'.85rem'}}>{entry.planName||'Treino livre'}</div>
                      <div style={{fontSize:'.7rem',color:'var(--color-text-sub)',marginTop:'2px'}}>{(entry.entries||[]).length} exercícios · {date}</div>
                    </div>
                    <div style={{textAlign:'right'}}>
                      <div style={{fontSize:'1.2rem'}}>💪</div>
                      {vol>0&&<div style={{fontSize:'.65rem',color:'var(--color-text-sub)'}}>{vol.toLocaleString('pt-BR')}kg</div>}
                    </div>
                  </div>
                  {(entry.entries||[]).length>0&&(
                    <div style={{marginTop:'.5rem',display:'flex',flexWrap:'wrap',gap:'.25rem'}}>
                      {(entry.entries||[]).slice(0,5).map((ex,j)=>(
                        <span key={j} style={{background:'rgba(255,255,255,.04)',border:'1px solid #1e1e1e',borderRadius:'6px',padding:'.15rem .45rem',fontSize:'.65rem',color:'#888'}}>{ex.name}</span>
                      ))}
                      {(entry.entries||[]).length>5&&<span style={{fontSize:'.65rem',color:'#444'}}>+{(entry.entries||[]).length-5}</span>}
                    </div>
                  )}
                </div>
              );
            })
      ) : tab==='fichas' ? (
        <div>
          <button onClick={()=>setShowBuilder(true)}
            style={{width:'100%',background:'var(--color-accent)',border:'none',borderRadius:'10px',padding:'.7rem',color:'#fff',fontWeight:800,fontSize:'.9rem',cursor:'pointer',marginBottom:'1rem'}}>
            + Criar Ficha para {student.name}
          </button>
          {personalPlans.length===0&&fichas.length===0&&(
            <div style={{textAlign:'center',padding:'1.5rem',color:'#444',fontSize:'.85rem'}}>Nenhuma ficha ainda. Crie uma acima.</div>
          )}
          {personalPlans.length>0&&(
            <div style={{marginBottom:'1rem'}}>
              <div style={{fontSize:'.72rem',fontWeight:700,color:'var(--color-accent)',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:'.4rem'}}>📋 Fichas do Personal</div>
              {personalPlans.map((f,i)=>(
                <div key={i} className="ds-card" style={{padding:'.75rem 1rem',marginBottom:'.4rem',display:'flex',alignItems:'center',gap:'.75rem'}}>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:700,fontSize:'.88rem'}}>{f.name}</div>
                    <div style={{fontSize:'.72rem',color:'var(--color-text-sub)',marginTop:'2px'}}>{Object.values(f.byDay||{}).reduce((a,b)=>a+b.length,0)} exercícios</div>
                  </div>
                  <button onClick={()=>deletePlan(f.id)} disabled={deletingId===f.id}
                    style={{background:'rgba(255,255,255,.04)',border:'1px solid #222',borderRadius:'8px',padding:'.35rem .6rem',color:'#555',fontSize:'.75rem',cursor:'pointer'}}>
                    {deletingId===f.id?'…':'✕'}
                  </button>
                </div>
              ))}
            </div>
          )}
          {fichas.length>0&&(
            <div>
              <div style={{fontSize:'.72rem',fontWeight:700,color:'#555',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:'.4rem'}}>Fichas do aluno</div>
              {fichas.map((f,i)=>(
                <div key={i} className="ds-card" style={{padding:'.75rem 1rem',marginBottom:'.4rem'}}>
                  <div style={{fontWeight:700,fontSize:'.88rem'}}>{f.name||'Ficha '+(i+1)}</div>
                  <div style={{fontSize:'.72rem',color:'var(--color-text-sub)',marginTop:'2px'}}>{Object.values(f.byDay||{}).reduce((a,b)=>a+b.length,0)} exercícios</div>
                </div>
              ))}
            </div>
          )}
        </div>
      ) : (
        <div style={{textAlign:'center',padding:'2rem',color:'#444'}}>
          <div style={{fontSize:'2rem',marginBottom:'.5rem'}}>🥗</div>
          <div style={{fontSize:'.85rem'}}>Prescrição de dieta em breve.</div>
        </div>
      )}
    </div>
  );
};

  ];

    localStorage.setItem('darkset.launched','1');

  const [plans,setPlans]=usePlans();

  const [isPersonal, setIsPersonal] = useState(()=>{ try{ return JSON.parse(localStorage.getItem('ds.isPersonal')||'false'); }catch(_){ return false; } });
  const ADMIN_UID = '3bZqslCsHxQIugjq9Tfd758hpu12';
  const isAdmin = getUID() === ADMIN_UID;
  window._DS_SETTERS = window._DS_SETTERS || {};
  const [paywallFeature, setPaywallFeature] = useState(null);

    window._DS_SETTERS.isPersonal = setIsPersonal;

      const stored = JSON.parse(localStorage.getItem('ds.isPersonal')||'false');

        setPlans(p=>({...p,list:[...p.list,{id,name:json.name,byDay:json.byDay||{}}]}));
        setToast("Ficha importada");
        window.history.replaceState({}, "", location.pathname);
      }
    };

    // Verifica ?import= na URL
    const params=new URLSearchParams(location.search);
    const imp=params.get("import");
    if(imp){
      try{
        const json=JSON.parse(decodeURIComponent(atob(imp).split('').map(c=>'%'+('00'+c.charCodeAt(0).toString(16)).slice(-2)).join('')));
        doImport(json);
      }catch(e){ alert("Link de importação inválido."); }
    }

    // Verifica import pendente do Firebase (?id=)
    if(window.__pendingImport){
      doImport(window.__pendingImport);
      window.__pendingImport = null;
    }

    // Escuta evento disparado pelo Firebase handler
    const handler = (e) => doImport(e.detail);
    window.addEventListener('darkset:import', handler);
    return () => window.removeEventListener('darkset:import', handler);
  },[]);

  const syncStatus = useSyncStatus();
  const [authed, setAuthed] = useState(()=>!!getUID());
  window._DS_SETTERS.authed = setAuthed;

      {authed && screen==="viewer" && <Viewer planId={(viewerPlanId||(plans.activeId||plans.list[0]?.id))} plans={plans} goto={goto}/>}
      {authed && screen==="profile" && <ScreenErrorBoundary><Profile prefs={prefs} setPrefs={setPrefs} history={history} setToast={setToast}/></ScreenErrorBoundary>}


      <footer style={{marginTop:'2rem',textAlign:'center',fontSize:'.65rem',color:'#2a2a2a',letterSpacing:'.08em',textTransform:'uppercase'}}>© {new Date().getFullYear()} DARKSET · V5.7.6</footer>
      {screen==="beats" && <PlaylistTreino prefs={prefs} setPrefs={setPrefs} setToast={setToast}/>}
      {screen==="gym"   && <GymMode prefs={prefs} setPrefs={setPrefs} setToast={setToast} goto={goto}/>}
      {prCelebration && <PRCelebration exName={prCelebration.exName} weight={prCelebration.weight} onClose={()=>setPrCelebration(null)}/>}
      {paywallFeature ? <PaywallModal feature={paywallFeature} onClose={function(){ setPaywallFeature(null); }} onTrial={function(){ startDSTrial(); setPlanState(getDSPlan()); setPaywallFeature(null); setToast('✨ Trial Elite ativo por 7 dias!'); }} trialUsed={trialUsed}/> : null}

      {toast && <Toast text={toast}/>}
    </div>
  );
}

<script>
(function(){
  const LS = {
    history: 'darkset.v3.history',
    measures: 'darkset.measures',
    cardio:   'darkset.cardio.history',
    diet:     'darkset.v1.diet',
  };
  const get = k => { try { return JSON.parse(localStorage.getItem(k)) || (k===LS.history?{}:(k===LS.measures?[]:(k===LS.diet?{}:[]))) } catch(_) { return k===LS.history||k===LS.diet?{}:[]; } };
  const num = v => { const n=parseFloat(String(v).replace(',','.')); return isFinite(n)?n:0; };
  const toBR = iso => { if(!iso) return ''; const [y,m,d]=iso.split('-'); return `${d}/${m}`; };
  const dayMs = 86400000;
  let charts = {};

  function destroyAll() {
    Object.values(charts).forEach(c => { try{c.destroy();}catch(_){} });
    charts = {};
  }

  function mkChart(id, type, labels, datasets, opts={}) {
    const el = document.getElementById(id);
    if(!el) return;
    if(charts[id]) { try{charts[id].destroy();}catch(_){} }
    charts[id] = new Chart(el, {
      type,
      data: { labels, datasets },
      options: {
        responsive:true, maintainAspectRatio:false,
        interaction:{mode:'index',intersect:false},
        plugins:{
          legend:{ display: datasets.length>1, labels:{color:'#888',boxWidth:10,font:{size:10}} },
          tooltip:{ callbacks:{ ...(opts.tooltipLabel?{label:opts.tooltipLabel}:{}) } }
        },
        scales: {
          x:{ ticks:{color:'#555',maxRotation:0,autoSkip:true,maxTicksLimit:8}, grid:{color:'rgba(255,255,255,.04)'} },
          y:{ beginAtZero: opts.noZero?false:true, ticks:{color:'#555'}, grid:{color:'rgba(255,255,255,.04)'} },
          ...(opts.y2 ? {y2:{type:'linear',position:'right',ticks:{color:'#888'},grid:{drawOnChartArea:false}}} : {})
        },
        ...opts.extra
      }
    });
  }

  // ── TREINO TAB ──────────────────────────────────────────────────────────
  function buildTreinoTab() {
    const hist = get(LS.history);
    const entries = Object.entries(hist).sort((a,b)=>a[0].localeCompare(b[0]));
    if(!entries.length){
      document.getElementById('dcBody').innerHTML='<div class="dc-empty">Nenhum treino registrado ainda.</div>';return;
    }

    // Weekly volume
    const wkVol = {};
    entries.forEach(([iso, obj]) => {
      const d = new Date(iso+'T00:00'); const start = new Date(d); start.setDate(d.getDate()-((d.getDay()+6)%7));
      const wk = start.toISOString().slice(0,10);
      const vol = (obj.entries||[]).reduce((a,en)=>(en.sets||[]).reduce((b,s)=>b+num(s.w)*num(s.r),a),0);
      wkVol[wk] = (wkVol[wk]||0)+vol;
    });

    // Exercise IIE - ALL exercises with data
    const exMap = {};
    // Muscle IIE
    const muscleMap = {};
    // Plan IIE (weekly)
    const planMap = {};
    entries.forEach(([iso,obj]) => {
      const d = new Date(iso+'T00:00'); const start = new Date(d); start.setDate(d.getDate()-((d.getDay()+6)%7));
      const wk = start.toISOString().slice(0,10);
      const planName = obj.planName||'Treino Livre';
      (obj.entries||[]).forEach(en => {
        // get muscle from EXS global
        const meta = (window.EXS||[]).find(e=>e.name===en.name);
        const muscle = meta?.primary||'Outros';
        (en.sets||[]).forEach(s => {
          const w=num(s.w),r=num(s.r); if(!r) return;
          const rw = {Falha:1,0:1,1:1,2:.92,3:.84,4:.75}[String(s.rir)]??0.9;
          const iie = (w>0?w*r:r)*rw/1000;
          // exercise
          if(!exMap[en.name]) exMap[en.name]={total:0,dates:{}};
          exMap[en.name].total+=iie;
          exMap[en.name].dates[iso]=(exMap[en.name].dates[iso]||0)+iie;
          // muscle
          if(!muscleMap[muscle]) muscleMap[muscle]={};
          muscleMap[muscle][wk]=(muscleMap[muscle][wk]||0)+iie;
          // plan
          if(!planMap[planName]) planMap[planName]={};
          planMap[planName][wk]=(planMap[planName][wk]||0)+iie;
        });
      });
    });

    const allExes = Object.entries(exMap).sort((a,b)=>b[1].total-a[1].total).map(([n])=>n);
    const allMuscles = Object.keys(muscleMap).sort();
    const allPlans = Object.keys(planMap).sort();

    const totalVol = entries.reduce((a,[,o])=>a+(o.entries||[]).reduce((b,en)=>(en.sets||[]).reduce((c,s)=>c+num(s.w)*num(s.r),b),0),0);
    const totalSets = entries.reduce((a,[,o])=>a+(o.entries||[]).reduce((b,en)=>b+(en.sets||[]).length,0),0);

    document.getElementById('dcBody').innerHTML = `
      <div class="dc-card">
        <div class="dc-stats">
          <div class="dc-stat-box"><div class="dc-stat-val">${entries.length}</div><div class="dc-stat-lbl">Treinos</div></div>
          <div class="dc-stat-box"><div class="dc-stat-val">${totalVol>=1000?(totalVol/1000).toFixed(1)+'t':Math.round(totalVol)+'kg'}</div><div class="dc-stat-lbl">Volume</div></div>
          <div class="dc-stat-box"><div class="dc-stat-val">${totalSets}</div><div class="dc-stat-lbl">Séries</div></div>
        </div>
      </div>
      <div class="dc-card">
        <div class="dc-card-title">Volume semanal (kg)</div>
        <div class="dc-pills" id="dcTreinoPills">
          <button class="dc-pill active" data-range="12">12 sem</button>
          <button class="dc-pill" data-range="26">6 meses</button>
          <button class="dc-pill" data-range="52">1 ano</button>
        </div>
        <div class="dc-canvas-wrap"><canvas id="cVolSem"></canvas></div>
      </div>
      <div class="dc-card">
        <div class="dc-card-title">IIE por exercício</div>
        <select id="dcExSelect" class="dc-select">${allExes.map(e=>`<option>${e}</option>`).join('')}</select>
        <div class="dc-canvas-wrap"><canvas id="cExIIE"></canvas></div>
        <div class="dc-formula">IIE = Volume × Fator RIR / 1000</div>
      </div>
      <div class="dc-card">
        <div class="dc-card-title">IIE por músculo (semanal)</div>
        <select id="dcMuscleSelect" class="dc-select">${allMuscles.map(m=>`<option>${m}</option>`).join('')}</select>
        <div class="dc-canvas-wrap"><canvas id="cMuscleIIE"></canvas></div>
      </div>
      <div class="dc-card">
        <div class="dc-card-title">IIE por ficha (semanal)</div>
        <select id="dcPlanSelect" class="dc-select">${allPlans.map(p=>`<option>${p}</option>`).join('')}</select>
        <div class="dc-canvas-wrap"><canvas id="cPlanIIE"></canvas></div>
      </div>
    `;

    function plotVolSem(range) {
      const keys = Object.keys(wkVol).sort().slice(-range);
      mkChart('cVolSem','bar', keys.map(toBR), [{
        label:'Volume (kg)', data:keys.map(k=>Math.round(wkVol[k])),
        backgroundColor:'rgba(227,27,35,.5)', borderColor:'#e31b23', borderWidth:1, borderRadius:4
      }]);
    }
    plotVolSem(12);
    document.getElementById('dcTreinoPills')?.addEventListener('click', e=>{
      const btn=e.target.closest('.dc-pill'); if(!btn) return;
      document.querySelectorAll('#dcTreinoPills .dc-pill').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active'); plotVolSem(Number(btn.dataset.range));
    });

    function plotExIIE(exName) {
      const d=exMap[exName]; if(!d) return;
      const dates=Object.keys(d.dates).sort().slice(-30);
      mkChart('cExIIE','line',dates.map(toBR),[{
        label:'IIE', data:dates.map(k=>+d.dates[k].toFixed(3)),
        borderColor:'#e31b23', backgroundColor:'rgba(227,27,35,.1)', fill:true, tension:.3, pointRadius:3
      }]);
    }
    function plotMuscleIIE(muscle) {
      const d=muscleMap[muscle]||{}; const wks=Object.keys(d).sort().slice(-16);
      mkChart('cMuscleIIE','bar',wks.map(toBR),[{
        label:muscle, data:wks.map(k=>+d[k].toFixed(3)),
        backgroundColor:'rgba(99,102,241,.55)', borderColor:'#6366f1', borderWidth:1, borderRadius:4
      }]);
    }
    function plotPlanIIE(plan) {
      const d=planMap[plan]||{}; const wks=Object.keys(d).sort().slice(-16);
      mkChart('cPlanIIE','bar',wks.map(toBR),[{
        label:plan, data:wks.map(k=>+d[k].toFixed(3)),
        backgroundColor:'rgba(251,146,60,.55)', borderColor:'#fb923c', borderWidth:1, borderRadius:4
      }]);
    }
    if(allExes[0]) plotExIIE(allExes[0]);
    if(allMuscles[0]) plotMuscleIIE(allMuscles[0]);
    if(allPlans[0]) plotPlanIIE(allPlans[0]);
    document.getElementById('dcExSelect')?.addEventListener('change',e=>plotExIIE(e.target.value));
    document.getElementById('dcMuscleSelect')?.addEventListener('change',e=>plotMuscleIIE(e.target.value));
    document.getElementById('dcPlanSelect')?.addEventListener('change',e=>plotPlanIIE(e.target.value));
  }

  // ── PESO TAB ─────────────────────────────────────────────────────────────
  function buildPesoTab() {
    const measures = get(LS.measures);
    const sorted = [...measures].sort((a,b)=>a.date?.localeCompare(b.date));
    const hasPeso = sorted.some(m=>m.peso);
    const hasGord = sorted.some(m=>m.gordura);

    if(!hasPeso) {
      document.getElementById('dcBody').innerHTML = '<div class="dc-empty" style="padding:3rem 2rem"><div style="font-size:2rem;margin-bottom:.75rem">⚖️</div><div>Sem dados de peso ainda.</div><div style="margin-top:.35rem;font-size:.72rem;color:#2a2a2a">Registre medições em DarkBody → Medidas</div></div>';
      return;
    }
    document.getElementById('dcBody').innerHTML = `
      <div class="dc-card">
        <div class="dc-card-title">Peso corporal (kg)</div>
        <div class="dc-canvas-wrap"><canvas id="cPeso"></canvas></div>
      </div>
      ${hasGord ? `
      <div class="dc-card">
        <div class="dc-card-title">% Gordura</div>
        <div class="dc-canvas-wrap"><canvas id="cGord"></canvas></div>
      </div>` : ''}
      ${hasPeso && hasGord ? `
      <div class="dc-card">
        <div class="dc-card-title">Massa magra estimada (kg)</div>
        <div class="dc-canvas-wrap"><canvas id="cMassa"></canvas></div>
        <div class="dc-formula">Massa magra = Peso × (1 − %Gordura/100)</div>
      </div>` : ''}
    `;
    const labels = sorted.filter(m=>m.peso).map(m=>toBR(m.date));
    const pesos = sorted.filter(m=>m.peso).map(m=>num(m.peso));
    mkChart('cPeso','line', labels, [{
      label:'Peso', data:pesos, borderColor:'#60a5fa', backgroundColor:'rgba(96,165,250,.1)',
      fill:true, tension:.3, pointRadius:4
    }], {noZero:true});

    if(hasGord) {
      const gl = sorted.filter(m=>m.gordura).map(m=>toBR(m.date));
      const gv = sorted.filter(m=>m.gordura).map(m=>num(m.gordura));
      mkChart('cGord','line', gl, [{
        label:'% Gordura', data:gv, borderColor:'#f87171', backgroundColor:'rgba(248,113,113,.1)',
        fill:true, tension:.3, pointRadius:4
      }], {noZero:true});
    }

    // Massa magra
    const massaData = sorted.filter(m=>m.peso && m.gordura).map(m=>({
      date:m.date, val: +(num(m.peso)*(1-num(m.gordura)/100)).toFixed(1)
    }));
    if(massaData.length > 0) {
      mkChart('cMassa','line', massaData.map(m=>toBR(m.date)), [{
        label:'Massa Magra (kg)', data:massaData.map(m=>m.val),
        borderColor:'#4ade80', backgroundColor:'rgba(74,222,128,.1)',
        fill:true, tension:.3, pointRadius:4
      }], {noZero:true});
    }
  }

  // ── CARDIO TAB ────────────────────────────────────────────────────────────
  function buildCardioTab() {
    const cardio = get(LS.cardio);
    if(!cardio.length) {
      document.getElementById('dcBody').innerHTML = '<div class="dc-empty">Sem sessões de cardio registradas.</div>';
      return;
    }
    const sorted = [...cardio].sort((a,b)=>a.date?.localeCompare(b.date));
    const labels = sorted.map(s=>toBR(s.date?.slice(0,10)));
    const tempos = sorted.map(s=>Math.round((s.tempo||0)/60));
    const cals   = sorted.map(s=>num(s.metrics?.calorias));
    const dists  = sorted.map(s=>num(s.metrics?.distancia));

    // By type
    const byType = {};
    cardio.forEach(s => {
      byType[s.typeName||s.type] = (byType[s.typeName||s.type]||0)+1;
    });

    document.getElementById('dcBody').innerHTML = `
      <div class="dc-card">
        <div class="dc-card-title">Tempo por sessão (min)</div>
        <div class="dc-canvas-wrap"><canvas id="cCardioTempo"></canvas></div>
      </div>
      ${cals.some(v=>v>0) ? `
      <div class="dc-card">
        <div class="dc-card-title">Calorias queimadas</div>
        <div class="dc-canvas-wrap"><canvas id="cCardioCal"></canvas></div>
      </div>` : ''}
      ${dists.some(v=>v>0) ? `
      <div class="dc-card">
        <div class="dc-card-title">Distância (km)</div>
        <div class="dc-canvas-wrap"><canvas id="cCardioDist"></canvas></div>
      </div>` : ''}
      <div class="dc-card">
        <div class="dc-card-title">Modalidades</div>
        <div class="dc-canvas-wrap" style="height:140px"><canvas id="cCardioType"></canvas></div>
      </div>
    `;

    mkChart('cCardioTempo','bar', labels, [{
      data:tempos, backgroundColor:'rgba(99,102,241,.5)', borderColor:'#6366f1',
      borderWidth:1, borderRadius:4, label:'Minutos'
    }]);
    if(cals.some(v=>v>0)) mkChart('cCardioCal','line', labels, [{
      data:cals, borderColor:'#fb923c', backgroundColor:'rgba(251,146,60,.1)',
      fill:true, tension:.3, label:'kcal'
    }]);
    if(dists.some(v=>v>0)) mkChart('cCardioDist','line', labels, [{
      data:dists, borderColor:'#34d399', backgroundColor:'rgba(52,211,153,.1)',
      fill:true, tension:.3, label:'km'
    }], {noZero:true});

    const typeNames = Object.keys(byType);
    const typeVals  = typeNames.map(k=>byType[k]);
    mkChart('cCardioType','doughnut', typeNames, [{
      data:typeVals,
      backgroundColor:['#e31b23','#6366f1','#34d399','#fb923c','#60a5fa','#f472b6'].slice(0,typeNames.length),
      borderWidth:0
    }], {extra:{plugins:{legend:{display:true,position:'right',labels:{color:'#888',font:{size:11}}}}}});
  }

  // ── DIETA TAB ─────────────────────────────────────────────────────────────
  function buildDietaTab() {
    const diet = get(LS.diet);
    const days = Object.entries(diet).sort((a,b)=>a[0].localeCompare(b[0])).slice(-30);
    if(!days.length) {
      document.getElementById('dcBody').innerHTML = '<div class="dc-empty">Sem dados de dieta. Registre em DarkDiet.</div>';
      return;
    }

    const labels = days.map(([d])=>toBR(d));
    const cals = days.map(([,meals])=>(meals||[]).reduce((a,m)=>a+num(m.calories),0));
    const prots = days.map(([,meals])=>(meals||[]).reduce((a,m)=>a+num(m.protein),0));
    const carbs = days.map(([,meals])=>(meals||[]).reduce((a,m)=>a+num(m.carbs),0));
    const fats  = days.map(([,meals])=>(meals||[]).reduce((a,m)=>a+num(m.fat),0));

    const goals = (() => { try{return JSON.parse(localStorage.getItem('ds_diet_goals'))||{calories:2000,protein:150};}catch(_){return{calories:2000,protein:150};} })();
    const avgCal = Math.round(cals.reduce((a,b)=>a+b,0)/cals.length);

    document.getElementById('dcBody').innerHTML = `
      <div class="dc-card">
        <div class="dc-stats">
          <div class="dc-stat-box"><div class="dc-stat-val">${avgCal}</div><div class="dc-stat-lbl">Média kcal</div></div>
          <div class="dc-stat-box"><div class="dc-stat-val">${goals.calories}</div><div class="dc-stat-lbl">Meta kcal</div></div>
          <div class="dc-stat-box"><div class="dc-stat-val" style="color:${avgCal>=goals.calories*0.9&&avgCal<=goals.calories*1.1?'#4ade80':'#f87171'}">${avgCal>=goals.calories*0.9&&avgCal<=goals.calories*1.1?'Na meta':'Fora'}</div><div class="dc-stat-lbl">Status</div></div>
        </div>
      </div>
      <div class="dc-card">
        <div class="dc-card-title">Calorias diárias (últimos 30 dias)</div>
        <div class="dc-canvas-wrap"><canvas id="cDietaCal"></canvas></div>
      </div>
      <div class="dc-card">
        <div class="dc-card-title">Macros acumulados (g)</div>
        <div class="dc-canvas-wrap"><canvas id="cDietaMacros"></canvas></div>
      </div>
    `;

    mkChart('cDietaCal','bar', labels, [
      { label:'Calorias', data:cals, backgroundColor:'rgba(251,146,60,.5)', borderColor:'#fb923c', borderWidth:1, borderRadius:3 },
      { label:'Meta', data:labels.map(()=>goals.calories), type:'line', borderColor:'rgba(255,255,255,.3)', borderDash:[4,3], borderWidth:1.5, pointRadius:0, fill:false }
    ]);

    mkChart('cDietaMacros','bar', labels, [
      { label:'Proteína', data:prots, backgroundColor:'rgba(74,222,128,.6)', stack:'a' },
      { label:'Carbs',    data:carbs, backgroundColor:'rgba(250,204,21,.6)', stack:'a' },
      { label:'Gordura',  data:fats,  backgroundColor:'rgba(248,113,113,.6)', stack:'a' },
    ], {extra:{scales:{x:{stacked:true},y:{stacked:true,ticks:{color:'#555'},grid:{color:'rgba(255,255,255,.04)'}}}}});
  }

  // ── COMPOSIÇÃO TAB ────────────────────────────────────────────────────────
  function buildComposicaoTab() {
    const measures = get(LS.measures);
    const cardio   = get(LS.cardio);
    const diet     = get(LS.diet);
    const sorted   = [...measures].sort((a,b)=>a.date?.localeCompare(b.date));

        if(sorted.length < 2) {
      document.getElementById('dcBody').innerHTML = '<div class="dc-empty" style="padding:3rem 2rem"><div style="font-size:2rem;margin-bottom:.75rem">🔬</div><div>Precisa de ao menos 2 medições.</div><div style="margin-top:.35rem;font-size:.72rem;color:#2a2a2a">Registre peso + gordura em DarkBody para ver composição.</div></div>';
      return;
    }

    // Weekly cardio minutes
    const wkCardio = {};
    cardio.forEach(s => {
      const d = new Date((s.date||'').slice(0,10)+'T00:00');
      const start = new Date(d); start.setDate(d.getDate()-((d.getDay()+6)%7));
      const wk = start.toISOString().slice(0,10);
      wkCardio[wk] = (wkCardio[wk]||0)+Math.round((s.tempo||0)/60);
    });

    // Weekly calories
    const wkDiet = {};
    Object.entries(diet).forEach(([iso,meals]) => {
      const d = new Date(iso+'T00:00');
      const start = new Date(d); start.setDate(d.getDate()-((d.getDay()+6)%7));
      const wk = start.toISOString().slice(0,10);
      const cal = (meals||[]).reduce((a,m)=>a+num(m.calories),0);
      wkDiet[wk] = (wkDiet[wk]||0)+cal;
    });

    // Peso vs Cardio (se ambos existirem)
    const pesoComCardio = sorted.filter(m=>m.peso).map(m=>{
      const d = new Date(m.date+'T00:00');
      const start = new Date(d); start.setDate(d.getDate()-((d.getDay()+6)%7));
      const wk = start.toISOString().slice(0,10);
      return { date:m.date, peso:num(m.peso), cardioMin:wkCardio[wk]||0, dietaCal:wkDiet[wk]||0 };
    });

    const last = sorted[sorted.length-1];
    const first = sorted[0];
    const pesoChange = last.peso && first.peso ? (num(last.peso)-num(first.peso)).toFixed(1) : null;
    const gordChange = last.gordura && first.gordura ? (num(last.gordura)-num(first.gordura)).toFixed(1) : null;
    const massaChange = (last.peso && last.gordura && first.peso && first.gordura)
      ? ((num(last.peso)*(1-num(last.gordura)/100)) - (num(first.peso)*(1-num(first.gordura)/100))).toFixed(1) : null;

    const arw = v => v===null?'–':(Number(v)>0?`<span style="color:#f87171">+${v}</span>`:`<span style="color:#4ade80">${v}</span>`);

    document.getElementById('dcBody').innerHTML = `
      <div class="dc-card">
        <div class="dc-card-title">Variação total</div>
        <div class="dc-stats">
          <div class="dc-stat-box"><div class="dc-stat-val">${pesoChange!==null?arw(pesoChange)+'kg':'–'}</div><div class="dc-stat-lbl">Peso</div></div>
          <div class="dc-stat-box"><div class="dc-stat-val">${gordChange!==null?arw(gordChange)+'%':'–'}</div><div class="dc-stat-lbl">Gordura</div></div>
          <div class="dc-stat-box"><div class="dc-stat-val">${massaChange!==null?arw(massaChange)+'kg':'–'}</div><div class="dc-stat-lbl">Massa magra</div></div>
        </div>
      </div>
      ${pesoComCardio.some(p=>p.cardioMin>0) ? `
      <div class="dc-card">
        <div class="dc-card-title">Peso × Cardio semanal</div>
        <div class="dc-canvas-wrap"><canvas id="cPesoCardio"></canvas></div>
        <div class="dc-formula">Correlação entre minutos de cardio e variação de peso</div>
      </div>` : ''}
      ${pesoComCardio.some(p=>p.dietaCal>0) ? `
      <div class="dc-card">
        <div class="dc-card-title">Peso × Ingestão calórica semanal</div>
        <div class="dc-canvas-wrap"><canvas id="cPesoDieta"></canvas></div>
        <div class="dc-formula">Peso medido vs calorias ingeridas na semana anterior</div>
      </div>` : ''}
      <div class="dc-card">
        <div class="dc-card-title">Índice de Recomposição Corporal</div>
        <div class="dc-canvas-wrap"><canvas id="cRecomp"></canvas></div>
        <div class="dc-formula">IRC = (Δ Massa Magra − Δ Gordura absoluta) / Nº semanas · positivo = recomposição</div>
      </div>
    `;

    // Peso × Cardio
    if(pesoComCardio.some(p=>p.cardioMin>0)) {
      mkChart('cPesoCardio','line',
        pesoComCardio.map(p=>toBR(p.date)),
        [
          { label:'Peso (kg)', data:pesoComCardio.map(p=>p.peso), borderColor:'#60a5fa', yAxisID:'y', tension:.3, pointRadius:3 },
          { label:'Cardio (min/sem)', data:pesoComCardio.map(p=>p.cardioMin), borderColor:'#34d399', yAxisID:'y2', tension:.3, borderDash:[3,2], pointRadius:3 },
        ], {noZero:true, y2:true}
      );
    }

    // Peso × Dieta
    if(pesoComCardio.some(p=>p.dietaCal>0)) {
      mkChart('cPesoDieta','line',
        pesoComCardio.map(p=>toBR(p.date)),
        [
          { label:'Peso (kg)', data:pesoComCardio.map(p=>p.peso), borderColor:'#60a5fa', yAxisID:'y', tension:.3, pointRadius:3 },
          { label:'kcal/sem', data:pesoComCardio.map(p=>Math.round(p.dietaCal/7)), borderColor:'#fb923c', yAxisID:'y2', tension:.3, borderDash:[3,2], pointRadius:3 },
        ], {noZero:true, y2:true}
      );
    }

    // IRC chart
    const ircData = sorted.filter(m=>m.peso&&m.gordura).map(m=>{
      const p=num(m.peso), g=num(m.gordura)/100;
      return { date:m.date, mm:+(p*(1-g)).toFixed(2), gabs:+(p*g).toFixed(2) };
    });
    if(ircData.length>=2) {
      const irc = ircData.slice(1).map((d,i)=>{
        const prev=ircData[i];
        const dMM=d.mm-prev.mm, dGabs=d.gabs-prev.gabs;
        return +(dMM-dGabs).toFixed(2);
      });
      mkChart('cRecomp','bar',
        ircData.slice(1).map(d=>toBR(d.date)),
        [{ label:'IRC', data:irc,
          backgroundColor: irc.map(v=>v>=0?'rgba(74,222,128,.5)':'rgba(248,113,113,.4)'),
          borderColor: irc.map(v=>v>=0?'#4ade80':'#f87171'),
          borderWidth:1, borderRadius:4
        }]
      );
    }
  }

  // ── INIT ──────────────────────────────────────────────────────────────────
  const TAB_BUILDERS = { treino:buildTreinoTab, peso:buildPesoTab, cardio:buildCardioTab, dieta:buildDietaTab, composicao:buildComposicaoTab };
  let currentTab = 'treino';

  document.getElementById('dcTabs')?.addEventListener('click', e=>{
    const btn = e.target.closest('.dc-tab'); if(!btn) return;
    document.querySelectorAll('.dc-tab').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentTab = btn.dataset.tab;
    destroyAll();
    TAB_BUILDERS[currentTab]?.();
  });

  document.getElementById('dcClose')?.addEventListener('click', ()=>window.closeDarkCharts());
  document.getElementById('dcBackdrop')?.addEventListener('click', e=>{
    if(e.target===document.getElementById('dcBackdrop')) window.closeDarkCharts();
  });

  window.openDarkCharts = function(tab) {
    currentTab = tab || 'treino';
    document.querySelectorAll('.dc-tab').forEach(b=>b.classList.toggle('active', b.dataset.tab===currentTab));
    document.getElementById('dcBackdrop').style.display='flex';
    document.body.style.overflow = 'hidden';
    destroyAll();
    TAB_BUILDERS[currentTab]?.();
  };
  window.closeDarkCharts = function() {
    document.getElementById('dcBackdrop').style.display='none';
    document.body.style.overflow = '';
    destroyAll();
  };

  // Keep old openChartsModal working
  window.openChartsModal = () => window.openDarkCharts('treino');
  window.closeChartsModal = window.closeDarkCharts;
})();
</script>

<script>
(function(){
  // ---- Helpers b64 ----
  function b64ToJson(b64){
    try{ return JSON.parse(decodeURIComponent(atob(b64).split('').map(c=>'%'+('00'+c.charCodeAt(0).toString(16)).slice(-2)).join(''))); }catch(e){ return null; }
  }
  function jsonToB64(obj){
    try{ return btoa(encodeURIComponent(JSON.stringify(obj)).replace(/%([0-9A-F]{2})/g,(_,p)=>String.fromCharCode('0x'+p))); }catch(e){ return ''; }
  }

  // ---- Handle ?id= param (share link) ----
  async function handleIdParam(){
    try{
      var url = new URL(location.href);
      var id = url.searchParams.get('id');
      if(!id) return;
      if(!window._db) return;
      var snap = await window._db.collection('fichas').doc(id).get();
      if(!snap.exists) return;
      var data = snap.data() || {};
      var payload = { name: data.name || data.title || "Importada", byDay: data.byDay || data.Semana || data.semana || {} };
      window.history.replaceState({}, '', location.pathname);
      window.__pendingImport = payload;
      window.dispatchEvent(new CustomEvent('darkset:import', { detail: payload }));
    }catch(e){ console.warn('handleIdParam error', e); }
  }

  // ---- Shorten share link via Firestore ----
  var replacedOnce = false;
  async function fireStoreShorten(){
    try{
      if(replacedOnce) return;
      var inp = document.getElementById('share-link');
      if(!inp) return;
      var val = inp.value || '';
      var imp = null;
      if(val.includes('?import=')) imp = (new URL(val, location.href)).searchParams.get('import');
      if(!imp) return;
      var qb = document.getElementById('qr-box');
      if(qb) qb.innerHTML = '<div style="padding:6px;font-size:12px;opacity:.8">Gerando link curto…</div>';
      inp.value = 'gerando…';
      if(!window._db) return;
      var obj = b64ToJson(imp);
      if(!obj || !obj.byDay) return;
      var docRef = await window._db.collection('fichas').add(Object.assign({}, obj, { ts: Date.now() }));
      var shortUrl = location.origin + '/?id=' + docRef.id;
      inp.value = shortUrl;
      if(qb && window.QRCode){ qb.innerHTML=''; new QRCode(qb, { text: shortUrl, width: 196, height: 196 }); }
      replacedOnce = true;
    }catch(e){ console.warn('fireStoreShorten error', e); }
  }

  // ---- MutationObserver para o modal de compartilhamento ----
  var mo = new MutationObserver(function(){
    if(document.getElementById('share-link')) fireStoreShorten();
  });

  // ---- Init Firebase com retry ----
  var initAttempts = 0;
  function tryInitFirebase(){
    initAttempts++;
    if(typeof firebase === 'undefined'){
      if(initAttempts < 20) setTimeout(tryInitFirebase, 300);
      else console.warn('Firebase SDK não carregou após várias tentativas');
      return;
    }
    try{
      var firebaseConfig = {
        apiKey: "AIzaSyB3bu3XercwmnlV0jdaldoXvd5gnHfj0GU",
        authDomain: "darkset-538d1.firebaseapp.com",
        projectId: "darkset-538d1",
        storageBucket: "darkset-538d1.firebasestorage.app",
        messagingSenderId: "354165019689",
        appId: "1:354165019689:web:dc458f0a61e26e6289f838",
        measurementId: "G-PVJ7QJ0T7F"
      };
      if(!firebase.apps.length) firebase.initializeApp(firebaseConfig);
      window._db   = firebase.firestore();
      window._auth = firebase.auth();
    }catch(e){ console.warn('Firebase init failed', e); return; }

    // ---- DSAuth API ----
    // NOTE: Firestore rules needed for squads (shared collection):
    // Add to Firebase Console > Firestore > Rules:
    //   match /squads/{squadCode}/{document=**} {
    //     allow read: if request.auth != null;
    //     allow write: if request.auth != null;
    //   }
    try{
      var auth = window._auth;
      var db   = window._db;
      window.DSAuth = {
        signInGoogle: async function(){
          var provider = new firebase.auth.GoogleAuthProvider();
          provider.setCustomParameters({ prompt: 'select_account' });
          try{ await auth.signInWithPopup(provider); }
          catch(e){
            if(e.code==='auth/popup-blocked'||e.code==='auth/operation-not-supported-in-this-environment'){
              await auth.signInWithPopup(provider);
            } else { throw e; }
          }
        },
        signInApple: async function(){
          var provider = new firebase.auth.OAuthProvider('apple.com');
          provider.addScope('email'); provider.addScope('name');
          try{ await auth.signInWithPopup(provider); }
          catch(e){
            if(e.code==='auth/popup-blocked'||e.code==='auth/operation-not-supported-in-this-environment'){
              await auth.signInWithPopup(provider); // Safari: always popup
            } else { throw e; }
          }
        },
        signUpEmail: function(email, pass, name){
          return auth.createUserWithEmailAndPassword(email, pass).then(function(cred){
            var user = cred.user;
            var chain = Promise.resolve();
            if(name) chain = chain.then(function(){ return user.updateProfile({ displayName: name }); });
            chain = chain.then(function(){ return user.sendEmailVerification(); });
            return chain;
          });
        },
        signInEmail: function(email, pass){
          return auth.signInWithEmailAndPassword(email, pass);
        },
        signOut: function(){ return auth.signOut(); }
      };

      auth.onAuthStateChanged(async function(user){
        try{
          if(user){
            var info = { uid: user.uid, email: user.email||null, displayName: user.displayName||null, photoURL: user.photoURL||null, lastLogin: Date.now() };
            localStorage.setItem('darkset.user', JSON.stringify(info));
            try{ if(db) await db.collection('users').doc(user.uid).set({ email: info.email, name: info.displayName, photoURL: info.photoURL, updatedAt: Date.now() }, { merge: true }); }catch(_){}
            try{
              var prefs = JSON.parse(localStorage.getItem('darkset.v3.prefs')||'{}');
              if(info.displayName && !prefs.name){ prefs.name = info.displayName; localStorage.setItem('darkset.v3.prefs', JSON.stringify(prefs)); }
            }catch(_){}
            // ── Pull cloud data — wait for React to be ready ──
            if(window.DSSync){
              // Clear local data before pulling - ensures switching accounts is clean
              var clearKeys = [
                'darkset.v3.plans','darkset.v3.history','darkset.v3.prefs',
                'darkset.v1.diet','darkset.measures','darkset.cardio.history',
                'ds.squad','ds_diet_plans','ds_diet_goals','darkset.progress','ds.planData','ds.isPersonal'
              ];
              clearKeys.forEach(function(k){ localStorage.removeItem(k); });
              if(window._DS_SETTERS){
                if(window._DS_SETTERS.plans)   window._DS_SETTERS.plans({list:[],activeId:null});
                if(window._DS_SETTERS.history) window._DS_SETTERS.history({});
                if(window._DS_SETTERS.isPersonal) window._DS_SETTERS.isPersonal(false);
              }
              // Retry até os setters do React estarem registrados (max 3s)
              var attempts=0;
              var tryPull=function(){
                attempts++;
                if(window._DS_SETTERS && window._DS_SETTERS.plans && window._DS_SETTERS.isPersonal){
                  window.DSSync.pull(user.uid);
                } else if(attempts<30){
                  setTimeout(tryPull,100);
                } else {
                  window.DSSync.pull(user.uid);
                }
              };
              setTimeout(tryPull,200);
            }
            if(window.closeAuthModal) closeAuthModal();
            if(window._DS_SETTERS && window._DS_SETTERS.authed) window._DS_SETTERS.authed(true);
          } else {
            // Clear all user data on logout
            var keysToRemove = [
              'darkset.user',
              'darkset.v3.plans', 'darkset.v3.history', 'darkset.v3.prefs',
              'darkset.v1.diet', 'darkset.measures', 'darkset.cardio.history',
              'ds.squad', 'darkset.squad.v1', 'darkset.squad.checkins', 'darkset.squad.chat',
              'ds_diet_plans', 'ds_diet_goals', 'darkset.progress', 'ds.planData', 'ds.isPersonal'
            ];
            keysToRemove.forEach(function(k){ localStorage.removeItem(k); });
            // Reset React state to empty
            if(window._DS_SETTERS){
              if(window._DS_SETTERS.plans)   window._DS_SETTERS.plans({list:[],activeId:null});
              if(window._DS_SETTERS.history) window._DS_SETTERS.history({});
              if(window._DS_SETTERS.prefs)   window._DS_SETTERS.prefs({name:'',avatar:'💀',unit:'kg',vibrate:true,weeklyGoal:5,showTimer:true,timerPreset:60,rirDefault:2,chartsPremium:false});
              if(window._DS_SETTERS.authed)  window._DS_SETTERS.authed(false);
              if(window._DS_SETTERS.isPersonal) window._DS_SETTERS.isPersonal(false);
            }
          }
        }catch(_){}
      });

      // signInWithPopup used — no redirect result needed
    }catch(e){ console.warn('DSAuth init error', e); }

    // Inicia observadores após Firebase pronto
    mo.observe(document.getElementById('root') || document.body, { subtree: true, childList: true });
    handleIdParam();
    fireStoreShorten();
  }

  // Inicia com pequeno delay para garantir que os SDKs externos carregaram
  setTimeout(tryInitFirebase, 100);
})();
</script>

<script>
(function(){
  var mode = 'signIn';
  var backdrop = document.getElementById('authModalBackdrop');
  var titleEl  = document.getElementById('authModalTitle');
  var closeBtn = document.getElementById('authCloseBtn');
  var googleBtn= document.getElementById('authGoogleBtn');
  var primaryBtn=document.getElementById('authPrimaryBtn');
  var toggleRow= document.getElementById('authToggleRow');
  var nameField= document.getElementById('authNameField');
  var nameInput= document.getElementById('authNameInput');
  var emailInput=document.getElementById('authEmailInput');
  var passInput= document.getElementById('authPassInput');
  var errorEl  = document.getElementById('authError');
  var termsField=document.getElementById('authTermsField');
  var termsCheck=document.getElementById('authTermsCheck');

  function showError(msg){ if(errorEl){ errorEl.textContent=msg; errorEl.style.display=msg?'block':'none'; } }

  function setMode(m){
    mode = m;
    var isUp = mode==='signUp';
    if(titleEl)    titleEl.textContent    = isUp ? 'Criar sua conta' : 'Entrar na sua conta';
    if(primaryBtn) primaryBtn.textContent = isUp ? 'Criar conta' : 'Entrar';
    if(nameField)  nameField.style.display  = isUp ? 'flex' : 'none';
    if(termsField) termsField.style.display = isUp ? 'block' : 'none';
    if(termsCheck) termsCheck.checked = false;
    if(toggleRow){
      toggleRow.innerHTML = isUp
        ? 'Já tem uma conta? <button id="authToggleBtn">Entrar</button>'
        : 'Ainda não tem uma conta? <button id="authToggleBtn">Criar conta</button>';
      var tb=document.getElementById('authToggleBtn');
      if(tb) tb.addEventListener('click',function(){ setMode(mode==='signUp'?'signIn':'signUp'); showError(''); });
    }
    if(passInput) passInput.setAttribute('autocomplete', isUp ? 'new-password' : 'current-password');
    showError('');
  }

  window.openAuthModal = function(m){
    if(!backdrop) backdrop=document.getElementById('authModalBackdrop');
    setMode(m||'signIn');
    if(backdrop){backdrop.style.display='flex';backdrop.setAttribute('aria-hidden','false');}
    var gb=document.getElementById('authGoogleBtn');
    if(gb){ gb.disabled=false; gb.innerHTML='<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path fill="#4285F4" d="M23.5 12.27c0-.84-.07-1.45-.22-2.09H12.22v3.8h6.42c-.13 1.01-.83 2.53-2.39 3.55l-.02.13 3.47 2.69.24.02c2.19-2.02 3.46-4.99 3.46-8.1z"/><path fill="#34A853" d="M12.22 23.5c3.14 0 5.77-1.03 7.69-2.82l-3.66-2.83c-.98.67-2.31 1.14-4.03 1.14-3.08 0-5.68-2.02-6.61-4.82l-.12.01-3.58 2.77-.05.11C2.83 21 7.19 23.5 12.22 23.5z"/><path fill="#FBBC05" d="M5.61 14.17c-.24-.73-.38-1.52-.38-2.35 0-.82.14-1.61.37-2.35l-.01-.16-3.62-2.8-.12.06C.75 8.26.22 10.06.22 11.82c0 1.76.53 3.56 1.63 5.25l3.76-2.9z"/><path fill="#EA4335" d="M12.22 4.64c2.18 0 3.64.94 4.48 1.72l3.26-3.18C17.98 1.2 15.36.14 12.22.14 7.19.14 2.83 2.63.75 6.4l3.84 2.98C5.52 7.58 8.12 4.64 12.22 4.64z"/></svg>Continuar com Google'; }
  };
  window.closeAuthModal = function(){
    if(!backdrop) backdrop=document.getElementById('authModalBackdrop');
    if(backdrop){backdrop.style.display='none';backdrop.setAttribute('aria-hidden','true');}

  // Google — termos aceitos implicitamente (aviso visível abaixo do botão)
  googleBtn && googleBtn.addEventListener('click', async function(){
    showError('');
    if(!window.DSAuth) return showError('Firebase não carregou. Tente recarregar a página.');

      googleBtn.disabled = false;
      googleBtn.innerHTML = '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path fill="#4285F4" d="M23.5 12.27c0-.84-.07-1.45-.22-2.09H12.22v3.8h6.42c-.13 1.01-.83 2.53-2.39 3.55l-.02.13 3.47 2.69.24.02c2.19-2.02 3.46-4.99 3.46-8.1z"/><path fill="#34A853" d="M12.22 23.5c3.14 0 5.77-1.03 7.69-2.82l-3.66-2.83c-.98.67-2.31 1.14-4.03 1.14-3.08 0-5.68-2.02-6.61-4.82l-.12.01-3.58 2.77-.05.11C2.83 21 7.19 23.5 12.22 23.5z"/><path fill="#FBBC05" d="M5.61 14.17c-.24-.73-.38-1.52-.38-2.35 0-.82.14-1.61.37-2.35l-.01-.16-3.62-2.8-.12.06C.75 8.26.22 10.06.22 11.82c0 1.76.53 3.56 1.63 5.25l3.76-2.9z"/><path fill="#EA4335" d="M12.22 4.64c2.18 0 3.64.94 4.48 1.72l3.26-3.18C17.98 1.2 15.36.14 12.22.14 7.19.14 2.83 2.63.75 6.4l3.84 2.98C5.52 7.58 8.12 4.64 12.22 4.64z"/></svg>Continuar com Google';
    };
    googleBtn.textContent = 'Aguarde…'; googleBtn.disabled = true;
    try{
      await DSAuth.signInGoogle();
      // success - onAuthStateChanged will close modal
    }catch(e){
      var code = e && e.code ? e.code : '';
      if(code === 'auth/popup-closed-by-user' || code === 'auth/cancelled-popup-request'){
        // User closed popup - just reset, no error
      } else {
        showError(e && e.message ? e.message : 'Erro ao entrar com Google.');
      }
    }finally{
      _resetBtn();
    }
  });

  primaryBtn && primaryBtn.addEventListener('click', async function(){
    showError('');
    var email = (emailInput && emailInput.value||'').trim();
    var pass  = (passInput  && passInput.value ||'').trim();
    var name  = (nameInput  && nameInput.value ||'').trim();
    if(!email||!pass){ showError('Preencha email e senha.'); return; }
    if(mode==='signUp' && (!termsCheck||!termsCheck.checked)){
      showError('Aceite os Termos de Uso para criar sua conta.'); return;
    }
    if(!window.DSAuth){ showError('Firebase não carregou. Tente recarregar.'); return; }
    primaryBtn.disabled = true; primaryBtn.textContent = 'Aguarde…';
    try{
      if(mode==='signUp'){
        await DSAuth.signUpEmail(email, pass, name);
        closeAuthModal();
        setTimeout(function(){
          alert('✅ Conta criada! Verifique seu e-mail (' + email + ') e clique no link de confirmação antes de fazer login.');
        }, 300);
      } else {
        await DSAuth.signInEmail(email, pass);
        closeAuthModal();
      }
    }catch(e){
      var msg = e && e.message ? e.message : 'Erro desconhecido.';
      if(e.code==='auth/user-not-found'||e.code==='auth/wrong-password') msg='Email ou senha incorretos.';
      if(e.code==='auth/email-already-in-use') msg='Este email já está cadastrado. Tente entrar.';
      if(e.code==='auth/weak-password') msg='Senha muito fraca (mínimo 6 caracteres).';
      if(e.code==='auth/invalid-email') msg='Email inválido.';
      showError(msg);
    }finally{
      primaryBtn.disabled = false;
      primaryBtn.textContent = mode==='signUp' ? 'Criar conta' : 'Entrar';
    }
  });

  toggleBtn && toggleBtn.addEventListener('click', function(){ setMode(mode==='signUp'?'signIn':'signUp'); showError(''); });

  try{
    var hasUser = !!JSON.parse(localStorage.getItem('darkset.user')||'null');
    if(!hasUser){ setTimeout(function(){ openAuthModal('signIn'); }, 600); }
  }catch(_){}
})();
</script>
<!-- ===== /Auth Popup ===== -->

</body>
</html>
