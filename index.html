  <style>
    @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap');

    :root{
      --color-bg: #080808;
      --color-card: #0f0f0f;
      --color-card-soft: #141414;
      --color-text: #f0f0f0;
      --color-text-sub: #888;
      --color-border: #1e1e1e;
      --color-accent: #e31b23;
      --color-accent2: #ff3b3b;
      --color-accent-glow: rgba(227,27,35,0.18);
      --ds-radius: 12px;
    }

    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      background-color: var(--color-bg) !important;
      color: var(--color-text) !important;
      font-family: 'Inter', -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    /* Subtle noise texture on body */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.35;
    }
    #root { background-color: var(--color-bg); min-height: 100vh; position: relative; z-index: 1; }

    /* Tailwind overrides */
    .bg-bgDark   { background-color: var(--color-bg) !important; }
    .bg-cardDark { background-color: var(--color-card) !important; }
    .bg-cardSoft { background-color: var(--color-card-soft) !important; }
    .text-textMain { color: var(--color-text) !important; }
    .text-textSub  { color: var(--color-text-sub) !important; }
    .border-borderDark { border-color: var(--color-border) !important; }
    .bg-accent   { background-color: var(--color-accent) !important; }
    .text-accent { color: var(--color-accent) !important; }
    .rounded-2xl, .rounded-xl { color: inherit; }
    .border { border-color: var(--color-border); }

    /* Inputs */
    input, select, textarea {
      background-color: rgba(0,0,0,0.45) !important;
      color: var(--color-text) !important;
      border-color: var(--color-border) !important;
      font-family: 'Inter', sans-serif;
    }
    input::placeholder { color: #444 !important; }
    input:focus, select:focus { outline: none; border-color: var(--color-accent) !important; box-shadow: 0 0 0 2px var(--color-accent-glow); }

    /* HEADER */
    nav.ds-nav{ overflow-x:auto; -webkit-overflow-scrolling: touch; gap:.4rem; scrollbar-width: none; display:flex; }
    nav.ds-nav::-webkit-scrollbar{ display:none; }
    @media (max-width: 480px){ nav.ds-nav button{ flex:0 0 auto } }

    /* DRAWER */
    .ds-drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:900;backdrop-filter:blur(2px);}
    .ds-drawer{
      position:fixed;left:0;top:0;bottom:0;width:280px;max-width:85vw;
      background:#0a0a0a;border-right:1px solid rgba(227,27,35,.15);
      z-index:901;display:flex;flex-direction:column;
      transform:translateX(-100%);transition:transform .28s cubic-bezier(.4,0,.2,1);
      overflow-y:auto;
    }
    .ds-drawer.open{transform:translateX(0);}
    .ds-drawer-item{
      display:flex;align-items:center;gap:.85rem;padding:.8rem 1.1rem;
      background:transparent;border:none;cursor:pointer;
      font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:1rem;
      text-transform:uppercase;letter-spacing:.04em;color:#666;
      border-left:3px solid transparent;transition:all .15s;text-align:left;width:100%;
    }
    .ds-drawer-item:hover{color:#ccc;background:rgba(255,255,255,.03);}
    .ds-drawer-item.active{color:#fff;border-left-color:var(--color-accent);background:rgba(227,27,35,.06);}
    .ds-drawer-item .ds-drawer-icon{font-size:1.3rem;width:28px;text-align:center;flex-shrink:0;}
    .ds-drawer-section{font-size:.58rem;color:#333;text-transform:uppercase;letter-spacing:.1em;padding:.75rem 1.1rem .3rem;font-weight:700;}
    .ds-hamburger{background:none;border:none;cursor:pointer;padding:.35rem;display:flex;flex-direction:column;gap:4px;flex-shrink:0;}
    .ds-hamburger span{display:block;width:20px;height:2px;background:#888;border-radius:1px;transition:all .2s;}
    .ds-hamburger:hover span{background:#fff;}
    [data-theme="light"] .ds-drawer{background:#f5f5f5;border-right-color:#ddd;}
    [data-theme="light"] .ds-drawer-item{color:#666;}
    [data-theme="light"] .ds-drawer-item.active{color:#e31b23;background:rgba(227,27,35,.06);}
    [data-theme="light"] .ds-drawer-section{color:#aaa;}
    header.ds-hdr{
      position: sticky; top: 0; z-index: 30;
      backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px) saturate(180%);
      background: rgba(8,8,8,.95);
      border-bottom: 1px solid rgba(227,27,35,.12);
      padding: .55rem .75rem;
      display:flex; align-items:center; justify-content:space-between; gap:.75rem; flex-wrap:wrap;
    }
    [data-theme="light"] header.ds-hdr {
      background: rgba(240,240,240,.97) !important;
      border-bottom: 1px solid #ddd;
    }

    /* NAV BUTTONS */
    .ds-nav-btn {
      padding: .45rem .85rem;
      border-radius: 8px;
      border: 1px solid #1e1e1e;
      font-size: .75rem;
      font-weight: 600;
      letter-spacing: .04em;
      text-transform: uppercase;
      color: #666;
      background: transparent;
      transition: color .15s, border-color .15s, background .15s;
      white-space: nowrap;
    }
    .ds-nav-btn:hover { color: #ccc; border-color: #333; background: rgba(255,255,255,.04); }
    .ds-nav-btn.active {
      color: #fff;
      border-color: var(--color-accent);
      background: rgba(227,27,35,.1);
      box-shadow: 0 0 12px rgba(227,27,35,.15);
    }

    /* CARDS */
    .ds-card{
      border-radius: var(--ds-radius);
      background: var(--color-card);
      border: 1px solid var(--color-border);
      position: relative;
      overflow: hidden;
    }
    .ds-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.06), transparent);
    }
    /* Red accent left border on active cards */
    .ds-card-accent { border-left: 2px solid var(--color-accent); }

    /* SECTION HEADERS — Barlow Condensed for aggressive look */
    .ds-section-title {
      font-family: 'Barlow Condensed', 'Inter', sans-serif;
      font-weight: 800;
      font-size: 1.1rem;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: #fff;
    }
    .ds-section-title span { color: var(--color-accent); }

    /* BUTTONS */
    .ds-btn {
      border-radius: 8px;
      padding: .6rem 1rem;
      font-weight: 700;
      font-size: .8rem;
      letter-spacing: .05em;
      text-transform: uppercase;
      transition: all .15s;
      cursor: pointer;
      border: 1px solid transparent;
      display: inline-flex; align-items: center; gap: .4rem;
    }
    .ds-btn-primary {
      background: linear-gradient(160deg, #e31b23, #a81018);
      border-color: rgba(255,255,255,.08);
      color: #fff;
      box-shadow: 0 4px 16px rgba(227,27,35,.3), inset 0 1px 0 rgba(255,255,255,.1);
    }
    .ds-btn-primary:hover { box-shadow: 0 4px 20px rgba(227,27,35,.5), inset 0 1px 0 rgba(255,255,255,.1); }
    .ds-btn-primary:active { transform: translateY(1px); box-shadow: 0 2px 8px rgba(227,27,35,.3); }
    .ds-btn-ghost {
      background: rgba(255,255,255,.04);
      border-color: #222;
      color: #aaa;
    }
    .ds-btn-ghost:hover { background: rgba(255,255,255,.08); color: #ddd; border-color: #333; }
    .ds-btn-success {
      background: rgba(34,197,94,.12);
      border-color: rgba(34,197,94,.3);
      color: #4ade80;
    }
    .ds-btn-danger {
      background: rgba(227,27,35,.12);
      border-color: rgba(227,27,35,.3);
      color: var(--color-accent2);
    }

    /* SET ROW */
    .set-row {
      background: rgba(0,0,0,.3);
      border: 1px solid #1a1a1a;
      border-radius: 10px;
      padding: .5rem .75rem;
      display: grid;
      align-items: center;
      gap: .5rem;
    }
    .set-row:focus-within { border-color: rgba(227,27,35,.3); background: rgba(227,27,35,.04); }

    /* STAT CHIPS */
    .ds-stat {
      background: rgba(0,0,0,.4);
      border: 1px solid #1a1a1a;
      border-radius: 8px;
      padding: .5rem .85rem;
      text-align: center;
    }
    .ds-stat-val {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.4rem;
      font-weight: 800;
      color: #fff;
      line-height: 1;
    }
    .ds-stat-label { font-size: .65rem; color: #555; text-transform: uppercase; letter-spacing: .06em; margin-top: .2rem; }

    /* WEEK STREAK BAR */
    .streak-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #1e1e1e;
      transition: background .2s;
    }
    .streak-dot.done { background: var(--color-accent); box-shadow: 0 0 6px rgba(227,27,35,.5); }

    /* EXERCISE CARD in session */
    .ex-card {
      background: rgba(0,0,0,.3);
      border: 1px solid #1e1e1e;
      border-radius: 10px;
      padding: .75rem 1rem;
    }
    .ex-num {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 2.5rem;
      font-weight: 900;
      color: rgba(227,27,35,.15);
      line-height: 1;
      position: absolute;
      right: .75rem;
      top: .5rem;
    }

    /* PROGRESS BAR */
    .ds-progress-track { background: #1a1a1a; border-radius: 4px; height: 3px; }
    .ds-progress-fill { background: var(--color-accent); border-radius: 4px; height: 100%; transition: width .3s ease; box-shadow: 0 0 8px rgba(227,27,35,.4); }

    /* HISTORY CARD */
    .hist-card {
      background: var(--color-card);
      border: 1px solid var(--color-border);
      border-radius: 10px;
      padding: .85rem 1rem;
      transition: border-color .15s, background .15s;
      cursor: pointer;
      text-align: left;
      width: 100%;
    }
    .hist-card:hover { border-color: #333; background: #111; }
    .hist-date {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: .03em;
      color: #fff;
    }

    /* TOAST */
    .ds-toast {
      position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
      background: #111; border: 1px solid #2a2a2a;
      color: #f0f0f0; font-size: .8rem; font-weight: 600;
      padding: .6rem 1.2rem; border-radius: 999px;
      box-shadow: 0 8px 24px rgba(0,0,0,.5);
      z-index: 999; white-space: nowrap;
      animation: toastIn .2s ease;
    }

    /* Light theme */
    [data-theme="light"] {
      --color-bg: #f0f0f0;
      --color-card: #ffffff;
      --color-card-soft: #f8f8f8;
      --color-border: #e0e0e0;
      --color-text: #111111;
      --color-text-sub: #666666;
    }
    [data-theme="light"] body { background-color: var(--color-bg) !important; color: var(--color-text) !important; }
    [data-theme="light"] #root { background-color: var(--color-bg); }
    [data-theme="light"] body::before { opacity: 0.05; }
    [data-theme="light"] .ds-card { background: #ffffff !important; border-color: #e0e0e0 !important; }
    [data-theme="light"] .ds-card-soft { background: #f8f8f8 !important; }
    [data-theme="light"] .ds-section-title { color: #111 !important; }
    [data-theme="light"] .set-row input, [data-theme="light"] .set-row select { background: rgba(0,0,0,.06) !important; color: #111 !important; border-color: #ddd !important; }
    [data-theme="light"] input, [data-theme="light"] select, [data-theme="light"] textarea {
      background-color: rgba(0,0,0,.06) !important;
      color: var(--color-text) !important;
      border-color: var(--color-border) !important;
    }
    [data-theme="light"] .ds-nav-btn { color: #444; border-color: #ccc; }
    [data-theme="light"] .ds-nav-btn:hover { background: rgba(0,0,0,.06); color: #111; }
    [data-theme="light"] .ds-nav-btn.active { background: rgba(227,27,35,.1); color: #e31b23; border-color: var(--color-accent); }
    [data-theme="light"] .mode-toggle { background: rgba(0,0,0,.08); border-color: #ddd; }
    [data-theme="light"] .mode-toggle-btn { color: #666; }
    [data-theme="light"] .ds-section-title { color: #111; }
    [data-theme="light"] .ds-hdr { background: rgba(240,240,240,.92); border-color: #ddd; }

    @keyframes toastIn { from { opacity:0; transform: translateX(-50%) translateY(6px); } to { opacity:1; transform: translateX(-50%) translateY(0); } }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

    /* MODAL */
    .modal-bg { position:fixed; inset:0; background:rgba(0,0,0,.75); display:flex; align-items:center; justify-content:center; z-index:50; backdrop-filter: blur(4px); }

    /* MODE TOGGLE */
    .mode-toggle { display: flex; background: rgba(0,0,0,.4); border: 1px solid #1e1e1e; border-radius: 10px; padding: 3px; gap: 3px; }
    .mode-toggle-btn { flex: 1; padding: .5rem .75rem; border-radius: 8px; font-size: .75rem; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; color: #555; background: transparent; border: none; cursor: pointer; transition: all .15s; }
    .mode-toggle-btn.active { background: var(--color-accent); color: #fff; box-shadow: 0 2px 8px rgba(227,27,35,.3); }

    /* Safe areas */
    .safe-pb{ padding-bottom: max(env(safe-area-inset-bottom), 16px); }
    .safe-pt{ padding-top: max(env(safe-area-inset-top), 8px); }

    @media (max-width: 480px){ .grid-cols-mobile-1{ grid-template-columns: 1fr; } }

    /* Charts */
    .charts-modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:9999;backdrop-filter:blur(4px)}
    .charts-modal{width:min(980px,92vw);max-height:90vh;background:#0a0a0a;color:#eaeaea;border:1px solid #1e1e1e;border-radius:12px;overflow:hidden;display:flex;flex-direction:column}
    .charts-hd{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid #1a1a1a;background:#0a0a0a}
    .charts-hd h3{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;margin:0}
    .charts-help{width:30px;height:30px;border-radius:999px;background:#141418;border:1px solid #2b2b31;display:flex;align-items:center;justify-content:center;cursor:pointer}
    .charts-body{padding:14px 16px;overflow:auto}
    .charts-row{display:grid;grid-template-columns:1fr;gap:12px}
    @media (min-width:700px){.charts-row{grid-template-columns:1fr 1fr}}
    .charts-field{display:flex;flex-direction:column;gap:6px}
    .charts-field label{font-size:12px;opacity:.85}
    .charts-select{background:#0d0d0d !important;color:#eaeaea !important;border:1px solid #1e1e1e !important;border-radius:8px;padding:10px 12px;font-size:14px;outline:none}
    .charts-pills{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
    .charts-pill{background:#111;border:1px solid #1e1e1e;color:#aaa;border-radius:999px;padding:6px 10px;font-size:13px;cursor:pointer;transition:all .15s}
    .charts-pill.active{background:rgba(227,27,35,.1);border-color:var(--color-accent);color:#fff}
    .charts-canvas-wrap{margin-top:14px;background:#0a0a0a;border:1px solid #1a1a1a;border-radius:10px;padding:8px}
    .charts-empty{padding:12px;border:1px dashed #1e1e1e;border-radius:10px;text-align:center;opacity:.8;display:none}
    .charts-actions{margin-left:auto}
    .charts-btn{background:#111;border:1px solid #1e1e1e;color:#eaeaea;border-radius:8px;padding:8px 12px;font-size:14px;cursor:pointer}
  </style>
  <!-- ZXing barcode scanner -->
  <script src="https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js"></script>
</head>

function exImgSrcs(exName) {
  const slug=EX_IMG_MAP[exName]||null, wid=WGER_ID[exName]||null;
  return { yuSrc:slug?YUHONAS_BASE+'/'+slug+'/':null, wgerSrc:wid?WGER_BASE+wid+'/main.png':null };
}
function getImgSlug(exName) {
  return EX_IMG_MAP[exName] || null;
}

// useExGif: carrega 2 fotos e alterna simulando animação
function useExGif(exName) {
  const slug = getImgSlug(exName);
  const [frame, setFrame] = useState(0);
  const [img1Ok, setImg1Ok] = useState(true);

  useEffect(() => {
    setFrame(0); setImg1Ok(true);
    if (!slug) return;
    const t = setInterval(() => setFrame(f => f === 0 ? 1 : 0), 900);
    return () => clearInterval(t);
  }, [slug]);

  const url0 = slug ? YUHONAS_BASE+'/'+slug+'/0.jpg' : null;
  const url1 = slug && img1Ok ? YUHONAS_BASE+'/'+slug+'/1.jpg' : url0;
  const gifUrl = frame === 0 ? url0 : url1;
  return { gifUrl, loading: false, slug, frame, setImg1Ok, url0, url1 };
}

    img.onerror = () => setHasFrame1(false);
    img.src = YUHONAS_BASE + '/' + slug + '/1.jpg';

    if (!slug) return;

      <div style={{borderRadius:'14px',overflow:'hidden',border:`1px solid ${grpColor}33`,background:'#000',height,position:'relative'}}>

// ── ExerciseDetail — tela completa de detalhes ──────────────────────────────
const ExerciseDetail = ({exName, onClose, history}) => {
  const ex = EXS.find(e=>e.name===exName);

  const stats = useMemo(()=>{
    if(!history||typeof history!=='object') return {sessions:0,bestWeight:0,totalSets:0,lastDate:null};
    let sessions=0,bestWeight=0,totalSets=0,lastDate=null;
    Object.entries(history).forEach(([date,sess])=>{
      const entry=sess.entries?.find(e=>e.name===exName);
      if(!entry) return;
      sessions++;
      if(!lastDate||date>lastDate) lastDate=date;
      entry.sets?.forEach(s=>{totalSets++;const w=Number(s.w||0);if(w>bestWeight)bestWeight=w;});
    });
    return {sessions,bestWeight,totalSets,lastDate};
  },[exName,history]);

  const tip = EXEC_TIPS[exName]||`Execute ${exName} com controle total. Mantenha postura neutra e foque na contração muscular em cada repetição.`;
  const toDate=iso=>{if(!iso)return '—';const[y,m,d]=iso.split('-');return`${d}/${m}/${y}`;};

  const recentSessions = useMemo(()=>{
    if(!history||typeof history!=='object') return [];
    return Object.entries(history)
      .filter(([,sess])=>sess.entries?.some(e=>e.name===exName))
      .sort((a,b)=>b[0].localeCompare(a[0]))
      .slice(0,5)
      .map(([date,sess])=>({date,sets:sess.entries.find(e=>e.name===exName)?.sets||[]}));
  },[exName,history]);

  return (
    <div style={{position:'fixed',inset:0,zIndex:9999,background:'var(--color-bg)',overflowY:'auto'}}>
      <div style={{position:'sticky',top:0,background:'var(--color-bg)',borderBottom:'1px solid var(--color-border)',padding:'.85rem 1rem',display:'flex',alignItems:'center',gap:'.75rem',zIndex:10}}>
        <button onClick={onClose} style={{background:'rgba(255,255,255,.05)',border:'1px solid var(--color-border)',borderRadius:'8px',padding:'.4rem .75rem',color:'var(--color-text-sub)',fontSize:'.85rem',cursor:'pointer',fontWeight:700}}>←</button>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:'1.3rem',textTransform:'uppercase',letterSpacing:'.03em',lineHeight:1,color:'var(--color-text)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{exName}</div>
          {ex&&<div style={{fontSize:'.62rem',color:'var(--color-text-sub)',marginTop:'1px'}}>{ex.primary} · {ex.equipment}</div>}
        </div>
        {ex&&<div style={{flexShrink:0,padding:'.25rem .6rem',background:'rgba(227,27,35,.1)',border:'1px solid rgba(227,27,35,.2)',borderRadius:'6px',fontSize:'.65rem',fontWeight:700,color:'var(--color-accent)',textTransform:'uppercase'}}>{ex.difficulty}</div>}
      </div>

      <div style={{padding:'1rem',display:'grid',gap:'1rem',maxWidth:'480px',margin:'0 auto'}}>

        {/* Imagem de execução */}
        {(()=>{
          const slug = EX_IMG_MAP[exName] || null;
          if (!slug) return null;
          return (
            <div style={{background:'#000',borderRadius:'12px',overflow:'hidden',border:'1px solid var(--color-border)',aspectRatio:'16/9',display:'flex',alignItems:'center',justifyContent:'center'}}>
              <img src={YUHONAS_BASE+'/'+slug+'/0.jpg'} alt={exName}
                style={{width:'100%',height:'100%',objectFit:'contain'}}
                onError={e=>e.target.style.display='none'}/>
            </div>
          );
        })()}

        {/* Stats */}
        {stats.sessions>0&&(
          <div className="ds-card" style={{padding:'1rem 1.1rem',background:'var(--color-card)'}}>
            <div style={{fontSize:'.62rem',color:'var(--color-accent)',textTransform:'uppercase',letterSpacing:'.08em',fontWeight:700,marginBottom:'.7rem'}}>Seus números</div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'.5rem'}}>
              {[{label:'Melhor carga',val:`${stats.bestWeight}kg`,icon:'🏆'},{label:'Sessões',val:stats.sessions,icon:'📅'},{label:'Total séries',val:stats.totalSets,icon:'💪'}].map(({label,val,icon})=>(
                <div key={label} style={{background:'rgba(0,0,0,.2)',borderRadius:'10px',padding:'.7rem .5rem',textAlign:'center'}}>
                  <div style={{fontSize:'1.2rem',marginBottom:'.2rem'}}>{icon}</div>
                  <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:'1.15rem',color:'var(--color-text)',lineHeight:1}}>{val}</div>
                  <div style={{fontSize:'.55rem',color:'var(--color-text-sub)',textTransform:'uppercase',letterSpacing:'.05em',marginTop:'3px'}}>{label}</div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* Dicas */}
        <div className="ds-card" style={{padding:'1rem 1.1rem',background:'var(--color-card)'}}>
          <div style={{fontSize:'.62rem',color:'var(--color-accent)',textTransform:'uppercase',letterSpacing:'.08em',fontWeight:700,marginBottom:'.6rem'}}>Execução correta</div>
          <p style={{fontSize:'.82rem',color:'var(--color-text-sub)',lineHeight:1.6,margin:0}}>{tip}</p>
        </div>

        {/* Músculos */}
        {ex&&(
          <div className="ds-card" style={{padding:'1rem 1.1rem',background:'var(--color-card)'}}>
            <div style={{fontSize:'.62rem',color:'var(--color-accent)',textTransform:'uppercase',letterSpacing:'.08em',fontWeight:700,marginBottom:'.65rem'}}>Músculos</div>
            <div style={{display:'flex',gap:'.5rem',flexWrap:'wrap'}}>
              {[{label:'Principal',val:ex.primary,color:'var(--color-accent)'},{label:'Foco',val:ex.subgroup,color:'#facc15'},{label:'Equipamento',val:ex.equipment,color:'#4ade80'}].filter(i=>i.val).map(item=>(
                <div key={item.label} style={{padding:'.35rem .75rem',background:'rgba(0,0,0,.2)',border:`1px solid ${item.color}33`,borderRadius:'20px'}}>
                  <div style={{fontSize:'.55rem',color:item.color,textTransform:'uppercase',letterSpacing:'.06em',fontWeight:700}}>{item.label}</div>
                  <div style={{fontSize:'.8rem',color:'var(--color-text)',fontWeight:600}}>{item.val}</div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* Histórico */}
        {recentSessions.length>0&&(
          <div className="ds-card" style={{padding:'1rem 1.1rem',background:'var(--color-card)'}}>
            <div style={{fontSize:'.62rem',color:'var(--color-accent)',textTransform:'uppercase',letterSpacing:'.08em',fontWeight:700,marginBottom:'.65rem'}}>Histórico recente</div>
            <div style={{display:'grid',gap:'.5rem'}}>
              {recentSessions.map(({date,sets})=>{
                const bestW=Math.max(0,...sets.map(s=>Number(s.w||0)));
                const totalR=sets.reduce((a,s)=>a+Number(s.r||0),0);
                return (
                  <div key={date} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'.55rem .75rem',background:'rgba(0,0,0,.2)',borderRadius:'8px'}}>
                    <div style={{fontSize:'.75rem',color:'var(--color-text)',fontWeight:600}}>{toDate(date)}</div>
                    <div style={{display:'flex',gap:'1rem'}}>
                      <div style={{textAlign:'center'}}><div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:'.95rem'}}>{sets.length}x</div><div style={{fontSize:'.5rem',color:'var(--color-text-sub)',textTransform:'uppercase'}}>séries</div></div>
                      {bestW>0&&<div style={{textAlign:'center'}}><div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:'.95rem',color:'var(--color-accent)'}}>{bestW}kg</div><div style={{fontSize:'.5rem',color:'var(--color-text-sub)',textTransform:'uppercase'}}>melhor</div></div>}
                      <div style={{textAlign:'center'}}><div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:'.95rem'}}>{totalR}</div><div style={{fontSize:'.5rem',color:'var(--color-text-sub)',textTransform:'uppercase'}}>reps</div></div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </div>
    </div>
  );
};

// ── Firestore sync ────────────────────────────────────────────────────────
const SYNC_STATUS = { listeners: [] };
function setSyncStatus(s){ SYNC_STATUS.current=s; SYNC_STATUS.listeners.forEach(fn=>fn(s)); }
function useSyncStatus(){ const [s,setS]=useState(SYNC_STATUS.current||'idle'); useEffect(()=>{ SYNC_STATUS.listeners.push(setS); return ()=>{SYNC_STATUS.listeners=SYNC_STATUS.listeners.filter(x=>x!==setS);};},[]);return s;}

function getUID(){ try{return JSON.parse(localStorage.getItem('darkset.user'))?.uid||null;}catch(_){return null;} }
function debounce(fn,ms){ let t; return (...args)=>{clearTimeout(t);t=setTimeout(()=>fn(...args),ms);}; }

// Global state setters — React components register these on mount
window._DS_SETTERS = { plans: null, history: null, prefs: null, isPersonal: null };

async function fsWrite(uid, docName, data){
  if(!uid||!window._db) return;
  setSyncStatus('saving');
  try{
    await window._db.collection('users').doc(uid).collection('data').doc(docName).set({payload:JSON.stringify(data),updatedAt:Date.now()});
    setSyncStatus('saved');
    setTimeout(()=>setSyncStatus('idle'),2500);
  }catch(e){
    setSyncStatus('error');
    const msg = e.code==='permission-denied' ? 'Regras do Firestore nao configuradas' : (e.code||e.message);
    console.warn('[DSSync] fsWrite erro:',msg);
    window._DS_LAST_ERROR = msg;
  }
}

async function fsRead(uid, docName){
  if(!uid||!window._db) return null;
  try{
    const snap=await window._db.collection('users').doc(uid).collection('data').doc(docName).get();
    if(snap.exists){ const d=snap.data(); if(d&&d.payload) return JSON.parse(d.payload); }
    return null;
  }catch(e){
    const msg = e.code==='permission-denied' ? 'Regras do Firestore nao configuradas' : (e.code||e.message);
    console.warn('[DSSync] fsRead erro:',msg);
    window._DS_LAST_ERROR = msg;
    return null;
  }
}

window.DSSync = {
  pull: async function(uid){
    if(!uid) return;
    setSyncStatus('syncing');
    console.log('[DSSync] pulling for', uid);
    try{
      const [cloudPlans, cloudHistory, cloudPrefs] = await Promise.all([
        fsRead(uid,'plans'),
        fsRead(uid,'history'),
        fsRead(uid,'prefs'),
      ]);
      console.log('[DSSync] received:', {plans:!!cloudPlans, history:!!cloudHistory, prefs:!!cloudPrefs});

      // Write to localStorage first
      if(cloudPlans)   localStorage.setItem(LS.plans,   JSON.stringify(cloudPlans));
      if(cloudHistory) localStorage.setItem(LS.history, JSON.stringify(cloudHistory));
      if(cloudPrefs)   localStorage.setItem(LS.prefs,   JSON.stringify(cloudPrefs));

      // Also pull extended data
      const extKeys = ['diet','measures','cardio','squad','checkins','chat'];
      const extLSMap = {
        diet: 'darkset.v1.diet', measures: 'darkset.measures', cardio: 'darkset.cardio.history',
        squad: 'darkset.squad.v1', checkins: 'darkset.squad.checkins', chat: 'darkset.squad.chat'
      };
      const extResults = await Promise.allSettled(extKeys.map(k=>fsRead(uid,k)));
      extKeys.forEach((k,i) => {
        const r = extResults[i];
        if(r.status==='fulfilled' && r.value) {
          try { localStorage.setItem(extLSMap[k], JSON.stringify(r.value)); } catch(_) {}
        }
      });

      // Push directly into React state if setters are registered
      if(cloudPlans   && window._DS_SETTERS.plans)   window._DS_SETTERS.plans(cloudPlans);
      if(cloudHistory && window._DS_SETTERS.history) window._DS_SETTERS.history(cloudHistory);
      // Prefs: MERGE cloud into local, never overwrite name/avatar set locally
      if(cloudPrefs && window._DS_SETTERS.prefs) {
        const localPrefs = JSON.parse(localStorage.getItem(LS.prefs)||'{}');
        // Local name/avatar take priority if set; rest comes from cloud
        const merged = { ...cloudPrefs, ...localPrefs };
        window._DS_SETTERS.prefs(merged);
        localStorage.setItem(LS.prefs, JSON.stringify(merged));
      }

      // Pull planData + role from user document (admin-controlled)
      try{
        if(window._db){
          const userDoc = await window._db.collection('users').doc(uid).get();
          if(userDoc.exists){
            const userData = userDoc.data();
            // planData
            if(userData && userData.planData){
              const pd = userData.planData;
              const localPd = JSON.parse(localStorage.getItem('ds.planData')||'null') || {};
              const merged = { ...localPd, ...pd };
              localStorage.setItem('ds.planData', JSON.stringify(merged));
              if(window._DS_SETTERS && window._DS_SETTERS.planData) window._DS_SETTERS.planData(merged);
            }
            // role: personal
            const isP = userData && (userData.role === 'personal');
            localStorage.setItem('ds.isPersonal', JSON.stringify(isP));
            if(window._DS_SETTERS && window._DS_SETTERS.isPersonal) window._DS_SETTERS.isPersonal(isP);
          }
        }
      }catch(_){}

      setSyncStatus('saved');
      setTimeout(()=>setSyncStatus('idle'),2500);
    }catch(e){ setSyncStatus('error'); console.warn('[DSSync] pull error',e); }
  },
  push: async function(uid){
    if(!uid||!window._db) return;
    const safe = k => { try{return JSON.parse(localStorage.getItem(k)||'null');}catch(_){return null;} };
    await Promise.all([
      'plans','history','prefs','diet','measures','cardio','squad','checkins','chat'
    ].map(key => {
      const LSkey = {
        plans: 'darkset.v3.plans', history: 'darkset.v3.history', prefs: 'darkset.v3.prefs',
        diet: 'darkset.v1.diet', measures: 'darkset.measures', cardio: 'darkset.cardio.history',
        squad: 'darkset.squad.v1', checkins: 'darkset.squad.checkins', chat: 'darkset.squad.chat'
      }[key];
      const data = safe(LSkey);
      return data ? fsWrite(uid, key, data) : null;
    }).filter(Boolean));
  }
};

const debouncedFsWrite = debounce((uid,key,val)=>fsWrite(uid,key,val),1500);

function usePlans(){
  const [plans,setPlansState]=useState(()=>load(LS.plans,{activeId:null,list:[]}));
  // Register setter so DSSync.pull can update React state directly
  useEffect(()=>{ window._DS_SETTERS.plans=setPlansState; return ()=>{window._DS_SETTERS.plans=null;}; },[]);
  const setPlans=(v)=>setPlansState(prev=>{
    const next=typeof v==='function'?v(prev):v;
    save(LS.plans,next);
    const uid=getUID(); if(uid) debouncedFsWrite(uid,'plans',next);
    return next;
  });
  return [plans,setPlans];
}
function useHistory(){
  const [history,setHistoryState]=useState(()=>load(LS.history,{}));
  useEffect(()=>{ window._DS_SETTERS.history=setHistoryState; return ()=>{window._DS_SETTERS.history=null;}; },[]);
  const setHistory=(v)=>setHistoryState(prev=>{
    const next=typeof v==='function'?v(prev):v;
    save(LS.history,next);
    const uid=getUID(); if(uid) debouncedFsWrite(uid,'history',next);
    return next;
  });
  return [history,setHistory];
}
function usePrefs(){
  const [prefs,setPrefsState]=useState(()=>load(LS.prefs,{name:"",avatar:"💀",unit:"kg",vibrate:true,weeklyGoal:5,showTimer:true,timerPreset:60,rirDefault:2,chartsPremium:false}));
  useEffect(()=>{ window._DS_SETTERS.prefs=setPrefsState; return ()=>{window._DS_SETTERS.prefs=null;}; },[]);
  const setPrefs=(v)=>setPrefsState(prev=>{
    const next=typeof v==='function'?v(prev):v;
    save(LS.prefs,next);
    const uid=getUID();
    if(uid){
      debouncedFsWrite(uid,'prefs',next);
      // Keep root users/{uid} name in sync so personal trainer can read it
      if(next.name && window._db){
        try{ window._db.collection('users').doc(uid).set({ name: next.name, updatedAt: Date.now() }, { merge: true }); }catch(_){}
      }
    }
    return next;
  });
  return [prefs,setPrefs];
}

// Home
const Home=({goto,plans,history,prefs,setDrawerOpen})=>{
  const active=plans.list.find(p=>p.id===plans.activeId)||null;
  const entries=Object.entries(history).sort((a,b)=>a[0]>b[0]?-1:1);
  const today=new Date();
  // Semana atual
  const weekStart=new Date(today); weekStart.setDate(today.getDate()-((today.getDay()||7)-1));
  const weekStartStr=weekStart.getFullYear()+'-'+String(weekStart.getMonth()+1).padStart(2,'0')+'-'+String(weekStart.getDate()).padStart(2,'0');
  const thisWeekEntries=entries.filter(([iso])=>iso>=weekStartStr);
  const thisWeek=thisWeekEntries.length;

  // Streak inteligente — dias de descanso programados não quebram
  const trainDays = prefs.trainDays || [1,2,3,4,5,6]; // 0=dom,1=seg,...,6=sab
  const streak=(()=>{
    let s=0;
    const d=new Date(today);
    // Se hoje é dia de treino e não treinou ainda, começa de ontem
    const todayKey=today.toISOString().slice(0,10);
    const todayIsTrainDay=trainDays.includes(today.getDay());
    if(todayIsTrainDay && !history[todayKey]) d.setDate(d.getDate()-1);
    for(let tries=0;tries<90;tries++){
      const k=d.toISOString().slice(0,10);
      const isTrainDay=trainDays.includes(d.getDay());
      if(!isTrainDay){ d.setDate(d.getDate()-1); continue; } // pula dia de descanso
      if(history[k]){ s++; d.setDate(d.getDate()-1); }
      else break; // dia de treino sem registro = streak quebrado
    }
    return s;
  })();

  // Dots da semana: só mostra dias de treino configurados
  const weekDotsFull = Array.from({length:7},(_,i)=>{
    const d2=new Date(weekStart); d2.setDate(weekStart.getDate()+i);
    const isTrainDay = trainDays.includes(d2.getDay());
    const trained = !!history[d2.toISOString().slice(0,10)];
    return {trained, isTrainDay};
  });

  // Volume total da semana
  const parseNum=(v)=>{const n=parseFloat(String(v).replace(",",".")); return isFinite(n)?n:0;};
  const weekVol=Math.round(thisWeekEntries.reduce((_acc,[,obj])=>_acc+(obj.entries||[]).reduce((a,en)=>a+(en.sets||[]).reduce((s2,s)=>s2+parseNum(s.w)*parseNum(s.r),0),0),0));

  // Total de treinos no histórico
  const totalSessions=entries.length;

  // Próximo dia de treino da ficha ativa
  const nextTrainDay = (() => {
    if (!active) return null;
    const byDay = active.byDay || {};
    const dayOrder = ['Segunda','Terça','Quarta','Quinta','Sexta','Sábado','Domingo'];
    const todayIdx = (today.getDay()+6)%7; // 0=seg
    for (let i=1; i<=7; i++) {
      const d = dayOrder[(todayIdx+i)%7];
      if (byDay[d] && byDay[d].length > 0) return {day:d, exs:byDay[d]};
    }
    // hoje também conta
    const todayName = dayOrder[todayIdx];
    if (byDay[todayName] && byDay[todayName].length > 0) return {day:'Hoje', exs:byDay[todayName]};
    return null;
  })();

  // Spotify favorito
  const spotifyUrl = (prefs.playlists&&prefs.playlists[0]?.url) || prefs.spotifyUrl || null;

  const dayNames=["S","T","Q","Q","S","S","D"];

  return (
    <div className="grid gap-3 mt-3">
      {/* Hero stats */}
      <div className="ds-card" style={{padding:'1.1rem',background:'linear-gradient(135deg, #0d0d0d 0%, #111 100%)'}}>
        <div className="flex items-start justify-between mb-3">
          <div>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:'1.8rem',fontWeight:900,lineHeight:1,textTransform:'uppercase'}}>
              {prefs.name ? `E aí, ${prefs.name.split(' ')[0]}!` : 'Bora Treinar!'}
            </div>
            <div style={{fontSize:'.72rem',color:'#555',marginTop:'.2rem',textTransform:'uppercase',letterSpacing:'.06em'}}>
              {today.toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'})}
            </div>
          </div>
          {prefs.avatarUrl
            ? <img src={prefs.avatarUrl} style={{width:'44px',height:'44px',borderRadius:'50%',border:'2px solid #222',objectFit:'cover'}} alt="avatar"/>
            : <div style={{width:'44px',height:'44px',borderRadius:'50%',border:'2px solid #222',background:'#111',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:'1rem',color:'#555'}}>{prefs.name?prefs.name.slice(0,2).toUpperCase():'DS'}</div>
          }
        </div>

        {/* Stat chips */}
        <div className="grid grid-cols-3 gap-2 mb-4">
          <div className="ds-stat">
            <div className="ds-stat-val" style={{color:'var(--color-accent)'}}>{streak}</div>
            <div className="ds-stat-label">Streak</div>
          </div>
          <div className="ds-stat">
            <div className="ds-stat-val">{thisWeek}<span style={{fontSize:'.9rem',color:'#444'}}>/{prefs.weeklyGoal}</span></div>
            <div className="ds-stat-label">Esta semana</div>
          </div>
          <div className="ds-stat">
            <div className="ds-stat-val" style={{fontSize:'1.1rem'}}>{weekVol>=1000?(weekVol/1000).toFixed(1)+'t':weekVol+'kg'}</div>
            <div className="ds-stat-label">Vol. semanal</div>
          </div>
        </div>

        {/* Week dots — só mostra dias de treino */}
        <div className="flex items-center justify-between" style={{padding:'0 .25rem'}}>
          {weekDotsFull.map(({trained,isTrainDay},i)=>(
            <div key={i} style={{textAlign:'center',opacity:isTrainDay?1:0.25}}>
              <div style={{
                width:'10px',height:'10px',borderRadius:'50%',margin:'0 auto .3rem',
                background: trained ? 'var(--color-accent)' : isTrainDay ? '#1a1a1a' : '#111',
                boxShadow: trained ? '0 0 6px rgba(227,27,35,.5)' : 'none',
                border: isTrainDay && !trained ? '1px solid #2a2a2a' : 'none'
              }}></div>
              <div style={{fontSize:'.6rem',color:isTrainDay?'#444':'#222',textTransform:'uppercase'}}>{dayNames[i]}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Quick actions */}
      <div className="grid grid-cols-2 gap-2">
        <button onClick={()=>goto('session')} style={{background:'var(--color-accent)',border:'none',borderRadius:'10px',padding:'1rem',textAlign:'left',cursor:'pointer',position:'relative',overflow:'hidden'}}>
          <div style={{position:'absolute',right:'-8px',top:'-8px',fontFamily:"'Barlow Condensed',sans-serif",fontSize:'4rem',fontWeight:900,color:'rgba(0,0,0,.15)',lineHeight:1}}>▶</div>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:'1.1rem',fontWeight:800,color:'#fff',textTransform:'uppercase',letterSpacing:'.04em'}}>Modo Treino</div>
          <div style={{fontSize:'.7rem',color:'rgba(255,255,255,.6)',marginTop:'.2rem'}}>Com ou sem ficha</div>
        </button>
        <button onClick={()=>goto('history')} style={{background:'#0f0f0f',border:'1px solid #1e1e1e',borderRadius:'10px',padding:'1rem',textAlign:'left',cursor:'pointer',position:'relative',overflow:'hidden'}}>
          <div style={{position:'absolute',right:'-4px',top:'-8px',fontFamily:"'Barlow Condensed',sans-serif",fontSize:'4rem',fontWeight:900,color:'rgba(255,255,255,.04)',lineHeight:1}}>H</div>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:'1.1rem',fontWeight:800,color:'#fff',textTransform:'uppercase',letterSpacing:'.04em'}}>Histórico</div>
          <div style={{fontSize:'.7rem',color:'#444',marginTop:'.2rem'}}>{totalSessions} treinos registrados</div>
        </button>
      </div>

      {/* Ficha ativa */}
      <div className="ds-card ds-card-accent" style={{padding:'1rem 1.1rem'}}>
        <div style={{fontSize:'.65rem',color:'#555',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:'.4rem'}}>Ficha Ativa</div>
        {active
          ? <div className="flex items-center justify-between">
              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:'1.1rem',fontWeight:700,color:'#fff'}}>{active.name}</div>
              <Button onClick={()=>goto('builder',active.id)} variant="ghost">Editar</Button>
            </div>
          : <div className="flex items-center justify-between">
              <div style={{color:'#444',fontSize:'.85rem'}}>Nenhuma ficha ativa</div>
              <Button onClick={()=>goto('plans')} variant="ghost">Criar</Button>
            </div>
        }
      </div>

      {/* Próximo treino */}
      {nextTrainDay && (
        <div className="ds-card" style={{padding:'1rem 1.1rem',background:'var(--color-card)'}}>
          <div style={{fontSize:'.62rem',color:'var(--color-text-sub)',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:'.5rem'}}>
            Próximo treino · <span style={{color:'var(--color-accent)'}}>{nextTrainDay.day}</span>
          </div>
          <div style={{display:'flex',flexWrap:'wrap',gap:'.3rem'}}>
            {nextTrainDay.exs.slice(0,6).map((ex,i)=>(
              <span key={i} style={{fontSize:'.7rem',background:'rgba(255,255,255,.04)',border:'1px solid var(--color-border)',borderRadius:'6px',padding:'.2rem .55rem',color:'#888',fontFamily:"'Barlow Condensed',sans-serif",fontWeight:600,textTransform:'uppercase'}}>
                {typeof ex==='string'?ex:ex.name||'?'}
              </span>
            ))}
            {nextTrainDay.exs.length>6 && <span style={{fontSize:'.7rem',color:'#444',padding:'.2rem .3rem'}}>+{nextTrainDay.exs.length-6}</span>}
          </div>
          <button onClick={()=>goto('session')} style={{marginTop:'.75rem',background:'none',border:'none',padding:0,color:'var(--color-accent)',fontSize:'.75rem',fontWeight:700,cursor:'pointer',textTransform:'uppercase',letterSpacing:'.04em'}}>
            Iniciar este treino →
          </button>
        </div>
      )}

      {/* Atalho Beats */}
      {spotifyUrl ? (
        <button onClick={()=>window.open(spotifyUrl,'_blank')} style={{background:'rgba(29,185,84,.08)',border:'1px solid rgba(29,185,84,.2)',borderRadius:'10px',padding:'.85rem 1rem',display:'flex',alignItems:'center',gap:'.85rem',cursor:'pointer',textAlign:'left',width:'100%'}}>
          <span style={{fontSize:'1.6rem'}}>🎵</span>
          <div style={{flex:1}}>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:'.95rem',textTransform:'uppercase',color:'#1DB954'}}>Minha Playlist</div>
            <div style={{fontSize:'.65rem',color:'var(--color-text-sub)',marginTop:'1px'}}>Abre no Spotify</div>
          </div>
          <span style={{color:'#1DB954',fontSize:'1.3rem'}}>▶</span>
        </button>
      ) : (
        <button onClick={()=>goto('beats')} style={{background:'rgba(29,185,84,.05)',border:'1px solid rgba(29,185,84,.12)',borderRadius:'10px',padding:'.85rem 1rem',display:'flex',alignItems:'center',gap:'.85rem',cursor:'pointer',textAlign:'left',width:'100%'}}>
          <span style={{fontSize:'1.6rem'}}>🎵</span>
          <div style={{flex:1}}>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:'.95rem',textTransform:'uppercase',color:'#1DB954'}}>DarkBeats</div>
            <div style={{fontSize:'.65rem',color:'var(--color-text-sub)',marginTop:'1px'}}>Salve sua playlist favorita</div>
          </div>
          <span style={{color:'#444',fontSize:'1.3rem'}}>▶</span>
        </button>
      )}


    </div>
  );
};

// Plans
const Plans=({plans,setPlans,goto,setToast})=>{
  const [newName,setNewName]=useState("");
  const [renameId,setRenameId]=useState(null);
  const [sharePlan,setSharePlan]=useState(null);
  const [tab,setTab]=useState('minhas'); // 'minhas' | 'prontas'
  const [filterLevel,setFilterLevel]=useState('todos');
  const [filterDays,setFilterDays]=useState('todos');
  const [previewPlan,setPreviewPlan]=useState(null);
  const [showQR,setShowQR]=useState(false);
  const [ptPlans,setPtPlans]=useState([]); // fichas do personal
  const handleQRResult=(url)=>{
    setShowQR(false);
    try{
      const u=new URL(url);
      const raw=u.searchParams.get('import');
      if(raw){
        const json=JSON.parse(decodeURIComponent(raw));
        importPreset({...json,id:'import_'+Date.now()});
        setToast('Ficha importada via QR! 📲');
      } else { setToast('QR inválido'); }
    }catch(e){ setToast('Link inválido'); }
  };

  const importPreset=(preset)=>{
    const id=Date.now();
    const byDay={};
    for(const d of DAYS){ byDay[d]=preset.byDay[d]||[]; }
    const _p2=getDSPlan(); if(plans.list.length>=(_p2.perms.maxFichas||1)){ window._showPaywall&&window._showPaywall('Criar mais fichas'); return; }
    setPlans(p=>({...p,list:[...p.list,{id,name:preset.name,byDay}],activeId:p.activeId||id}));
    setToast("Ficha importada! 💪");
    setTab('minhas');
  };

  const filteredPresets = PRESET_PLANS.filter(p=>{
    if(filterLevel!=='todos' && p.level!==filterLevel) return false;
    if(filterDays!=='todos' && p.days!==Number(filterDays)) return false;
    return true;
  });

  const levelColor={'iniciante':'#4ade80','intermediário':'#facc15','avançado':'#e31b23'};

  const createPlan=()=>{
    const nm = newName.trim() || ('Minha Ficha ' + (plans.list.length+1));
    const _p=getDSPlan(); if(plans.list.length>=(_p.perms.maxFichas||1)){ window._showPaywall&&window._showPaywall('Criar mais fichas'); return; }
    const id=Date.now(); const byDay={};
    for(const d of DAYS){byDay[d]=[]}
    setPlans(p=>({...p,list:[...p.list,{id,name:nm,byDay}],activeId:p.activeId||id}));
    setNewName(""); setToast("Ficha criada");
  };
  const duplicatePlan=(id)=>setPlans(p=>{
    const src=p.list.find(x=>x.id===id);
    const clone=JSON.parse(JSON.stringify(src));
    clone.id=Date.now(); clone.name=src.name+" (cópia)";
    return {...p,list:[...p.list,clone]};
  });
  const removePlan=(id)=>{
    if(!confirm("Excluir esta ficha?")) return;
    setPlans(p=>({...p,list:p.list.filter(pl=>pl.id!==id),activeId:p.activeId===id?null:p.activeId}));
    setToast("Ficha excluída");
  };
  const activate=(id,val)=>setPlans(p=>({...p,activeId:val?id:(p.activeId===id?null:p.activeId)}));
  const makeImportLink=(pl)=>{
    const payload={name:pl.name,byDay:pl.byDay};
    const raw=encodeURIComponent(btoa(encodeURIComponent(JSON.stringify(payload)).replace(/%([0-9A-F]{2})/g,(_,p)=>String.fromCharCode('0x'+p))));
    return `${location.origin}${location.pathname}?import=${raw}`;
  };
  useEffect(()=>{
    if(!sharePlan) return;
    setTimeout(()=>{
      const el=document.getElementById("qr-box");
      if(el){el.innerHTML="";new QRCode(el,{text:makeImportLink(sharePlan),width:180,height:180});}
    },10);
  },[sharePlan]);

  // Carregar fichas do personal
  useEffect(()=>{
    const uid=getUID();
    if(!uid||!window._db) return;
    window._db.collection('personal_plans').doc(uid).collection('plans').get()
      .then(snap=>{ if(!snap.empty) setPtPlans(snap.docs.map(d=>d.data())); })
      .catch(()=>{});
  },[]);

  const totalExsByDay=(pl)=>DAYS.reduce((a,d)=>a+(pl.byDay?.[d]?.length||0),0);

  return (
    <div style={{marginTop:'1rem',display:'grid',gap:'1rem'}}>
      {/* Header */}
      <div className="ds-card" style={{padding:'.85rem 1.1rem',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:'1.5rem',textTransform:'uppercase',letterSpacing:'.04em',lineHeight:1}}>Fichas</div>
          <div style={{fontSize:'.65rem',color:'var(--color-text-sub)',marginTop:'2px'}}>{plans.list.length} ficha(s) salva(s)</div>
        </div>
        <button onClick={()=>setShowQR(true)} style={{background:'rgba(255,255,255,.04)',border:'1px solid var(--color-border)',borderRadius:'8px',padding:'.45rem .85rem',color:'var(--color-text-sub)',fontSize:'.75rem',fontWeight:700,textTransform:'uppercase',cursor:'pointer'}}>
          📷 QR
        </button>
      </div>

      {/* Tab toggle */}
      <div className="mode-toggle">
        <button className={"mode-toggle-btn"+(tab==='minhas'?' active':'')} onClick={()=>setTab('minhas')}>Minhas Fichas</button>
        <button className={"mode-toggle-btn"+(tab==='prontas'?' active':'')} onClick={()=>setTab('prontas')}>Fichas Prontas</button>
      </div>

      {/* ── MINHAS FICHAS ── */}
      {tab==='minhas'&&(<>
        <div className="ds-card" style={{padding:'1rem 1.1rem'}}>
          <div style={{fontSize:'.65rem',color:'var(--color-text-sub)',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:'.6rem'}}>Nova Ficha</div>
          <div style={{display:'flex',gap:'.5rem',alignItems:'stretch'}}>
            <input
              style={{flex:1,minWidth:0,background:'rgba(0,0,0,.45)',border:'1px solid var(--color-border)',borderRadius:'8px',padding:'.55rem .85rem',fontSize:'.9rem',color:'var(--color-text)'}}
              placeholder="Nome da ficha…"
              value={newName} onChange={e=>setNewName(e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&createPlan()}
            />
            <button onClick={createPlan} style={{flexShrink:0,background:'var(--color-accent)',border:'none',borderRadius:'8px',padding:'.55rem 1rem',color:'#fff',fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:'.9rem',textTransform:'uppercase',cursor:'pointer'}}>+ Criar</button>
          </div>
        </div>

        {plans.list.length===0?(
          <div style={{textAlign:'center',padding:'3rem 1rem',color:'var(--color-text-sub)'}}>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:'2rem',fontWeight:900,textTransform:'uppercase',marginBottom:'.5rem'}}>Sem fichas</div>
            <div style={{fontSize:'.85rem',marginBottom:'1rem'}}>Crie uma ficha ou importe uma pronta</div>
            <button onClick={()=>setTab('prontas')} style={{background:'var(--color-accent)',border:'none',borderRadius:'8px',padding:'.55rem 1.25rem',color:'#fff',fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:'.9rem',textTransform:'uppercase',cursor:'pointer'}}>Ver fichas prontas</button>
          </div>
        ):(
          <div style={{display:'grid',gap:'.6rem'}}>
            {plans.list.map(pl=>{
              const isActive=plans.activeId===pl.id;
              const exTotal=totalExsByDay(pl);
            return (
              <div key={pl.id} className="ds-card" style={{padding:'1rem 1.1rem',borderLeft:isActive?'2px solid var(--color-accent)':'2px solid transparent'}}>
                <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:'.65rem'}}>
                  <div style={{display:'flex',alignItems:'center',gap:'.75rem',flex:1,minWidth:0}}>
                    <button onClick={()=>activate(pl.id,!isActive)} style={{width:'20px',height:'20px',borderRadius:'50%',flexShrink:0,cursor:'pointer',background:isActive?'var(--color-accent)':'transparent',border:isActive?'2px solid var(--color-accent)':'2px solid #333',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:isActive?'0 0 8px rgba(227,27,35,.4)':''}}>
                      {isActive&&<div style={{width:'8px',height:'8px',borderRadius:'50%',background:'#fff'}}></div>}
                    </button>
                    {renameId===pl.id?(
                      <input autoFocus style={{flex:1,background:'rgba(0,0,0,.4)',border:'1px solid var(--color-accent)',borderRadius:'6px',padding:'.35rem .6rem',fontSize:'.95rem',color:'var(--color-text)',fontWeight:600}} value={pl.name} onChange={e=>setPlans(p=>({...p,list:p.list.map(x=>x.id===pl.id?{...x,name:e.target.value}:x)}))} onBlur={()=>setRenameId(null)}/>
                    ):(
                      <div style={{minWidth:0}}>
                        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:'1.15rem',textTransform:'uppercase',letterSpacing:'.03em',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>
                          {pl.name}
                          {isActive&&<span style={{marginLeft:'.5rem',fontSize:'.6rem',color:'var(--color-accent)',fontFamily:"'Inter',sans-serif",fontWeight:700,letterSpacing:'.06em',verticalAlign:'middle'}}>ATIVA</span>}
                        </div>
                        <div style={{fontSize:'.7rem',color:'#444',marginTop:'1px'}}>{exTotal} exercício(s)</div>
                      </div>
                    )}
                  </div>
                </div>
                <div style={{display:'flex',gap:'.3rem',flexWrap:'wrap',marginBottom:'.75rem'}}>
                  {DAYS.map(d=>{const n=pl.byDay?.[d]?.length||0;return n>0?(
                    <span key={d} style={{background:'rgba(227,27,35,.08)',border:'1px solid rgba(227,27,35,.15)',borderRadius:'5px',padding:'2px 7px',fontSize:'.65rem',color:'var(--color-accent)',fontWeight:700}}>{d.slice(0,3)} {n}</span>
                  ):(
                    <span key={d} style={{background:'rgba(0,0,0,.2)',border:'1px solid #1a1a1a',borderRadius:'5px',padding:'2px 7px',fontSize:'.65rem',color:'#222'}}>{d.slice(0,3)}</span>
                  );})}
                </div>
                <div style={{display:'flex',gap:'.4rem',flexWrap:'wrap'}}>
                  <button onClick={()=>goto('builder',pl.id)} style={{background:'var(--color-accent)',border:'none',borderRadius:'7px',padding:'.4rem .85rem',color:'#fff',fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:'.78rem',textTransform:'uppercase',cursor:'pointer'}}>Editar</button>
                  <button onClick={()=>setPreviewPlan(pl)} style={{background:'rgba(255,255,255,.05)',border:'1px solid #222',borderRadius:'7px',padding:'.4rem .75rem',color:'#aaa',fontSize:'.78rem',fontWeight:600,textTransform:'uppercase',cursor:'pointer'}}>👁 Ver</button>
                  <button onClick={()=>setRenameId(renameId===pl.id?null:pl.id)} style={{background:'rgba(255,255,255,.04)',border:'1px solid #222',borderRadius:'7px',padding:'.4rem .75rem',color:'#777',fontSize:'.78rem',fontWeight:600,textTransform:'uppercase',cursor:'pointer'}}>Renomear</button>
                  <button onClick={()=>duplicatePlan(pl.id)} style={{background:'rgba(255,255,255,.04)',border:'1px solid #222',borderRadius:'7px',padding:'.4rem .75rem',color:'#777',fontSize:'.78rem',fontWeight:600,textTransform:'uppercase',cursor:'pointer'}}>Duplicar</button>
                  <button onClick={()=>setSharePlan(pl)} style={{background:'rgba(255,255,255,.04)',border:'1px solid #222',borderRadius:'7px',padding:'.4rem .75rem',color:'#777',fontSize:'.78rem',fontWeight:600,textTransform:'uppercase',cursor:'pointer'}}>Compartilhar</button>
                  <button onClick={()=>removePlan(pl.id)} style={{background:'rgba(227,27,35,.08)',border:'1px solid rgba(227,27,35,.2)',borderRadius:'7px',padding:'.4rem .6rem',color:'#e31b23',fontSize:'.78rem',fontWeight:700,cursor:'pointer'}}>X</button>
                </div>
              </div>
            );
          })}
        </div>
      )}
      </>)}

      {/* ── FICHAS DO PERSONAL ── visíveis em Minhas Fichas, só selecionáveis */}
      {tab==='minhas' && ptPlans.length>0 && (
        <div>
          <div style={{display:'flex',alignItems:'center',gap:'.5rem',marginBottom:'.5rem'}}>
            <div style={{fontSize:'.62rem',color:'var(--color-text-sub)',textTransform:'uppercase',letterSpacing:'.1em',fontWeight:700}}>Do Seu Personal</div>
            <div style={{flex:1,height:'1px',background:'rgba(227,27,35,.2)'}}/>
          </div>
          {ptPlans.map(function(pl,i){
            var isActive = plans.activeId === pl.id;
            var exTotal = totalExsByDay(pl);
            return (
              <div key={i} className="ds-card" style={{padding:'1rem 1.1rem',marginBottom:'.5rem',borderLeft:isActive?'2px solid var(--color-accent)':'2px solid rgba(227,27,35,.2)',background:isActive?'rgba(227,27,35,.04)':'rgba(255,255,255,.02)'}}>
                <div style={{display:'flex',alignItems:'center',gap:'.75rem'}}>
                  <button onClick={()=>{ setPlans(p=>({...p,activeId:isActive?null:pl.id})); }}
                    style={{width:'20px',height:'20px',borderRadius:'50%',flexShrink:0,cursor:'pointer',background:isActive?'var(--color-accent)':'transparent',border:isActive?'2px solid var(--color-accent)':'2px solid #333',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:isActive?'0 0 8px rgba(227,27,35,.4)':''}}>
                    {isActive&&<div style={{width:'8px',height:'8px',borderRadius:'50%',background:'#fff'}}/>}
                  </button>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:'1.1rem',textTransform:'uppercase',letterSpacing:'.03em',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>
                      {pl.name}
                      {isActive&&<span style={{marginLeft:'.5rem',fontSize:'.6rem',color:'var(--color-accent)',fontFamily:"'Inter',sans-serif",fontWeight:700,letterSpacing:'.06em',verticalAlign:'middle'}}>ATIVA</span>}
                    </div>
                    <div style={{fontSize:'.7rem',color:'#555',marginTop:'1px'}}>
                      {exTotal} exercício(s) · <span style={{color:'rgba(227,27,35,.6)'}}>👨‍💼 {pl.personalName||'Personal'}</span>
                    </div>

          {filteredPresets.map(preset=>(
            <div key={preset.id} className="ds-card" style={{padding:'1rem 1.1rem'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'.6rem'}}>
