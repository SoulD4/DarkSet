const DRAFT_KEY = "darkset.draft.session";
const DRAFT_FREE_KEY = "darkset.draft.free";

// Autosalva rascunho por exercício no modo com ficha
function saveDraft(planId, day, cursor, sets, rir) {
  try {
    const all = JSON.parse(localStorage.getItem(DRAFT_KEY) || '{}');
    all[`${planId}__${day}__${cursor}`] = {sets, rir, ts: Date.now()};
    localStorage.setItem(DRAFT_KEY, JSON.stringify(all));
  } catch(_) {}
}
function loadDraft(planId, day, cursor) {
  try {
    const all = JSON.parse(localStorage.getItem(DRAFT_KEY) || '{}');
    return all[`${planId}__${day}__${cursor}`] || null;
  } catch(_) { return null; }
}
function clearDraftSession(planId, day) {
  try {
    const all = JSON.parse(localStorage.getItem(DRAFT_KEY) || '{}');
    Object.keys(all).filter(k=>k.startsWith(`${planId}__${day}__`)).forEach(k=>delete all[k]);
    localStorage.setItem(DRAFT_KEY, JSON.stringify(all));
  } catch(_) {}
}


// ── Smart Rest Duration based on exercise type ───────────────────────────
function smartRestDuration(exName, prefs) {
  if (!exName) return Number(prefs.timerPreset||60);
  const name = exName.toLowerCase();
  // Compound/heavy → longer rest
  if (/(agachamento|levantamento|supino reto barra|barra fixa|desenvolvimento barra|stiff$)/.test(name)) return 120;
  // Isolation → shorter
  if (/(rosca|tríceps|panturrilha|abdôm|elevação|crucifixo|kick back)/.test(name)) return 45;
  // Default
  return Number(prefs.timerPreset||60);
}

// Global rest timer trigger — called after each set save
function triggerSmartRest(exName, prefs) {
  if (!prefs.showTimer) return;
  const dur = smartRestDuration(exName, prefs);
  const endsAt = Date.now() + dur * 1000;
  // Dispatch event so DarkTimer picks it up
  window.dispatchEvent(new CustomEvent('darkset:startRest', {detail: {endsAt, dur}}));
}

  const freeRemoveExercise = (i) => setFreeExercises(prev => prev.filter((_, ix) => ix !== i));
  const freeUpdateSet = (ei, si, field, val) => setFreeExercises(prev => prev.map((ex, ix) =>
    ix !== ei ? ex : {...ex, sets: ex.sets.map((s, six) => six !== si ? s : {...s, [field]: val})}
  ));
  const freeUpdateRir = (ei, si, val) => setFreeExercises(prev => prev.map((ex, ix) =>
    ix !== ei ? ex : {...ex, rir: ex.rir.map((r, six) => six !== si ? r : val)}
  ));
  const freeAddSet = (ei) => setFreeExercises(prev => prev.map((ex, ix) =>
    ix !== ei ? ex : {...ex, sets: [...ex.sets, {w: '', r: ''}], rir: [...ex.rir, rirDefault]}
  ));
  const freeRemoveSet = (ei, si) => setFreeExercises(prev => prev.map((ex, ix) =>
    ix !== ei ? ex : {...ex, sets: ex.sets.filter((_, six) => six !== si), rir: ex.rir.filter((_, six) => six !== si)}
  ));
  const freeSaveSession = () => {
    const valid = freeExercises.filter(ex => ex.sets.some(s => s.r));
    if (!valid.length) { setToast('Adicione ao menos uma série com reps'); return; }
    const dateKey = new Date().toISOString().slice(0, 10);
    setHistory(prev => {
      const copy = {...prev};
      if (!copy[dateKey]) copy[dateKey] = {planName: 'Treino Livre', day: DAYS[(new Date().getDay() || 7) - 1], entries: []};
      for (const ex of valid) {
        const setsOut = ex.sets.map((s, i) => ({w: s.w, r: s.r, ...(ex.rir[i] && ex.rir[i] !== '--' ? {rir: ex.rir[i]} : {})}));
        const idx = copy[dateKey].entries.findIndex(e => e.name === ex.name);
        if (idx >= 0) copy[dateKey].entries[idx].sets = setsOut;
        else copy[dateKey].entries.push({name: ex.name, sets: setsOut});
      }
      return copy;
    });
    try { localStorage.removeItem(DRAFT_FREE_KEY); } catch(_) {}
    setFreeExercises([]);
    if (prefs.vibrate && navigator.vibrate) navigator.vibrate([100, 50, 200]);
    setToast('Treino salvo!');
  };

  const freeSuggestions = freeSearch.length >= 2
    ? EXS.filter(e => e.name.toLowerCase().includes(freeSearch.toLowerCase())).slice(0, 8)
    : [];

  // ── PRE-START SCREEN ──
  const preStartScreen = (
    <div className="grid gap-3 mt-3">
      {/* Mode toggle */}
      <div className="mode-toggle">
        <button className={'mode-toggle-btn' + (mode === 'plan' ? ' active' : '')} onClick={() => setMode('plan')}>Com Ficha</button>
        <button className={'mode-toggle-btn' + (mode === 'free' ? ' active' : '')} onClick={() => setMode('free')}>Treino Livre</button>
      </div>

      {mode === 'plan' && (
        <div className="ds-card" style={{padding:'1rem 1.1rem'}}>
          {!activePlan ? (
            <div>
              <div style={{color:'#555',fontSize:'.85rem',marginBottom:'.75rem'}}>Nenhuma ficha ativa. Crie uma primeiro.</div>
              <Button onClick={() => goto('plans')} variant="ghost">Ir para Fichas</Button>
            </div>
          ) : (
            <div className="grid gap-3">
              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:'1.4rem',fontWeight:800,textTransform:'uppercase'}}>{activePlan.name}</div>
              <div className="flex items-center gap-2">
                <span style={{fontSize:'.8rem',color:'#555',textTransform:'uppercase',letterSpacing:'.05em'}}>Dia:</span>
                <select style={{background:'rgba(0,0,0,.4)',border:'1px solid #1e1e1e',borderRadius:'8px',padding:'.4rem .75rem',fontSize:'.85rem',color:'#fff',flex:1}} value={day} onChange={e => {setDay(e.target.value); setCursor(0);}}>
                  {DAYS.map(d => <option key={d}>{d}</option>)}
                </select>
              </div>
              <div style={{fontSize:'.75rem',color:'#444'}}>{planItems.length} exercício(s) programado(s)</div>
              <Button variant="accent" onClick={start} full>Iniciar Treino</Button>
            </div>
          )}
        </div>
      )}

      {mode === 'free' && (
        <div className="grid gap-3">
        {prefs.showTimer && <DarkTimer prefs={prefs}/>}
        <div className="ds-card" style={{padding:'1rem 1.1rem'}}>
          <div style={{fontSize:'.75rem',color:'#555',marginBottom:'1rem',textTransform:'uppercase',letterSpacing:'.05em'}}>Adicione exercícios conforme vai treinando</div>

          {/* Search */}
          <div style={{position:'relative',marginBottom:'1rem'}}>
            <div className="flex gap-2">
              <input
                style={{background:'rgba(0,0,0,.4)',border:'1px solid #1e1e1e',borderRadius:'8px',padding:'.5rem .75rem',fontSize:'.85rem',color:'#fff',flex:1}}
                placeholder="Buscar exercício…"
                value={freeSearch}
                onChange={e => {setFreeSearch(e.target.value); setShowFreeSearch(true);}}
                onFocus={() => setShowFreeSearch(true)}
              />
              <Button variant="ghost" onClick={() => {if (freeSearch.trim()) freeAddExercise(freeSearch.trim());}}>+ Add</Button>
            </div>
            {showFreeSearch && freeSuggestions.length > 0 && (
              <div style={{position:'absolute',zIndex:20,left:0,right:0,top:'100%',marginTop:'4px',background:'#0d0d0d',border:'1px solid #1e1e1e',borderRadius:'8px',overflow:'hidden',boxShadow:'0 8px 24px rgba(0,0,0,.5)'}}>
                {freeSuggestions.map(e => (
                  <button key={e.id} style={{width:'100%',textAlign:'left',padding:'.65rem 1rem',background:'transparent',border:'none',borderBottom:'1px solid #111',cursor:'pointer',color:'#ddd',fontSize:'.85rem'}}
                    onMouseDown={() => freeAddExercise(e.name)}>
                    <span style={{fontWeight:600}}>{e.name}</span>
                    <span style={{color:'#444',marginLeft:'.5rem',fontSize:'.75rem'}}>{e.primary}</span>
                  </button>
                ))}
              </div>
            )}
          </div>

          {/* Free exercises list */}
          {freeExercises.length === 0 && (
            <div style={{textAlign:'center',padding:'1.5rem 0',color:'#333',fontSize:'.85rem'}}>Nenhum exercício ainda</div>
          )}
          <div className="grid gap-3">
            {freeExercises.map((ex, ei) => (
              <div key={ei} style={{background:'rgba(0,0,0,.3)',border:'1px solid #1a1a1a',borderRadius:'10px',padding:'.75rem'}}>
                <div className="flex items-center justify-between" style={{marginBottom:'.5rem'}}>
                  <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:'1rem',textTransform:'uppercase',letterSpacing:'.03em'}}>{ex.name}</div>
                  <button onClick={() => freeRemoveExercise(ei)} style={{background:'rgba(227,27,35,.1)',border:'1px solid rgba(227,27,35,.2)',borderRadius:'6px',color:'#e31b23',fontSize:'.7rem',padding:'.25rem .5rem',cursor:'pointer',fontWeight:600,textTransform:'uppercase'}}>×</button>
                </div>
                <div className="grid gap-1.5">
                  {ex.sets.map((s, si) => (
                    <div key={si} className="set-row" style={{gridTemplateColumns:'2rem 1fr 1fr 1fr 1.5rem'}}>
                      <div style={{fontSize:'.7rem',color:'#444',fontWeight:700}}>S{si+1}</div>
                      <input type="number" placeholder={prefs.unit==='kg'?'kg':'lb'} style={{background:'rgba(0,0,0,.4)',border:'1px solid #1a1a1a',borderRadius:'6px',padding:'.4rem .5rem',fontSize:'.85rem',color:'#fff',width:'100%'}} value={s.w} onChange={e => freeUpdateSet(ei, si, 'w', e.target.value)}/>
                      <input type="number" placeholder="reps" style={{background:'rgba(0,0,0,.4)',border:'1px solid #1a1a1a',borderRadius:'6px',padding:'.4rem .5rem',fontSize:'.85rem',color:'#fff',width:'100%'}} value={s.r} onChange={e => freeUpdateSet(ei, si, 'r', e.target.value)}/>
                      <select style={{background:'rgba(0,0,0,.4)',border:'1px solid #1a1a1a',borderRadius:'6px',padding:'.4rem .3rem',fontSize:'.8rem',color:'#fff'}} value={ex.rir[si]||'--'} onChange={e => freeUpdateRir(ei, si, e.target.value)}>
                        <option>--</option><option>Falha</option><option>1</option><option>2</option><option>3</option><option>4</option>
                      </select>
                      <button onClick={() => freeRemoveSet(ei, si)} style={{color:'#444',fontSize:'1rem',background:'none',border:'none',cursor:'pointer',padding:0}}>×</button>
                    </div>
                  ))}
                </div>
                <button onClick={() => freeAddSet(ei)} style={{marginTop:'.5rem',fontSize:'.7rem',color:'#444',background:'none',border:'1px solid #1a1a1a',borderRadius:'6px',padding:'.3rem .65rem',cursor:'pointer',textTransform:'uppercase',letterSpacing:'.05em'}}>+ Série</button>
              </div>
            ))}
          </div>

          {freeExercises.length > 0 && (
            <div style={{marginTop:'1rem'}}>
              <Button variant="accent" onClick={freeSaveSession} full>Salvar Treino</Button>
            </div>
          )}
        </div>
        </div>
      )}
    </div>
  );

  if (!started || mode === 'free') return preStartScreen;
  if (planItems.length === 0) return (
    <div className="ds-card grid gap-3 mt-3" style={{padding:'1rem 1.1rem'}}>
      <div className="mode-toggle">
        <button className={'mode-toggle-btn' + (mode === 'plan' ? ' active' : '')} onClick={() => setMode('plan')}>Com Ficha</button>
        <button className={'mode-toggle-btn' + (mode === 'free' ? ' active' : '')} onClick={() => setMode('free')}>Treino Livre</button>
      </div>
      <div style={{color:'#555',fontSize:'.85rem'}}>Sem exercícios para {day}.</div>
      <Button variant="ghost" onClick={back}>Voltar</Button>
    </div>
  );

  const current = planItems[cursor];
  const exMeta = EXS.find(e => e.id === current?.exId);
  const progress = ((cursor + 1) / planItems.length) * 100;

  return (
    <div className="grid gap-3 mt-3">
      {/* Header com progresso */}
      <div className="ds-card" style={{padding:'1rem 1.1rem'}}>
        <div className="flex items-center justify-between" style={{marginBottom:'.6rem'}}>
          <div>
            <div style={{fontSize:'.65rem',color:'var(--color-text-sub)',textTransform:'uppercase',letterSpacing:'.07em'}}>{activePlan.name} · {day}</div>
            <div style={{display:'flex',alignItems:'center',gap:'.6rem',marginTop:'.15rem'}}>
              <button onClick={()=>setSessionDetail(current.name)} style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:'1.5rem',fontWeight:800,textTransform:'uppercase',letterSpacing:'.03em',lineHeight:1.1,color:'var(--color-text)',background:'none',border:'none',cursor:'pointer',padding:0,textAlign:'left'}}>{current.name}</button>
              <button onClick={()=>setSessionGif(current.name)} style={{flexShrink:0,background:'rgba(227,27,35,.12)',border:'1px solid rgba(227,27,35,.25)',borderRadius:'7px',padding:'.28rem .55rem',fontSize:'.75rem',color:'var(--color-accent)',cursor:'pointer',fontWeight:700,lineHeight:1}}>🎬</button>
            </div>
          </div>
          <div style={{textAlign:'right'}}>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:'1.6rem',fontWeight:900,color:'var(--color-accent)',lineHeight:1}}>{cursor+1}<span style={{fontSize:'1rem',color:'#333'}}>/{planItems.length}</span></div>
            <Button variant="ghost" onClick={back} style={{fontSize:'.65rem',padding:'.25rem .5rem'}}>Sair</Button>
          </div>
        </div>
        <div className="ds-progress-track">
          <div className="ds-progress-fill" style={{width:`${progress}%`}}></div>
        </div>
      </div>

      {/* Timer */}
      {prefs.showTimer && <DarkTimer prefs={prefs}/>}
      {sessionGif&&<ExGifModal exName={sessionGif} onClose={()=>setSessionGif(null)}/>}
      {sessionDetail&&<ExerciseDetail exName={sessionDetail} onClose={()=>setSessionDetail(null)} history={history}/>}

      {/* Sets */}
      <div className="ds-card" style={{padding:'1rem 1.1rem'}}>
        <div style={{fontSize:'.65rem',color:'#555',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:'.6rem'}}>Séries</div>
        <div className="grid gap-2">
          {sets.map((s, i) => (
            <div key={i} className="set-row" style={{gridTemplateColumns:'2.5rem 1fr 1fr 1fr'}}>
              <div style={{fontSize:'.75rem',color:s.w&&s.r?'var(--color-accent)':'#333',fontWeight:700,textTransform:'uppercase'}}>S{i+1}</div>
              <input type="number" placeholder={prefs.unit==='kg'?'kg':'lb'} style={{background:'rgba(0,0,0,.4)',border:'1px solid #1a1a1a',borderRadius:'6px',padding:'.45rem .6rem',fontSize:'.9rem',color:'#fff',width:'100%'}}
                value={s.w} onChange={e => setSets(prev => prev.map((v, ix) => ix===i ? {...v, w: e.target.value} : v))}/>
              <input type="number" placeholder="reps" style={{background:'rgba(0,0,0,.4)',border:'1px solid #1a1a1a',borderRadius:'6px',padding:'.45rem .6rem',fontSize:'.9rem',color:'#fff',width:'100%'}}
                value={s.r} onChange={e => setSets(prev => prev.map((v, ix) => ix===i ? {...v, r: e.target.value} : v))}/>
              <select style={{background:'rgba(0,0,0,.4)',border:'1px solid #1a1a1a',borderRadius:'6px',padding:'.45rem .3rem',fontSize:'.82rem',color:'#fff'}}
                value={rir[i]} onChange={e => setRir(prev => prev.map((v, ix) => ix===i ? e.target.value : v))}>
                <option>--</option><option>Falha</option><option>1</option><option>2</option><option>3</option><option>4</option>
              </select>
            </div>
          ))}
        </div>

        <div className="flex items-center justify-between" style={{marginTop:'.85rem'}}>
          <Button variant="ghost" onClick={() => setCursor(i => Math.max(0, i-1))} disabled={cursor===0}>← Anterior</Button>
          <div className="flex gap-2">
            <Button variant={isDirty?'accent':'success'} onClick={saveCurrent}>{isDirty?'Salvar':'Salvo ✓'}</Button>
            {cursor < planItems.length-1
              ? <Button onClick={() => { saveCurrent(); setCursor(i => i+1); }}>Próximo →</Button>
              : <Button variant="accent" onClick={() => { saveCurrent(); clearDraftSession(activePlanId, day); back(); setToast('Treino concluído! 💪'); }}>Concluir</Button>
            }
          </div>
        </div>
      </div>

      {/* Último treino */}
      {lastPerf && (
        <div className="ds-card" style={{padding:'.85rem 1.1rem'}}>
          <div style={{fontSize:'.65rem',color:'#555',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:'.5rem'}}>Último Treino</div>
          <div className="grid gap-1.5">
            {lastPerf.sets.map((s, i) => (
              <div key={i} className="flex items-center justify-between" style={{background:'rgba(0,0,0,.2)',borderRadius:'6px',padding:'.35rem .75rem'}}>
                <div style={{fontSize:'.7rem',color:'#444',fontWeight:700}}>S{i+1}</div>
                <div style={{fontSize:'.85rem',fontFamily:"'Barlow Condensed',sans-serif",fontWeight:600,letterSpacing:'.03em'}}>
                  {s.w||'–'}{prefs.unit==='kg'?'kg':'lb'} × {s.r||'–'}{s.rir?` · RIR ${s.rir}`:''}
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* GIF */}
      {exMeta?.media?.srcGif && (
        <div className="ds-card" style={{padding:'.85rem 1.1rem'}}>
          <div style={{fontSize:'.65rem',color:'#555',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:'.5rem'}}>Execução</div>
          <div style={{borderRadius:'8px',overflow:'hidden',border:'1px solid #1a1a1a',background:'#000'}}>
            <img src={exMeta.media.srcGif} alt={current.name} style={{width:'100%',height:'auto',display:'block'}}/>
          </div>
        </div>
      )}
    </div>
  );
};



// History (cards compact + modal details)
const History=({history,setHistory,prefs})=>{
  const [dateSearch,setDateSearch]=useState("");
  const [weekday,setWeekday]=useState("");
  const [planFilter,setPlanFilter]=useState("");
  const [detail,setDetail]=useState(null);
  const [exportMsg,setExportMsg]=useState(null);

  const parseNum=(v)=>{const n=parseFloat(String(v).replace(",","."));return isFinite(n)?n:0;};
  const volSets=(sets)=>sets.reduce((acc,s)=>acc+(parseNum(s.w)*parseNum(s.r)),0);
  const volSession=(obj)=>(obj.entries||[]).reduce((acc,en)=>acc+volSets(en.sets||[]),0);
  const toBR=(iso)=>{const [y,m,d]=iso.split("-");return `${d}/${m}/${y}`;};

  const entries=Object.entries(history).sort((a,b)=>a[0]>b[0]?-1:1);

  const prMap=useMemo(()=>{
    const map={};
    entries.forEach(([,obj])=>{
      (obj.entries||[]).forEach(en=>{
        (en.sets||[]).forEach(s=>{
          const w=parseNum(s.w),r=parseNum(s.r);
          if(!w||!r) return;
          const est=w*(1+r/30);
          if(!map[en.name]||est>map[en.name]) map[en.name]=est;
        });
      });
    });
    return map;
  },[entries.length]);

  const matchDate=(iso)=>{
    if(!dateSearch) return true;
    const q=dateSearch.trim().toLowerCase();
    return toBR(iso).toLowerCase().includes(q)||iso.includes(q);
  };
  const filtered=entries.filter(([date,o])=>(!weekday||o.day===weekday)&&(!planFilter||o.planName===planFilter)&&matchDate(date));
  const planOptions=[...new Set(entries.map(([,o])=>o.planName).filter(Boolean))];
  const chartsEnabled=!!prefs.chartsPremium;
  const totalVol=Math.round(entries.reduce((_a,[,o])=>_a+volSession(o),0));

  const exportCSV=()=>{
    const rows=[['Data','Dia','Ficha','Exercicio','Serie','Carga','Reps','RIR']];
    entries.forEach(([date,obj])=>{
      (obj.entries||[]).forEach(en=>{
        (en.sets||[]).forEach((s,i)=>{
          rows.push([toBR(date),obj.day||'',obj.planName||'',en.name,i+1,s.w||'',s.r||'',s.rir||'']);
        });
      });
    });
    const csv=rows.map(r=>r.map(c=>'"'+c+'"').join(',')).join('\n');
    const a=document.createElement('a');
    a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
    a.download='darkset_historico_'+new Date().toISOString().slice(0,10)+'.csv';
    a.click();
    setExportMsg('CSV baixado!');
    setTimeout(()=>setExportMsg(null),2000);
  };

  const deleteEntry=(date)=>{
    if(!confirm('Excluir o treino de '+toBR(date)+'?')) return;
    setHistory(prev=>{const copy={...prev};delete copy[date];return copy;});
  };

  return (
    <div style={{marginTop:'1rem',display:'grid',gap:'1rem'}}>
      <div className="ds-card" style={{padding:'1rem 1.1rem'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'.85rem'}}>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:'1.5rem',textTransform:'uppercase',letterSpacing:'.04em',lineHeight:1}}>Historico</div>
          <div style={{display:'flex',gap:'.4rem'}}>
            <button onClick={exportCSV} style={{background:'rgba(255,255,255,.04)',border:'1px solid #222',borderRadius:'7px',padding:'.35rem .65rem',color:'#777',fontSize:'.72rem',fontWeight:700,textTransform:'uppercase',cursor:'pointer'}}>CSV</button>
            <button disabled={!chartsEnabled} onClick={()=>window.openChartsModal&&window.openChartsModal()} style={{background:chartsEnabled?'rgba(227,27,35,.1)':'rgba(255,255,255,.02)',border:chartsEnabled?'1px solid rgba(227,27,35,.25)':'1px solid #1a1a1a',borderRadius:'7px',padding:'.35rem .65rem',color:chartsEnabled?'#e31b23':'#333',fontSize:'.72rem',fontWeight:700,textTransform:'uppercase',cursor:chartsEnabled?'pointer':'default',display:'inline-flex',alignItems:'center',gap:'.3rem'}}>
              {!chartsEnabled&&<LockIcon/>}Graficos
            </button>
          </div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'.5rem'}}>
          <div className="ds-stat"><div className="ds-stat-val">{entries.length}</div><div className="ds-stat-label">Treinos</div></div>
          <div className="ds-stat"><div className="ds-stat-val" style={{fontSize:'1.1rem'}}>{totalVol>=1000?(totalVol/1000).toFixed(1)+'t':totalVol+'kg'}</div><div className="ds-stat-label">Volume total</div></div>
          <div className="ds-stat"><div className="ds-stat-val">{Object.keys(prMap).length}</div><div className="ds-stat-label">Exercicios</div></div>
        </div>
        {exportMsg&&<div style={{marginTop:'.5rem',fontSize:'.72rem',color:'#4ade80'}}>{exportMsg}</div>}
      </div>

      <div className="ds-card" style={{padding:'.85rem 1.1rem',display:'grid',gap:'.5rem'}}>
        <input style={{width:'100%',background:'rgba(0,0,0,.45)',border:'1px solid #1e1e1e',borderRadius:'8px',padding:'.5rem .85rem',fontSize:'.85rem',color:'var(--color-text)'}} placeholder="Buscar por data (ex: 25/02)..." value={dateSearch} onChange={e=>setDateSearch(e.target.value)}/>
        <div style={{display:'flex',gap:'.4rem',flexWrap:'wrap'}}>
          <select style={{background:'rgba(0,0,0,.4)',border:'1px solid #1a1a1a',borderRadius:'7px',padding:'.35rem .6rem',fontSize:'.78rem',color:weekday?'var(--color-text)':'#555',flex:1,minWidth:'120px'}} value={weekday} onChange={e=>setWeekday(e.target.value)}>
            <option value="">Dia da semana</option>{DAYS.map(d=><option key={d}>{d}</option>)}
          </select>
          <select style={{background:'rgba(0,0,0,.4)',border:'1px solid #1a1a1a',borderRadius:'7px',padding:'.35rem .6rem',fontSize:'.78rem',color:planFilter?'var(--color-text)':'#555',flex:1,minWidth:'120px'}} value={planFilter} onChange={e=>setPlanFilter(e.target.value)}>
            <option value="">Ficha</option>{planOptions.map(n=><option key={n}>{n}</option>)}
          </select>
          {(dateSearch||weekday||planFilter)&&<button onClick={()=>{setDateSearch('');setWeekday('');setPlanFilter('');}} style={{background:'rgba(227,27,35,.08)',border:'1px solid rgba(227,27,35,.2)',borderRadius:'7px',padding:'.35rem .65rem',color:'#e31b23',fontSize:'.75rem',fontWeight:700,cursor:'pointer'}}>Limpar</button>}
        </div>
        <div style={{fontSize:'.65rem',color:'#333',textTransform:'uppercase',letterSpacing:'.06em'}}>{filtered.length} resultado(s)</div>
      </div>

      {filtered.length===0?(
        <div style={{textAlign:'center',padding:'2.5rem 1rem',color:'#222'}}>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:'2rem',fontWeight:900,textTransform:'uppercase',marginBottom:'.4rem'}}>Sem registros</div>
          <div style={{fontSize:'.8rem',color:'#333'}}>Treine para ver o historico aqui</div>
        </div>
      ):(
        <div style={{display:'grid',gap:'.5rem'}}>
          {filtered.map(([date,obj])=>{
            const vol=Math.round(volSession(obj));
            const hasPR=(obj.entries||[]).some(en=>(en.sets||[]).some(s=>{
              const w=parseNum(s.w),r=parseNum(s.r);
              if(!w||!r) return false;
              return Math.abs(w*(1+r/30)-(prMap[en.name]||0))<0.01;
            }));
            return (
              <button key={date} onClick={()=>setDetail({date,obj})} style={{background:'var(--color-card)',border:'1px solid var(--color-border)',borderLeft:hasPR?'2px solid var(--color-accent)':'2px solid transparent',borderRadius:'10px',padding:'.85rem 1rem',textAlign:'left',cursor:'pointer',width:'100%'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                  <div>
                    <div style={{display:'flex',alignItems:'center',gap:'.5rem',marginBottom:'2px'}}>
                      <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:'1.1rem',fontWeight:700,color:'var(--color-text)',letterSpacing:'.02em'}}>{toBR(date)}</span>
                      {hasPR&&<span style={{background:'rgba(227,27,35,.12)',border:'1px solid rgba(227,27,35,.25)',borderRadius:'4px',padding:'1px 6px',fontSize:'.6rem',color:'var(--color-accent)',fontWeight:800}}>PR</span>}
                    </div>
                    <div style={{fontSize:'.75rem',color:'#555'}}>{obj.day||''} · {obj.planName||'Treino Livre'}</div>
                  </div>
                  <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:'.3rem'}}>
                    <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:'1rem',fontWeight:700,color:'#555'}}>{vol>=1000?(vol/1000).toFixed(1)+'t':vol+'kg'}</div>
                    <div style={{fontSize:'.65rem',color:'#333'}}>{(obj.entries||[]).length} ex</div>
                    <button onClick={e=>{e.stopPropagation();deleteEntry(date);}} style={{background:'rgba(227,27,35,.07)',border:'1px solid rgba(227,27,35,.15)',borderRadius:'5px',color:'#e31b23',padding:'2px 7px',fontSize:'.65rem',fontWeight:700,cursor:'pointer'}}>X</button>
                  </div>
                </div>
              </button>
            );
          })}
        </div>
      )}

      {detail&&(
        <Modal onClose={()=>setDetail(null)}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'1rem'}}>
            <div>
              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:'1.2rem',textTransform:'uppercase',lineHeight:1}}>{toBR(detail.date)}</div>
              <div style={{fontSize:'.72rem',color:'#555',marginTop:'2px'}}>{detail.obj.day} · {detail.obj.planName||'Treino Livre'}</div>
            </div>
            <button onClick={()=>setDetail(null)} style={{background:'rgba(255,255,255,.04)',border:'1px solid #222',borderRadius:'6px',padding:'.3rem .65rem',color:'#777',fontSize:'.75rem',cursor:'pointer'}}>Fechar</button>
          </div>
          <div style={{display:'grid',gap:'.5rem',maxHeight:'60vh',overflowY:'auto',paddingRight:'2px'}}>
            {detail.obj.entries.map((en,i)=>{
              const isPR=(en.sets||[]).some(s=>{
                const w=parseNum(s.w),r=parseNum(s.r);
                if(!w||!r) return false;
                return Math.abs(w*(1+r/30)-(prMap[en.name]||0))<0.01;
              });
              return (
                <div key={i} style={{background:'rgba(0,0,0,.3)',border:isPR?'1px solid rgba(227,27,35,.25)':'1px solid #1a1a1a',borderRadius:'8px',padding:'.65rem .85rem'}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'.4rem'}}>
                    <div style={{fontWeight:600,fontSize:'.88rem'}}>{en.name}</div>
                    <div style={{display:'flex',gap:'.4rem',alignItems:'center'}}>
                      {isPR&&<span style={{background:'rgba(227,27,35,.12)',border:'1px solid rgba(227,27,35,.25)',borderRadius:'4px',padding:'1px 6px',fontSize:'.6rem',color:'var(--color-accent)',fontWeight:800}}>PR</span>}
                      <span style={{fontSize:'.65rem',color:'#333'}}>{Math.round(volSets(en.sets))}kg</span>
                    </div>
                  </div>
                  <div style={{display:'flex',flexWrap:'wrap',gap:'.3rem'}}>
                    {en.sets.map((s,ix)=>(
                      <span key={ix} style={{background:'rgba(255,255,255,.04)',border:'1px solid #1a1a1a',borderRadius:'5px',padding:'3px 8px',fontSize:'.72rem',color:'#aaa'}}>
                        S{ix+1}: {s.w||'-'}{prefs.unit==='kg'?'kg':'lb'} x {s.r||'-'}{s.rir?' RIR'+s.rir:''}
                      </span>
                    ))}
                  </div>
                </div>
              );
            })}
          </div>
        </Modal>
      )}
    </div>
  );
};

const GifApiKeyInput = () => {
  const [key, setKey] = useState(()=>localStorage.getItem('darkset.rapidapi.key')||'');
  const [saved, setSaved] = useState(false);
  const save = () => {
    localStorage.setItem('darkset.rapidapi.key', key.trim());
    // Clear gif cache so new key takes effect
    localStorage.removeItem('darkset.gifcache');
    Object.keys(GIF_CACHE).forEach(k=>delete GIF_CACHE[k]);
    setSaved(true); setTimeout(()=>setSaved(false),2000);
  };
  return (
    <div style={{display:'flex',gap:'.4rem'}}>
      <input
        type="password"
        placeholder="Cole sua API key aqui..."
        value={key}
        onChange={e=>{setKey(e.target.value);setSaved(false);}}
        style={{flex:1,background:'rgba(0,0,0,.25)',border:'1px solid var(--color-border)',borderRadius:'7px',padding:'.4rem .65rem',fontSize:'.75rem',color:'var(--color-text)',fontFamily:'monospace'}}
      />
      <button onClick={save} style={{background:saved?'rgba(74,222,128,.15)':'var(--color-accent)',border:saved?'1px solid rgba(74,222,128,.3)':'none',borderRadius:'7px',padding:'.4rem .85rem',color:saved?'#4ade80':'#fff',fontSize:'.75rem',fontWeight:700,textTransform:'uppercase',cursor:'pointer',transition:'all .2s'}}>
        {saved?'✓ Salvo':'Salvar'}
      </button>
    </div>
  );
};


const Profile=({prefs,setPrefs,history})=>{
  const [tab,setTab]=useState('config');
  const [name,setName]=useState(prefs.name||'');
  const [avatarUrl,setAvatarUrl]=useState(prefs.avatarUrl||null);
  const [unit,setUnit]=useState(prefs.unit||'kg');
  const [vibrate,setVibrate]=useState(prefs.vibrate!==false);
  const [goal,setGoal]=useState(prefs.weeklyGoal||5);
  const [showTimer,setShowTimer]=useState(prefs.showTimer!==false);
  const [timerPreset,setTimerPreset]=useState(Number(prefs.timerPreset||60));
  const [rir,setRir]=useState(typeof prefs.rirDefault==='number'?prefs.rirDefault:2);
  const [theme,setTheme]=useState(prefs.theme||'dark');
  const [uploading,setUploading]=useState(false);
  const [uploadErr,setUploadErr]=useState(null);
  const [syncMsg,setSyncMsg]=useState('');
  // Progresso
  const [progressPhotos,setProgressPhotos]=useState(()=>{
    try{return JSON.parse(localStorage.getItem('darkset.progress')||'[]');}catch(_){return [];}
  });
  const [addingPhoto,setAddingPhoto]=useState(false);
  const [photoDate,setPhotoDate]=useState(new Date().toISOString().slice(0,10));
  const [photoLabel,setPhotoLabel]=useState('');
  const [pendingPhotoData,setPendingPhotoData]=useState(null);
  const photoRef=useRef(null);
  const fileRef=useRef(null);

  const dirty=(name!==prefs.name)||(avatarUrl!==(prefs.avatarUrl||null))||(unit!==prefs.unit)||(vibrate!==(prefs.vibrate!==false))||(goal!==prefs.weeklyGoal)||(showTimer!==(prefs.showTimer!==false))||(Number(timerPreset)!==Number(prefs.timerPreset||60))||(Number(rir)!==Number(typeof prefs.rirDefault==='number'?prefs.rirDefault:2));

  const savePrefs=()=>setPrefs({name,avatarUrl,unit,vibrate,weeklyGoal:goal,showTimer,timerPreset,rirDefault:rir,chartsPremium:!!prefs.chartsPremium,theme});

  const changeTheme=(t)=>{setTheme(t);setPrefs(p=>({...p,theme:t}));};

  const handlePhotoChange=async(e)=>{
    const file=e.target.files&&e.target.files[0];
    if(!file) return;
    if(file.size>5*1024*1024){setUploadErr('Imagem muito grande (max 5MB).');return;}
    setUploadErr(null); setUploading(true);
    try{
      const user=JSON.parse(localStorage.getItem('darkset.user')||'null');
      if(!user){setUploadErr('Faca login para enviar foto.');setUploading(false);return;}
      const reader=new FileReader();
      reader.onload=ev=>{ setAvatarUrl(ev.target.result); setUploading(false); };
      reader.readAsDataURL(file);
    }catch(err){setUploadErr('Erro: '+(err.message||''));setUploading(false);}
  };

  const handleProgressPhoto=(e)=>{
    const file=e.target.files&&e.target.files[0];
    if(!file) return;
    const reader=new FileReader();
    reader.onload=ev=>{setPendingPhotoData(ev.target.result);setAddingPhoto(true);};
    reader.readAsDataURL(file);
    e.target.value='';
  };
  const saveProgressPhoto=()=>{
    if(!pendingPhotoData) return;
    const newPhotos=[...progressPhotos,{date:photoDate,label:photoLabel||'Foto',data:pendingPhotoData,id:Date.now()}];
    setProgressPhotos(newPhotos);
    try{localStorage.setItem('darkset.progress',JSON.stringify(newPhotos));}catch(_){}
    setAddingPhoto(false); setPendingPhotoData(null); setPhotoLabel('');
  };
  const deletePhoto=(id)=>{
    const updated=progressPhotos.filter(p=>p.id!==id);
    setProgressPhotos(updated);
    try{localStorage.setItem('darkset.progress',JSON.stringify(updated));}catch(_){}
  };

  const doSync=async()=>{
    const uid=getUID();
    if(!uid){setSyncMsg('Faca login primeiro.');return;}
    if(!window._db){setSyncMsg('Firebase nao conectado.');return;}
    window._DS_LAST_ERROR=null;
    setSyncMsg('Sincronizando...');
    try{
      await window.DSSync.pull(uid);
      setSyncMsg(window._DS_LAST_ERROR?'Erro: '+window._DS_LAST_ERROR:'Sincronizado!');
      setTimeout(()=>setSyncMsg(''),3000);
    }catch(e){setSyncMsg('Erro: '+e.message);}
  };

  const uid=getUID();
  const displayImg=avatarUrl||null;
  const toBR=(iso)=>{if(!iso)return '';const[y,m,d]=iso.split('-');return d+'/'+m+'/'+y;};

  return (
    <div style={{marginTop:'1rem',display:'grid',gap:'1rem'}}>

      {/* Header */}
      <div className="ds-card" style={{padding:'1rem 1.1rem'}}>
        <div style={{display:'flex',alignItems:'center',gap:'1rem'}}>
          <div style={{position:'relative'}}>
            {displayImg
              ?<img src={displayImg} style={{width:'56px',height:'56px',borderRadius:'50%',border:'2px solid var(--color-border)',objectFit:'cover'}} alt="avatar"/>
              :<div style={{width:'56px',height:'56px',borderRadius:'50%',border:'2px solid var(--color-border)',background:'var(--color-card-soft)',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:'1.3rem',color:'var(--color-text-sub)'}}>{name?name.slice(0,2).toUpperCase():'DS'}</div>
            }
            <button onClick={()=>fileRef.current&&fileRef.current.click()} style={{position:'absolute',bottom:'-2px',right:'-2px',width:'20px',height:'20px',borderRadius:'50%',background:'var(--color-accent)',border:'2px solid var(--color-bg)',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',fontSize:'.65rem',color:'#fff',fontWeight:700}}>e</button>
            <input ref={fileRef} type="file" accept="image/*" style={{display:'none'}} onChange={handlePhotoChange}/>
          </div>
          <div style={{flex:1}}>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:'1.4rem',textTransform:'uppercase',letterSpacing:'.04em',lineHeight:1,color:'var(--color-text)'}}>{name||'Sem nome'}</div>
            <div style={{fontSize:'.7rem',color:'var(--color-text-sub)',marginTop:'2px'}}>Meta: {goal} treinos/semana</div>
          </div>
        </div>
        {uploading&&<div style={{marginTop:'.5rem',fontSize:'.72rem',color:'var(--color-text-sub)'}}>Carregando...</div>}
        {uploadErr&&<div style={{marginTop:'.5rem',fontSize:'.72rem',color:'var(--color-accent)'}}>{uploadErr}</div>}
      </div>

      {/* Tabs */}
      <div className="mode-toggle">
        <button className={"mode-toggle-btn"+(tab==='config'?' active':'')} onClick={()=>setTab('config')}>Configurações</button>
        <button className={"mode-toggle-btn"+(tab==='progresso'?' active':'')} onClick={()=>setTab('progresso')}>Progresso</button>
      </div>

      {/* ── CONFIG ── */}
      {tab==='config'&&(
        <div className="ds-card" style={{padding:'1rem 1.1rem',display:'grid',gap:'1rem',background:'var(--color-card)'}}>

          <div>
            <div style={{fontSize:'.65rem',color:'var(--color-text-sub)',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:'.35rem'}}>Nome</div>
            <input style={{width:'100%',background:'rgba(0,0,0,.25)',border:'1px solid var(--color-border)',borderRadius:'8px',padding:'.55rem .85rem',fontSize:'.9rem',color:'var(--color-text)'}} placeholder="Seu nome" value={name} onChange={e=>setName(e.target.value)}/>
          </div>

          <div>
            <div style={{fontSize:'.65rem',color:'var(--color-text-sub)',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:'.4rem'}}>Tema</div>
            <div className="mode-toggle">
              <button className={"mode-toggle-btn"+(theme==='dark'?' active':'')} onClick={()=>changeTheme('dark')}>🌑 Dark</button>
              <button className={"mode-toggle-btn"+(theme==='light'?' active':'')} onClick={()=>changeTheme('light')}>☀️ Light</button>
            </div>
          </div>

          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <div style={{fontSize:'.65rem',color:'var(--color-text-sub)',textTransform:'uppercase',letterSpacing:'.07em'}}>Unidade</div>
            <div className="mode-toggle" style={{width:'auto'}}>
              <button className={"mode-toggle-btn"+(unit==='kg'?' active':'')} onClick={()=>setUnit('kg')}>kg</button>
              <button className={"mode-toggle-btn"+(unit==='lb'?' active':'')} onClick={()=>setUnit('lb')}>lb</button>
            </div>
          </div>

          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <div style={{fontSize:'.65rem',color:'var(--color-text-sub)',textTransform:'uppercase',letterSpacing:'.07em'}}>Vibração ao salvar</div>
            <Switch checked={vibrate} onChange={setVibrate}/>
          </div>

          <div>
            <div style={{fontSize:'.65rem',color:'var(--color-text-sub)',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:'.4rem'}}>Meta semanal</div>
            <div style={{display:'flex',gap:'.4rem'}}>
              {[3,4,5,6,7].map(n=>(
                <button key={n} onClick={()=>setGoal(n)} style={{flex:1,padding:'.4rem 0',borderRadius:'7px',background:goal===n?'var(--color-accent)':'rgba(0,0,0,.2)',border:goal===n?'none':'1px solid var(--color-border)',color:goal===n?'#fff':'var(--color-text-sub)',fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:'.9rem',cursor:'pointer'}}>{n}x</button>
              ))}
            </div>
          </div>

          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <div style={{fontSize:'.65rem',color:'var(--color-text-sub)',textTransform:'uppercase',letterSpacing:'.07em'}}>DarkTimer</div>
            <Switch checked={showTimer} onChange={setShowTimer}/>
          </div>

          <div>
            <div style={{fontSize:'.65rem',color:'var(--color-text-sub)',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:'.4rem'}}>Tempo padrão (s)</div>
            <div style={{display:'flex',gap:'.4rem'}}>
              {[30,45,60,90,120].map(n=>(
                <button key={n} onClick={()=>setTimerPreset(n)} style={{flex:1,padding:'.35rem 0',borderRadius:'7px',background:timerPreset===n?'var(--color-accent)':'rgba(0,0,0,.2)',border:timerPreset===n?'none':'1px solid var(--color-border)',color:timerPreset===n?'#fff':'var(--color-text-sub)',fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:'.78rem',cursor:'pointer'}}>{n}s</button>
              ))}
            </div>
          </div>

          <div>
            <div style={{fontSize:'.65rem',color:'var(--color-text-sub)',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:'.4rem'}}>RIR padrão</div>
            <div style={{display:'flex',gap:'.4rem'}}>
              {[0,1,2,3,4].map(n=>(
                <button key={n} onClick={()=>setRir(n)} style={{flex:1,padding:'.35rem 0',borderRadius:'7px',background:rir===n?'var(--color-accent)':'rgba(0,0,0,.2)',border:rir===n?'none':'1px solid var(--color-border)',color:rir===n?'#fff':'var(--color-text-sub)',fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:'.9rem',cursor:'pointer'}}>{n}</button>
              ))}
            </div>
          </div>

          <button disabled={!dirty||uploading} onClick={savePrefs} style={{background:dirty&&!uploading?'var(--color-accent)':'rgba(0,0,0,.15)',border:'none',borderRadius:'8px',padding:'.65rem',color:dirty&&!uploading?'#fff':'var(--color-text-sub)',fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:'1rem',textTransform:'uppercase',letterSpacing:'.05em',cursor:dirty&&!uploading?'pointer':'default',width:'100%',transition:'all .15s'}}>
            {dirty?'Salvar alterações':'Sem alterações'}
          </button>

          {/* Notificações */}
          <NotifSettings prefs={prefs} setPrefs={setPrefs} setToast={()=>{}}/>

          {/* Sync */}
          <div style={{borderTop:'1px solid var(--color-border)',paddingTop:'1rem',display:'grid',gap:'.5rem'}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <div>
                <div style={{fontSize:'.65rem',color:'var(--color-text-sub)',textTransform:'uppercase',letterSpacing:'.07em'}}>Sincronização</div>
                <div style={{fontSize:'.7rem',color:uid?'#4ade80':'var(--color-text-sub)',marginTop:'1px'}}>{uid?'Conectado':'Sem login'}</div>
              </div>
              <button onClick={doSync} disabled={!uid} style={{background:uid?'rgba(74,222,128,.1)':'rgba(0,0,0,.15)',border:uid?'1px solid rgba(74,222,128,.25)':'1px solid var(--color-border)',borderRadius:'7px',padding:'.4rem .85rem',color:uid?'#4ade80':'var(--color-text-sub)',fontSize:'.75rem',fontWeight:700,textTransform:'uppercase',cursor:uid?'pointer':'default'}}>
                Sincronizar
              </button>
            </div>
            {syncMsg&&<div style={{fontSize:'.72rem',color:syncMsg.startsWith('Erro')?'#e31b23':'#4ade80'}}>{syncMsg}</div>}
          </div>

          {/* API Key para GIFs */}
          <div style={{borderTop:'1px solid var(--color-border)',paddingTop:'.85rem',display:'grid',gap:'.5rem'}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <div>
                <div style={{fontSize:'.65rem',color:'var(--color-text-sub)',textTransform:'uppercase',letterSpacing:'.07em'}}>GIFs de Exercícios</div>
                <div style={{fontSize:'.62rem',color:'#444',marginTop:'1px'}}>Cole a X-RapidAPI-Key (não o Host)</div>
              </div>
              <a href="https://rapidapi.com/justin-WFnsXH_t6/api/exercisedb" target="_blank" rel="noreferrer" style={{fontSize:'.65rem',color:'var(--color-accent)',fontWeight:700,textDecoration:'none'}}>Criar grátis →</a>
            </div>

          <div style={{borderTop:'1px solid var(--color-border)',paddingTop:'.85rem',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <div style={{fontSize:'.65rem',color:'var(--color-text-sub)',textTransform:'uppercase',letterSpacing:'.07em'}}>Tutorial</div>
            <button onClick={()=>{localStorage.removeItem('darkset.launched');window.location.reload();}} style={{background:'rgba(0,0,0,.15)',border:'1px solid var(--color-border)',borderRadius:'7px',padding:'.4rem .85rem',color:'var(--color-text-sub)',fontSize:'.72rem',fontWeight:700,textTransform:'uppercase',cursor:'pointer'}}>
              Ver novamente
            </button>
          </div>

        </div>
      )}

      {/* ── PROGRESSO ── */}
      {tab==='progresso'&&(
        <div style={{display:'grid',gap:'1rem'}}>
          <div className="ds-card" style={{padding:'1rem 1.1rem',background:'var(--color-card)'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'.75rem'}}>
              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:'1rem',textTransform:'uppercase',color:'var(--color-text)'}}>Fotos de Progresso</div>
              <button onClick={()=>photoRef.current&&photoRef.current.click()} style={{background:'var(--color-accent)',border:'none',borderRadius:'7px',padding:'.35rem .9rem',color:'#fff',fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:'.78rem',textTransform:'uppercase',cursor:'pointer'}}>+ Foto</button>
              <input ref={photoRef} type="file" accept="image/*" capture="environment" style={{display:'none'}} onChange={handleProgressPhoto}/>
            </div>

            {progressPhotos.length===0&&!addingPhoto&&(
              <div style={{textAlign:'center',padding:'2rem 1rem',color:'var(--color-text-sub)',fontSize:'.85rem'}}>
                <div style={{fontSize:'2rem',marginBottom:'.5rem'}}>📸</div>
                <div>Nenhuma foto ainda</div>
                <div style={{fontSize:'.72rem',marginTop:'.25rem',color:'#333'}}>Registre sua evolução mês a mês</div>
              </div>
            )}

            {progressPhotos.length>0&&(
              <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'.4rem',marginBottom:'.75rem'}}>
                {progressPhotos.map(p=>(
                  <div key={p.id} style={{position:'relative',borderRadius:'6px',overflow:'hidden',aspectRatio:'1',background:'var(--color-card-soft)'}}>
                    <img src={p.data} style={{width:'100%',height:'100%',objectFit:'cover'}} alt={p.label}/>
                    <div style={{position:'absolute',bottom:0,left:0,right:0,background:'linear-gradient(transparent,rgba(0,0,0,.85))',padding:'4px 5px'}}>
                      <div style={{fontSize:'.58rem',color:'#ddd',fontWeight:600}}>{toBR(p.date)}</div>
                      <div style={{fontSize:'.52rem',color:'#aaa'}}>{p.label}</div>
                    </div>
                    <button onClick={()=>deletePhoto(p.id)} style={{position:'absolute',top:'3px',right:'3px',background:'rgba(0,0,0,.75)',border:'none',borderRadius:'50%',width:'18px',height:'18px',color:'#e31b23',fontSize:'.7rem',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',lineHeight:1}}>×</button>

            {addingPhoto&&(
              <div style={{background:'var(--color-card-soft)',border:'1px solid var(--color-border)',borderRadius:'8px',padding:'.75rem',display:'grid',gap:'.5rem'}}>
                {pendingPhotoData&&<img src={pendingPhotoData} style={{width:'100%',maxHeight:'180px',objectFit:'cover',borderRadius:'6px'}} alt="preview"/>}
                <input type="date" value={photoDate} onChange={e=>setPhotoDate(e.target.value)} style={{background:'rgba(0,0,0,.25)',border:'1px solid var(--color-border)',borderRadius:'6px',padding:'.4rem .65rem',fontSize:'.85rem',color:'var(--color-text)'}}/>
                <input placeholder="Descrição (ex: Início, Mês 1...)" value={photoLabel} onChange={e=>setPhotoLabel(e.target.value)} style={{background:'rgba(0,0,0,.25)',border:'1px solid var(--color-border)',borderRadius:'6px',padding:'.4rem .65rem',fontSize:'.85rem',color:'var(--color-text)'}}/>
                <div style={{display:'flex',gap:'.4rem'}}>
                  <button onClick={saveProgressPhoto} style={{flex:1,background:'var(--color-accent)',border:'none',borderRadius:'7px',padding:'.45rem',color:'#fff',fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:'.85rem',textTransform:'uppercase',cursor:'pointer'}}>Salvar</button>
                  <button onClick={()=>{setAddingPhoto(false);setPendingPhotoData(null);}} style={{flex:1,background:'rgba(0,0,0,.15)',border:'1px solid var(--color-border)',borderRadius:'7px',padding:'.45rem',color:'var(--color-text-sub)',fontSize:'.82rem',cursor:'pointer'}}>Cancelar</button>
                </div>
              </div>
            )}
          </div>
        </div>
      )}

    </div>
  );
};


function App(){
  const [screen,setScreen]=useState("home");
  // Apply saved theme immediately on load
  useEffect(()=>{
    try{
      const p=JSON.parse(localStorage.getItem('darkset.v3.prefs')||'{}');
      if(p.theme==='light') document.documentElement.setAttribute('data-theme','light');
    }catch(_){}
  },[]);
  const [showSplash,setShowSplash]=useState(()=>!localStorage.getItem('darkset.launched'));
  const [tutStep,setTutStep]=useState(0);
  const tutorialSteps=[
    {title:"Bem-vindo ao DarkSet",body:"Seu app de treino pessoal. Vamos te mostrar as principais funcionalidades em 4 passos rápidos.",icon:"💪"},
    {title:"Monte sua ficha",body:"Na aba MONTAR você adiciona exercícios, define séries e organiza os dias da semana do seu jeito.",icon:"📋"},
    {title:"Registre seus treinos",body:"Na aba TREINO você executa a ficha série por série. Seus dados ficam salvos no histórico automaticamente.",icon:"⚡"},
    {title:"Acompanhe seu progresso",body:"No HISTÓRICO você vê todos os treinos, volume total e detectamos seus recordes pessoais (PR) automaticamente.",icon:"📈"},
    {title:"Sincronize entre devices",body:"Faça login no PERFIL para salvar seus dados na nuvem e acessar de qualquer celular.",icon:"☁️"},
  ];

  // Dismiss splash after first open
  const finishSplash=()=>{
    localStorage.setItem('darkset.launched','1');
    setShowSplash(false);
  };
  const [plans,setPlans]=usePlans();
  const [history,setHistory]=useHistory();
  const [prefs,setPrefs]=usePrefs();
  const [toast,setToast]=useState(null);
  const [builderPlanId,setBuilderPlanId]=useState(null);
  const [viewerPlanId,setViewerPlanId]=useState(null);
  const goto=(s,id=null)=>{ setScreen(s); if(s==='builder' && id) setBuilderPlanId(id); if(s==='viewer' && id) setViewerPlanId(id); };
  useEffect(()=>{ if(toast){ const t=setTimeout(()=>setToast(null),1200); return ()=>clearTimeout(t);} },[toast]);

  // Sync theme with prefs — runs whenever prefs.theme changes
  useEffect(()=>{
    const t = prefs.theme||'dark';
    document.documentElement.setAttribute('data-theme', t);
    document.body.style.background = t==='light'?'#f0f0f0':'';
    document.body.style.color = t==='light'?'#111':'';
  },[prefs.theme]);

  // Import via ?import= na URL
  useEffect(()=>{
    const doImport = (json) => {
      const days=Object.entries(json.byDay||{}).map(([d,arr])=>`${d}: ${arr.length}`).join(" | ");
      const ok = confirm(`Ficha encontrada: ${json.name}\n${days}\n\nAdicionar ao seu DarkSet?`);
      if(ok){
        const id=Date.now();
        setPlans(p=>({...p,list:[...p.list,{id,name:json.name,byDay:json.byDay||{}}]}));
        setToast("Ficha importada");
        window.history.replaceState({}, "", location.pathname);
      }
    };

    // Verifica ?import= na URL
    const params=new URLSearchParams(location.search);
    const imp=params.get("import");
    if(imp){
      try{
        const json=JSON.parse(decodeURIComponent(atob(imp).split('').map(c=>'%'+('00'+c.charCodeAt(0).toString(16)).slice(-2)).join('')));
        doImport(json);
      }catch(e){ alert("Link de importação inválido."); }
    }

    // Verifica import pendente do Firebase (?id=)
    if(window.__pendingImport){
      doImport(window.__pendingImport);
      window.__pendingImport = null;
    }

    // Escuta evento disparado pelo Firebase handler
    const handler = (e) => doImport(e.detail);
    window.addEventListener('darkset:import', handler);
    return () => window.removeEventListener('darkset:import', handler);
  },[]);

  const syncStatus = useSyncStatus();
  const syncLabel = {saving:'Salvando…',saved:'Salvo ✓',syncing:'Sincronizando…',error:'Erro sync',idle:''}[syncStatus]||'';
  const syncColor = {saving:'#888',saved:'#4ade80',syncing:'#facc15',error:'#e31b23',idle:'transparent'}[syncStatus]||'transparent';

  return (
    <div className="max-w-5xl mx-auto p-4 md:p-8 safe-pt safe-pb">
      {/* Splash screen */}
      {showSplash&&(
        <div style={{position:'fixed',inset:0,background:'#080808',zIndex:9999,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'2rem'}}>
          {tutStep===0&&(
            <div style={{textAlign:'center',animation:'fadeIn .5s ease'}}>
              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:'4rem',textTransform:'uppercase',lineHeight:1,marginBottom:'.25rem',letterSpacing:'.02em'}}>

              </button>
              <div style={{marginTop:'1.5rem'}}>
                <button onClick={finishSplash} style={{background:'none',border:'none',color:'#333',fontSize:'.75rem',cursor:'pointer',textDecoration:'underline'}}>Já conheço o app</button>
              </div>
            </div>
          )}
          {tutStep>0&&tutStep<=tutorialSteps.length&&(()=>{
            const step=tutorialSteps[tutStep-1];
            const total=tutorialSteps.length;
            return (
              <div style={{maxWidth:'340px',width:'100%',textAlign:'center'}}>
                <div style={{fontSize:'3.5rem',marginBottom:'1.5rem'}}>{step.icon}</div>
                <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:'1.6rem',textTransform:'uppercase',letterSpacing:'.04em',marginBottom:'.75rem',color:'#fff'}}>{step.title}</div>

                <div style={{display:'flex',gap:'.4rem',justifyContent:'center',marginBottom:'2rem'}}>
                  {tutorialSteps.map((_,i)=>(
                    <div key={i} style={{width:i===tutStep-1?'20px':'6px',height:'6px',borderRadius:'3px',background:i===tutStep-1?'var(--color-accent)':'#222',transition:'all .3s'}}></div>
                  ))}
                </div>
                <div style={{display:'flex',gap:'.75rem',justifyContent:'center'}}>
                  {tutStep>1&&<button onClick={()=>setTutStep(tutStep-1)} style={{background:'rgba(255,255,255,.06)',border:'1px solid #222',borderRadius:'9px',padding:'.75rem 1.5rem',color:'#777',fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:'.9rem',textTransform:'uppercase',cursor:'pointer'}}>Voltar</button>}
                  <button onClick={()=>tutStep<total?setTutStep(tutStep+1):finishSplash()} style={{background:'var(--color-accent)',border:'none',borderRadius:'9px',padding:'.75rem 1.75rem',color:'#fff',fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:'.9rem',textTransform:'uppercase',cursor:'pointer',boxShadow:'0 0 20px rgba(227,27,35,.3)'}}>
                    {tutStep<total?'Próximo':'Entrar no app'}
                  </button>
                </div>
              </div>
            );
          })()}
        </div>
      )}
      <header className="ds-hdr">
        <LogoRow/>
        <nav className="ds-nav flex gap-2">
          <button className={"ds-nav-btn"+(screen==="home"?" active":"")} onClick={()=>goto("home")}>Início</button>
          <button className={"ds-nav-btn"+(screen==="plans"?" active":"")} onClick={()=>goto("plans")}>Fichas</button>
          <button className={"ds-nav-btn"+(screen==="builder"?" active":"")} onClick={()=>goto("builder",plans.activeId||(plans.list[0]?.id??null))}>Montar</button>
          <button className={"ds-nav-btn"+(screen==="session"?" active":"")} onClick={()=>goto("session")}>Treino</button>
          <button className={"ds-nav-btn"+(screen==="cardio"?" active":"")} onClick={()=>goto("cardio")}>Cardio</button>
          <button className={"ds-nav-btn"+(screen==="community"?" active":"")} onClick={()=>goto("community")}>Squad</button>
          <button className={"ds-nav-btn"+(screen==="measures"?" active":"")} onClick={()=>goto("measures")}>Medidas</button>
          <button className={"ds-nav-btn"+(screen==="history"?" active":"")} onClick={()=>goto("history")}>Histórico</button>
          <button className={"ds-nav-btn"+(screen==="profile"?" active":"")} onClick={()=>goto("profile")}>Perfil</button>
        </nav>
        {syncLabel&&(
          <div style={{fontSize:'.62rem',color:syncColor,fontWeight:700,letterSpacing:'.05em',textTransform:'uppercase',whiteSpace:'nowrap',flexShrink:0,display:'flex',alignItems:'center',gap:'.3rem'}}>
            {syncStatus==='saving'||syncStatus==='syncing'?<span style={{display:'inline-block',width:'6px',height:'6px',borderRadius:'50%',background:syncColor,animation:'pulse 1s infinite'}}></span>:null}
            {syncLabel}
          </div>
        )}
      </header>

      {screen==="home" && <Home goto={goto} plans={plans} history={history} prefs={prefs}/>}
      {screen==="plans" && <Plans plans={plans} setPlans={setPlans} goto={(s,id)=>goto(s,id)} setToast={setToast}/>}
      {screen==="builder" && <Builder planId={builderPlanId||(plans.activeId||plans.list[0]?.id)} plans={plans} setPlans={setPlans} setToast={setToast}/>}
      {screen==="session" && <Session plans={plans} setHistory={setHistory} history={history} prefs={prefs} goto={goto} setToast={setToast}/>}
      {screen==="history" && <History history={history} setHistory={setHistory} prefs={prefs}/>}
      {screen==="cardio" && <Cardio goto={goto} setToast={setToast}/>}
      {screen==="community" && <Community history={history} setToast={setToast} prefs={prefs}/>}
      {screen==="measures" && <Measures setToast={setToast}/>}
      {screen==="viewer" && <Viewer planId={(viewerPlanId||(plans.activeId||plans.list[0]?.id))} plans={plans} goto={goto}/>}
      {screen==="profile" && <Profile prefs={prefs} setPrefs={setPrefs} history={history}/>}

      <footer style={{marginTop:'2rem',textAlign:'center',fontSize:'.65rem',color:'#2a2a2a',letterSpacing:'.08em',textTransform:'uppercase'}}>© {new Date().getFullYear()} DARKSET · V5.1.0</footer>
      {toast && <Toast text={toast}/>}
    </div>
  );
}

<div id="chartsModalBackdrop" class="charts-modal-backdrop" aria-hidden="true">

            <div style="font-size:11px;opacity:.7;margin-bottom:2px">Variação</div>
            <div id="sumDelta" style="font-size:18px;font-weight:700">—</div>
          </div>
          <div style="background:#0e0e12;border:1px solid #1f2024;border-radius:10px;padding:10px 12px">
            <div style="font-size:11px;opacity:.7;margin-bottom:2px">Volume total</div>
            <div id="sumVol" style="font-size:18px;font-weight:700">—</div>
          </div>
          <div style="background:#0e0e12;border:1px solid #1f2024;border-radius:10px;padding:10px 12px">
            <div style="font-size:11px;opacity:.7;margin-bottom:2px">Séries</div>
            <div id="sumSets" style="font-size:18px;font-weight:700">—</div>
          </div>
          <div style="background:#0e0e12;border:1px solid #1f2024;border-radius:10px;padding:10px 12px">
            <div style="font-size:11px;opacity:.7;margin-bottom:2px">Repetições</div>
            <div id="sumReps" style="font-size:18px;font-weight:700">—</div>
          </div>
        </div>
      </div>

</div>
<script>
(function(){
  const LS_HISTORY_KEY = "darkset.v3.history";
  function getHistory(){ try{ return JSON.parse(localStorage.getItem(LS_HISTORY_KEY)) || {}; }catch(e){ return {}; } }
  const toBR = (iso) => { const [y,m,d]=iso.split('-'); return `${d}/${m}/${y}`; };
  const dayMs = 86400000;

  const RIR_W = { "Falha":1.00, 0:1.00, 1:1.00, 2:0.92, 3:0.84, 4:0.75 };
  const num = (v)=>{ const n=parseFloat(String(v).replace(',', '.')); return isFinite(n)?n:0; };
  const tOf = (iso)=> +new Date(iso+"T00:00:00");

  function metaOf(name){
    return (window.EXS||[]).find(e=> e && e.name && e.name.toLowerCase()===String(name).toLowerCase()) || null;
  }
  function primaryOf(name){ const m=metaOf(name); return m? m.primary : null; }
  function isUnilateral(name){ const m=metaOf(name); return m? !!m.unilateral : false; }

  function listSubjects(hist, type){
    const set = new Set();
    for(const [date, obj] of Object.entries(hist)){
      if(!obj || !Array.isArray(obj.entries)) continue;
      if(type==='plan'){ if(obj.planName) set.add(obj.planName); continue; }
      for(const en of obj.entries){
        if(!en || !en.name || !Array.isArray(en.sets)) continue;
        const has = en.sets.some(s=> num(s.r)>0);
        if(!has) continue;
        if(type==='exercise') set.add(en.name);
        if(type==='muscle'){ const p=primaryOf(en.name); if(p) set.add(p); }
      }
    }
    return Array.from(set).sort((a,b)=> a.localeCompare(b));
  }

  function weekStart(d){
    const dt = new Date(d);
    const day = (dt.getDay()+6)%7;
    dt.setDate(dt.getDate()-day);
    dt.setHours(0,0,0,0);
    return dt;
  }
  function weekEndFromStart(ws){
    const dt = new Date(+ws + 6*dayMs);
    dt.setHours(0,0,0,0);
    return dt;
  }
  function fmtISO(d){ return d.toISOString().slice(0,10); }

  // Calcula moving average (janela de 3 pontos)
  function movingAvg(data, window=3){
    return data.map((_, i)=>{
      const start = Math.max(0, i - Math.floor(window/2));
      const end   = Math.min(data.length, start + window);
      const slice = data.slice(start, end);
      return slice.reduce((a,b)=>a+b,0) / slice.length;
    });
  }

  function buildAgg(hist, type, subject, rangeDays){
    const since = (rangeDays && rangeDays!=='all') ? (Date.now() - Number(rangeDays)*dayMs) : 0;
    const dayMap = new Map();

    for(const [iso, obj] of Object.entries(hist)){
      const t = tOf(iso); if(since && t < since) continue;
      if(!obj || !Array.isArray(obj.entries)) continue;
      if(type==='plan' && obj.planName !== subject) continue;

      for(const en of obj.entries){
        if(!en || !en.name || !Array.isArray(en.sets)) continue;
        if(type==='exercise' && en.name !== subject) continue;
        if(type==='muscle'){ const p=primaryOf(en.name); if(p!==subject) continue; }

        // Fator unilateral: exercícios de 1 lado × 2 para equivaler ao bilateral
        const uFactor = isUnilateral(en.name) ? 2 : 1;

        for(const s of en.sets){
          const r=num(s.r), w=num(s.w);
          if(r<=0) continue;
          const rw = (s.rir in RIR_W) ? RIR_W[s.rir] : (RIR_W[String(s.rir)] ?? 0.90);
          const vol = (w>0 ? w*r : r) * uFactor;
          const iie = vol * rw / 1000.0;

          let acc = dayMap.get(iso);
          if(!acc){ acc={iie:0,volume:0,sets:0,reps:0}; dayMap.set(iso,acc); }
          acc.iie += iie; acc.volume += vol; acc.sets += 1; acc.reps += r;
        }
      }
    }

    // Exercício: diário
    if(type==='exercise'){
      const labels = Array.from(dayMap.keys()).sort((a,b)=> a.localeCompare(b));
      const series = labels.map(d=> dayMap.get(d));
      const tot = series.reduce((o,s)=>({iie:o.iie+s.iie, vol:o.vol+s.volume, sets:o.sets+s.sets, reps:o.reps+s.reps}), {iie:0,vol:0,sets:0,reps:0});
      const delta = (series.length>1)? Math.round(((series.at(-1).iie - series[0].iie)/Math.max(1e-6, series[0].iie))*100) : 0;
      window.__chartsWeekTitles = null;
      return { labels: labels.map(toBR), series, tot, delta };
    }

    // Agrupamento semanal com SOMA (não média) para músculo/ficha
    const wkMap = new Map();
    for(const [iso, vals] of Array.from(dayMap.entries())){
      const ws = weekStart(new Date(iso+"T00:00:00"));
      const we = weekEndFromStart(ws);
      const key = fmtISO(ws);
      let acc = wkMap.get(key);
      if(!acc){ acc={sumIie:0, days:0, volume:0, sets:0, reps:0, ws, we}; wkMap.set(key, acc); }
      acc.sumIie += vals.iie; acc.days += 1;
      acc.volume += vals.volume; acc.sets += vals.sets; acc.reps += vals.reps;
    }
    const weeks = Array.from(wkMap.entries()).sort((a,b)=> a[0].localeCompare(b[0]));
    const labels = [], series = [], titles = [];
    let idx = 1;
    for(const [, v] of weeks){
      labels.push("Sem " + (idx++));
      // Soma semanal (não mais média)
      series.push({ iie: v.sumIie, volume: v.volume, sets: v.sets, reps: v.reps });
      titles.push(`${toBR(fmtISO(v.ws))} — ${toBR(fmtISO(v.we))}`);
    }
    const tot = series.reduce((o,s)=>({iie:o.iie+s.iie, vol:o.vol+s.volume, sets:o.sets+s.sets, reps:o.reps+s.reps}), {iie:0,vol:0,sets:0,reps:0});
    const delta = (series.length>1)? Math.round(((series.at(-1).iie - series[0].iie)/Math.max(1e-6, series[0].iie))*100) : 0;
    window.__chartsWeekTitles = titles;
    return { labels, series, tot, delta };
  }

  let chart;
  function renderChart(labels, series, tot, delta){
    const elEmpty  = document.getElementById('chartsEmpty');
    const elSummary= document.getElementById('chartsSummary');
    const ctx = document.getElementById('chartsCanvas');
    if(chart){ chart.destroy(); chart=null; }

    if(!labels.length){
      elEmpty.style.display=''; elSummary.style.display='none'; return;
    }
    elEmpty.style.display='none';

    // Atualiza estatísticas resumidas
    if(elSummary){
      elSummary.style.display='block';
      const arrow = delta > 0 ? '↑' : delta < 0 ? '↓' : '→';
      const color = delta > 0 ? '#4ade80' : delta < 0 ? '#f87171' : '#a3a3a3';
      document.getElementById('sumDelta').innerHTML = `<span style="color:${color}">${arrow} ${Math.abs(delta)}%</span>`;
      const vol = tot.vol >= 1000 ? `${(tot.vol/1000).toFixed(1)}t` : `${Math.round(tot.vol)}kg`;
      document.getElementById('sumVol').textContent = vol;
      document.getElementById('sumSets').textContent = tot.sets;
      document.getElementById('sumReps').textContent = tot.reps;
    }

    const iieData  = series.map(s=> +s.iie.toFixed(4));
    const trendData = movingAvg(iieData);
    const titles   = window.__chartsWeekTitles;

    chart = new Chart(ctx, {
      type:'line',
      data:{
        labels,
        datasets:[
          {
            label:'IIE',
            data: iieData,
            borderWidth:2, tension:.25, pointRadius:4, pointHoverRadius:6,
            borderColor:'#ff3b30', backgroundColor:'rgba(255,59,48,.15)',
            fill: true, order: 2
          },
          {
            label:'Tendência',
            data: trendData,
            borderWidth:2, tension:.4, pointRadius:0, pointHoverRadius:0,
            borderColor:'rgba(255,200,0,.6)', backgroundColor:'transparent',
            borderDash:[5,4], fill: false, order: 1
          }
        ]
      },
      options:{
        responsive:true, maintainAspectRatio:false,
        interaction:{mode:'index', intersect:false},
        plugins:{
          legend:{ display: true, labels:{ color:'#eaeaea', boxWidth:12, font:{size:11} } },
          tooltip:{
            enabled:true,
            callbacks:{
              title:(items)=>{
                const i = items && items.length? items[0].dataIndex : 0;
                return titles && titles[i] ? titles[i] : items[0].label;
              },
              label:(item)=>{
                if(item.datasetIndex === 1) return `Tendência: ${Number(item.raw).toFixed(3)}`;
                const s = series[item.dataIndex];
                const lines = [`IIE: ${Number(item.raw).toFixed(3)}`];
                if(s.volume > 0) lines.push(`Volume: ${Math.round(s.volume)}kg`);
                lines.push(`Séries: ${s.sets}  ·  Reps: ${s.reps}`);
                return lines;
              }
            }
          }
        },
        scales:{
          x:{ ticks:{ color:'#a3a3a3', maxRotation:0, autoSkip:true }, grid:{ color:'rgba(255,255,255,.05)' } },
          y:{ beginAtZero:true, ticks:{ color:'#a3a3a3' }, grid:{ color:'rgba(255,255,255,.05)' } }
        }
      }
    });
  }

  function refillAndPlot(defaults){
    const hist = getHistory();
    const typeSel = document.getElementById('chartsType');
    const subjSel = document.getElementById('chartsSubject');
    const pills = Array.from(document.querySelectorAll('.charts-pill'));
    if(defaults && defaults.type) typeSel.value = defaults.type;

    function fillSubj(){
      const list = listSubjects(hist, typeSel.value);
      subjSel.innerHTML = '';
      if(!list.length){ subjSel.innerHTML = '<option>Sem dados</option>'; renderChart([],[],{},{delta:0}); return; }
      for(const name of list){ const o=document.createElement('option'); o.value=name; o.textContent=name; subjSel.appendChild(o); }
      if(defaults && defaults.subject && list.includes(defaults.subject)) subjSel.value = defaults.subject;
    }
    fillSubj();

    let range = 'all';
    function plot(){
      const {labels, series, tot, delta} = buildAgg(hist, typeSel.value, subjSel.value, range);
      renderChart(labels, series, tot, delta);
    }
    plot();

    typeSel.onchange = ()=>{ fillSubj(); plot(); };
    subjSel.onchange = ()=> plot();
    pills.forEach(p=> p.onclick = ()=>{ pills.forEach(x=>x.classList.remove('active')); p.classList.add('active'); range=p.dataset.range; plot(); });
  }

  window.openChartsModal = function(defaultExerciseName){
    const el = document.getElementById('chartsModalBackdrop'); if(!el) return;
    el.style.display='flex';
    const defaults = defaultExerciseName? {type:'exercise', subject: defaultExerciseName} : null;
    setTimeout(()=> refillAndPlot(defaults), 0);
  };
  window.closeChartsModal = function(){ const el = document.getElementById('chartsModalBackdrop'); if(el) el.style.display='none'; };

  document.getElementById('chartsCloseBtn')?.addEventListener('click', ()=> window.closeChartsModal());
  document.getElementById('chartsHelpBtn')?.addEventListener('click', ()=>{
    alert('IIE (Índice de Intensidade Efetiva) = Volume × Fator RIR / 1000\n\nExercícios unilaterais têm fator ×2 (equivalência bilateral).\n\nA linha amarela tracejada é a tendência (média móvel de 3 pontos).\n\nMúsculo/Ficha: IIE somado por semana. Exercício: IIE diário.');
  });

  document.addEventListener('click', (ev)=>{
    const btn = ev.target.closest('button, a'); if(!btn) return;
    const t = (btn.innerText || btn.textContent || '').toLowerCase();
    if(t.includes('gráfico')){ ev.preventDefault(); window.openChartsModal(); }
  });
})();
</script>

<script>
(function(){
  // ---- Helpers b64 ----
  function b64ToJson(b64){
    try{ return JSON.parse(decodeURIComponent(atob(b64).split('').map(c=>'%'+('00'+c.charCodeAt(0).toString(16)).slice(-2)).join(''))); }catch(e){ return null; }
  }
  function jsonToB64(obj){
    try{ return btoa(encodeURIComponent(JSON.stringify(obj)).replace(/%([0-9A-F]{2})/g,(_,p)=>String.fromCharCode('0x'+p))); }catch(e){ return ''; }
  }

  // ---- Handle ?id= param (share link) ----
  async function handleIdParam(){
    try{
      var url = new URL(location.href);
      var id = url.searchParams.get('id');
      if(!id) return;
      if(!window._db) return;
      var snap = await window._db.collection('fichas').doc(id).get();
      if(!snap.exists) return;
      var data = snap.data() || {};
      var payload = { name: data.name || data.title || "Importada", byDay: data.byDay || data.Semana || data.semana || {} };
      window.history.replaceState({}, '', location.pathname);
      window.__pendingImport = payload;
      window.dispatchEvent(new CustomEvent('darkset:import', { detail: payload }));
    }catch(e){ console.warn('handleIdParam error', e); }
  }

  // ---- Shorten share link via Firestore ----
  var replacedOnce = false;
  async function fireStoreShorten(){
    try{
      if(replacedOnce) return;
      var inp = document.getElementById('share-link');
      if(!inp) return;
      var val = inp.value || '';
      var imp = null;
      if(val.includes('?import=')) imp = (new URL(val, location.href)).searchParams.get('import');
      if(!imp) return;
      var qb = document.getElementById('qr-box');
      if(qb) qb.innerHTML = '<div style="padding:6px;font-size:12px;opacity:.8">Gerando link curto…</div>';
      inp.value = 'gerando…';
      if(!window._db) return;
      var obj = b64ToJson(imp);
      if(!obj || !obj.byDay) return;
      var docRef = await window._db.collection('fichas').add(Object.assign({}, obj, { ts: Date.now() }));
      var shortUrl = location.origin + '/?id=' + docRef.id;
      inp.value = shortUrl;
      if(qb && window.QRCode){ qb.innerHTML=''; new QRCode(qb, { text: shortUrl, width: 196, height: 196 }); }
      replacedOnce = true;
    }catch(e){ console.warn('fireStoreShorten error', e); }
  }

  // ---- MutationObserver para o modal de compartilhamento ----
  var mo = new MutationObserver(function(){
    if(document.getElementById('share-link')) fireStoreShorten();
  });

  // ---- Init Firebase com retry ----
  var initAttempts = 0;
  function tryInitFirebase(){
    initAttempts++;
    if(typeof firebase === 'undefined'){
      if(initAttempts < 20) setTimeout(tryInitFirebase, 300);
      else console.warn('Firebase SDK não carregou após várias tentativas');
      return;
    }
    try{
      var firebaseConfig = {
        apiKey: "AIzaSyB3bu3XercwmnlV0jdaldoXvd5gnHfj0GU",
        authDomain: "darkset-538d1.firebaseapp.com",
        projectId: "darkset-538d1",
        storageBucket: "darkset-538d1.firebasestorage.app",
        messagingSenderId: "354165019689",
        appId: "1:354165019689:web:dc458f0a61e26e6289f838",
        measurementId: "G-PVJ7QJ0T7F"
      };
      if(!firebase.apps.length) firebase.initializeApp(firebaseConfig);
      window._db   = firebase.firestore();
      window._auth = firebase.auth();
    }catch(e){ console.warn('Firebase init failed', e); return; }

    // ---- DSAuth API ----
    try{
      var auth = window._auth;
      var db   = window._db;
      window.DSAuth = {
        signInGoogle: async function(){
          var provider = new firebase.auth.GoogleAuthProvider();
          try{ await auth.signInWithPopup(provider); }
          catch(e){
            if(e.code==='auth/popup-blocked'||e.code==='auth/operation-not-supported-in-this-environment'){
              await auth.signInWithRedirect(provider);
            } else { throw e; }
          }
        },
        signInApple: async function(){
          var provider = new firebase.auth.OAuthProvider('apple.com');
          provider.addScope('email'); provider.addScope('name');
          try{ await auth.signInWithPopup(provider); }
          catch(e){
            if(e.code==='auth/popup-blocked'||e.code==='auth/operation-not-supported-in-this-environment'){
              await auth.signInWithRedirect(provider);
            } else { throw e; }
          }
        },
        signUpEmail: function(email, pass, name){
          return auth.createUserWithEmailAndPassword(email, pass).then(function(cred){
            if(name) return cred.user.updateProfile({ displayName: name });
          });
        },
        signInEmail: function(email, pass){
          return auth.signInWithEmailAndPassword(email, pass);
        },
        signOut: function(){ return auth.signOut(); }
      };

      auth.onAuthStateChanged(async function(user){
        try{
          if(user){
            var info = { uid: user.uid, email: user.email||null, displayName: user.displayName||null, photoURL: user.photoURL||null, lastLogin: Date.now() };
            localStorage.setItem('darkset.user', JSON.stringify(info));
            try{ if(db) await db.collection('users').doc(user.uid).set({ email: info.email, name: info.displayName, photoURL: info.photoURL, updatedAt: Date.now() }, { merge: true }); }catch(_){}
            try{
              var prefs = JSON.parse(localStorage.getItem('darkset.v3.prefs')||'{}');
              if(info.displayName && !prefs.name){ prefs.name = info.displayName; localStorage.setItem('darkset.v3.prefs', JSON.stringify(prefs)); }
            }catch(_){}
            // ── Pull cloud data — wait for React to be ready ──
            if(window.DSSync){
              // Retry até os setters do React estarem registrados (max 3s)
              var attempts=0;
              var tryPull=function(){
                attempts++;
                if(window._DS_SETTERS && window._DS_SETTERS.plans){
                  window.DSSync.pull(user.uid);
                } else if(attempts<30){
                  setTimeout(tryPull,100);
                } else {
                  window.DSSync.pull(user.uid); // tenta de qualquer forma
                }
              };
              setTimeout(tryPull,200);
            }
            if(window.closeAuthModal) closeAuthModal();
          } else {
            localStorage.removeItem('darkset.user');
          }
        }catch(_){}
      });

      auth.getRedirectResult().catch(function(){});
    }catch(e){ console.warn('DSAuth init error', e); }

    // Inicia observadores após Firebase pronto
    mo.observe(document.getElementById('root') || document.body, { subtree: true, childList: true });
    handleIdParam();
    fireStoreShorten();
  }

  // Inicia com pequeno delay para garantir que os SDKs externos carregaram
  setTimeout(tryInitFirebase, 100);
})();
</script>
