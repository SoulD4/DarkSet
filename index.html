  <style>
    @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap');

    :root{
      --color-bg: #080808;
      --color-card: #0f0f0f;
      --color-card-soft: #141414;
      --color-text: #f0f0f0;
      --color-text-sub: #888;
      --color-border: #1e1e1e;
      --color-accent: #e31b23;
      --color-accent2: #ff3b3b;
      --color-accent-glow: rgba(227,27,35,0.18);
      --ds-radius: 12px;
    }

    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      background-color: var(--color-bg) !important;
      color: var(--color-text) !important;
      font-family: 'Inter', -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    /* Subtle noise texture on body */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.35;
    }
    #root { background-color: var(--color-bg); min-height: 100vh; position: relative; z-index: 1; }

    /* Tailwind overrides */
    .bg-bgDark   { background-color: var(--color-bg) !important; }
    .bg-cardDark { background-color: var(--color-card) !important; }
    .bg-cardSoft { background-color: var(--color-card-soft) !important; }
    .text-textMain { color: var(--color-text) !important; }
    .text-textSub  { color: var(--color-text-sub) !important; }
    .border-borderDark { border-color: var(--color-border) !important; }
    .bg-accent   { background-color: var(--color-accent) !important; }
    .text-accent { color: var(--color-accent) !important; }
    .rounded-2xl, .rounded-xl { color: inherit; }
    .border { border-color: var(--color-border); }

    /* Inputs */
    input, select, textarea {
      background-color: rgba(0,0,0,0.45) !important;
      color: var(--color-text) !important;
      border-color: var(--color-border) !important;
      font-family: 'Inter', sans-serif;
    }
    input::placeholder { color: #444 !important; }
    input:focus, select:focus { outline: none; border-color: var(--color-accent) !important; box-shadow: 0 0 0 2px var(--color-accent-glow); }

    /* HEADER */
    nav.ds-nav{ overflow-x:auto; -webkit-overflow-scrolling: touch; gap:.4rem; scrollbar-width: none; display:flex; }
    nav.ds-nav::-webkit-scrollbar{ display:none; }
    @media (max-width: 480px){ nav.ds-nav button{ flex:0 0 auto } }
    header.ds-hdr{
      position: sticky; top: 0; z-index: 30;
      backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px) saturate(180%);
      background: rgba(8,8,8,.95);
      border-bottom: 1px solid rgba(227,27,35,.12);
      padding: .55rem .75rem;
      display:flex; align-items:center; justify-content:space-between; gap:.75rem; flex-wrap:wrap;
    }
    [data-theme="light"] header.ds-hdr {
      background: rgba(240,240,240,.97) !important;
      border-bottom: 1px solid #ddd;
    }

    /* NAV BUTTONS */
    .ds-nav-btn {
      padding: .45rem .85rem;
      border-radius: 8px;
      border: 1px solid #1e1e1e;
      font-size: .75rem;
      font-weight: 600;
      letter-spacing: .04em;
      text-transform: uppercase;
      color: #666;
      background: transparent;
      transition: color .15s, border-color .15s, background .15s;
      white-space: nowrap;
    }
    .ds-nav-btn:hover { color: #ccc; border-color: #333; background: rgba(255,255,255,.04); }
    .ds-nav-btn.active {
      color: #fff;
      border-color: var(--color-accent);
      background: rgba(227,27,35,.1);
      box-shadow: 0 0 12px rgba(227,27,35,.15);
    }

    /* CARDS */
    .ds-card{
      border-radius: var(--ds-radius);
      background: var(--color-card);
      border: 1px solid var(--color-border);
      position: relative;
      overflow: hidden;
    }
    .ds-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.06), transparent);
    }
    /* Red accent left border on active cards */
    .ds-card-accent { border-left: 2px solid var(--color-accent); }

    /* SECTION HEADERS — Barlow Condensed for aggressive look */
    .ds-section-title {
      font-family: 'Barlow Condensed', 'Inter', sans-serif;
      font-weight: 800;
      font-size: 1.1rem;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: #fff;
    }
    .ds-section-title span { color: var(--color-accent); }

    /* BUTTONS */
    .ds-btn {
      border-radius: 8px;
      padding: .6rem 1rem;
      font-weight: 700;
      font-size: .8rem;
      letter-spacing: .05em;
      text-transform: uppercase;
      transition: all .15s;
      cursor: pointer;
      border: 1px solid transparent;
      display: inline-flex; align-items: center; gap: .4rem;
    }
    .ds-btn-primary {
      background: linear-gradient(160deg, #e31b23, #a81018);
      border-color: rgba(255,255,255,.08);
      color: #fff;
      box-shadow: 0 4px 16px rgba(227,27,35,.3), inset 0 1px 0 rgba(255,255,255,.1);
    }
    .ds-btn-primary:hover { box-shadow: 0 4px 20px rgba(227,27,35,.5), inset 0 1px 0 rgba(255,255,255,.1); }
    .ds-btn-primary:active { transform: translateY(1px); box-shadow: 0 2px 8px rgba(227,27,35,.3); }
    .ds-btn-ghost {
      background: rgba(255,255,255,.04);
      border-color: #222;
      color: #aaa;
    }
    .ds-btn-ghost:hover { background: rgba(255,255,255,.08); color: #ddd; border-color: #333; }
    .ds-btn-success {
      background: rgba(34,197,94,.12);
      border-color: rgba(34,197,94,.3);
      color: #4ade80;
    }
    .ds-btn-danger {
      background: rgba(227,27,35,.12);
      border-color: rgba(227,27,35,.3);
      color: var(--color-accent2);
    }

    /* SET ROW */
    .set-row {
      background: rgba(0,0,0,.3);
      border: 1px solid #1a1a1a;
      border-radius: 10px;
      padding: .5rem .75rem;
      display: grid;
      align-items: center;
      gap: .5rem;
    }
    .set-row:focus-within { border-color: rgba(227,27,35,.3); background: rgba(227,27,35,.04); }

    /* STAT CHIPS */
    .ds-stat {
      background: rgba(0,0,0,.4);
      border: 1px solid #1a1a1a;
      border-radius: 8px;
      padding: .5rem .85rem;
      text-align: center;
    }
    .ds-stat-val {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.4rem;
      font-weight: 800;
      color: #fff;
      line-height: 1;
    }
    .ds-stat-label { font-size: .65rem; color: #555; text-transform: uppercase; letter-spacing: .06em; margin-top: .2rem; }

    /* WEEK STREAK BAR */
    .streak-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #1e1e1e;
      transition: background .2s;
    }
    .streak-dot.done { background: var(--color-accent); box-shadow: 0 0 6px rgba(227,27,35,.5); }

    /* EXERCISE CARD in session */
    .ex-card {
      background: rgba(0,0,0,.3);
      border: 1px solid #1e1e1e;
      border-radius: 10px;
      padding: .75rem 1rem;
    }
    .ex-num {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 2.5rem;
      font-weight: 900;
      color: rgba(227,27,35,.15);
      line-height: 1;
      position: absolute;
      right: .75rem;
      top: .5rem;
    }

    /* PROGRESS BAR */
    .ds-progress-track { background: #1a1a1a; border-radius: 4px; height: 3px; }
    .ds-progress-fill { background: var(--color-accent); border-radius: 4px; height: 100%; transition: width .3s ease; box-shadow: 0 0 8px rgba(227,27,35,.4); }

    /* HISTORY CARD */
    .hist-card {
      background: var(--color-card);
      border: 1px solid var(--color-border);
      border-radius: 10px;
      padding: .85rem 1rem;
      transition: border-color .15s, background .15s;
      cursor: pointer;
      text-align: left;
      width: 100%;
    }
    .hist-card:hover { border-color: #333; background: #111; }
    .hist-date {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: .03em;
      color: #fff;
    }

    /* TOAST */
    .ds-toast {
      position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
      background: #111; border: 1px solid #2a2a2a;
      color: #f0f0f0; font-size: .8rem; font-weight: 600;
      padding: .6rem 1.2rem; border-radius: 999px;
      box-shadow: 0 8px 24px rgba(0,0,0,.5);
      z-index: 999; white-space: nowrap;
      animation: toastIn .2s ease;
    }

    /* Light theme */
    [data-theme="light"] {
      --color-bg: #f0f0f0;
      --color-card: #ffffff;
      --color-card-soft: #f8f8f8;
      --color-border: #e0e0e0;
      --color-text: #111111;
      --color-text-sub: #666666;
    }
    [data-theme="light"] body { background-color: var(--color-bg) !important; color: var(--color-text) !important; }
    [data-theme="light"] #root { background-color: var(--color-bg); }
    [data-theme="light"] body::before { opacity: 0.05; }
    [data-theme="light"] .ds-card { background: #ffffff !important; border-color: #e0e0e0 !important; }
    [data-theme="light"] .ds-card-soft { background: #f8f8f8 !important; }
    [data-theme="light"] .ds-section-title { color: #111 !important; }
    [data-theme="light"] .set-row input, [data-theme="light"] .set-row select { background: rgba(0,0,0,.06) !important; color: #111 !important; border-color: #ddd !important; }
    [data-theme="light"] input, [data-theme="light"] select, [data-theme="light"] textarea {

      border-color: var(--color-border) !important;

    [data-theme="light"] .ds-nav-btn.active { background: rgba(227,27,35,.1); color: #e31b23; border-color: var(--color-accent); }
    [data-theme="light"] .mode-toggle { background: rgba(0,0,0,.08); border-color: #ddd; }
    [data-theme="light"] .mode-toggle-btn { color: #666; }
    [data-theme="light"] .ds-section-title { color: #111; }
    [data-theme="light"] .ds-hdr { background: rgba(240,240,240,.92); border-color: #ddd; }

    @keyframes toastIn { from { opacity:0; transform: translateX(-50%) translateY(6px); } to { opacity:1; transform: translateX(-50%) translateY(0); } }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

    /* MODAL */
    .modal-bg { position:fixed; inset:0; background:rgba(0,0,0,.75); display:flex; align-items:center; justify-content:center; z-index:50; backdrop-filter: blur(4px); }

    /* MODE TOGGLE */
    .mode-toggle { display: flex; background: rgba(0,0,0,.4); border: 1px solid #1e1e1e; border-radius: 10px; padding: 3px; gap: 3px; }
    .mode-toggle-btn { flex: 1; padding: .5rem .75rem; border-radius: 8px; font-size: .75rem; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; color: #555; background: transparent; border: none; cursor: pointer; transition: all .15s; }
    .mode-toggle-btn.active { background: var(--color-accent); color: #fff; box-shadow: 0 2px 8px rgba(227,27,35,.3); }

    /* Safe areas */
    .safe-pb{ padding-bottom: max(env(safe-area-inset-bottom), 16px); }
    .safe-pt{ padding-top: max(env(safe-area-inset-top), 8px); }

    @media (max-width: 480px){ .grid-cols-mobile-1{ grid-template-columns: 1fr; } }

    /* Charts */
    .charts-modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:9999;backdrop-filter:blur(4px)}
    .charts-modal{width:min(980px,92vw);max-height:90vh;background:#0a0a0a;color:#eaeaea;border:1px solid #1e1e1e;border-radius:12px;overflow:hidden;display:flex;flex-direction:column}
    .charts-hd{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid #1a1a1a;background:#0a0a0a}
    .charts-hd h3{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;margin:0}
    .charts-help{width:30px;height:30px;border-radius:999px;background:#141418;border:1px solid #2b2b31;display:flex;align-items:center;justify-content:center;cursor:pointer}
    .charts-body{padding:14px 16px;overflow:auto}
    .charts-row{display:grid;grid-template-columns:1fr;gap:12px}
    @media (min-width:700px){.charts-row{grid-template-columns:1fr 1fr}}
    .charts-field{display:flex;flex-direction:column;gap:6px}
    .charts-field label{font-size:12px;opacity:.85}
    .charts-select{background:#0d0d0d !important;color:#eaeaea !important;border:1px solid #1e1e1e !important;border-radius:8px;padding:10px 12px;font-size:14px;outline:none}
    .charts-pills{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
    .charts-pill{background:#111;border:1px solid #1e1e1e;color:#aaa;border-radius:999px;padding:6px 10px;font-size:13px;cursor:pointer;transition:all .15s}
    .charts-pill.active{background:rgba(227,27,35,.1);border-color:var(--color-accent);color:#fff}
    .charts-canvas-wrap{margin-top:14px;background:#0a0a0a;border:1px solid #1a1a1a;border-radius:10px;padding:8px}
    .charts-empty{padding:12px;border:1px dashed #1e1e1e;border-radius:10px;text-align:center;opacity:.8;display:none}
    .charts-actions{margin-left:auto}
    .charts-btn{background:#111;border:1px solid #1e1e1e;color:#eaeaea;border-radius:8px;padding:8px 12px;font-size:14px;cursor:pointer}
  </style>
</head>

// GIF cache in memory + localStorage
const GIF_CACHE_KEY = 'darkset.gifcache';
const GIF_CACHE = (() => {
  try {
    const raw = JSON.parse(localStorage.getItem(GIF_CACHE_KEY)||'{}');
    // Remove entradas inválidas (strings vazias de tentativas falhas anteriores)
    Object.keys(raw).forEach(k => { if(!raw[k] || !raw[k].startsWith('http')) delete raw[k]; });
    return raw;
  } catch(_){ return {}; }
})();
const saveGifCache = () => {
  try { localStorage.setItem(GIF_CACHE_KEY, JSON.stringify(GIF_CACHE)); } catch(_){}
};

// API key storage
const getApiKey = () => localStorage.getItem('darkset.rapidapi.key')||'';

// Fetch GIF URL for an exercise name
async function fetchExGif(exName) {
  if (GIF_CACHE[exName]) return GIF_CACHE[exName];

  const engName = EX_NAME_MAP[exName];
  if (!engName) return null;

  const apiKey = getApiKey();
  if (!apiKey) return null;

  const key = apiKey.trim();
  const headers = {
    'X-RapidAPI-Key': key,
    'X-RapidAPI-Host': 'exercisedb.p.rapidapi.com'
  };

  // Endpoint 1: busca por nome exato
  try {
    const q = encodeURIComponent(engName);
    const res = await fetch(
      `https://exercisedb.p.rapidapi.com/exercises/name/${q}?limit=3&offset=0`,
      { headers }
    );
    if (res.ok) {
      const data = await res.json();
      const items = Array.isArray(data) ? data : (data?.data||[]);
      if (items[0]?.gifUrl) {
        GIF_CACHE[exName] = items[0].gifUrl;
        saveGifCache();
        return items[0].gifUrl;
      }
    }
  } catch(_){}

  // Endpoint 2: busca pela primeira palavra (mais ampla)
  try {
    const word = encodeURIComponent(engName.split(' ')[0]);
    const res2 = await fetch(
      `https://exercisedb.p.rapidapi.com/exercises/name/${word}?limit=5&offset=0`,
      { headers }
    );
    if (res2.ok) {
      const data2 = await res2.json();
      const items2 = Array.isArray(data2) ? data2 : (data2?.data||[]);
      const match = items2.find(e => {
        const n = (e.name||'').toLowerCase();
        return engName.split(' ').every(w => n.includes(w));
      }) || items2[0];
      if (match?.gifUrl) {
        GIF_CACHE[exName] = match.gifUrl;
        saveGifCache();
        return match.gifUrl;
      }
    }
  } catch(_){}

  return null;
}

// React hook: load gif for an exercise
function useExGif(exName) {
  // Só usa cache se tiver URL real (não string vazia)
  const cached = GIF_CACHE[exName];
  const [gifUrl, setGifUrl] = useState(cached && cached.startsWith('http') ? cached : null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(false);

  useEffect(()=>{
    if(!exName) return;
    // Limpa cache inválido (string vazia guardada de tentativas anteriores)
    if(GIF_CACHE[exName] === '' || GIF_CACHE[exName] === null) {
      delete GIF_CACHE[exName];
    }
    if(gifUrl) return; // já tem URL válida
    let cancelled = false;
    setLoading(true);
    setError(false);
    fetchExGif(exName).then(url=>{
      if(!cancelled){
        if(url) { setGifUrl(url); }
        else { setError(true); }
        setLoading(false);
      }
    });
    return ()=>{ cancelled=true; };
  },[exName]);

  return {gifUrl, loading, error};
}

// ── Firestore sync ────────────────────────────────────────────────────────
const SYNC_STATUS = { listeners: [] };
function setSyncStatus(s){ SYNC_STATUS.current=s; SYNC_STATUS.listeners.forEach(fn=>fn(s)); }
function useSyncStatus(){ const [s,setS]=useState(SYNC_STATUS.current||'idle'); useEffect(()=>{ SYNC_STATUS.listeners.push(setS); return ()=>{SYNC_STATUS.listeners=SYNC_STATUS.listeners.filter(x=>x!==setS);};},[]);return s;}

function getUID(){ try{return JSON.parse(localStorage.getItem('darkset.user'))?.uid||null;}catch(_){return null;} }
function debounce(fn,ms){ let t; return (...args)=>{clearTimeout(t);t=setTimeout(()=>fn(...args),ms);}; }

// Global state setters — React components register these on mount
window._DS_SETTERS = { plans: null, history: null, prefs: null };

async function fsWrite(uid, docName, data){
  if(!uid||!window._db) return;
  setSyncStatus('saving');
  try{
    await window._db.collection('users').doc(uid).collection('data').doc(docName).set({payload:JSON.stringify(data),updatedAt:Date.now()});
    setSyncStatus('saved');
    setTimeout(()=>setSyncStatus('idle'),2500);
  }catch(e){
    setSyncStatus('error');
    const msg = e.code==='permission-denied' ? 'Regras do Firestore nao configuradas' : (e.code||e.message);
    console.warn('[DSSync] fsWrite erro:',msg);
    window._DS_LAST_ERROR = msg;
  }
}

async function fsRead(uid, docName){
  if(!uid||!window._db) return null;
  try{
    const snap=await window._db.collection('users').doc(uid).collection('data').doc(docName).get();
    if(snap.exists){ const d=snap.data(); if(d&&d.payload) return JSON.parse(d.payload); }
    return null;
  }catch(e){
    const msg = e.code==='permission-denied' ? 'Regras do Firestore nao configuradas' : (e.code||e.message);
    console.warn('[DSSync] fsRead erro:',msg);
    window._DS_LAST_ERROR = msg;
    return null;
  }
}

window.DSSync = {
  pull: async function(uid){
    if(!uid) return;
    setSyncStatus('syncing');
    console.log('[DSSync] pulling for', uid);
    try{
      const [cloudPlans, cloudHistory, cloudPrefs] = await Promise.all([
        fsRead(uid,'plans'),
        fsRead(uid,'history'),
        fsRead(uid,'prefs'),
      ]);
      console.log('[DSSync] received:', {plans:!!cloudPlans, history:!!cloudHistory, prefs:!!cloudPrefs});

      // Write to localStorage first
      if(cloudPlans)   localStorage.setItem(LS.plans,   JSON.stringify(cloudPlans));
      if(cloudHistory) localStorage.setItem(LS.history, JSON.stringify(cloudHistory));
      if(cloudPrefs)   localStorage.setItem(LS.prefs,   JSON.stringify(cloudPrefs));

      // Push directly into React state if setters are registered
      if(cloudPlans   && window._DS_SETTERS.plans)   window._DS_SETTERS.plans(cloudPlans);
      if(cloudHistory && window._DS_SETTERS.history) window._DS_SETTERS.history(cloudHistory);
      if(cloudPrefs   && window._DS_SETTERS.prefs)   window._DS_SETTERS.prefs(cloudPrefs);

      setSyncStatus('saved');
      setTimeout(()=>setSyncStatus('idle'),2500);
    }catch(e){ setSyncStatus('error'); console.warn('[DSSync] pull error',e); }
  },
  push: async function(uid){
    if(!uid||!window._db) return;
    const plans   = JSON.parse(localStorage.getItem(LS.plans)||'null');
    const history = JSON.parse(localStorage.getItem(LS.history)||'null');
    const prefs   = JSON.parse(localStorage.getItem(LS.prefs)||'null');
    await Promise.all([
      plans   ? fsWrite(uid,'plans',plans)   : null,
      history ? fsWrite(uid,'history',history): null,
      prefs   ? fsWrite(uid,'prefs',prefs)   : null,
    ].filter(Boolean));
  }
};

const debouncedFsWrite = debounce((uid,key,val)=>fsWrite(uid,key,val),1500);

function usePlans(){
  const [plans,setPlansState]=useState(()=>load(LS.plans,{activeId:null,list:[]}));
  // Register setter so DSSync.pull can update React state directly
  useEffect(()=>{ window._DS_SETTERS.plans=setPlansState; return ()=>{window._DS_SETTERS.plans=null;}; },[]);
  const setPlans=(v)=>setPlansState(prev=>{
    const next=typeof v==='function'?v(prev):v;
    save(LS.plans,next);
    const uid=getUID(); if(uid) debouncedFsWrite(uid,'plans',next);
    return next;
  });
  return [plans,setPlans];
}
function useHistory(){
  const [history,setHistoryState]=useState(()=>load(LS.history,{}));
  useEffect(()=>{ window._DS_SETTERS.history=setHistoryState; return ()=>{window._DS_SETTERS.history=null;}; },[]);
  const setHistory=(v)=>setHistoryState(prev=>{
    const next=typeof v==='function'?v(prev):v;
    save(LS.history,next);
    const uid=getUID(); if(uid) debouncedFsWrite(uid,'history',next);
    return next;
  });
  return [history,setHistory];
}
function usePrefs(){
  const [prefs,setPrefsState]=useState(()=>load(LS.prefs,{name:"",avatar:"💀",unit:"kg",vibrate:true,weeklyGoal:5,showTimer:true,timerPreset:60,rirDefault:2,chartsPremium:false}));

    save(LS.prefs,next);
    const uid=getUID(); if(uid) debouncedFsWrite(uid,'prefs',next);

  return [prefs,setPrefs];
}

  // Semana atual
  const weekStart=new Date(today); weekStart.setDate(today.getDate()-((today.getDay()||7)-1));
  const thisWeekEntries=entries.filter(([iso])=>new Date(iso)>=weekStart);
  const thisWeek=thisWeekEntries.length;

  const streak=(()=>{
    let s=0; const d=new Date(today);

      else if(s===0&&d.toISOString().slice(0,10)===today.toISOString().slice(0,10)){d.setDate(d.getDate()-1);}

                    <button onClick={()=>activate(pl.id,!isActive)} style={{width:'20px',height:'20px',borderRadius:'50%',flexShrink:0,cursor:'pointer',background:isActive?'var(--color-accent)':'transparent',border:isActive?'2px solid var(--color-accent)':'2px solid #333',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:isActive?'0 0 8px rgba(227,27,35,.4)':''}}>
                      {isActive&&<div style={{width:'8px',height:'8px',borderRadius:'50%',background:'#fff'}}></div>}
                    </button>
                    {renameId===pl.id?(
                      <input autoFocus style={{flex:1,background:'rgba(0,0,0,.4)',border:'1px solid var(--color-accent)',borderRadius:'6px',padding:'.35rem .6rem',fontSize:'.95rem',color:'var(--color-text)',fontWeight:600}} value={pl.name} onChange={e=>setPlans(p=>({...p,list:p.list.map(x=>x.id===pl.id?{...x,name:e.target.value}:x)}))} onBlur={()=>setRenameId(null)}/>
                    ):(
                      <div style={{minWidth:0}}>
                        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:'1.15rem',textTransform:'uppercase',letterSpacing:'.03em',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>
                          {pl.name}
                          {isActive&&<span style={{marginLeft:'.5rem',fontSize:'.6rem',color:'var(--color-accent)',fontFamily:"'Inter',sans-serif",fontWeight:700,letterSpacing:'.06em',verticalAlign:'middle'}}>ATIVA</span>}
                        </div>
                        <div style={{fontSize:'.7rem',color:'#444',marginTop:'1px'}}>{exTotal} exercício(s)</div>
                      </div>
                    )}
                  </div>
                </div>
                <div style={{display:'flex',gap:'.3rem',flexWrap:'wrap',marginBottom:'.75rem'}}>
                  {DAYS.map(d=>{const n=pl.byDay?.[d]?.length||0;return n>0?(
                    <span key={d} style={{background:'rgba(227,27,35,.08)',border:'1px solid rgba(227,27,35,.15)',borderRadius:'5px',padding:'2px 7px',fontSize:'.65rem',color:'var(--color-accent)',fontWeight:700}}>{d.slice(0,3)} {n}</span>
                  ):(
                    <span key={d} style={{background:'rgba(0,0,0,.2)',border:'1px solid #1a1a1a',borderRadius:'5px',padding:'2px 7px',fontSize:'.65rem',color:'#222'}}>{d.slice(0,3)}</span>
                  );})}
                </div>
                <div style={{display:'flex',gap:'.4rem',flexWrap:'wrap'}}>
                  <button onClick={()=>goto('builder',pl.id)} style={{background:'var(--color-accent)',border:'none',borderRadius:'7px',padding:'.4rem .85rem',color:'#fff',fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:'.78rem',textTransform:'uppercase',cursor:'pointer'}}>Editar</button>
                  <button onClick={()=>setRenameId(renameId===pl.id?null:pl.id)} style={{background:'rgba(255,255,255,.04)',border:'1px solid #222',borderRadius:'7px',padding:'.4rem .75rem',color:'#777',fontSize:'.78rem',fontWeight:600,textTransform:'uppercase',cursor:'pointer'}}>Renomear</button>
                  <button onClick={()=>duplicatePlan(pl.id)} style={{background:'rgba(255,255,255,.04)',border:'1px solid #222',borderRadius:'7px',padding:'.4rem .75rem',color:'#777',fontSize:'.78rem',fontWeight:600,textTransform:'uppercase',cursor:'pointer'}}>Duplicar</button>
                  <button onClick={()=>setSharePlan(pl)} style={{background:'rgba(255,255,255,.04)',border:'1px solid #222',borderRadius:'7px',padding:'.4rem .75rem',color:'#777',fontSize:'.78rem',fontWeight:600,textTransform:'uppercase',cursor:'pointer'}}>Compartilhar</button>
                  <button onClick={()=>removePlan(pl.id)} style={{background:'rgba(227,27,35,.08)',border:'1px solid rgba(227,27,35,.2)',borderRadius:'7px',padding:'.4rem .6rem',color:'#e31b23',fontSize:'.78rem',fontWeight:700,cursor:'pointer'}}>X</button>
                </div>
              </div>
            );
          })}
        </div>
      )}
      </>)}

      {/* ── FICHAS PRONTAS ── */}
      {tab==='prontas'&&(
        <div style={{display:'grid',gap:'1rem'}}>
          {/* Filtros */}
          <div className="ds-card" style={{padding:'.85rem 1.1rem',display:'grid',gap:'.6rem'}}>
            <div style={{fontSize:'.65rem',color:'var(--color-text-sub)',textTransform:'uppercase',letterSpacing:'.07em'}}>Filtrar</div>
            <div style={{display:'flex',gap:'.5rem',flexWrap:'wrap'}}>
              {['todos','iniciante','intermediário','avançado'].map(l=>(
                <button key={l} onClick={()=>setFilterLevel(l)} style={{background:filterLevel===l?'var(--color-accent)':'rgba(255,255,255,.04)',border:filterLevel===l?'none':'1px solid #222',borderRadius:'7px',padding:'.35rem .75rem',color:filterLevel===l?'#fff':'var(--color-text-sub)',fontSize:'.72rem',fontWeight:700,textTransform:'capitalize',cursor:'pointer'}}>
                  {l==='todos'?'Todos níveis':l}
                </button>
              ))}
            </div>
            <div style={{display:'flex',gap:'.5rem',flexWrap:'wrap'}}>
              {['todos','3','4','5','6'].map(d=>(
                <button key={d} onClick={()=>setFilterDays(d)} style={{background:filterDays===d?'var(--color-accent)':'rgba(255,255,255,.04)',border:filterDays===d?'none':'1px solid #222',borderRadius:'7px',padding:'.35rem .75rem',color:filterDays===d?'#fff':'var(--color-text-sub)',fontSize:'.72rem',fontWeight:700,cursor:'pointer'}}>
                  {d==='todos'?'Todos dias':`${d} dias`}
                </button>
              ))}
            </div>
          </div>

          <div style={{fontSize:'.65rem',color:'var(--color-text-sub)',textTransform:'uppercase',letterSpacing:'.07em'}}>{filteredPresets.length} ficha(s) encontrada(s)</div>

          {filteredPresets.map(preset=>(
            <div key={preset.id} className="ds-card" style={{padding:'1rem 1.1rem'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'.6rem'}}>
                <div style={{flex:1,marginRight:'.75rem'}}>
                  <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:'1.1rem',textTransform:'uppercase',letterSpacing:'.03em',lineHeight:1.1}}>{preset.name}</div>
                  <div style={{fontSize:'.72rem',color:'var(--color-text-sub)',marginTop:'.25rem'}}>{preset.description}</div>
                </div>
                <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:'.3rem',flexShrink:0}}>
                  <span style={{background:levelColor[preset.level]+'22',border:`1px solid ${levelColor[preset.level]}44`,borderRadius:'5px',padding:'.2rem .5rem',fontSize:'.6rem',fontWeight:700,color:levelColor[preset.level],textTransform:'uppercase',letterSpacing:'.05em'}}>{preset.level}</span>
                  <span style={{fontSize:'.6rem',color:'var(--color-text-sub)',fontWeight:600}}>{preset.days} dias/sem</span>
                </div>
              </div>

              {/* Day pills */}
              <div style={{display:'flex',flexWrap:'wrap',gap:'.35rem',marginBottom:'.75rem'}}>
                {DAYS.filter(d=>preset.byDay[d]&&preset.byDay[d].length>0).map(d=>(
                  <span key={d} style={{background:'rgba(227,27,35,.1)',border:'1px solid rgba(227,27,35,.2)',borderRadius:'5px',padding:'.2rem .5rem',fontSize:'.62rem',fontWeight:700,color:'var(--color-accent)',textTransform:'uppercase'}}>
                    {d.slice(0,3)} · {preset.byDay[d].length}ex
                  </span>
                ))}
              </div>

              {/* Preview modal trigger + import */}
              <div style={{display:'flex',gap:'.5rem'}}>
                <button onClick={()=>setPreviewPlan(previewPlan?.id===preset.id?null:preset)} style={{flex:1,background:'rgba(255,255,255,.04)',border:'1px solid #222',borderRadius:'8px',padding:'.5rem',color:'var(--color-text-sub)',fontSize:'.78rem',fontWeight:700,textTransform:'uppercase',cursor:'pointer'}}>
                  {previewPlan?.id===preset.id?'▲ Fechar':'▼ Ver exercícios'}
                </button>
                <button onClick={()=>importPreset(preset)} style={{flex:1,background:'var(--color-accent)',border:'none',borderRadius:'8px',padding:'.5rem',color:'#fff',fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:'.85rem',textTransform:'uppercase',cursor:'pointer',boxShadow:'0 0 12px rgba(227,27,35,.25)'}}>
                  + Usar esta ficha
                </button>
              </div>

              {/* Expandable preview */}
              {previewPlan?.id===preset.id&&(
                <div style={{marginTop:'.75rem',borderTop:'1px solid var(--color-border)',paddingTop:'.75rem',display:'grid',gap:'.5rem'}}>
                  {DAYS.filter(d=>preset.byDay[d]&&preset.byDay[d].length>0).map(d=>(
                    <div key={d}>
                      <div style={{fontSize:'.62rem',color:'var(--color-accent)',fontWeight:700,textTransform:'uppercase',letterSpacing:'.06em',marginBottom:'.25rem'}}>{d}</div>
                      {preset.byDay[d].map((e,i)=>(
                        <div key={i} style={{display:'flex',justifyContent:'space-between',padding:'.2rem 0',borderBottom:'1px solid rgba(255,255,255,.03)'}}>
                          <span style={{fontSize:'.78rem',color:'var(--color-text)'}}>{e.name}</span>
                          <span style={{fontSize:'.72rem',color:'var(--color-text-sub)',fontWeight:600}}>{e.setsPlanned}x</span>
                        </div>
                      ))}
                    </div>
                  ))}
                </div>
              )}
            </div>
          ))}
        </div>
      )}

      {showQR&&<QRScanner onResult={handleQRResult} onClose={()=>setShowQR(false)}/>}

      {sharePlan&&(
        <Modal onClose={()=>setSharePlan(null)}>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:'1.2rem',textTransform:'uppercase',marginBottom:'1rem'}}>{sharePlan.name}</div>
          <div id="qr-box" style={{margin:'0 auto .75rem',width:'180px',height:'180px',border:'1px solid #1e1e1e',borderRadius:'8px',overflow:'hidden'}}></div>
          <div style={{fontSize:'.7rem',color:'#444',marginBottom:'.5rem'}}>Escaneie o QR ou copie o link:</div>
          <div style={{display:'flex',gap:'.5rem'}}>
            <input id="share-link" readOnly value={makeImportLink(sharePlan)} style={{flex:1,background:'rgba(0,0,0,.4)',border:'1px solid #1a1a1a',borderRadius:'7px',padding:'.4rem .65rem',fontSize:'.72rem',color:'#888'}}/>
            <button onClick={()=>{document.getElementById('share-link').select();document.execCommand('copy');setToast("Link copiado");}} style={{background:'rgba(255,255,255,.06)',border:'1px solid #222',borderRadius:'7px',padding:'.4rem .75rem',color:'#ccc',fontSize:'.78rem',fontWeight:700,cursor:'pointer'}}>Copiar</button>
          </div>
          <div style={{fontSize:'.65rem',color:'#333',marginTop:'.5rem'}}>Apenas a estrutura da ficha. Sem dados pessoais.</div>
          <div style={{marginTop:'1rem',textAlign:'right'}}><button onClick={()=>setSharePlan(null)} style={{background:'rgba(255,255,255,.04)',border:'1px solid #222',borderRadius:'7px',padding:'.4rem .85rem',color:'#777',fontSize:'.78rem',cursor:'pointer'}}>Fechar</button></div>
        </Modal>
      )}
    </div>
  );
};


// Builder
const Builder=({planId,plans,setPlans,setToast})=>{
  const plan=plans.list.find(p=>p.id===planId)||plans.list[0];
  const [day,setDay]=useState(DAYS[0]);
  const [filters,setFilters]=useState(()=>load(LS.filters,{q:"",m:"",s:"",e:"",d:""}));
  const [tab,setTab]=useState('ficha'); // 'ficha' | 'buscar'
  const {q,m,s,e,d}=filters;
  const [gifModal,setGifModal]=useState(null);
  const [detailEx,setDetailEx]=useState(null);

  useEffect(()=>save(LS.filters,filters),[filters]);

  const list=useMemo(()=>{
    const filtered = EXS.filter(ex=>{
      const nameOk=ex.name.toLowerCase().includes(q.toLowerCase());
      const mOk=!m||ex.primary===m;
      const sOk=!s||ex.subgroup===s;
      const eOk=!e||ex.equipment===e;
      const dOk=!d||ex.difficulty===d;
      return nameOk&&mOk&&sOk&&eOk&&dOk;
    });
    // Sort: by group order then alphabetically within group
    const GROUP_ORDER=["Peito","Ombro","Trapézio","Costas","Bíceps","Tríceps","Antebraço","Lombar","Quadríceps","Posterior de Coxa","Glúteo","Abdutores","Adutores","Panturrilha","Abdômen"];
    return filtered.sort((a,b)=>{
      const gi = GROUP_ORDER.indexOf(a.primary) - GROUP_ORDER.indexOf(b.primary);
      if(gi!==0) return gi;
      return a.name.localeCompare(b.name,'pt');
    });
  },[q,m,s,e,d]);

  const dayItems=plan?.byDay?.[day]||[];
  const canAdd=(ex)=>!dayItems.some(it=>it.exId===ex.id);

  const addEx=(ex,setsPlanned=3)=>{
    setPlans(p=>{
      const copy=JSON.parse(JSON.stringify(p));
      const pl=copy.list.find(x=>x.id===plan.id);
      const arr=pl.byDay[day];
      if(arr.some(it=>it.exId===ex.id)) return p;
      arr.push({exId:ex.id,name:ex.name,setsPlanned:Math.max(1,Number(setsPlanned)||3)});
      return copy;
    });
    setToast("+ "+ex.name);
  };
  const removeItem=(i)=>setPlans(p=>{const copy=JSON.parse(JSON.stringify(p));copy.list.find(x=>x.id===plan.id).byDay[day].splice(i,1);return copy;});
  const move=(i,dir)=>setPlans(p=>{
    const copy=JSON.parse(JSON.stringify(p));
    const arr=copy.list.find(x=>x.id===plan.id).byDay[day];
    const j=i+dir; if(j<0||j>=arr.length)return p;
    [arr[i],arr[j]]=[arr[j],arr[i]]; return copy;
  });
  const updateSets=(i,val)=>setPlans(p=>{
    const copy=JSON.parse(JSON.stringify(p));
    copy.list.find(x=>x.id===plan.id).byDay[day][i].setsPlanned=Math.max(1,Math.min(10,Number(val)||1));
    return copy;
  });

  const MUSCLES=[...new Set(EXS.map(e=>e.primary))];
  const SUBS_BY=MUSCLES.reduce((acc,mu)=>{acc[mu]=[...new Set(EXS.filter(e=>e.primary===mu&&e.subgroup).map(e=>e.subgroup))];return acc;},{});
  const EQUIPS=[...new Set(EXS.map(e=>e.equipment))];
  const DIFFS=[...new Set(EXS.map(e=>e.difficulty))];

  const totalSets=dayItems.reduce((a,it)=>a+(it.setsPlanned||3),0);

  if(!plan) return <div style={{padding:'2rem',color:'#555',textAlign:'center'}}>Nenhuma ficha encontrada.</div>;

  return (
    <div style={{marginTop:'1rem',display:'grid',gap:'1rem'}}>

      {/* Topo: nome da ficha + seletor de dia */}
      <div className="ds-card" style={{padding:'.85rem 1.1rem'}}>
        <div className="flex items-center justify-between" style={{marginBottom:'.85rem'}}>
          <div>
            <div style={{fontSize:'.6rem',color:'#444',textTransform:'uppercase',letterSpacing:'.08em'}}>Editando ficha</div>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:'1.5rem',textTransform:'uppercase',letterSpacing:'.04em',lineHeight:1}}>{plan.name}</div>
          </div>
          <div style={{textAlign:'right'}}>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:'1.2rem',fontWeight:800,color:'var(--color-accent)',lineHeight:1}}>{dayItems.length}<span style={{fontSize:'.85rem',color:'#333'}}>ex</span></div>
            <div style={{fontSize:'.65rem',color:'#333'}}>{totalSets} séries</div>
          </div>
        </div>

        {/* Day pills */}
        <div style={{display:'flex',gap:'.4rem',flexWrap:'wrap',paddingBottom:'.3rem',paddingTop:'.6rem'}}>
          {DAYS.map(dy=>{
            const count=plan.byDay?.[dy]?.length||0;
            const active=day===dy;
            return (
              <button key={dy} onClick={()=>setDay(dy)} style={{
                flexShrink:0,padding:'.4rem .75rem',borderRadius:'8px',
                background:active?'var(--color-accent)':'rgba(0,0,0,.4)',
                border:active?'1px solid rgba(255,255,255,.08)':'1px solid #1a1a1a',
                color:active?'#fff':'#555',
                fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:'.85rem',
                textTransform:'uppercase',letterSpacing:'.04em',cursor:'pointer',
                position:'relative',overflow:'visible',marginTop:'6px'
              }}>
                {dy.slice(0,3)}
                {count>0&&<span style={{position:'absolute',top:'-8px',right:'-6px',background:active?'#fff':'var(--color-accent)',color:active?'var(--color-accent)':'#fff',borderRadius:'50%',width:'18px',height:'18px',fontSize:'.6rem',fontWeight:800,display:'flex',alignItems:'center',justifyContent:'center',zIndex:2,boxShadow:'0 0 0 2px var(--color-card)'}}>{count}</span>}
              </button>
            );
          })}
        </div>
      </div>

      {/* Tab toggle */}
      <div className="mode-toggle">
        <button className={"mode-toggle-btn"+(tab==="ficha"?" active":"")} onClick={()=>setTab("ficha")}>
          Ficha de {day.slice(0,3)} ({dayItems.length})
        </button>
        <button className={"mode-toggle-btn"+(tab==="buscar"?" active":"")} onClick={()=>setTab("buscar")}>
          + Adicionar Exercício
        </button>
      </div>

      {/* TAB: FICHA */}
      {tab==="ficha" && (
        <div className="ds-card" style={{padding:'1rem 1.1rem'}}>
          {dayItems.length===0 ? (
            <div style={{textAlign:'center',padding:'2rem 0'}}>
              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:'1.8rem',fontWeight:900,color:'#1a1a1a',textTransform:'uppercase',marginBottom:'.5rem'}}>Vazio</div>
              <div style={{color:'#333',fontSize:'.8rem',marginBottom:'1rem'}}>Nenhum exercício para {day}</div>
              <button onClick={()=>setTab("buscar")} style={{background:'var(--color-accent)',border:'none',borderRadius:'8px',color:'#fff',padding:'.6rem 1.2rem',fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:'.9rem',textTransform:'uppercase',letterSpacing:'.04em',cursor:'pointer'}}>
                + Adicionar Exercício
              </button>
            </div>
          ) : (
            <div style={{display:'grid',gap:'.5rem'}}>
              {dayItems.map((it,i)=>(
                <div key={i} style={{display:'grid',gridTemplateColumns:'2rem 1fr 3.5rem 2.5rem 2.5rem',alignItems:'center',gap:'.5rem',background:'rgba(0,0,0,.3)',border:'1px solid #1a1a1a',borderRadius:'10px',padding:'.6rem .75rem'}}>
                  {/* Número */}
                  <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:'1.1rem',fontWeight:900,color:'#222',lineHeight:1}}>{i+1}</div>
                  {/* Nome */}
                  <div style={{minWidth:0}}>
                    <div style={{fontWeight:600,fontSize:'.82rem',lineHeight:1.3,overflow:'hidden',display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical'}}>{it.name}</div>
                    <div style={{fontSize:'.65rem',color:'#444',marginTop:'2px'}}>
                      {EXS.find(e=>e.id===it.exId)?.primary||''} · {EXS.find(e=>e.id===it.exId)?.equipment||''}
                    </div>
                  </div>
                  {/* Séries input */}
                  <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:'2px'}}>
                    <input type="number" min="1" max="10" value={it.setsPlanned||3}
                      onChange={e=>updateSets(i,e.target.value)}
                      style={{width:'2.5rem',textAlign:'center',background:'rgba(0,0,0,.4)',border:'1px solid #1e1e1e',borderRadius:'6px',padding:'.3rem .2rem',fontSize:'.85rem',color:'#fff'}}
                    />
                    <div style={{fontSize:'.52rem',color:'#333',textTransform:'uppercase',letterSpacing:'.04em'}}>séries</div>
                  </div>
                  {/* Move */}
                  <div style={{display:'flex',flexDirection:'column',gap:'3px'}}>
                    <button onClick={()=>move(i,-1)} disabled={i===0} style={{background:'none',border:'1px solid #1a1a1a',borderRadius:'4px',color:i===0?'#222':'#888',padding:'3px 7px',cursor:i===0?'default':'pointer',fontSize:'.8rem',lineHeight:1}}>↑</button>
                    <button onClick={()=>move(i,1)} disabled={i===dayItems.length-1} style={{background:'none',border:'1px solid #1a1a1a',borderRadius:'4px',color:i===dayItems.length-1?'#222':'#888',padding:'3px 7px',cursor:i===dayItems.length-1?'default':'pointer',fontSize:'.8rem',lineHeight:1}}>↓</button>
                  </div>
                  {/* Remove */}
                  <button onClick={()=>removeItem(i)} style={{background:'rgba(227,27,35,.08)',border:'1px solid rgba(227,27,35,.2)',borderRadius:'6px',color:'#e31b23',padding:'.4rem .4rem',cursor:'pointer',fontSize:'.8rem',fontWeight:700,lineHeight:1,alignSelf:'center'}}>✕</button>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {/* TAB: BUSCAR */}
      {tab==="buscar" && (
        <div className="ds-card" style={{padding:'1rem 1.1rem'}}>
          {/* Search input */}
          <div style={{position:'relative',marginBottom:'.75rem'}}>
            <input
              style={{width:'100%',background:'rgba(0,0,0,.45)',border:'1px solid #1e1e1e',borderRadius:'8px',padding:'.6rem .85rem .6rem 2.2rem',fontSize:'.88rem',color:'#fff'}}
              placeholder="Buscar exercício por nome…"
              value={q} onChange={e=>setFilters({...filters,q:e.target.value})}
            />
            <span style={{position:'absolute',left:'.7rem',top:'50%',transform:'translateY(-50%)',color:'#333',pointerEvents:'none',fontSize:'.9rem'}}>⌕</span>
          </div>

          {/* Filter chips */}
          <div style={{display:'flex',gap:'.4rem',overflowX:'auto',marginBottom:'.75rem',scrollbarWidth:'none',paddingBottom:'.2rem'}}>
            <select style={{flexShrink:0,background:'rgba(0,0,0,.4)',border:'1px solid #1a1a1a',borderRadius:'7px',padding:'.35rem .6rem',fontSize:'.75rem',color:m?'#fff':'#555',cursor:'pointer'}}
              value={m} onChange={e=>{const v=e.target.value;setFilters({...filters,m:v,s:""});}}>
              <option value="">Músculo</option>{MUSCLES.map(x=><option key={x}>{x}</option>)}
            </select>
            <select style={{flexShrink:0,background:'rgba(0,0,0,.4)',border:'1px solid #1a1a1a',borderRadius:'7px',padding:'.35rem .6rem',fontSize:'.75rem',color:s?'#fff':'#555',cursor:'pointer',opacity:(!m||(SUBS_BY[m]||[]).length===0)?0.4:1}}
              value={s} onChange={e=>setFilters({...filters,s:e.target.value})} disabled={!m||(SUBS_BY[m]||[]).length===0}>
              <option value="">Subgrupo</option>{(m?SUBS_BY[m]:[]).map(x=><option key={x}>{x}</option>)}
            </select>
            <select style={{flexShrink:0,background:'rgba(0,0,0,.4)',border:'1px solid #1a1a1a',borderRadius:'7px',padding:'.35rem .6rem',fontSize:'.75rem',color:e?'#fff':'#555',cursor:'pointer'}}
              value={e} onChange={e2=>setFilters({...filters,e:e2.target.value})}>
              <option value="">Equipamento</option>{EQUIPS.map(x=><option key={x}>{x}</option>)}
            </select>
            <select style={{flexShrink:0,background:'rgba(0,0,0,.4)',border:'1px solid #1a1a1a',borderRadius:'7px',padding:'.35rem .6rem',fontSize:'.75rem',color:d?'#fff':'#555',cursor:'pointer'}}
              value={d} onChange={e3=>setFilters({...filters,d:e3.target.value})}>
              <option value="">Nível</option>{DIFFS.map(x=><option key={x}>{x}</option>)}
            </select>
            {(q||m||s||e||d)&&<button onClick={()=>setFilters({q:"",m:"",s:"",e:"",d:""})} style={{flexShrink:0,background:'rgba(227,27,35,.1)',border:'1px solid rgba(227,27,35,.2)',borderRadius:'7px',padding:'.35rem .65rem',fontSize:'.75rem',color:'#e31b23',cursor:'pointer',fontWeight:700}}>Limpar</button>}
          </div>

          {/* Results count */}
          <div style={{fontSize:'.65rem',color:'#333',marginBottom:'.5rem',textTransform:'uppercase',letterSpacing:'.06em'}}>{list.length} exercício(s)</div>

          {/* Exercise list grouped by muscle */}
          <div style={{display:'grid',gap:'.4rem',maxHeight:'360px',overflowY:'auto',paddingRight:'2px'}}>
            {(()=>{
              const rows=[];
              let lastGroup=null;
              list.forEach(ex=>{
                if(ex.primary!==lastGroup){
                  lastGroup=ex.primary;
                  rows.push(
                    <div key={'g_'+ex.primary} style={{padding:'.25rem .5rem',fontSize:'.6rem',fontWeight:800,color:'var(--color-accent)',textTransform:'uppercase',letterSpacing:'.1em',borderBottom:'1px solid rgba(227,27,35,.15)',marginTop:rows.length?'.3rem':0}}>
                      {ex.primary}
                    </div>
                  );
                }
                const added=!canAdd(ex);
                rows.push(
                  <div key={ex.id} style={{
                    display:'grid',gridTemplateColumns:'52px 1fr auto auto',alignItems:'center',gap:'.6rem',
                    background:added?'rgba(227,27,35,.04)':'rgba(0,0,0,.25)',
                    border:added?'1px solid rgba(227,27,35,.15)':'1px solid #151515',
                    borderRadius:'8px',padding:'.6rem .85rem',transition:'border-color .15s'
                  }}>
                    <ExGifThumb exName={ex.name} onClick={()=>setDetailEx(ex.name)}/>
                    <div>
                      <div style={{fontSize:'.85rem',fontWeight:600,color:added?'#e31b23':'var(--color-text)'}}>{ex.name}</div>
                      <div style={{fontSize:'.62rem',color:'var(--color-text-sub)',marginTop:'1px'}}>{ex.equipment} · {ex.difficulty} · <span onClick={()=>setDetailEx(ex.name)} style={{color:'var(--color-accent)',cursor:'pointer',fontWeight:700}}>ver detalhes</span></div>
                    </div>
                    {!added && (
                      <select
                        defaultValue="3"
                        id={"sets_"+ex.id}
                        style={{width:'3.2rem',background:'rgba(0,0,0,.4)',border:'1px solid #1a1a1a',borderRadius:'6px',padding:'.3rem .2rem',fontSize:'.8rem',color:'var(--color-text)',textAlign:'center'}}
                        onClick={ev=>ev.stopPropagation()}
                      >
                        {[1,2,3,4,5,6].map(n=><option key={n} value={n}>{n}x</option>)}
                      </select>
                    )}
                    <button
                      onClick={()=>{
                        if(added) return;
                        const sel=document.getElementById("sets_"+ex.id);
                        addEx(ex, sel?Number(sel.value):3);
                      }}
                      disabled={added}
                      style={{
                        background:added?'transparent':'var(--color-accent)',
                        border:added?'1px solid #1a1a1a':'none',
                        borderRadius:'7px',padding:'.4rem .65rem',
                        color:added?'#333':'#fff',
                        fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:'.8rem',
                        textTransform:'uppercase',letterSpacing:'.04em',cursor:added?'default':'pointer',
                        whiteSpace:'nowrap'
                    }}
                  >{added?'✓ Na ficha':'+ Add'}</button>
                  </div>
                );
              });
              if(list.length===0) rows.push(<div key="empty" style={{textAlign:'center',padding:'1.5rem',color:'var(--color-text-sub)',fontSize:'.85rem'}}>Nenhum exercício encontrado</div>);
              return rows;
            })()}
          </div>
        </div>
      )}
    </div>
  );
};

// CARDIO MODULE
// ═══════════════════════════════════════════════════════
const CARDIO_TYPES = [
  {id:'corrida',    name:'Corrida',      icon:'🏃', metrics:['distancia','tempo','pace']},
  {id:'bike',       name:'Bike',         icon:'🚴', metrics:['distancia','tempo','velocidade']},
  {id:'hiit',       name:'HIIT',         icon:'⚡', metrics:['tempo','rounds']},
  {id:'eliptico',   name:'Elíptico',     icon:'🔄', metrics:['tempo','calorias']},
  {id:'corda',      name:'Corda',        icon:'🪢', metrics:['tempo','rounds']},
  {id:'natacao',    name:'Natação',       icon:'🏊', metrics:['distancia','tempo']},
  {id:'caminhada',  name:'Caminhada',    icon:'🚶', metrics:['distancia','tempo']},
  {id:'escada',     name:'Escada',       icon:'🪜', metrics:['tempo','andares']},
  {id:'livre',      name:'Livre',        icon:'💪', metrics:['tempo','calorias']},
];

const CARDIO_HISTORY_KEY = 'darkset.cardio.history';
const loadCardioHistory = () => {
  try { return JSON.parse(localStorage.getItem(CARDIO_HISTORY_KEY)||'[]'); } catch(_){ return []; }
};
const saveCardioHistory = (data) => {
  try { localStorage.setItem(CARDIO_HISTORY_KEY, JSON.stringify(data)); } catch(_){}
};

const Cardio = ({goto, setToast}) => {
  const [view, setView] = useState('home'); // 'home' | 'session' | 'history'
  const [selectedType, setSelectedType] = useState(null);
  const [history, setHistory] = useState(loadCardioHistory);

  // Session state
  const [running, setRunning] = useState(false);
  const [elapsed, setElapsed] = useState(0);
  const [startTs, setStartTs] = useState(null);
  const [metrics, setMetrics] = useState({distancia:'', calorias:'', rounds:'', andares:'', pace:'', velocidade:''});
  const [notes, setNotes] = useState('');
  const timerRef = useRef(null);

  useEffect(()=>{
    if(running){
      timerRef.current = setInterval(()=>setElapsed(e=>e+1),1000);
    } else {
      clearInterval(timerRef.current);
    }
    return ()=>clearInterval(timerRef.current);
  },[running]);

  const startSession = (type) => {
    setSelectedType(type);
    setElapsed(0); setRunning(false); setMetrics({distancia:'',calorias:'',rounds:'',andares:'',pace:'',velocidade:''});
    setNotes(''); setStartTs(new Date().toISOString());
    setView('session');
  };

  const toggleTimer = () => setRunning(r=>!r);

  const resetTimer = () => { setRunning(false); setElapsed(0); };

  const saveSession = () => {
    const entry = {
      id: Date.now(),
      date: startTs||new Date().toISOString(),
      type: selectedType.id,
      typeName: selectedType.name,
      typeIcon: selectedType.icon,
      tempo: elapsed,
      metrics: {...metrics},
      notes,
    };
    const updated = [entry, ...history];
    setHistory(updated);
    saveCardioHistory(updated);
    setToast('Cardio salvo! 🏃');
    setView('home');
    setRunning(false); setElapsed(0);
  };

  const deleteEntry = (id) => {
    const updated = history.filter(h=>h.id!==id);
    setHistory(updated);
    saveCardioHistory(updated);
  };

  const fmt = (s) => {
    const h=Math.floor(s/3600), m=Math.floor((s%3600)/60), sec=s%60;
    return h>0?`${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`:`${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  };

  const toDate = (iso) => { try{ const d=new Date(iso); return d.toLocaleDateString('pt-BR'); }catch(_){return '';} };

  if(view==='session' && selectedType){
    const hasMetric = (m) => selectedType.metrics.includes(m);
    return (
      <div style={{marginTop:'1rem',display:'grid',gap:'1rem'}}>
        <div className="ds-card" style={{padding:'1rem 1.1rem'}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'.5rem'}}>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:'1.6rem',textTransform:'uppercase',letterSpacing:'.04em'}}>
              {selectedType.icon} {selectedType.name}
            </div>
            <button onClick={()=>{setView('home');setRunning(false);setElapsed(0);}} style={{background:'rgba(255,255,255,.04)',border:'1px solid var(--color-border)',borderRadius:'7px',padding:'.3rem .75rem',color:'var(--color-text-sub)',fontSize:'.75rem',fontWeight:700,cursor:'pointer'}}>Sair</button>
          </div>

          {/* Big timer */}
          <div style={{textAlign:'center',padding:'1.5rem 0'}}>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:'4.5rem',letterSpacing:'.04em',lineHeight:1,color:running?'var(--color-accent)':'var(--color-text)'}}>{fmt(elapsed)}</div>
            <div style={{fontSize:'.65rem',color:'var(--color-text-sub)',textTransform:'uppercase',letterSpacing:'.1em',marginTop:'.25rem'}}>tempo</div>
          </div>

          <div style={{display:'flex',gap:'.75rem',justifyContent:'center',marginBottom:'1rem'}}>
            <button onClick={toggleTimer} style={{flex:1,background:running?'rgba(227,27,35,.15)':'var(--color-accent)',border:running?'1px solid rgba(227,27,35,.3)':'none',borderRadius:'10px',padding:'.85rem',color:running?'var(--color-accent)':'#fff',fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:'1rem',textTransform:'uppercase',cursor:'pointer'}}>
              {running?'⏸ Pausar':'▶ Iniciar'}
            </button>
            <button onClick={resetTimer} style={{background:'rgba(255,255,255,.04)',border:'1px solid var(--color-border)',borderRadius:'10px',padding:'.85rem 1rem',color:'var(--color-text-sub)',fontSize:'.85rem',cursor:'pointer'}}>↺</button>
          </div>
        </div>

        {/* Metrics */}
        <div className="ds-card" style={{padding:'1rem 1.1rem',display:'grid',gap:'.75rem'}}>
          <div style={{fontSize:'.65rem',color:'var(--color-text-sub)',textTransform:'uppercase',letterSpacing:'.07em'}}>Dados do treino</div>

          {hasMetric('distancia')&&(
            <div>
              <div style={{fontSize:'.62rem',color:'var(--color-text-sub)',marginBottom:'.3rem'}}>Distância (km)</div>
              <input type="number" step="0.1" placeholder="0.0" value={metrics.distancia} onChange={e=>setMetrics(m=>({...m,distancia:e.target.value}))} style={{width:'100%',background:'rgba(0,0,0,.3)',border:'1px solid var(--color-border)',borderRadius:'8px',padding:'.55rem .85rem',fontSize:'1.1rem',color:'var(--color-text)',fontWeight:600}}/>
            </div>
          )}
          {hasMetric('calorias')&&(
            <div>
              <div style={{fontSize:'.62rem',color:'var(--color-text-sub)',marginBottom:'.3rem'}}>Calorias (kcal)</div>
              <input type="number" placeholder="0" value={metrics.calorias} onChange={e=>setMetrics(m=>({...m,calorias:e.target.value}))} style={{width:'100%',background:'rgba(0,0,0,.3)',border:'1px solid var(--color-border)',borderRadius:'8px',padding:'.55rem .85rem',fontSize:'1.1rem',color:'var(--color-text)',fontWeight:600}}/>
            </div>
          )}
          {hasMetric('rounds')&&(
            <div>
              <div style={{fontSize:'.62rem',color:'var(--color-text-sub)',marginBottom:'.3rem'}}>Rounds</div>
              <input type="number" placeholder="0" value={metrics.rounds} onChange={e=>setMetrics(m=>({...m,rounds:e.target.value}))} style={{width:'100%',background:'rgba(0,0,0,.3)',border:'1px solid var(--color-border)',borderRadius:'8px',padding:'.55rem .85rem',fontSize:'1.1rem',color:'var(--color-text)',fontWeight:600}}/>
            </div>
          )}
          {hasMetric('andares')&&(
            <div>
              <div style={{fontSize:'.62rem',color:'var(--color-text-sub)',marginBottom:'.3rem'}}>Andares</div>
              <input type="number" placeholder="0" value={metrics.andares} onChange={e=>setMetrics(m=>({...m,andares:e.target.value}))} style={{width:'100%',background:'rgba(0,0,0,.3)',border:'1px solid var(--color-border)',borderRadius:'8px',padding:'.55rem .85rem',fontSize:'1.1rem',color:'var(--color-text)',fontWeight:600}}/>
            </div>
          )}

          <div>
            <div style={{fontSize:'.62rem',color:'var(--color-text-sub)',marginBottom:'.3rem'}}>Observações</div>
            <textarea placeholder="Como foi o treino?" value={notes} onChange={e=>setNotes(e.target.value)} rows={2} style={{width:'100%',background:'rgba(0,0,0,.3)',border:'1px solid var(--color-border)',borderRadius:'8px',padding:'.55rem .85rem',fontSize:'.85rem',color:'var(--color-text)',resize:'none'}}/>
          </div>

          <button onClick={saveSession} style={{background:'var(--color-accent)',border:'none',borderRadius:'10px',padding:'.75rem',color:'#fff',fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:'1rem',textTransform:'uppercase',cursor:'pointer',boxShadow:'0 0 16px rgba(227,27,35,.3)'}}>
            Salvar Cardio ✓
          </button>
        </div>
      </div>
    );
  }

  if(view==='history'){
    return (
      <div style={{marginTop:'1rem',display:'grid',gap:'1rem'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:'1.5rem',textTransform:'uppercase'}}>Histórico Cardio</div>
          <button onClick={()=>setView('home')} style={{background:'rgba(255,255,255,.04)',border:'1px solid var(--color-border)',borderRadius:'7px',padding:'.35rem .85rem',color:'var(--color-text-sub)',fontSize:'.78rem',fontWeight:700,cursor:'pointer'}}>← Voltar</button>
        </div>
        {history.length===0&&(
          <div style={{textAlign:'center',padding:'3rem',color:'var(--color-text-sub)'}}>
            <div style={{fontSize:'3rem',marginBottom:'.5rem'}}>🏃</div>
            <div>Nenhum cardio registrado ainda</div>
          </div>
        )}
        {history.map(h=>(
          <div key={h.id} className="ds-card" style={{padding:'.85rem 1.1rem'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
              <div>
                <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:'1.1rem',textTransform:'uppercase'}}>{h.typeIcon} {h.typeName}</div>
                <div style={{fontSize:'.65rem',color:'var(--color-text-sub)',marginTop:'2px'}}>{toDate(h.date)}</div>
              </div>
              <button onClick={()=>deleteEntry(h.id)} style={{background:'rgba(227,27,35,.08)',border:'1px solid rgba(227,27,35,.2)',borderRadius:'6px',padding:'.25rem .5rem',color:'#e31b23',fontSize:'.75rem',cursor:'pointer'}}>×</button>
            </div>
            <div style={{display:'flex',gap:'1rem',marginTop:'.6rem',flexWrap:'wrap'}}>
              <div style={{textAlign:'center'}}>
                <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:'1.1rem',color:'var(--color-accent)'}}>{fmt(h.tempo||0)}</div>
                <div style={{fontSize:'.55rem',color:'var(--color-text-sub)',textTransform:'uppercase'}}>tempo</div>
              </div>
              {h.metrics.distancia&&<div style={{textAlign:'center'}}><div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:'1.1rem'}}>{h.metrics.distancia}km</div><div style={{fontSize:'.55rem',color:'var(--color-text-sub)',textTransform:'uppercase'}}>distância</div></div>}
              {h.metrics.calorias&&<div style={{textAlign:'center'}}><div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:'1.1rem'}}>{h.metrics.calorias}</div><div style={{fontSize:'.55rem',color:'var(--color-text-sub)',textTransform:'uppercase'}}>kcal</div></div>}
              {h.metrics.rounds&&<div style={{textAlign:'center'}}><div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:'1.1rem'}}>{h.metrics.rounds}x</div><div style={{fontSize:'.55rem',color:'var(--color-text-sub)',textTransform:'uppercase'}}>rounds</div></div>}
              {h.metrics.andares&&<div style={{textAlign:'center'}}><div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:'1.1rem'}}>{h.metrics.andares}</div><div style={{fontSize:'.55rem',color:'var(--color-text-sub)',textTransform:'uppercase'}}>andares</div></div>}
            </div>
            {h.notes&&<div style={{marginTop:'.5rem',fontSize:'.75rem',color:'var(--color-text-sub)',fontStyle:'italic'}}>"{h.notes}"</div>}
          </div>
        ))}
      </div>
    );
  }

  // Home view
  return (
    <div style={{marginTop:'1rem',display:'grid',gap:'1rem'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:'1.8rem',textTransform:'uppercase',lineHeight:1}}>DARK<span style={{color:'var(--color-accent)'}}>CARDIO</span></div>
          <div style={{fontSize:'.65rem',color:'var(--color-text-sub)',letterSpacing:'.08em',textTransform:'uppercase',marginTop:'2px'}}>Registre seu cardio</div>
        </div>
        {history.length>0&&(
          <button onClick={()=>setView('history')} style={{background:'rgba(255,255,255,.04)',border:'1px solid var(--color-border)',borderRadius:'7px',padding:'.4rem .85rem',color:'var(--color-text-sub)',fontSize:'.75rem',fontWeight:700,textTransform:'uppercase',cursor:'pointer'}}>Histórico ({history.length})</button>
        )}
      </div>

      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'.6rem'}}>
        {CARDIO_TYPES.map(type=>(
          <button key={type.id} onClick={()=>startSession(type)} style={{background:'var(--color-card)',border:'1px solid var(--color-border)',borderRadius:'12px',padding:'1rem .5rem',display:'flex',flexDirection:'column',alignItems:'center',gap:'.4rem',cursor:'pointer',transition:'all .15s'}}>
            <span style={{fontSize:'1.8rem'}}>{type.icon}</span>
            <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:'.78rem',textTransform:'uppercase',letterSpacing:'.04em',color:'var(--color-text)'}}>{type.name}</span>
          </button>
        ))}
      </div>

      {/* Last cardio */}
      {history.length>0&&(
        <div className="ds-card" style={{padding:'.85rem 1.1rem'}}>
          <div style={{fontSize:'.62rem',color:'var(--color-text-sub)',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:'.5rem'}}>Último Cardio</div>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>

const MEASURES_KEY = 'darkset.measures';

const saveMeasures = (d) => { try{localStorage.setItem(MEASURES_KEY,JSON.stringify(d));}catch(_){} };

  const [entries, setEntries] = useState(loadMeasures);

  const save = () => {
    if(!form.peso && !form.gordura) { setToast('Preencha ao menos peso ou % gordura'); return; }
    const updated = [{ id:Date.now(), ...form }, ...entries];
    setEntries(updated); saveMeasures(updated); setAdding(false);
    setForm({date:new Date().toISOString().slice(0,10),peso:'',gordura:'',cintura:'',quadril:'',peito:'',braco:'',coxa:''});

};

// QR CODE SCANNER (for importing plans)
// ═══════════════════════════════════════════════════════════════════════════
const QRScanner = ({onResult, onClose}) => {
  const videoRef = useRef(null);
  const [error, setError] = useState(null);
  const [scanning, setScanning] = useState(false);

  useEffect(()=>{
    let stream = null;
    const start = async() => {
      try {
        stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
        if(videoRef.current) { videoRef.current.srcObject = stream; videoRef.current.play(); setScanning(true); }
      } catch(e) { setError('Câmera não disponível: '+e.message); }
    };
    start();
    return () => { if(stream) stream.getTracks().forEach(t=>t.stop()); };
  },[]);

  // Use BarcodeDetector API if available, else show manual input
  const [manual, setManual] = useState('');
  const hasBarcodeApi = typeof BarcodeDetector !== 'undefined';

  useEffect(()=>{
    if(!hasBarcodeApi || !scanning) return;
    const detector = new BarcodeDetector({formats:['qr_code']});
    const interval = setInterval(async()=>{
      if(!videoRef.current) return;
      try {
        const codes = await detector.detect(videoRef.current);
        if(codes.length>0) { clearInterval(interval); onResult(codes[0].rawValue); }
      } catch(_){}
    }, 500);
    return ()=>clearInterval(interval);
  },[scanning, hasBarcodeApi]);

  return (
    <Modal onClose={onClose}>
      <div style={{textAlign:'center'}}>
        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:'1.2rem',textTransform:'uppercase',marginBottom:'1rem'}}>Escanear QR Code</div>
        {error ? (
          <div style={{color:'var(--color-accent)',fontSize:'.85rem',padding:'1rem'}}>{error}</div>
        ) : (
          <div style={{position:'relative',borderRadius:'10px',overflow:'hidden',background:'#000',marginBottom:'1rem'}}>
            <video ref={videoRef} style={{width:'100%',maxHeight:'240px',objectFit:'cover',display:'block'}} muted playsInline/>
            <div style={{position:'absolute',inset:'20%',border:'2px solid var(--color-accent)',borderRadius:'8px',boxShadow:'0 0 0 9999px rgba(0,0,0,.5)'}}/>
          </div>
        )}
        {!hasBarcodeApi&&(
          <div style={{marginTop:'.75rem'}}>
            <div style={{fontSize:'.72rem',color:'var(--color-text-sub)',marginBottom:'.5rem'}}>Ou cole o link da ficha:</div>
            <div style={{display:'flex',gap:'.5rem'}}>
              <input placeholder="https://darksetoficial.netlify.app/?import=..." value={manual} onChange={e=>setManual(e.target.value)}
                style={{flex:1,background:'rgba(0,0,0,.3)',border:'1px solid var(--color-border)',borderRadius:'8px',padding:'.45rem .75rem',fontSize:'.82rem',color:'var(--color-text)'}}/>
              <button onClick={()=>manual&&onResult(manual)} style={{background:'var(--color-accent)',border:'none',borderRadius:'8px',padding:'.45rem .85rem',color:'#fff',fontWeight:700,fontSize:'.82rem',cursor:'pointer'}}>OK</button>
            </div>
          </div>
        )}
      </div>
    </Modal>
  );
};

// NOTIFICAÇÕES DE TREINO
// ═══════════════════════════════════════════════════════════════════════════
const NotifSettings = ({prefs, setPrefs, setToast}) => {
  const [enabled, setEnabled] = useState(!!prefs.notifEnabled);
  const [hour, setHour] = useState(prefs.notifHour||7);
  const [min, setMin] = useState(prefs.notifMin||0);
  const [perm, setPerm] = useState(Notification?.permission||'default');

  const requestAndSave = async() => {
    if('Notification' in window){
      const p = await Notification.requestPermission();
      setPerm(p);
      if(p==='granted'){
        setEnabled(true);
        setPrefs(prev=>({...prev, notifEnabled:true, notifHour:hour, notifMin:min}));
        setToast('Lembrete ativado! ⏰');
        // Schedule via service worker if available
        scheduleNotif(hour,min);
      } else {
        setToast('Permissão negada. Ative nas configurações do celular.');
      }
    } else {
      setToast('Notificações não suportadas neste dispositivo');
    }
  };

  const disable = () => {
    setEnabled(false);
    setPrefs(prev=>({...prev, notifEnabled:false}));
    setToast('Lembrete desativado');
  };

  const scheduleNotif = (h,m) => {
    // Use SW periodic sync if available, else manual check
    if('serviceWorker' in navigator && navigator.serviceWorker.controller){
      navigator.serviceWorker.controller.postMessage({type:'scheduleNotif', hour:h, min:m});
    }
  };

  const fmtTime = (h,m) => `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;

  return (
    <div className="ds-card" style={{padding:'1rem 1.1rem',display:'grid',gap:'.85rem',background:'var(--color-card)'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:'1rem',textTransform:'uppercase'}}>Lembrete diário</div>
          <div style={{fontSize:'.7rem',color:'var(--color-text-sub)',marginTop:'2px'}}>Te avisa na hora certa de treinar</div>
        </div>
        <Switch checked={enabled} onChange={v=>v?requestAndSave():disable()}/>
      </div>

      {enabled&&(
        <>
          <div>
            <div style={{fontSize:'.62rem',color:'var(--color-text-sub)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:'.4rem'}}>Horário do lembrete</div>
            <div style={{display:'flex',alignItems:'center',gap:'.5rem'}}>
              <input type="number" min={0} max={23} value={hour} onChange={e=>setHour(Number(e.target.value))}
                style={{width:'60px',background:'rgba(0,0,0,.25)',border:'1px solid var(--color-border)',borderRadius:'8px',padding:'.45rem .65rem',fontSize:'1.1rem',color:'var(--color-text)',fontWeight:700,textAlign:'center'}}/>
              <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:'1.2rem',color:'var(--color-text-sub)'}}>:</span>
              <input type="number" min={0} max={59} step={5} value={min} onChange={e=>setMin(Number(e.target.value))}
                style={{width:'60px',background:'rgba(0,0,0,.25)',border:'1px solid var(--color-border)',borderRadius:'8px',padding:'.45rem .65rem',fontSize:'1.1rem',color:'var(--color-text)',fontWeight:700,textAlign:'center'}}/>
              <button onClick={()=>{setPrefs(prev=>({...prev,notifHour:hour,notifMin:min}));scheduleNotif(hour,min);setToast('Horário salvo');}}
                style={{background:'var(--color-accent)',border:'none',borderRadius:'8px',padding:'.45rem .85rem',color:'#fff',fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:'.85rem',textTransform:'uppercase',cursor:'pointer'}}>
                Salvar
              </button>
            </div>
          </div>
          <div style={{fontSize:'.7rem',color:'#4ade80'}}>⏰ Lembrete ativo às {fmtTime(hour,min)} todos os dias</div>
        </>
      )}
      {perm==='denied'&&<div style={{fontSize:'.72rem',color:'var(--color-accent)'}}>Permissão negada. Ative nas configurações do sistema.</div>}
    </div>
  );
};

const Community = ({history, setToast, prefs}) => {

    try {
      if(!history||typeof history!=='object') return 0;
      const now = new Date(); const day = now.getDay()||7;
      const mon = new Date(now); mon.setDate(now.getDate()-(day-1));
      mon.setHours(0,0,0,0);
      return Object.keys(history).filter(k=>{
        const d=new Date(k); return !isNaN(d)&&d>=mon;
      }).length;
    } catch(_){ return 0; }
  })();

  // Generate a group code for this user
  const myGroupCode = (() => {
    if (!uid) return null;
    return uid.slice(0,8).toUpperCase();

  const joinGroup = () => {
    if(!inputCode.trim()) return;

    setGroupCode(inputCode.trim().toUpperCase());
    setToast('Grupo entrado!');

  const leaveGroup = () => {
    localStorage.removeItem('darkset.groupCode');

    setMembers([]);

  // Firebase available check
  const [fbOk, setFbOk] = useState(false);

    try {
      const db = window._db;
      unsubFeed = db.collection('groups').doc(groupCode).collection('feed')

        .onSnapshot(snap=>{
          setFeed(snap.docs.map(d=>({id:d.id,...d.data()})));
          setLoading(false);

      unsubMembers = db.collection('groups').doc(groupCode).collection('members')
        .onSnapshot(snap=>{
          setMembers(snap.docs.map(d=>({id:d.id,...d.data()})));
        }, ()=>{});
      db.collection('groups').doc(groupCode).collection('members').doc(uid).set({
        name: userName, weekCount: thisWeek, updatedAt: new Date().toISOString()
      },{merge:true}).catch(()=>{});

    return () => { try{unsubFeed&&unsubFeed();}catch(_){} try{unsubMembers&&unsubMembers();}catch(_){} };

      </div>

        <div style={{fontSize:'3rem',marginBottom:'.75rem'}}>🔒</div>
        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:'1.2rem',textTransform:'uppercase',marginBottom:'.5rem',color:'var(--color-text)'}}>Login necessário</div>

// Pede permissão de notificação uma vez
function requestNotifPermission(){
  try{

      Notification.requestPermission();
    }
  }catch(_){}
}

// Avisa o Service Worker sobre o timer
function swTimerStart(endsAt){
  try{
    if(navigator.serviceWorker && navigator.serviceWorker.controller){
      navigator.serviceWorker.controller.postMessage({ type:'TIMER_START', endsAt });
    }
  }catch(_){}
}
function swTimerCancel(){
  try{
    if(navigator.serviceWorker && navigator.serviceWorker.controller){
      navigator.serviceWorker.controller.postMessage({ type:'TIMER_CANCEL' });
    }
  }catch(_){}
}

// DarkTimer — V4.5 (background via SW notification)
const DarkTimer = ({prefs}) => {
  const STORAGE_KEY = "darkset.timer.v1";
  const [sec,setSec]=useState(Math.max(5, Number(prefs.timerPreset||60)));
  const [running,setRunning]=useState(false);
  const endRef = useRef(0);

  // Pede permissão na primeira vez que o componente monta
  useEffect(()=>{ requestNotifPermission(); },[]);

  useEffect(()=>{ if(!running){ setSec(Math.max(5, Number(prefs.timerPreset||60))); } }, [prefs.timerPreset]);

  useEffect(()=>{
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(raw){
        const st = JSON.parse(raw);
        if(st.active && st.endTime){
          const remain = Math.ceil((st.endTime - Date.now())/1000);
          if(remain > 0){
            endRef.current = st.endTime;
            setSec(remain);
            setRunning(true);
          }else{
            setSec(Math.max(5, Number(prefs.timerPreset||60)));
            setRunning(false);
            localStorage.removeItem(STORAGE_KEY);
          }
        }else if(typeof st.pausedSec === "number"){
          setSec(Math.max(0, st.pausedSec));
          setRunning(false);
        }
      }
    }catch(_){}
  },[]);

  // Escuta mensagem do SW avisando que o timer terminou em background
  useEffect(()=>{
    const handler = (event) => {
      if(event.data && event.data.type === 'TIMER_DONE'){
        try{ if(navigator.vibrate) navigator.vibrate([320,140,320,140,420]); }catch(_){}
        setRunning(false);
        setSec(Math.max(5, Number(prefs.timerPreset||60)));
        try{ localStorage.removeItem(STORAGE_KEY); }catch(_){}
      }
    };
    navigator.serviceWorker && navigator.serviceWorker.addEventListener('message', handler);
    return ()=> navigator.serviceWorker && navigator.serviceWorker.removeEventListener('message', handler);
  },[]);

  useEffect(()=>{
    if(!running) return;
    let loop;
    const tick = () => {
      const remainMs = endRef.current - Date.now();
      const remain = Math.max(0, Math.ceil(remainMs/1000));
      if(remain <= 0){
        try{ if(navigator.vibrate) navigator.vibrate([320,140,320,140,420]); }catch(_){}
        try{
          const AC=window.AudioContext||window.webkitAudioContext;
          if(AC){
            const ctx=new AC();
            const g=ctx.createGain(); g.connect(ctx.destination);
            g.gain.setValueAtTime(0.35, ctx.currentTime);
            const mk=(t)=>{ const o=ctx.createOscillator(); o.type="square"; o.frequency.setValueAtTime(700, t); o.connect(g); o.start(t); o.stop(t+0.22); };
            const now=ctx.currentTime; mk(now); mk(now+0.36); mk(now+0.72);
            setTimeout(()=>ctx.close(), 1200);
          }
        }catch(_){}
        swTimerCancel();
        setRunning(false);
        setSec(Math.max(5, Number(prefs.timerPreset||60)));
        try{ localStorage.removeItem(STORAGE_KEY); }catch(_){}
      }else{
        setSec(remain);
        const delay = Math.max(150, 1000 - (Date.now() % 1000));
        loop = setTimeout(tick, delay);
      }
    };
    loop = setTimeout(tick, 150);
    return ()=> clearTimeout(loop);
  },[running]);

  const start = () => {
    const duration = Math.max(1, Number(sec||0));
    endRef.current = Date.now() + duration*1000;
    setRunning(true);
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify({active:true, endTime:endRef.current})); }catch(_){}
    swTimerStart(endRef.current);
  };
  const pause = () => {
    const remain = Math.max(0, Math.ceil((endRef.current - Date.now())/1000));
    setRunning(false);
    setSec(remain || Math.max(5, Number(prefs.timerPreset||60)));
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify({active:false, pausedSec: remain})); }catch(_){}
    swTimerCancel();
  };
  const reset = () => {
    setRunning(false);
    setSec(Math.max(5, Number(prefs.timerPreset||60)));
    try{ localStorage.removeItem(STORAGE_KEY); }catch(_){}
    swTimerCancel();
  };

  const fmtTime = (s) => {
    const m = Math.floor(s / 60);
    const ss = s % 60;
    return m > 0 ? `${m}:${String(ss).padStart(2,'0')}` : `${s}s`;
  };
  const presets=[30,60,90,120,150,180];
  return (
    <div className="border border-borderDark rounded-2xl p-3 grid gap-2 bg-cardDark/70">
      <div className="flex items-start justify-between gap-3">
        <div className="flex flex-col">
          <div className="font-semibold">DarkTimer</div>
          <div className="text-2xl font-semibold tabular-nums mt-1">{fmtTime(sec)}</div>
        </div>
        <div className="flex gap-2">
          <Button onClick={reset}>Reset</Button>
          <Button variant={running?"danger":"accent"} onClick={()=> running ? pause() : start()}>{running? "Pausar":"Iniciar"}</Button>
        </div>
      </div>
      <div className="flex flex-wrap gap-2">
        {presets.map(p=>(
          <button key={p} onClick={()=>{ if(!running){ setSec(p); try{ localStorage.setItem(STORAGE_KEY, JSON.stringify({active:false, pausedSec:p})); }catch(_){} } }} className={"px-3 py-1.5 rounded-full border border-borderDark "+(sec===p?"bg-white/10":"")}>{fmtTime(p)}</button>
        ))}
      </div>
    </div>
  );
};
