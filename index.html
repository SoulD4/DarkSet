  <style>
    @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap');

    :root{
      --color-bg: #080808;
      --color-card: #0f0f0f;
      --color-card-soft: #141414;
      --color-text: #f0f0f0;
      --color-text-sub: #888;
      --color-border: #1e1e1e;
      --color-accent: #e31b23;
      --color-accent2: #ff3b3b;
      --color-accent-glow: rgba(227,27,35,0.18);
      --ds-radius: 12px;
    }

    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      background-color: var(--color-bg) !important;
      color: var(--color-text) !important;
      font-family: 'Inter', -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    /* Subtle noise texture on body */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.35;
    }
    #root { background-color: var(--color-bg); min-height: 100vh; position: relative; z-index: 1; }

    /* Tailwind overrides */
    .bg-bgDark   { background-color: var(--color-bg) !important; }
    .bg-cardDark { background-color: var(--color-card) !important; }
    .bg-cardSoft { background-color: var(--color-card-soft) !important; }
    .text-textMain { color: var(--color-text) !important; }
    .text-textSub  { color: var(--color-text-sub) !important; }
    .border-borderDark { border-color: var(--color-border) !important; }
    .bg-accent   { background-color: var(--color-accent) !important; }
    .text-accent { color: var(--color-accent) !important; }
    .rounded-2xl, .rounded-xl { color: inherit; }
    .border { border-color: var(--color-border); }

    /* Inputs */
    input, select, textarea {
      background-color: rgba(0,0,0,0.45) !important;
      color: var(--color-text) !important;
      border-color: var(--color-border) !important;
      font-family: 'Inter', sans-serif;
    }
    input::placeholder { color: #444 !important; }
    input:focus, select:focus { outline: none; border-color: var(--color-accent) !important; box-shadow: 0 0 0 2px var(--color-accent-glow); }

    /* HEADER */
    nav.ds-nav{ overflow-x:auto; -webkit-overflow-scrolling: touch; gap:.4rem; scrollbar-width: none; display:flex; }
    nav.ds-nav::-webkit-scrollbar{ display:none; }
    @media (max-width: 480px){ nav.ds-nav button{ flex:0 0 auto } }
    header.ds-hdr{
      position: sticky; top: 0; z-index: 30;
      backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px) saturate(180%);
      background: rgba(8,8,8,.92) !important;
      border-bottom: 1px solid rgba(227,27,35,.12);
      padding: .55rem .75rem;
      display:flex; align-items:center; justify-content:space-between; gap:.75rem; flex-wrap:wrap;
    }

    /* NAV BUTTONS */
    .ds-nav-btn {
      padding: .45rem .85rem;
      border-radius: 8px;
      border: 1px solid #1e1e1e;
      font-size: .75rem;
      font-weight: 600;
      letter-spacing: .04em;
      text-transform: uppercase;
      color: #666;
      background: transparent;
      transition: color .15s, border-color .15s, background .15s;
      white-space: nowrap;
    }
    .ds-nav-btn:hover { color: #ccc; border-color: #333; background: rgba(255,255,255,.04); }
    .ds-nav-btn.active {
      color: #fff;
      border-color: var(--color-accent);
      background: rgba(227,27,35,.1);
      box-shadow: 0 0 12px rgba(227,27,35,.15);
    }

    /* CARDS */
    .ds-card{
      border-radius: var(--ds-radius);
      background: var(--color-card);
      border: 1px solid var(--color-border);
      position: relative;
      overflow: hidden;
    }
    .ds-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.06), transparent);
    }
    /* Red accent left border on active cards */
    .ds-card-accent { border-left: 2px solid var(--color-accent); }

    /* SECTION HEADERS — Barlow Condensed for aggressive look */
    .ds-section-title {
      font-family: 'Barlow Condensed', 'Inter', sans-serif;
      font-weight: 800;
      font-size: 1.1rem;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: #fff;
    }
    .ds-section-title span { color: var(--color-accent); }

    /* BUTTONS */
    .ds-btn {
      border-radius: 8px;
      padding: .6rem 1rem;
      font-weight: 700;
      font-size: .8rem;
      letter-spacing: .05em;
      text-transform: uppercase;
      transition: all .15s;
      cursor: pointer;
      border: 1px solid transparent;
      display: inline-flex; align-items: center; gap: .4rem;
    }
    .ds-btn-primary {
      background: linear-gradient(160deg, #e31b23, #a81018);
      border-color: rgba(255,255,255,.08);
      color: #fff;
      box-shadow: 0 4px 16px rgba(227,27,35,.3), inset 0 1px 0 rgba(255,255,255,.1);
    }
    .ds-btn-primary:hover { box-shadow: 0 4px 20px rgba(227,27,35,.5), inset 0 1px 0 rgba(255,255,255,.1); }
    .ds-btn-primary:active { transform: translateY(1px); box-shadow: 0 2px 8px rgba(227,27,35,.3); }
    .ds-btn-ghost {
      background: rgba(255,255,255,.04);
      border-color: #222;
      color: #aaa;
    }
    .ds-btn-ghost:hover { background: rgba(255,255,255,.08); color: #ddd; border-color: #333; }
    .ds-btn-success {
      background: rgba(34,197,94,.12);
      border-color: rgba(34,197,94,.3);
      color: #4ade80;
    }
    .ds-btn-danger {
      background: rgba(227,27,35,.12);
      border-color: rgba(227,27,35,.3);
      color: var(--color-accent2);
    }

    /* SET ROW */
    .set-row {
      background: rgba(0,0,0,.3);
      border: 1px solid #1a1a1a;
      border-radius: 10px;
      padding: .5rem .75rem;
      display: grid;
      align-items: center;
      gap: .5rem;
    }
    .set-row:focus-within { border-color: rgba(227,27,35,.3); background: rgba(227,27,35,.04); }

    /* STAT CHIPS */
    .ds-stat {
      background: rgba(0,0,0,.4);
      border: 1px solid #1a1a1a;
      border-radius: 8px;
      padding: .5rem .85rem;
      text-align: center;
    }
    .ds-stat-val {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.4rem;
      font-weight: 800;
      color: #fff;
      line-height: 1;
    }
    .ds-stat-label { font-size: .65rem; color: #555; text-transform: uppercase; letter-spacing: .06em; margin-top: .2rem; }

    /* WEEK STREAK BAR */
    .streak-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #1e1e1e;
      transition: background .2s;
    }
    .streak-dot.done { background: var(--color-accent); box-shadow: 0 0 6px rgba(227,27,35,.5); }

    /* EXERCISE CARD in session */
    .ex-card {
      background: rgba(0,0,0,.3);
      border: 1px solid #1e1e1e;
      border-radius: 10px;
      padding: .75rem 1rem;
    }
    .ex-num {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 2.5rem;
      font-weight: 900;
      color: rgba(227,27,35,.15);
      line-height: 1;
      position: absolute;
      right: .75rem;
      top: .5rem;
    }

    /* PROGRESS BAR */
    .ds-progress-track { background: #1a1a1a; border-radius: 4px; height: 3px; }
    .ds-progress-fill { background: var(--color-accent); border-radius: 4px; height: 100%; transition: width .3s ease; box-shadow: 0 0 8px rgba(227,27,35,.4); }

    /* HISTORY CARD */
    .hist-card {
      background: var(--color-card);
      border: 1px solid var(--color-border);
      border-radius: 10px;
      padding: .85rem 1rem;
      transition: border-color .15s, background .15s;
      cursor: pointer;
      text-align: left;
      width: 100%;
    }
    .hist-card:hover { border-color: #333; background: #111; }
    .hist-date {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: .03em;
      color: #fff;
    }

    /* TOAST */
    .ds-toast {
      position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
      background: #111; border: 1px solid #2a2a2a;
      color: #f0f0f0; font-size: .8rem; font-weight: 600;
      padding: .6rem 1.2rem; border-radius: 999px;
      box-shadow: 0 8px 24px rgba(0,0,0,.5);
      z-index: 999; white-space: nowrap;
      animation: toastIn .2s ease;
    }
    @keyframes toastIn { from { opacity:0; transform: translateX(-50%) translateY(6px); } to { opacity:1; transform: translateX(-50%) translateY(0); } }

    /* MODAL */
    .modal-bg { position:fixed; inset:0; background:rgba(0,0,0,.75); display:flex; align-items:center; justify-content:center; z-index:50; backdrop-filter: blur(4px); }

    /* MODE TOGGLE */
    .mode-toggle { display: flex; background: rgba(0,0,0,.4); border: 1px solid #1e1e1e; border-radius: 10px; padding: 3px; gap: 3px; }
    .mode-toggle-btn { flex: 1; padding: .5rem .75rem; border-radius: 8px; font-size: .75rem; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; color: #555; background: transparent; border: none; cursor: pointer; transition: all .15s; }
    .mode-toggle-btn.active { background: var(--color-accent); color: #fff; box-shadow: 0 2px 8px rgba(227,27,35,.3); }

    /* Safe areas */
    .safe-pb{ padding-bottom: max(env(safe-area-inset-bottom), 16px); }
    .safe-pt{ padding-top: max(env(safe-area-inset-top), 8px); }

    @media (max-width: 480px){ .grid-cols-mobile-1{ grid-template-columns: 1fr; } }

    /* Charts */
    .charts-modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:9999;backdrop-filter:blur(4px)}
    .charts-modal{width:min(980px,92vw);max-height:90vh;background:#0a0a0a;color:#eaeaea;border:1px solid #1e1e1e;border-radius:12px;overflow:hidden;display:flex;flex-direction:column}
    .charts-hd{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid #1a1a1a;background:#0a0a0a}
    .charts-hd h3{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;margin:0}
    .charts-help{width:30px;height:30px;border-radius:999px;background:#141418;border:1px solid #2b2b31;display:flex;align-items:center;justify-content:center;cursor:pointer}
    .charts-body{padding:14px 16px;overflow:auto}
    .charts-row{display:grid;grid-template-columns:1fr;gap:12px}
    @media (min-width:700px){.charts-row{grid-template-columns:1fr 1fr}}
    .charts-field{display:flex;flex-direction:column;gap:6px}
    .charts-field label{font-size:12px;opacity:.85}
    .charts-select{background:#0d0d0d !important;color:#eaeaea !important;border:1px solid #1e1e1e !important;border-radius:8px;padding:10px 12px;font-size:14px;outline:none}
    .charts-pills{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
    .charts-pill{background:#111;border:1px solid #1e1e1e;color:#aaa;border-radius:999px;padding:6px 10px;font-size:13px;cursor:pointer;transition:all .15s}
    .charts-pill.active{background:rgba(227,27,35,.1);border-color:var(--color-accent);color:#fff}
    .charts-canvas-wrap{margin-top:14px;background:#0a0a0a;border:1px solid #1a1a1a;border-radius:10px;padding:8px}
    .charts-empty{padding:12px;border:1px dashed #1e1e1e;border-radius:10px;text-align:center;opacity:.8;display:none}
    .charts-actions{margin-left:auto}
    .charts-btn{background:#111;border:1px solid #1e1e1e;color:#eaeaea;border-radius:8px;padding:8px 12px;font-size:14px;cursor:pointer}
  </style>
</head>

const Home=({goto,plans,history,prefs})=>{
  const active=plans.list.find(p=>p.id===plans.activeId)||null;
  const entries=Object.entries(history).sort((a,b)=>a[0]>b[0]?-1:1);
  const today=new Date();
  const [authUser,setAuthUser]=useState(()=>{try{return JSON.parse(localStorage.getItem('darkset.user'));}catch(_){return null;}});
  useEffect(()=>{
    const iv=setInterval(()=>{try{setAuthUser(JSON.parse(localStorage.getItem('darkset.user')));}catch(_){}},800);
    return ()=>clearInterval(iv);
  },[]);

  // Semana atual
  const weekStart=new Date(today); weekStart.setDate(today.getDate()-((today.getDay()||7)-1));
  const thisWeekEntries=entries.filter(([iso])=>new Date(iso)>=weekStart);
  const thisWeek=thisWeekEntries.length;

  // Streak: dias consecutivos treinando
  const streak=(()=>{
    let s=0; const d=new Date(today);
    while(true){
      const k=d.toISOString().slice(0,10);
      if(history[k]){s++;d.setDate(d.getDate()-1);}
      else if(s===0&&d.toISOString().slice(0,10)===today.toISOString().slice(0,10)){d.setDate(d.getDate()-1);}
      else break;
    }
    return s;
  })();

  // Volume total da semana
  const parseNum=(v)=>{const n=parseFloat(String(v).replace(",",".")); return isFinite(n)?n:0;};
  const weekVol=Math.round(thisWeekEntries.reduce((_acc,[,obj])=>_acc+(obj.entries||[]).reduce((a,en)=>a+(en.sets||[]).reduce((s2,s)=>s2+parseNum(s.w)*parseNum(s.r),0),0),0));

  // Total de treinos no histórico
  const totalSessions=entries.length;

  // Pontos da semana (Seg a Dom)
  const weekDots=Array.from({length:7},(_,i)=>{
    const d=new Date(weekStart); d.setDate(weekStart.getDate()+i);
    return !!history[d.toISOString().slice(0,10)];
  });

  const dayNames=["S","T","Q","Q","S","S","D"];

  return (
    <div className="grid gap-3 mt-3">
      {/* Hero stats */}
      <div className="ds-card" style={{padding:'1.1rem',background:'linear-gradient(135deg, #0d0d0d 0%, #111 100%)'}}>
        <div className="flex items-start justify-between mb-3">
          <div>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:'1.8rem',fontWeight:900,lineHeight:1,textTransform:'uppercase'}}>
              {prefs.name ? `E aí, ${prefs.name.split(' ')[0]}!` : 'Bora Treinar!'}
            </div>
            <div style={{fontSize:'.72rem',color:'#555',marginTop:'.2rem',textTransform:'uppercase',letterSpacing:'.06em'}}>
              {today.toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'})}
            </div>
          </div>
          {prefs.avatarUrl
            ? <img src={prefs.avatarUrl} style={{width:'44px',height:'44px',borderRadius:'50%',border:'2px solid #222',objectFit:'cover'}} alt="avatar"/>
            : <div style={{width:'44px',height:'44px',borderRadius:'50%',border:'2px solid #222',background:'#111',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:'1rem',color:'#555'}}>{prefs.name?prefs.name.slice(0,2).toUpperCase():'DS'}</div>
          }
        </div>

        {/* Stat chips */}
        <div className="grid grid-cols-3 gap-2 mb-4">
          <div className="ds-stat">
            <div className="ds-stat-val" style={{color:'var(--color-accent)'}}>{streak}</div>
            <div className="ds-stat-label">Streak</div>
          </div>
          <div className="ds-stat">
            <div className="ds-stat-val">{thisWeek}<span style={{fontSize:'.9rem',color:'#444'}}>/{prefs.weeklyGoal}</span></div>
            <div className="ds-stat-label">Esta semana</div>
          </div>
          <div className="ds-stat">
            <div className="ds-stat-val" style={{fontSize:'1.1rem'}}>{weekVol>=1000?(weekVol/1000).toFixed(1)+'t':weekVol+'kg'}</div>
            <div className="ds-stat-label">Vol. semanal</div>
          </div>
        </div>

        {/* Week dots */}
        <div className="flex items-center justify-between" style={{padding:'0 .25rem'}}>
          {weekDots.map((done,i)=>(
            <div key={i} style={{textAlign:'center'}}>
              <div className={"streak-dot"+(done?" done":"")} style={{margin:'0 auto .3rem'}}></div>
              <div style={{fontSize:'.6rem',color:'#333',textTransform:'uppercase'}}>{dayNames[i]}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Quick actions */}
      <div className="grid grid-cols-2 gap-2">
        <button onClick={()=>goto('session')} style={{background:'var(--color-accent)',border:'none',borderRadius:'10px',padding:'1rem',textAlign:'left',cursor:'pointer',position:'relative',overflow:'hidden'}}>
          <div style={{position:'absolute',right:'-8px',top:'-8px',fontFamily:"'Barlow Condensed',sans-serif",fontSize:'4rem',fontWeight:900,color:'rgba(0,0,0,.15)',lineHeight:1}}>▶</div>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:'1.1rem',fontWeight:800,color:'#fff',textTransform:'uppercase',letterSpacing:'.04em'}}>Modo Treino</div>
          <div style={{fontSize:'.7rem',color:'rgba(255,255,255,.6)',marginTop:'.2rem'}}>Com ou sem ficha</div>
        </button>
        <button onClick={()=>goto('history')} style={{background:'#0f0f0f',border:'1px solid #1e1e1e',borderRadius:'10px',padding:'1rem',textAlign:'left',cursor:'pointer',position:'relative',overflow:'hidden'}}>
          <div style={{position:'absolute',right:'-4px',top:'-8px',fontFamily:"'Barlow Condensed',sans-serif",fontSize:'4rem',fontWeight:900,color:'rgba(255,255,255,.04)',lineHeight:1}}>H</div>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:'1.1rem',fontWeight:800,color:'#fff',textTransform:'uppercase',letterSpacing:'.04em'}}>Histórico</div>
          <div style={{fontSize:'.7rem',color:'#444',marginTop:'.2rem'}}>{totalSessions} treinos registrados</div>
        </button>
      </div>

      {/* Ficha ativa */}
      <div className="ds-card ds-card-accent" style={{padding:'1rem 1.1rem'}}>
        <div style={{fontSize:'.65rem',color:'#555',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:'.4rem'}}>Ficha Ativa</div>
        {active
          ? <div className="flex items-center justify-between">
              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:'1.1rem',fontWeight:700,color:'#fff'}}>{active.name}</div>
              <Button onClick={()=>goto('builder',active.id)} variant="ghost">Editar</Button>
            </div>
          : <div className="flex items-center justify-between">
              <div style={{color:'#444',fontSize:'.85rem'}}>Nenhuma ficha ativa</div>
              <Button onClick={()=>goto('plans')} variant="ghost">Criar</Button>
            </div>
        }
      </div>

      {/* Conta */}
      <div className="ds-card" style={{padding:'.85rem 1.1rem'}}>
        {authUser ? (
          <div className="flex items-center justify-between gap-3">
            <div className="flex items-center gap-3 min-w-0">
              {authUser.photoURL && <img src={authUser.photoURL} style={{width:'36px',height:'36px',borderRadius:'50%',border:'1px solid #222'}} alt="foto"/>}
              <div className="min-w-0">
                <div style={{fontWeight:600,fontSize:'.85rem',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{authUser.displayName||authUser.email}</div>
                <div style={{fontSize:'.7rem',color:'#555',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{authUser.email}</div>
              </div>
            </div>
            <Button variant="ghost" onClick={()=>window.DSAuth&&DSAuth.signOut()}>Sair</Button>
          </div>
        ) : (
          <div className="flex items-center justify-between">
            <div style={{fontSize:'.8rem',color:'#555'}}>Entre para sincronizar seus treinos</div>
            <Button variant="accent" onClick={()=>window.openAuthModal&&openAuthModal('signIn')}>Entrar</Button>
          </div>
        )}
      </div>
    </div>
  );
};

const Plans=({plans,setPlans,goto,setToast})=>{
  const [renameId,setRenameId]=useState(null);
  const [newName,setNewName]=useState("");
  const [sharePlan,setSharePlan]=useState(null);

  const createPlan=()=>{ if(!newName.trim()) return; const id=Date.now(); const byDay={}; for(const d of DAYS){byDay[d]=[]} setPlans(p=>({...p,list:[...p.list,{id,name:newName.trim(),byDay}],activeId:p.activeId||id})); setNewName(""); };
  const duplicatePlan=(id)=> setPlans(p=>{const src=p.list.find(x=>x.id===id);const clone=JSON.parse(JSON.stringify(src));clone.id=Date.now();clone.name=src.name+" (cópia)";return {...p,list:[...p.list,clone]};});
  const removePlan=(id)=> setPlans(p=>({...p,list:p.list.filter(pl=>pl.id!==id),activeId:p.activeId===id?null:p.activeId}));
  const activate=(id,val)=> setPlans(p=>({...p,activeId:val? id: (p.activeId===id? null:p.activeId)}));

  const openShare=(pl)=> setSharePlan(pl);
  const closeShare=()=> setSharePlan(null);

  // generate import link
  const makeImportLink=(pl)=>{
    const payload = { name: pl.name, byDay: pl.byDay };
    const raw = encodeURIComponent(btoa(encodeURIComponent(JSON.stringify(payload)).replace(/%([0-9A-F]{2})/g,(_,p)=>String.fromCharCode('0x'+p))));
    return `${location.origin}${location.pathname}?import=${raw}`;
  };

  useEffect(()=>{
    if(!sharePlan) return;
    // render QR
    setTimeout(()=>{
      const el = document.getElementById("qr-box");
      if(el){ el.innerHTML=""; new QRCode(el, { text: makeImportLink(sharePlan), width: 196, height: 196 }); }
    },10);
  },[sharePlan]);

  return (
    <div className="grid gap-4">
      <Card title="Minhas fichas">
        <div className="space-y-2">
          {plans.list.length===0 && <div className="text-sm text-textSub">Nenhuma ficha criada.</div>}

            <div key={pl.id} className="flex flex-col md:flex-row md:items-center md:justify-between border border-borderDark rounded-xl p-3 gap-2">
              <div className="flex items-center gap-3">
                <Switch checked={plans.activeId===pl.id} onChange={(v)=>activate(pl.id,v)}/>
                {renameId===pl.id? (
                  <input className="border border-borderDark bg-black/30 rounded px-2 py-1" value={pl.name} onChange={e=> setPlans(p=>({...p,list:p.list.map(x=>x.id===pl.id? {...x,name:e.target.value}:x)}))}/>
                ) : (<div className="font-medium">{pl.name}</div>)}
              </div>
              <div className="grid grid-cols-2 sm:grid-cols-3 gap-2 w-full md:w-auto">
                {renameId===pl.id? <Button full variant="success" onClick={()=>setRenameId(null)}>Ok</Button> : <Button full variant="ghost" onClick={()=>setRenameId(pl.id)}>Renomear</Button>}
                <Button full variant="ghost" onClick={()=>duplicatePlan(pl.id)}>Duplicar</Button>
                <Button full variant="ghost" onClick={()=>openShare(pl)}>Compartilhar</Button>
                <Button full variant="danger" onClick={()=>{ if(confirm("Excluir esta ficha? O histórico não será apagado.")) { removePlan(pl.id); setToast("Ficha excluída"); } }}>Excluir</Button>
                <Button full onClick={()=>goto('viewer',pl.id)} variant="ghost">Visualizar</Button>
                <Button full onClick={()=>goto('builder',pl.id)}>Editar</Button>
              </div>
            </div>
          ))}
        </div>
      </Card>
      <Card title="Criar nova ficha">
        <div className="grid grid-cols-2 sm:grid-cols-3 gap-2 w-full md:w-auto">
          <input className="border border-borderDark bg-black/30 rounded-xl px-3 py-2 flex-1" placeholder="Ex.: Foco em Peito" value={newName} onChange={e=>setNewName(e.target.value)}/>
          <Button full variant="accent" onClick={createPlan}>Criar</Button>
        </div>
      </Card>

      {sharePlan && (
        <Modal onClose={closeShare}>
          <div className="font-semibold text-lg mb-2">Compartilhar: {sharePlan.name}</div>
          <div id="qr-box" className="mx-auto my-2 w-[196px] h-[196px] border border-borderDark rounded-xl"></div>
          <div className="text-xs text-textSub mb-2">Escaneie o QR ou copie o link abaixo:</div>
          <div className="grid grid-cols-2 sm:grid-cols-3 gap-2 w-full md:w-auto">
            <input id="share-link" className="border border-borderDark bg-black/30 rounded-xl px-3 py-2 w-full text-xs" readOnly value={makeImportLink(sharePlan)}/>
            <Button full variant="ghost" onClick={()=>{ const el=document.getElementById('share-link'); el.select(); document.execCommand('copy'); setToast("Link copiado"); }}>Copiar</Button>
          </div>
          <div className="text-xs text-textSub mt-2">O link contém somente a estrutura da ficha. Histórico e dados pessoais não são enviados.</div>
          <div className="mt-3 text-right"><Button full variant="ghost" onClick={closeShare}>Fechar</Button></div>
        </Modal>
      )}
    </div>
  );
};

const Builder=({planId,plans,setPlans,setToast})=>{
  const plan=plans.list.find(p=>p.id===planId)||plans.list[0];
  const [day,setDay]=useState(DAYS[0]);
  const [filters,setFilters]=useState(()=>load(LS.filters,{q:"",m:"",s:"",e:"",d:""}));
  const {q,m,s,e,d} = filters;

  const [openInline, setOpenInline] = useState({}); // exId => bool
  const openVideo=(exMeta)=>{
    if(!exMeta) return;
    setOpenInline(prev=> ({...prev, [exMeta.id]: !prev[exMeta.id]}));
  };


  useEffect(()=>save(LS.filters,filters),[filters]);

  const list=useMemo(()=> EXS.filter(ex=>{
    const nameOk=ex.name.toLowerCase().includes(q.toLowerCase());
    const mOk=!m||ex.primary===m;
    const sOk=!s||ex.subgroup===s;
    const eOk=!e||ex.equipment===e;
    const dOk=!d||ex.difficulty===d;
    return nameOk && mOk && sOk && eOk && dOk;
  }),[q,m,s,e,d]);

  const dayItems=plan?.byDay?.[day]||[];
  const canAdd=(ex)=> !dayItems.some(it=>it.exId===ex.id);
  const addEx=(ex,setsPlanned)=>{
    setPlans(p=>{
      const copy=JSON.parse(JSON.stringify(p));
      const pl=copy.list.find(x=>x.id===plan.id);
      const arr=pl.byDay[day];
      if(arr.some(it=>it.exId===ex.id)) return p;
      arr.push({exId:ex.id,name:ex.name,setsPlanned:Math.max(1,Number(setsPlanned)||3)});
      return copy;
    });
    setToast("✅ Adicionado");
  };
  const removeItem=(i)=> setPlans(p=>{const copy=JSON.parse(JSON.stringify(p));const arr=copy.list.find(x=>x.id===plan.id).byDay[day];arr.splice(i,1);return copy;});
  const move=(i,dir)=> setPlans(p=>{const copy=JSON.parse(JSON.stringify(p));const arr=copy.list.find(x=>x.id===plan.id).byDay[day];const j=i+dir;if(j<0||j>=arr.length)return p;[arr[i],arr[j]]=[arr[j],arr[i]];return copy;});

  const MUSCLES=[...new Set(EXS.map(e=>e.primary))];
  const SUBS_BY = MUSCLES.reduce((acc,m)=>{acc[m]=[...new Set(EXS.filter(e=>e.primary===m && e.subgroup).map(e=>e.subgroup))];return acc;},{});
  const EQUIPS=[...new Set(EXS.map(e=>e.equipment))];
  const DIFFS=[...new Set(EXS.map(e=>e.difficulty))];

  return (
    <div className="grid gap-4">
      <Card title={"Editando: "+(plan?.name||"Ficha")}>
        <div className="flex gap-2 flex-wrap mb-3">{DAYS.map(dy=>(<button key={dy} onClick={()=>setDay(dy)} className={"px-3 py-1.5 rounded-full border border-borderDark "+(day===dy?"bg-white/10":"")}>{dy}</button>))}</div>

        <div className="grid grid-cols-1 lg:grid-cols-2 gap-3">
          <div className="rounded-2xl border border-borderDark p-3">

// Pede permissão de notificação uma vez
function requestNotifPermission(){
  try{
    if('Notification' in window && Notification.permission === 'default'){
      Notification.requestPermission();
    }
  }catch(_){}
}

// Avisa o Service Worker sobre o timer
function swTimerStart(endsAt){
  try{
    if(navigator.serviceWorker && navigator.serviceWorker.controller){
      navigator.serviceWorker.controller.postMessage({ type:'TIMER_START', endsAt });
    }
  }catch(_){}
}
function swTimerCancel(){
  try{
    if(navigator.serviceWorker && navigator.serviceWorker.controller){
      navigator.serviceWorker.controller.postMessage({ type:'TIMER_CANCEL' });
    }
  }catch(_){}
}

// DarkTimer — V4.5 (background via SW notification)
const DarkTimer = ({prefs}) => {
  const STORAGE_KEY = "darkset.timer.v1";
  const [sec,setSec]=useState(Math.max(5, Number(prefs.timerPreset||60)));
  const [running,setRunning]=useState(false);
  const endRef = useRef(0);

  // Pede permissão na primeira vez que o componente monta
  useEffect(()=>{ requestNotifPermission(); },[]);

  useEffect(()=>{ if(!running){ setSec(Math.max(5, Number(prefs.timerPreset||60))); } }, [prefs.timerPreset]);

  useEffect(()=>{
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(raw){
        const st = JSON.parse(raw);
        if(st.active && st.endTime){
          const remain = Math.ceil((st.endTime - Date.now())/1000);
          if(remain > 0){
            endRef.current = st.endTime;
            setSec(remain);
            setRunning(true);
          }else{
            setSec(Math.max(5, Number(prefs.timerPreset||60)));
            setRunning(false);
            localStorage.removeItem(STORAGE_KEY);
          }
        }else if(typeof st.pausedSec === "number"){
          setSec(Math.max(0, st.pausedSec));
          setRunning(false);
        }
      }
    }catch(_){}
  },[]);

  // Escuta mensagem do SW avisando que o timer terminou em background
  useEffect(()=>{
    const handler = (event) => {
      if(event.data && event.data.type === 'TIMER_DONE'){
        try{ if(navigator.vibrate) navigator.vibrate([320,140,320,140,420]); }catch(_){}
        setRunning(false);
        setSec(Math.max(5, Number(prefs.timerPreset||60)));
        try{ localStorage.removeItem(STORAGE_KEY); }catch(_){}
      }
    };
    navigator.serviceWorker && navigator.serviceWorker.addEventListener('message', handler);
    return ()=> navigator.serviceWorker && navigator.serviceWorker.removeEventListener('message', handler);
  },[]);

  useEffect(()=>{
    if(!running) return;
    let loop;
    const tick = () => {
      const remainMs = endRef.current - Date.now();
      const remain = Math.max(0, Math.ceil(remainMs/1000));
      if(remain <= 0){
        try{ if(navigator.vibrate) navigator.vibrate([320,140,320,140,420]); }catch(_){}
        try{
          const AC=window.AudioContext||window.webkitAudioContext;
          if(AC){
            const ctx=new AC();
            const g=ctx.createGain(); g.connect(ctx.destination);
            g.gain.setValueAtTime(0.35, ctx.currentTime);
            const mk=(t)=>{ const o=ctx.createOscillator(); o.type="square"; o.frequency.setValueAtTime(700, t); o.connect(g); o.start(t); o.stop(t+0.22); };
            const now=ctx.currentTime; mk(now); mk(now+0.36); mk(now+0.72);
            setTimeout(()=>ctx.close(), 1200);
          }
        }catch(_){}
        swTimerCancel();
        setRunning(false);
        setSec(Math.max(5, Number(prefs.timerPreset||60)));
        try{ localStorage.removeItem(STORAGE_KEY); }catch(_){}
      }else{
        setSec(remain);
        const delay = Math.max(150, 1000 - (Date.now() % 1000));
        loop = setTimeout(tick, delay);
      }
    };
    loop = setTimeout(tick, 150);
    return ()=> clearTimeout(loop);
  },[running]);

  const start = () => {
    const duration = Math.max(1, Number(sec||0));
    endRef.current = Date.now() + duration*1000;
    setRunning(true);
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify({active:true, endTime:endRef.current})); }catch(_){}
    swTimerStart(endRef.current);
  };
  const pause = () => {
    const remain = Math.max(0, Math.ceil((endRef.current - Date.now())/1000));
    setRunning(false);
    setSec(remain || Math.max(5, Number(prefs.timerPreset||60)));
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify({active:false, pausedSec: remain})); }catch(_){}
    swTimerCancel();
  };
  const reset = () => {
    setRunning(false);
    setSec(Math.max(5, Number(prefs.timerPreset||60)));
    try{ localStorage.removeItem(STORAGE_KEY); }catch(_){}
    swTimerCancel();
  };

  const fmtTime = (s) => {
    const m = Math.floor(s / 60);
    const ss = s % 60;
    return m > 0 ? `${m}:${String(ss).padStart(2,'0')}` : `${s}s`;
  };
  const presets=[30,60,90,120,150,180];
  return (
    <div className="border border-borderDark rounded-2xl p-3 grid gap-2 bg-cardDark/70">
      <div className="flex items-start justify-between gap-3">
        <div className="flex flex-col">
          <div className="font-semibold">DarkTimer</div>
          <div className="text-2xl font-semibold tabular-nums mt-1">{fmtTime(sec)}</div>
        </div>
        <div className="flex gap-2">
          <Button onClick={reset}>Reset</Button>
          <Button variant={running?"danger":"accent"} onClick={()=> running ? pause() : start()}>{running? "Pausar":"Iniciar"}</Button>
        </div>
      </div>
      <div className="flex flex-wrap gap-2">
        {presets.map(p=>(
          <button key={p} onClick={()=>{ if(!running){ setSec(p); try{ localStorage.setItem(STORAGE_KEY, JSON.stringify({active:false, pausedSec:p})); }catch(_){} } }} className={"px-3 py-1.5 rounded-full border border-borderDark "+(sec===p?"bg-white/10":"")}>{fmtTime(p)}</button>
        ))}
      </div>
    </div>
  );
};

const DRAFT_KEY = "darkset.draft.session";
const DRAFT_FREE_KEY = "darkset.draft.free";

// Autosalva rascunho por exercício no modo com ficha
function saveDraft(planId, day, cursor, sets, rir) {
  try {
    const all = JSON.parse(localStorage.getItem(DRAFT_KEY) || '{}');
    all[`${planId}__${day}__${cursor}`] = {sets, rir, ts: Date.now()};
    localStorage.setItem(DRAFT_KEY, JSON.stringify(all));
  } catch(_) {}
}
function loadDraft(planId, day, cursor) {
  try {
    const all = JSON.parse(localStorage.getItem(DRAFT_KEY) || '{}');
    return all[`${planId}__${day}__${cursor}`] || null;
  } catch(_) { return null; }
}
function clearDraftSession(planId, day) {
  try {
    const all = JSON.parse(localStorage.getItem(DRAFT_KEY) || '{}');
    Object.keys(all).filter(k=>k.startsWith(`${planId}__${day}__`)).forEach(k=>delete all[k]);
    localStorage.setItem(DRAFT_KEY, JSON.stringify(all));
  } catch(_) {}
}

};



// History (cards compact + modal details)
const History=({history, setHistory, prefs})=>{
  const [weekday,setWeekday]=useState("");
  const [planFilter,setPlanFilter]=useState("");
  const [dateSearch,setDateSearch]=useState("");
  const [detail,setDetail]=useState(null);

  const entries=Object.entries(history).sort((a,b)=>a[0]>b[0]?-1:1);
  const toBR=(iso)=>{const [y,m,d]=iso.split("-");return `${d}/${m}/${y}`;}

  // Busca por data: aceita dd/mm/yyyy, dd/mm, ou yyyy-mm-dd
  const matchesDate=(iso)=>{
    if(!dateSearch) return true;
    const q=dateSearch.trim().toLowerCase();
    const br=toBR(iso).toLowerCase();
    return br.includes(q) || iso.includes(q);
  };

  const filtered=entries.filter(([date,o])=>
    (!weekday||o.day===weekday) &&
    (!planFilter||o.planName===planFilter) &&
    matchesDate(date)
  );
  const planOptions=[...new Set(entries.map(([,o])=>o.planName).filter(Boolean))];
  const chartsEnabled=!!prefs.chartsPremium;
  const deleteEntry=(date)=>{
    if(!confirm(`Excluir o treino de ${toBR(date)}?`)) return;
    setHistory(prev=>{const copy={...prev};delete copy[date];return copy;});
  };

  const parseNum=(v)=>{const n=parseFloat(String(v).replace(",","."));return isFinite(n)?n:0;};
  const volSets=(sets)=>sets.reduce((acc,s)=>acc+(parseNum(s.w)*parseNum(s.r)),0);
  const volSession=(obj)=>(obj.entries||[]).reduce((acc,en)=>acc+volSets(en.sets||[]),0);

  return (
    <div className="grid gap-4">
      <Card title="Histórico">
        <div className="grid gap-2 mb-3">
          {/* Busca por data */}
          <input
            className="border border-borderDark bg-black/30 rounded-xl px-3 py-2 text-sm w-full"
            placeholder="Buscar por data (ex: 25/02 ou 25/02/2025)…"
            value={dateSearch}
            onChange={e=>setDateSearch(e.target.value)}
          />
          <div className="flex items-center gap-2 flex-wrap">
            <select className="border border-borderDark bg-black/30 rounded-xl px-3 py-2 text-sm" value={weekday} onChange={e=>setWeekday(e.target.value)}>
              <option value="">Dia da semana</option>{DAYS.map(d=><option key={d}>{d}</option>)}
            </select>
            <select className="border border-borderDark bg-black/30 rounded-xl px-3 py-2 text-sm" value={planFilter} onChange={e=>setPlanFilter(e.target.value)}>
              <option value="">Ficha</option>{planOptions.map(n=><option key={n}>{n}</option>)}
            </select>
            <div className="ml-auto">
              <Button variant="ghost" disabled={!chartsEnabled} onClick={()=>window.openChartsModal&&window.openChartsModal()}>
                <span className="inline-flex items-center gap-1">{!chartsEnabled&&<LockIcon className="opacity-80"/>} Gráficos</span>
              </Button>
            </div>
          </div>
        </div>

        {filtered.length===0?<div className="text-sm text-textSub">Sem registros.</div>:(
          <div className="grid gap-3 md:grid-cols-2">
            {filtered.map(([date,obj])=>{
              const vol=Math.round(volSession(obj));
              return (
                <button key={date} onClick={()=>setDetail({date,obj})} className="text-left ds-card rounded-2xl p-3 border border-borderDark hover:bg-white/5 transition">
                  <div className="flex items-start justify-between">
                    <div>
                      <div className="text-sm text-textSub">{obj.day}</div>
                      <div className="font-semibold">{toBR(date)} — {obj.planName||"Sem ficha"}</div>
                      <div className="text-xs text-textSub">{obj.entries.length} exercício(s)</div>
                    </div>
                    <div className="flex flex-col items-end gap-1">
                      <div className="text-xs text-textSub">Vol: {vol}</div>
                      <button onClick={e=>{e.stopPropagation();deleteEntry(date);}} className="text-xs text-red-500 hover:text-red-400 px-2 py-0.5 rounded-lg border border-red-900/40 hover:bg-red-900/20 transition">Excluir</button>
                    </div>
                  </div>
                </button>
              );
            })}
          </div>
        )}
      </Card>

      {detail&&(
        <Modal onClose={()=>setDetail(null)}>
          <div className="flex items-start justify-between mb-2">
            <div>
              <div className="text-sm text-textSub">{detail.obj.day}</div>
              <div className="font-semibold">{toBR(detail.date)} — {detail.obj.planName||"Sem ficha"}</div>
              <div className="text-xs text-textSub">{detail.obj.entries.length} exercício(s)</div>
            </div>
            <Button variant="ghost" onClick={()=>setDetail(null)}>Fechar</Button>
          </div>
          <div className="space-y-2 max-h-[60vh] overflow-auto pr-1">
            {detail.obj.entries.map((en,i)=>(
              <div key={i} className="border border-borderDark rounded-xl p-2">
                <div className="flex items-center justify-between">
                  <div className="font-medium">{en.name}</div>
                  <div className="text-xs text-textSub">Vol: {Math.round(volSets(en.sets))}</div>
                </div>
                <div className="flex flex-wrap gap-2 mt-1">
                  {en.sets.map((s,ix)=>(
                    <span key={ix} className="inline-flex items-center rounded-full border border-borderDark px-2 py-0.5 text-xs">
                      S{ix+1}: {s.w||"-"}{prefs.unit==="kg"?"kg":"lb"} × {s.r||"-"}{s.rir?` (RIR ${s.rir})`:""}
                    </span>
                  ))}
                </div>
              </div>
            ))}
          </div>
        </Modal>
      )}
    </div>
  );
};
// Profile
const Profile=({prefs,setPrefs})=>{
  const [name,setName]=useState(prefs.name);
  const [avatar,setAvatar]=useState(prefs.avatar);
  const [avatarUrl,setAvatarUrl]=useState(prefs.avatarUrl||null);
  const [unit,setUnit]=useState(prefs.unit);
  const [vibrate,setVibrate]=useState(prefs.vibrate);
  const [goal,setGoal]=useState(prefs.weeklyGoal);
  const [showTimer,setShowTimer]=useState(prefs.showTimer!==false);
  const [timerPreset,setTimerPreset]=useState(Number(prefs.timerPreset||60));
  const [rir,setRir]=useState(typeof prefs.rirDefault==="number"? prefs.rirDefault : 2);
  const [chartsPremium,setChartsPremium]=useState(!!prefs.chartsPremium);
  const [uploading,setUploading]=useState(false);
  const [uploadErr,setUploadErr]=useState(null);
  const fileRef=useRef(null);

  const dirty = (name!==prefs.name)||(avatar!==prefs.avatar)||(avatarUrl!==(prefs.avatarUrl||null))||(unit!==prefs.unit)||(vibrate!==prefs.vibrate)||(goal!==prefs.weeklyGoal)||((showTimer)!==(prefs.showTimer!==false))||((Number(timerPreset||0))!==(Number(prefs.timerPreset||60)))||((Number(rir))!==(Number((typeof prefs.rirDefault==="number"? prefs.rirDefault : 2))))||(chartsPremium!==!!prefs.chartsPremium);

  const handlePhotoChange = async (e) => {
    const file = e.target.files && e.target.files[0];
    if(!file) return;
    if(!file.type.startsWith('image/')){ setUploadErr('Selecione uma imagem.'); return; }
    if(file.size > 5*1024*1024){ setUploadErr('Imagem muito grande (máx 5MB).'); return; }
    setUploadErr(null);
    setUploading(true);
    try{
      // Verifica se Firebase Storage está disponível
      if(!window.firebase || !firebase.storage){
        setUploadErr('Firebase Storage não disponível. Tente recarregar.');
        setUploading(false); return;
      }
      const user = JSON.parse(localStorage.getItem('darkset.user')||'null');
      if(!user){ setUploadErr('Faça login para enviar foto.'); setUploading(false); return; }
      const ext = file.name.split('.').pop() || 'jpg';
      const path = `avatars/${user.uid}/avatar.${ext}`;
      const ref = firebase.storage().ref(path);
      await ref.put(file);
      const url = await ref.getDownloadURL();
      setAvatarUrl(url);
      setAvatar(''); // limpa emoji ao usar foto
    }catch(err){
      setUploadErr('Erro ao enviar foto: ' + (err.message||''));
    }finally{ setUploading(false); }
  };

  const displayImg = avatarUrl || (prefs.avatarUrl||null);

  return (
    <div className="grid gap-4">
      <Card title="Perfil">
        <div className="grid gap-3">
          <div className="flex flex-wrap items-center gap-3">
            {/* Avatar: foto ou iniciais */}
            <div className="relative">
              {displayImg
                ? <img src={displayImg} className="w-16 h-16 rounded-full border-2 border-borderDark object-cover" alt="avatar"/>
                : <div className="w-16 h-16 rounded-full border-2 border-borderDark bg-black/30 flex items-center justify-center text-xl font-bold text-textSub">{name ? name.slice(0,2).toUpperCase() : 'DS'}</div>
              }
              <button
                onClick={()=>fileRef.current && fileRef.current.click()}
                className="absolute bottom-0 right-0 bg-accent rounded-full w-6 h-6 flex items-center justify-center text-white text-xs border-2 border-bgDark"
                title="Trocar foto"
              >✎</button>
              <input ref={fileRef} type="file" accept="image/*" className="hidden" onChange={handlePhotoChange}/>
            </div>
            <div className="flex-1 grid gap-2">
              <input className="border border-borderDark bg-black/30 rounded-xl px-3 py-2 w-full" placeholder="Seu nome" value={name} onChange={e=>setName(e.target.value)}/>
            </div>
          </div>
          {uploading && <div className="text-xs text-textSub">Enviando foto…</div>}
          {uploadErr && <div className="text-xs text-red-400">{uploadErr}</div>}
          <div className="flex flex-wrap items-center gap-3">
            <label>Unidade:</label>
            <select className="border border-borderDark bg-black/30 rounded-xl px-3 py-2 w-full sm:w-auto" value={unit} onChange={e=>setUnit(e.target.value)}>
              <option value="kg">kg</option>
              <option value="lb">lb</option>
            </select>
            <label className="ml-4">Vibração:</label>
            <Switch checked={vibrate} onChange={setVibrate}/>
            <label className="ml-4">Meta semanal:</label>
            <input type="number" min="1" max="14" className="border border-borderDark bg-black/30 rounded-xl px-3 py-2 w-full sm:w-20" value={goal} onChange={e=>setGoal(Number(e.target.value)||1)}/>
          </div>
          <div className="flex flex-wrap items-center gap-3">
            <label>DarkTimer</label>
            <Switch checked={showTimer} onChange={setShowTimer}/>
            <label className="ml-4">Tempo padrão:</label>
            <select className="border border-borderDark bg-black/30 rounded-xl px-3 py-2 w-full sm:w-auto" value={timerPreset} onChange={e=>setTimerPreset(Number(e.target.value)||60)}>
              <option value="30">30s</option>
              <option value="60">1min</option>
              <option value="90">1min30s</option>
              <option value="120">2min</option>
              <option value="150">2min30s</option>
              <option value="180">3min</option>
            </select>
          </div>
          <div className="flex flex-wrap items-center gap-3">
            <label>RIR padrão:</label>
            <select className="border border-borderDark bg-black/30 rounded-xl px-3 py-2 w-full sm:w-auto" value={rir} onChange={e=>setRir(Math.max(0, Math.min(4, Number(e.target.value)||0)))}>
              <option value="0">0 (Falha)</option>
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3">3</option>
              <option value="4">4</option>
            </select>
          </div>
          <div className="flex flex-wrap items-center gap-3">
            <label>Gráficos (Premium):</label>
            <Switch checked={chartsPremium} onChange={setChartsPremium}/>
            <span className="text-xs text-textSub">Habilita o botão "Gráficos" no Histórico.</span>
          </div>
          <div><Button variant="accent" disabled={!dirty||uploading} onClick={()=>setPrefs({name,avatar,avatarUrl,unit,vibrate,weeklyGoal:goal,showTimer,timerPreset,rirDefault:rir,chartsPremium})}>Salvar perfil</Button></div>
        </div>
      </Card>
    </div>
  );
};

function App(){
  const [screen,setScreen]=useState("home");
  const [plans,setPlans]=usePlans();
  const [history,setHistory]=useHistory();
  const [prefs,setPrefs]=usePrefs();
  const [toast,setToast]=useState(null);
  const [builderPlanId,setBuilderPlanId]=useState(null);
  const [viewerPlanId,setViewerPlanId]=useState(null);
  const goto=(s,id=null)=>{ setScreen(s); if(s==='builder' && id) setBuilderPlanId(id); if(s==='viewer' && id) setViewerPlanId(id); };
  useEffect(()=>{ if(toast){ const t=setTimeout(()=>setToast(null),1200); return ()=>clearTimeout(t);} },[toast]);

  // Import via ?import= na URL
  useEffect(()=>{
    const doImport = (json) => {
      const days=Object.entries(json.byDay||{}).map(([d,arr])=>`${d}: ${arr.length}`).join(" | ");
      const ok = confirm(`Ficha encontrada: ${json.name}\n${days}\n\nAdicionar ao seu DarkSet?`);
      if(ok){
        const id=Date.now();
        setPlans(p=>({...p,list:[...p.list,{id,name:json.name,byDay:json.byDay||{}}]}));
        setToast("Ficha importada");
        window.history.replaceState({}, "", location.pathname);
      }
    };

    // Verifica ?import= na URL
    const params=new URLSearchParams(location.search);
    const imp=params.get("import");
    if(imp){
      try{
        const json=JSON.parse(decodeURIComponent(atob(imp).split('').map(c=>'%'+('00'+c.charCodeAt(0).toString(16)).slice(-2)).join('')));
        doImport(json);
      }catch(e){ alert("Link de importação inválido."); }
    }

    // Verifica import pendente do Firebase (?id=)
    if(window.__pendingImport){
      doImport(window.__pendingImport);
      window.__pendingImport = null;
    }

    // Escuta evento disparado pelo Firebase handler
    const handler = (e) => doImport(e.detail);
    window.addEventListener('darkset:import', handler);
    return () => window.removeEventListener('darkset:import', handler);
  },[]);

  return (
    <div className="max-w-5xl mx-auto p-4 md:p-8 safe-pt safe-pb">
      <header className="ds-hdr">
        <LogoRow/>
        <nav className="ds-nav flex gap-2">
          <button className={"ds-nav-btn"+(screen==="home"?" active":"")} onClick={()=>goto("home")}>Início</button>
          <button className={"ds-nav-btn"+(screen==="plans"?" active":"")} onClick={()=>goto("plans")}>Fichas</button>
          <button className={"ds-nav-btn"+(screen==="builder"?" active":"")} onClick={()=>goto("builder",plans.activeId||(plans.list[0]?.id??null))}>Montar</button>
          <button className={"ds-nav-btn"+(screen==="session"?" active":"")} onClick={()=>goto("session")}>Treino</button>
          <button className={"ds-nav-btn"+(screen==="history"?" active":"")} onClick={()=>goto("history")}>Histórico</button>
          <button className={"ds-nav-btn"+(screen==="profile"?" active":"")} onClick={()=>goto("profile")}>Perfil</button>
        </nav>
      </header>

      {screen==="home" && <Home goto={goto} plans={plans} history={history} prefs={prefs}/>}
      {screen==="plans" && <Plans plans={plans} setPlans={setPlans} goto={(s,id)=>goto(s,id)} setToast={setToast}/>}
      {screen==="builder" && <Builder planId={builderPlanId||(plans.activeId||plans.list[0]?.id)} plans={plans} setPlans={setPlans} setToast={setToast}/>}
      {screen==="session" && <Session plans={plans} setHistory={setHistory} history={history} prefs={prefs} goto={goto} setToast={setToast}/>}
      {screen==="history" && <History history={history} setHistory={setHistory} prefs={prefs}/>}
      {screen==="viewer" && <Viewer planId={(viewerPlanId||(plans.activeId||plans.list[0]?.id))} plans={plans} goto={goto}/>}
      {screen==="profile" && <Profile prefs={prefs} setPrefs={setPrefs}/>}

      <footer style={{marginTop:'2rem',textAlign:'center',fontSize:'.65rem',color:'#2a2a2a',letterSpacing:'.08em',textTransform:'uppercase'}}>© {new Date().getFullYear()} DARKSET · V4.9.0</footer>
      {toast && <Toast text={toast}/>}
    </div>
  );
}

<div id="chartsModalBackdrop" class="charts-modal-backdrop" aria-hidden="true">

            <div style="font-size:11px;opacity:.7;margin-bottom:2px">Variação</div>
            <div id="sumDelta" style="font-size:18px;font-weight:700">—</div>
          </div>
          <div style="background:#0e0e12;border:1px solid #1f2024;border-radius:10px;padding:10px 12px">
            <div style="font-size:11px;opacity:.7;margin-bottom:2px">Volume total</div>
            <div id="sumVol" style="font-size:18px;font-weight:700">—</div>
          </div>
          <div style="background:#0e0e12;border:1px solid #1f2024;border-radius:10px;padding:10px 12px">
            <div style="font-size:11px;opacity:.7;margin-bottom:2px">Séries</div>
            <div id="sumSets" style="font-size:18px;font-weight:700">—</div>
          </div>
          <div style="background:#0e0e12;border:1px solid #1f2024;border-radius:10px;padding:10px 12px">
            <div style="font-size:11px;opacity:.7;margin-bottom:2px">Repetições</div>
            <div id="sumReps" style="font-size:18px;font-weight:700">—</div>
          </div>
        </div>
      </div>

<script>
(function(){
  const LS_HISTORY_KEY = "darkset.v3.history";
  function getHistory(){ try{ return JSON.parse(localStorage.getItem(LS_HISTORY_KEY)) || {}; }catch(e){ return {}; } }
  const toBR = (iso) => { const [y,m,d]=iso.split('-'); return `${d}/${m}/${y}`; };
  const dayMs = 86400000;

  const RIR_W = { "Falha":1.00, 0:1.00, 1:1.00, 2:0.92, 3:0.84, 4:0.75 };
  const num = (v)=>{ const n=parseFloat(String(v).replace(',', '.')); return isFinite(n)?n:0; };
  const tOf = (iso)=> +new Date(iso+"T00:00:00");

  function metaOf(name){
    return (window.EXS||[]).find(e=> e && e.name && e.name.toLowerCase()===String(name).toLowerCase()) || null;
  }
  function primaryOf(name){ const m=metaOf(name); return m? m.primary : null; }
  function isUnilateral(name){ const m=metaOf(name); return m? !!m.unilateral : false; }

  function listSubjects(hist, type){
    const set = new Set();
    for(const [date, obj] of Object.entries(hist)){
      if(!obj || !Array.isArray(obj.entries)) continue;
      if(type==='plan'){ if(obj.planName) set.add(obj.planName); continue; }
      for(const en of obj.entries){
        if(!en || !en.name || !Array.isArray(en.sets)) continue;
        const has = en.sets.some(s=> num(s.r)>0);
        if(!has) continue;
        if(type==='exercise') set.add(en.name);
        if(type==='muscle'){ const p=primaryOf(en.name); if(p) set.add(p); }
      }
    }
    return Array.from(set).sort((a,b)=> a.localeCompare(b));
  }

  function weekStart(d){
    const dt = new Date(d);
    const day = (dt.getDay()+6)%7;
    dt.setDate(dt.getDate()-day);
    dt.setHours(0,0,0,0);
    return dt;
  }
  function weekEndFromStart(ws){
    const dt = new Date(+ws + 6*dayMs);
    dt.setHours(0,0,0,0);
    return dt;
  }
  function fmtISO(d){ return d.toISOString().slice(0,10); }

  // Calcula moving average (janela de 3 pontos)
  function movingAvg(data, window=3){
    return data.map((_, i)=>{
      const start = Math.max(0, i - Math.floor(window/2));
      const end   = Math.min(data.length, start + window);
      const slice = data.slice(start, end);
      return slice.reduce((a,b)=>a+b,0) / slice.length;
    });
  }

  function buildAgg(hist, type, subject, rangeDays){
    const since = (rangeDays && rangeDays!=='all') ? (Date.now() - Number(rangeDays)*dayMs) : 0;
    const dayMap = new Map();

    for(const [iso, obj] of Object.entries(hist)){
      const t = tOf(iso); if(since && t < since) continue;
      if(!obj || !Array.isArray(obj.entries)) continue;
      if(type==='plan' && obj.planName !== subject) continue;

      for(const en of obj.entries){
        if(!en || !en.name || !Array.isArray(en.sets)) continue;
        if(type==='exercise' && en.name !== subject) continue;
        if(type==='muscle'){ const p=primaryOf(en.name); if(p!==subject) continue; }

        // Fator unilateral: exercícios de 1 lado × 2 para equivaler ao bilateral
        const uFactor = isUnilateral(en.name) ? 2 : 1;

        for(const s of en.sets){
          const r=num(s.r), w=num(s.w);
          if(r<=0) continue;
          const rw = (s.rir in RIR_W) ? RIR_W[s.rir] : (RIR_W[String(s.rir)] ?? 0.90);
          const vol = (w>0 ? w*r : r) * uFactor;
          const iie = vol * rw / 1000.0;

          let acc = dayMap.get(iso);
          if(!acc){ acc={iie:0,volume:0,sets:0,reps:0}; dayMap.set(iso,acc); }
          acc.iie += iie; acc.volume += vol; acc.sets += 1; acc.reps += r;
        }
      }
    }

    // Exercício: diário
    if(type==='exercise'){
      const labels = Array.from(dayMap.keys()).sort((a,b)=> a.localeCompare(b));
      const series = labels.map(d=> dayMap.get(d));
      const tot = series.reduce((o,s)=>({iie:o.iie+s.iie, vol:o.vol+s.volume, sets:o.sets+s.sets, reps:o.reps+s.reps}), {iie:0,vol:0,sets:0,reps:0});
      const delta = (series.length>1)? Math.round(((series.at(-1).iie - series[0].iie)/Math.max(1e-6, series[0].iie))*100) : 0;
      window.__chartsWeekTitles = null;
      return { labels: labels.map(toBR), series, tot, delta };
    }

    // Agrupamento semanal com SOMA (não média) para músculo/ficha
    const wkMap = new Map();
    for(const [iso, vals] of Array.from(dayMap.entries())){
      const ws = weekStart(new Date(iso+"T00:00:00"));
      const we = weekEndFromStart(ws);
      const key = fmtISO(ws);
      let acc = wkMap.get(key);
      if(!acc){ acc={sumIie:0, days:0, volume:0, sets:0, reps:0, ws, we}; wkMap.set(key, acc); }
      acc.sumIie += vals.iie; acc.days += 1;
      acc.volume += vals.volume; acc.sets += vals.sets; acc.reps += vals.reps;
    }
    const weeks = Array.from(wkMap.entries()).sort((a,b)=> a[0].localeCompare(b[0]));
    const labels = [], series = [], titles = [];
    let idx = 1;
    for(const [, v] of weeks){
      labels.push("Sem " + (idx++));
      // Soma semanal (não mais média)
      series.push({ iie: v.sumIie, volume: v.volume, sets: v.sets, reps: v.reps });
      titles.push(`${toBR(fmtISO(v.ws))} — ${toBR(fmtISO(v.we))}`);
    }
    const tot = series.reduce((o,s)=>({iie:o.iie+s.iie, vol:o.vol+s.volume, sets:o.sets+s.sets, reps:o.reps+s.reps}), {iie:0,vol:0,sets:0,reps:0});
    const delta = (series.length>1)? Math.round(((series.at(-1).iie - series[0].iie)/Math.max(1e-6, series[0].iie))*100) : 0;
    window.__chartsWeekTitles = titles;
    return { labels, series, tot, delta };
  }

  let chart;
  function renderChart(labels, series, tot, delta){
    const elEmpty  = document.getElementById('chartsEmpty');
    const elSummary= document.getElementById('chartsSummary');
    const ctx = document.getElementById('chartsCanvas');
    if(chart){ chart.destroy(); chart=null; }

    if(!labels.length){
      elEmpty.style.display=''; elSummary.style.display='none'; return;
    }
    elEmpty.style.display='none';

    // Atualiza estatísticas resumidas
    if(elSummary){
      elSummary.style.display='block';
      const arrow = delta > 0 ? '↑' : delta < 0 ? '↓' : '→';
      const color = delta > 0 ? '#4ade80' : delta < 0 ? '#f87171' : '#a3a3a3';
      document.getElementById('sumDelta').innerHTML = `<span style="color:${color}">${arrow} ${Math.abs(delta)}%</span>`;
      const vol = tot.vol >= 1000 ? `${(tot.vol/1000).toFixed(1)}t` : `${Math.round(tot.vol)}kg`;
      document.getElementById('sumVol').textContent = vol;
      document.getElementById('sumSets').textContent = tot.sets;
      document.getElementById('sumReps').textContent = tot.reps;
    }

    const iieData  = series.map(s=> +s.iie.toFixed(4));
    const trendData = movingAvg(iieData);
    const titles   = window.__chartsWeekTitles;

    chart = new Chart(ctx, {
      type:'line',
      data:{
        labels,
        datasets:[
          {
            label:'IIE',
            data: iieData,
            borderWidth:2, tension:.25, pointRadius:4, pointHoverRadius:6,
            borderColor:'#ff3b30', backgroundColor:'rgba(255,59,48,.15)',
            fill: true, order: 2
          },
          {
            label:'Tendência',
            data: trendData,
            borderWidth:2, tension:.4, pointRadius:0, pointHoverRadius:0,
            borderColor:'rgba(255,200,0,.6)', backgroundColor:'transparent',
            borderDash:[5,4], fill: false, order: 1
          }
        ]
      },
      options:{
        responsive:true, maintainAspectRatio:false,
        interaction:{mode:'index', intersect:false},
        plugins:{
          legend:{ display: true, labels:{ color:'#eaeaea', boxWidth:12, font:{size:11} } },
          tooltip:{
            enabled:true,
            callbacks:{
              title:(items)=>{
                const i = items && items.length? items[0].dataIndex : 0;
                return titles && titles[i] ? titles[i] : items[0].label;
              },
              label:(item)=>{
                if(item.datasetIndex === 1) return `Tendência: ${Number(item.raw).toFixed(3)}`;
                const s = series[item.dataIndex];
                const lines = [`IIE: ${Number(item.raw).toFixed(3)}`];
                if(s.volume > 0) lines.push(`Volume: ${Math.round(s.volume)}kg`);
                lines.push(`Séries: ${s.sets}  ·  Reps: ${s.reps}`);
                return lines;
              }
            }
          }
        },
        scales:{
          x:{ ticks:{ color:'#a3a3a3', maxRotation:0, autoSkip:true }, grid:{ color:'rgba(255,255,255,.05)' } },
          y:{ beginAtZero:true, ticks:{ color:'#a3a3a3' }, grid:{ color:'rgba(255,255,255,.05)' } }
        }
      }
    });
  }

  function refillAndPlot(defaults){
    const hist = getHistory();
    const typeSel = document.getElementById('chartsType');
    const subjSel = document.getElementById('chartsSubject');
    const pills = Array.from(document.querySelectorAll('.charts-pill'));
    if(defaults && defaults.type) typeSel.value = defaults.type;

    function fillSubj(){
      const list = listSubjects(hist, typeSel.value);
      subjSel.innerHTML = '';
      if(!list.length){ subjSel.innerHTML = '<option>Sem dados</option>'; renderChart([],[],{},{delta:0}); return; }
      for(const name of list){ const o=document.createElement('option'); o.value=name; o.textContent=name; subjSel.appendChild(o); }
      if(defaults && defaults.subject && list.includes(defaults.subject)) subjSel.value = defaults.subject;
    }
    fillSubj();

    let range = 'all';
    function plot(){
      const {labels, series, tot, delta} = buildAgg(hist, typeSel.value, subjSel.value, range);
      renderChart(labels, series, tot, delta);
    }
    plot();

    typeSel.onchange = ()=>{ fillSubj(); plot(); };
    subjSel.onchange = ()=> plot();
    pills.forEach(p=> p.onclick = ()=>{ pills.forEach(x=>x.classList.remove('active')); p.classList.add('active'); range=p.dataset.range; plot(); });
  }

  window.openChartsModal = function(defaultExerciseName){
    const el = document.getElementById('chartsModalBackdrop'); if(!el) return;
    el.style.display='flex';
    const defaults = defaultExerciseName? {type:'exercise', subject: defaultExerciseName} : null;
    setTimeout(()=> refillAndPlot(defaults), 0);
  };
  window.closeChartsModal = function(){ const el = document.getElementById('chartsModalBackdrop'); if(el) el.style.display='none'; };

  document.getElementById('chartsCloseBtn')?.addEventListener('click', ()=> window.closeChartsModal());
  document.getElementById('chartsHelpBtn')?.addEventListener('click', ()=>{
    alert('IIE (Índice de Intensidade Efetiva) = Volume × Fator RIR / 1000\n\nExercícios unilaterais têm fator ×2 (equivalência bilateral).\n\nA linha amarela tracejada é a tendência (média móvel de 3 pontos).\n\nMúsculo/Ficha: IIE somado por semana. Exercício: IIE diário.');
  });

  document.addEventListener('click', (ev)=>{
    const btn = ev.target.closest('button, a'); if(!btn) return;
    const t = (btn.innerText || btn.textContent || '').toLowerCase();
    if(t.includes('gráfico')){ ev.preventDefault(); window.openChartsModal(); }
  });
})();
</script>

<script>
(function(){
  // ---- Helpers b64 ----
  function b64ToJson(b64){
    try{ return JSON.parse(decodeURIComponent(atob(b64).split('').map(c=>'%'+('00'+c.charCodeAt(0).toString(16)).slice(-2)).join(''))); }catch(e){ return null; }
  }
  function jsonToB64(obj){
    try{ return btoa(encodeURIComponent(JSON.stringify(obj)).replace(/%([0-9A-F]{2})/g,(_,p)=>String.fromCharCode('0x'+p))); }catch(e){ return ''; }
  }

  // ---- Handle ?id= param (share link) ----
  async function handleIdParam(){
    try{
      var url = new URL(location.href);
      var id = url.searchParams.get('id');
      if(!id) return;
      if(!window._db) return;
      var snap = await window._db.collection('fichas').doc(id).get();
      if(!snap.exists) return;
      var data = snap.data() || {};
      var payload = { name: data.name || data.title || "Importada", byDay: data.byDay || data.Semana || data.semana || {} };
      window.history.replaceState({}, '', location.pathname);
      window.__pendingImport = payload;
      window.dispatchEvent(new CustomEvent('darkset:import', { detail: payload }));
    }catch(e){ console.warn('handleIdParam error', e); }
  }

  // ---- Shorten share link via Firestore ----
  var replacedOnce = false;
  async function fireStoreShorten(){
    try{
      if(replacedOnce) return;
      var inp = document.getElementById('share-link');
      if(!inp) return;
      var val = inp.value || '';
      var imp = null;
      if(val.includes('?import=')) imp = (new URL(val, location.href)).searchParams.get('import');
      if(!imp) return;
      var qb = document.getElementById('qr-box');
      if(qb) qb.innerHTML = '<div style="padding:6px;font-size:12px;opacity:.8">Gerando link curto…</div>';
      inp.value = 'gerando…';
      if(!window._db) return;
      var obj = b64ToJson(imp);
      if(!obj || !obj.byDay) return;
      var docRef = await window._db.collection('fichas').add(Object.assign({}, obj, { ts: Date.now() }));
      var shortUrl = location.origin + '/?id=' + docRef.id;
      inp.value = shortUrl;
      if(qb && window.QRCode){ qb.innerHTML=''; new QRCode(qb, { text: shortUrl, width: 196, height: 196 }); }
      replacedOnce = true;
    }catch(e){ console.warn('fireStoreShorten error', e); }
  }

  // ---- MutationObserver para o modal de compartilhamento ----
  var mo = new MutationObserver(function(){
    if(document.getElementById('share-link')) fireStoreShorten();
  });

  // ---- Init Firebase com retry ----
  var initAttempts = 0;
  function tryInitFirebase(){
    initAttempts++;
    if(typeof firebase === 'undefined'){
      if(initAttempts < 20) setTimeout(tryInitFirebase, 300);
      else console.warn('Firebase SDK não carregou após várias tentativas');
      return;
    }
    try{
      var firebaseConfig = {
        apiKey: "AIzaSyB3bu3XercwmnlV0jdaldoXvd5gnHfj0GU",
        authDomain: "darkset-538d1.firebaseapp.com",
        projectId: "darkset-538d1",
        storageBucket: "darkset-538d1.firebasestorage.app",
        messagingSenderId: "354165019689",
        appId: "1:354165019689:web:dc458f0a61e26e6289f838",
        measurementId: "G-PVJ7QJ0T7F"
      };
      if(!firebase.apps.length) firebase.initializeApp(firebaseConfig);
      window._db   = firebase.firestore();
      window._auth = firebase.auth();
    }catch(e){ console.warn('Firebase init failed', e); return; }

    // ---- DSAuth API ----
    try{
      var auth = window._auth;
      var db   = window._db;
      window.DSAuth = {
        signInGoogle: async function(){
          var provider = new firebase.auth.GoogleAuthProvider();
          try{ await auth.signInWithPopup(provider); }
          catch(e){
            if(e.code==='auth/popup-blocked'||e.code==='auth/operation-not-supported-in-this-environment'){
              await auth.signInWithRedirect(provider);
            } else { throw e; }
          }
        },
        signInApple: async function(){
          var provider = new firebase.auth.OAuthProvider('apple.com');
          provider.addScope('email'); provider.addScope('name');
          try{ await auth.signInWithPopup(provider); }
          catch(e){
            if(e.code==='auth/popup-blocked'||e.code==='auth/operation-not-supported-in-this-environment'){
              await auth.signInWithRedirect(provider);
            } else { throw e; }
          }
        },
        signUpEmail: function(email, pass, name){
          return auth.createUserWithEmailAndPassword(email, pass).then(function(cred){
            if(name) return cred.user.updateProfile({ displayName: name });
          });
        },
        signInEmail: function(email, pass){
          return auth.signInWithEmailAndPassword(email, pass);
        },
        signOut: function(){ return auth.signOut(); }
      };

      auth.onAuthStateChanged(async function(user){
        try{
          if(user){
            var info = { uid: user.uid, email: user.email||null, displayName: user.displayName||null, photoURL: user.photoURL||null, lastLogin: Date.now() };
            localStorage.setItem('darkset.user', JSON.stringify(info));
            try{ if(db) await db.collection('users').doc(user.uid).set({ email: info.email, name: info.displayName, photoURL: info.photoURL, updatedAt: Date.now() }, { merge: true }); }catch(_){}
            try{
              var prefs = JSON.parse(localStorage.getItem('darkset.v3.prefs')||'{}');
              if(info.displayName && !prefs.name){ prefs.name = info.displayName; localStorage.setItem('darkset.v3.prefs', JSON.stringify(prefs)); }
            }catch(_){}
            if(window.closeAuthModal) closeAuthModal();
          } else {
            localStorage.removeItem('darkset.user');
          }
        }catch(_){}
      });

      auth.getRedirectResult().catch(function(){});
    }catch(e){ console.warn('DSAuth init error', e); }

    // Inicia observadores após Firebase pronto
    mo.observe(document.getElementById('root') || document.body, { subtree: true, childList: true });
    handleIdParam();
    fireStoreShorten();
  }

  // Inicia com pequeno delay para garantir que os SDKs externos carregaram
  setTimeout(tryInitFirebase, 100);
})();
</script>

<style>
  .auth-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.65);display:none;align-items:center;justify-content:center;z-index:99999}
  .auth-card{width:min(420px,92vw);background:#0b0b0c;border:1px solid #1f2024;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.6);color:#eaeaea;overflow:hidden}
  .auth-hd{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid #1f2024;background:linear-gradient(180deg,#0f0f11,#0b0b0c)}

  .auth-x{background:transparent;border:0;color:#a9a9b0;font-size:20px;cursor:pointer;line-height:1;padding:0 4px}
  .auth-body{padding:16px;display:grid;gap:12px}
  .auth-social{display:flex;flex-direction:column;gap:8px}
  .btn-social{display:flex;align-items:center;gap:10px;justify-content:center;background:#fff;color:#111;border:1px solid #e5e5e5;border-radius:10px;padding:11px 12px;font-weight:700;cursor:pointer;font-size:15px}

  .auth-sep{display:flex;align-items:center;gap:8px;color:#555;font-size:12px}
  .auth-sep::before,.auth-sep::after{content:'';flex:1;height:1px;background:#1f2024}
  .auth-field{display:flex;flex-direction:column;gap:5px}
  .auth-field label{font-size:12px;opacity:.8}
  .auth-input{background:#111114;border:1px solid #28282c;border-radius:10px;color:#eaeaea;padding:10px 12px;font-size:14px;outline:none;width:100%;box-sizing:border-box}
  .auth-input:focus{border-color:#6e5bff}
  .auth-primary{display:flex;gap:8px;justify-content:flex-end;margin-top:2px}
  .auth-btn{background:#e31b23;border:1px solid #b31217;color:#fff;border-radius:10px;padding:10px 18px;cursor:pointer;font-weight:700;font-size:15px}
  .auth-btn:active{transform:translateY(1px)}
  .auth-muted{font-size:12px;color:#a9a9b0;text-align:center}
  .auth-muted button{background:none;border:0;color:#ff7b7e;text-decoration:underline;cursor:pointer;font-size:12px}
  .auth-error{background:#3a0a0a;border:1px solid #7a1a1a;border-radius:8px;padding:8px 12px;font-size:13px;color:#ff9a9a;display:none}
</style>

<div id="authModalBackdrop" class="auth-backdrop" aria-hidden="true">
  <div class="auth-card" role="dialog" aria-modal="true" aria-label="Autenticação">
    <div class="auth-hd">
      <div class="auth-title" id="authModalTitle">Entrar</div>
      <button class="auth-x" id="authCloseBtn" aria-label="Fechar">✕</button>
    </div>
    <div class="auth-body">
      <div class="auth-social">
        <button class="btn-social" id="authGoogleBtn">
          <span class="ico"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path fill="#4285F4" d="M23.5 12.27c0-.84-.07-1.45-.22-2.09H12.22v3.8h6.42c-.13 1.01-.83 2.53-2.39 3.55l-.02.13 3.47 2.69.24.02c2.19-2.02 3.46-4.99 3.46-8.1z"/><path fill="#34A853" d="M12.22 23.5c3.14 0 5.77-1.03 7.69-2.82l-3.66-2.83c-.98.67-2.31 1.14-4.03 1.14-3.08 0-5.68-2.02-6.61-4.82l-.12.01-3.58 2.77-.05.11C2.83 21 7.19 23.5 12.22 23.5z"/><path fill="#FBBC05" d="M5.61 14.17c-.24-.73-.38-1.52-.38-2.35 0-.82.14-1.61.37-2.35l-.01-.16-3.62-2.8-.12.06C.75 8.26.22 10.06.22 11.82c0 1.76.53 3.56 1.63 5.25l3.76-2.9z"/><path fill="#EA4335" d="M12.22 4.64c2.18 0 3.64.94 4.48 1.72l3.26-3.18C17.98 1.2 15.36.14 12.22.14 7.19.14 2.83 2.63.75 6.4l3.84 2.98C5.52 7.58 8.12 4.64 12.22 4.64z"/></svg></span>
          <span>Continuar com Google</span>
        </button>
      </div>
      <div class="auth-sep">ou</div>
      <div class="auth-error" id="authError"></div>
      <div class="auth-field" id="authNameField" style="display:none">
        <label>Nome</label>
        <input class="auth-input" id="authNameInput" placeholder="Seu nome" autocomplete="name"/>
      </div>
      <div class="auth-field">
        <label>Email</label>
        <input class="auth-input" id="authEmailInput" type="email" placeholder="email@exemplo.com" autocomplete="email"/>
      </div>
      <div class="auth-field">
        <label>Senha</label>
        <input class="auth-input" id="authPassInput" type="password" placeholder="••••••••" autocomplete="current-password"/>
      </div>
      <div class="auth-primary">
        <button class="auth-btn" id="authPrimaryBtn">Entrar</button>
      </div>
      <div class="auth-muted" id="authToggleRow">
        Ainda não tem uma conta? <button id="authToggleBtn">Criar conta</button>
      </div>
    </div>
  </div>
</div>

<script>
(function(){
  var mode = 'signIn';
  var backdrop = document.getElementById('authModalBackdrop');
  var titleEl  = document.getElementById('authModalTitle');
  var closeBtn = document.getElementById('authCloseBtn');
  var googleBtn= document.getElementById('authGoogleBtn');
  var primaryBtn=document.getElementById('authPrimaryBtn');
  var toggleBtn= document.getElementById('authToggleBtn');
  var toggleRow= document.getElementById('authToggleRow');
  var nameField= document.getElementById('authNameField');
  var nameInput= document.getElementById('authNameInput');
  var emailInput=document.getElementById('authEmailInput');
  var passInput= document.getElementById('authPassInput');
  var errorEl  = document.getElementById('authError');

  function showError(msg){ if(errorEl){ errorEl.textContent=msg; errorEl.style.display=msg?'block':'none'; } }
  function setMode(m){
    mode = m;
    var isUp = mode==='signUp';
    if(titleEl)   titleEl.textContent  = isUp? 'Criar conta' : 'Entrar';
    if(primaryBtn) primaryBtn.textContent = isUp? 'Criar conta' : 'Entrar';
    if(nameField) nameField.style.display = isUp? 'flex' : 'none';
    if(toggleRow) toggleRow.innerHTML = isUp
      ? 'Já tem uma conta? <button id="authToggleBtn">Entrar</button>'
      : 'Ainda não tem uma conta? <button id="authToggleBtn">Criar conta</button>';
    document.getElementById('authToggleBtn').addEventListener('click', function(){ setMode(mode==='signUp'?'signIn':'signUp'); showError(''); });
    if(passInput) passInput.setAttribute('autocomplete', isUp? 'new-password':'current-password');
    showError('');
  }

  window.openAuthModal  = function(m){ setMode(m||'signIn'); backdrop.style.display='flex'; backdrop.setAttribute('aria-hidden','false'); };
  window.closeAuthModal = function(){ backdrop.style.display='none'; backdrop.setAttribute('aria-hidden','true'); showError(''); };

  closeBtn && closeBtn.addEventListener('click', closeAuthModal);
  backdrop.addEventListener('click', function(e){ if(e.target===backdrop) closeAuthModal(); });

  googleBtn && googleBtn.addEventListener('click', async function(){
    showError('');
    try{
      if(!window.DSAuth) return showError('Firebase não carregou. Tente recarregar a página.');
      googleBtn.textContent = 'Aguarde…'; googleBtn.disabled = true;
      await DSAuth.signInGoogle();
    }catch(e){
      showError(e && e.message ? e.message : 'Erro ao entrar com Google.');
      googleBtn.disabled = false;
      googleBtn.innerHTML = '<span class="ico"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path fill="#4285F4" d="M23.5 12.27c0-.84-.07-1.45-.22-2.09H12.22v3.8h6.42c-.13 1.01-.83 2.53-2.39 3.55l-.02.13 3.47 2.69.24.02c2.19-2.02 3.46-4.99 3.46-8.1z"/><path fill="#34A853" d="M12.22 23.5c3.14 0 5.77-1.03 7.69-2.82l-3.66-2.83c-.98.67-2.31 1.14-4.03 1.14-3.08 0-5.68-2.02-6.61-4.82l-.12.01-3.58 2.77-.05.11C2.83 21 7.19 23.5 12.22 23.5z"/><path fill="#FBBC05" d="M5.61 14.17c-.24-.73-.38-1.52-.38-2.35 0-.82.14-1.61.37-2.35l-.01-.16-3.62-2.8-.12.06C.75 8.26.22 10.06.22 11.82c0 1.76.53 3.56 1.63 5.25l3.76-2.9z"/><path fill="#EA4335" d="M12.22 4.64c2.18 0 3.64.94 4.48 1.72l3.26-3.18C17.98 1.2 15.36.14 12.22.14 7.19.14 2.83 2.63.75 6.4l3.84 2.98C5.52 7.58 4.64 12.22 4.64z"/></svg></span><span>Continuar com Google</span>';
    }
  });

  primaryBtn && primaryBtn.addEventListener('click', async function(){
    showError('');
    var email = (emailInput && emailInput.value||'').trim();
    var pass  = (passInput  && passInput.value ||'').trim();
    var name  = (nameInput  && nameInput.value ||'').trim();
    if(!email||!pass){ showError('Preencha email e senha.'); return; }
    if(!window.DSAuth){ showError('Firebase não carregou. Tente recarregar.'); return; }
    primaryBtn.disabled = true; primaryBtn.textContent = 'Aguarde…';
    try{
      if(mode==='signUp') await DSAuth.signUpEmail(email, pass, name);
      else                await DSAuth.signInEmail(email, pass);
      closeAuthModal();
    }catch(e){
      var msg = e && e.message ? e.message : 'Erro desconhecido.';
      if(e.code==='auth/user-not-found'||e.code==='auth/wrong-password') msg='Email ou senha incorretos.';
      if(e.code==='auth/email-already-in-use') msg='Este email já está cadastrado. Tente entrar.';
      if(e.code==='auth/weak-password') msg='Senha muito fraca (mínimo 6 caracteres).';
      if(e.code==='auth/invalid-email') msg='Email inválido.';
      showError(msg);
    }finally{
      primaryBtn.disabled = false;
      primaryBtn.textContent = mode==='signUp'? 'Criar conta':'Entrar';
    }
  });

  toggleBtn && toggleBtn.addEventListener('click', function(){ setMode(mode==='signUp'?'signIn':'signUp'); showError(''); });

  // Abre automaticamente para visitantes sem conta
  try{
    var hasUser = !!JSON.parse(localStorage.getItem('darkset.user')||'null');
    if(!hasUser){ setTimeout(function(){ openAuthModal('signIn'); }, 600); }
  }catch(_){}
})();
</script>
