const GymMode = ({prefs, setPrefs, setToast, goto}) => {
  const [detecting, setDetecting] = useState(false);
  const active = !!prefs.gymMode;

  const toggle = (val) => {
    setPrefs(p => ({...p, gymMode: val}));
    if (val) {
      setToast('🏋️ Modo Academia ativado!');
      if (prefs.vibrate && navigator.vibrate) navigator.vibrate([50,30,100]);
    } else {
      setToast('Modo Academia desativado');
    }
  };

  const saveLocation = () => {
    setDetecting(true);
    navigator.geolocation?.getCurrentPosition(
      pos => {
        setPrefs(p => ({...p, gymLocation: {lat: pos.coords.latitude, lng: pos.coords.longitude}}));
        setDetecting(false);
        setToast('📍 Localização da academia salva!');
      },
      () => { setDetecting(false); setToast('GPS não disponível'); }
    );
  };

  const checkNearby = () => {
    if (!prefs.gymLocation) { setToast('Salve a localização primeiro'); return; }
    navigator.geolocation?.getCurrentPosition(pos => {
      const R = 6371000;
      const dLat = (pos.coords.latitude  - prefs.gymLocation.lat) * Math.PI / 180;
      const dLng = (pos.coords.longitude - prefs.gymLocation.lng) * Math.PI / 180;
      const a = Math.sin(dLat/2)**2 + Math.cos(prefs.gymLocation.lat*Math.PI/180) * Math.cos(pos.coords.latitude*Math.PI/180) * Math.sin(dLng/2)**2;
      const dist = Math.round(R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
      if (dist < 200) { toggle(true); }
      else { setToast(`Você está ${dist}m longe da academia`); }
    }, () => setToast('GPS não disponível'));
  };

  const [wifiInput, setWifiInput] = useState(prefs.gymWifi||'');
  const saveWifi = () => { setPrefs(p=>({...p, gymWifi:wifiInput})); setToast('Wi-Fi salvo!'); };

  return (
    <div style={{marginTop:'1rem',display:'grid',gap:'1rem'}}>
      <div>
        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:'1.8rem',textTransform:'uppercase',lineHeight:1,color:'var(--color-text)'}}>
          DARK<span style={{color:'var(--color-accent)'}}>GYM</span>
        </div>
        <div style={{fontSize:'.65rem',color:'var(--color-text-sub)',textTransform:'uppercase',letterSpacing:'.08em',marginTop:'2px'}}>Ativa timer de descanso automático · bloqueia tela · vibração · foco total</div>
      </div>

      {/* Toggle */}
      <div style={{background:active?'rgba(227,27,35,.06)':'var(--color-card)',border:active?'1px solid rgba(227,27,35,.25)':'1px solid var(--color-border)',borderRadius:'14px',padding:'1.1rem',transition:'all .3s'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:active?'.85rem':'0'}}>
          <div>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:'1.1rem',textTransform:'uppercase',color:active?'var(--color-accent)':'var(--color-text)'}}>
              {active ? '🏋️ Na academia' : 'Desligado'}
            </div>
            <div style={{fontSize:'.72rem',color:'var(--color-text-sub)',marginTop:'2px'}}>
              {active ? 'Timer auto · tela ativa · vibração entre séries' : 'Ative ao chegar na academia'}
            </div>
          </div>
          <Switch checked={active} onChange={toggle}/>
        </div>
        {active && (
          <button onClick={() => goto('session')} style={{width:'100%',background:'var(--color-accent)',border:'none',borderRadius:'9px',padding:'.75rem',color:'#fff',fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:'1rem',textTransform:'uppercase',cursor:'pointer',boxShadow:'0 0 20px rgba(227,27,35,.3)'}}>
            Iniciar treino agora →
          </button>
        )}
      </div>

      {/* Ativação automática */}
      <div style={{background:'var(--color-card)',border:'1px solid var(--color-border)',borderRadius:'14px',padding:'1rem 1.1rem',display:'grid',gap:'1rem'}}>
        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:'.95rem',textTransform:'uppercase',color:'var(--color-text)'}}>Ativação automática</div>

        {/* GPS */}
        <div style={{display:'grid',gap:'.4rem'}}>
          <div style={{fontSize:'.62rem',color:'var(--color-text-sub)',textTransform:'uppercase',letterSpacing:'.06em'}}>📍 Por localização GPS</div>
          <div style={{display:'flex',gap:'.5rem'}}>
            <button onClick={saveLocation} disabled={detecting} style={{flex:1,background:'rgba(0,0,0,.2)',border:'1px solid var(--color-border)',borderRadius:'8px',padding:'.55rem',color:prefs.gymLocation?'#4ade80':'var(--color-text-sub)',fontSize:'.78rem',fontWeight:700,cursor:'pointer'}}>
              {detecting ? 'Detectando...' : prefs.gymLocation ? '✓ Local salvo' : 'Salvar local atual'}
            </button>
            {prefs.gymLocation && (
              <button onClick={checkNearby} style={{background:'var(--color-accent)',border:'none',borderRadius:'8px',padding:'.55rem .9rem',color:'#fff',fontSize:'.78rem',fontWeight:700,cursor:'pointer'}}>
                Verificar
              </button>
            )}
          </div>
          <div style={{fontSize:'.62rem',color:'#444'}}>Ativa automaticamente se você estiver a menos de 200m</div>
        </div>

        {/* Wi-Fi */}
        <div style={{display:'grid',gap:'.4rem'}}>
          <div style={{fontSize:'.62rem',color:'var(--color-text-sub)',textTransform:'uppercase',letterSpacing:'.06em'}}>📶 Por nome do Wi-Fi</div>
          <div style={{display:'flex',gap:'.5rem'}}>
            <input
              placeholder="Nome da rede da academia..."
              value={wifiInput}
              onChange={e => setWifiInput(e.target.value)}
              style={{flex:1,background:'rgba(0,0,0,.25)',border:'1px solid var(--color-border)',borderRadius:'8px',padding:'.5rem .75rem',fontSize:'.82rem',color:'var(--color-text)'}}
            />
            <button onClick={saveWifi} style={{background:'var(--color-accent)',border:'none',borderRadius:'8px',padding:'.5rem .85rem',color:'#fff',fontWeight:700,fontSize:'.82rem',cursor:'pointer'}}>OK</button>
          </div>
          <div style={{fontSize:'.62rem',color:'#444'}}>Detecção automática de Wi-Fi disponível apenas no app nativo</div>
        </div>
      </div>
    </div>
  );
};

// DarkTimer — V4.5 (background via SW notification)
const DarkTimer = ({prefs}) => {
  const STORAGE_KEY = "darkset.timer.v1";
  const [sec,setSec]=useState(Math.max(5, Number(prefs.timerPreset||60)));
  const [running,setRunning]=useState(false);
  const endRef = useRef(0);

  // Pede permissão na primeira vez que o componente monta
  useEffect(()=>{ requestNotifPermission(); },[]);

  useEffect(()=>{ if(!running){ setSec(Math.max(5, Number(prefs.timerPreset||60))); } }, [prefs.timerPreset]);

  useEffect(()=>{
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(raw){
        const st = JSON.parse(raw);
        if(st.active && st.endTime){
          const remain = Math.ceil((st.endTime - Date.now())/1000);
          if(remain > 0){
            endRef.current = st.endTime;
            setSec(remain);
            setRunning(true);
          }else{
            setSec(Math.max(5, Number(prefs.timerPreset||60)));
            setRunning(false);
            localStorage.removeItem(STORAGE_KEY);
          }
        }else if(typeof st.pausedSec === "number"){
          setSec(Math.max(0, st.pausedSec));
          setRunning(false);
        }
      }
    }catch(_){}
  },[]);

  // Escuta mensagem do SW avisando que o timer terminou em background
  useEffect(()=>{
    const handler = (event) => {
      if(event.data && event.data.type === 'TIMER_DONE'){
        try{ if(navigator.vibrate) navigator.vibrate([320,140,320,140,420]); }catch(_){}
        setRunning(false);
        setSec(Math.max(5, Number(prefs.timerPreset||60)));
        try{ localStorage.removeItem(STORAGE_KEY); }catch(_){}
      }
    };
    navigator.serviceWorker && navigator.serviceWorker.addEventListener('message', handler);
    return ()=> navigator.serviceWorker && navigator.serviceWorker.removeEventListener('message', handler);
  },[]);

  useEffect(()=>{
    if(!running) return;
    let loop;
    const tick = () => {
      const remainMs = endRef.current - Date.now();
      const remain = Math.max(0, Math.ceil(remainMs/1000));
      if(remain <= 0){
        try{ if(navigator.vibrate) navigator.vibrate([320,140,320,140,420]); }catch(_){}
        try{
          const AC=window.AudioContext||window.webkitAudioContext;
          if(AC){
            const ctx=new AC();
            const g=ctx.createGain(); g.connect(ctx.destination);
            g.gain.setValueAtTime(0.35, ctx.currentTime);
            const mk=(t)=>{ const o=ctx.createOscillator(); o.type="square"; o.frequency.setValueAtTime(700, t); o.connect(g); o.start(t); o.stop(t+0.22); };
            const now=ctx.currentTime; mk(now); mk(now+0.36); mk(now+0.72);
            setTimeout(()=>ctx.close(), 1200);
          }
        }catch(_){}
        swTimerCancel();
        setRunning(false);
        setSec(Math.max(5, Number(prefs.timerPreset||60)));
        try{ localStorage.removeItem(STORAGE_KEY); }catch(_){}
      }else{
        setSec(remain);
        const delay = Math.max(150, 1000 - (Date.now() % 1000));
        loop = setTimeout(tick, delay);
      }
    };
    loop = setTimeout(tick, 150);
    return ()=> clearTimeout(loop);
  },[running]);

  const start = () => {
    const duration = Math.max(1, Number(sec||0));
    endRef.current = Date.now() + duration*1000;
    setRunning(true);
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify({active:true, endTime:endRef.current})); }catch(_){}
    swTimerStart(endRef.current);
  };
  const pause = () => {
    const remain = Math.max(0, Math.ceil((endRef.current - Date.now())/1000));
    setRunning(false);
    setSec(remain || Math.max(5, Number(prefs.timerPreset||60)));
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify({active:false, pausedSec: remain})); }catch(_){}
    swTimerCancel();
  };
  const reset = () => {
    setRunning(false);
    setSec(Math.max(5, Number(prefs.timerPreset||60)));
    try{ localStorage.removeItem(STORAGE_KEY); }catch(_){}
    swTimerCancel();
  };

  const fmtTime = (s) => {
    const m = Math.floor(s / 60);
    const ss = s % 60;
    return m > 0 ? `${m}:${String(ss).padStart(2,'0')}` : `${s}s`;
  };
  const presets=[30,60,90,120,150,180];
  return (
    <div className="border border-borderDark rounded-2xl p-3 grid gap-2 bg-cardDark/70">
      <div className="flex items-start justify-between gap-3">
        <div className="flex flex-col">
          <div className="font-semibold">DarkTimer</div>
          <div className="text-2xl font-semibold tabular-nums mt-1">{fmtTime(sec)}</div>
        </div>
        <div className="flex gap-2">
          <Button onClick={reset}>Reset</Button>
          <Button variant={running?"danger":"accent"} onClick={()=> running ? pause() : start()}>{running? "Pausar":"Iniciar"}</Button>
        </div>
      </div>
      <div className="flex flex-wrap gap-2">
        {presets.map(p=>(
          <button key={p} onClick={()=>{ if(!running){ setSec(p); try{ localStorage.setItem(STORAGE_KEY, JSON.stringify({active:false, pausedSec:p})); }catch(_){} } }} className={"px-3 py-1.5 rounded-full border border-borderDark "+(sec===p?"bg-white/10":"")}>{fmtTime(p)}</button>
        ))}
      </div>
    </div>
  );
};

// ── Smart Rest Duration based on exercise type ───────────────────────────
function smartRestDuration(exName, prefs) {
  if (!exName) return Number(prefs.timerPreset||60);
  const name = (exName||'').toLowerCase();
  const heavy = ['agachamento','levantamento','supino reto barra','barra fixa','desenvolvimento barra','stiff'];
  const light = ['rosca','triceps','panturrilha','abdom','elevacao','crucifixo','kick'];
  if (heavy.some(k=>name.includes(k))) return 120;
  if (light.some(k=>name.includes(k))) return 45;
  return Number(prefs.timerPreset||60);
}

// Global rest timer trigger — called after each set save
function triggerSmartRest(exName, prefs) {
  if (!prefs.showTimer) return;
  const dur = smartRestDuration(exName, prefs);
  const endsAt = Date.now() + dur * 1000;
  // Dispatch event so DarkTimer picks it up
  window.dispatchEvent(new CustomEvent('darkset:startRest', {detail: {endsAt, dur}}));
}

// detectPR: retorna o novo peso se for recorde, null caso contrário
function detectPR(exName, newSets, history) {
  const newBest = Math.max(0, ...newSets.map(s => Number(s.w || 0)));
  if (newBest <= 0) return null;
  const prevBest = Object.values(history).reduce((best, sess) => {
    const entry = (sess.entries || []).find(e => e.name === exName);
    if (!entry) return best;
    const w = Math.max(0, ...(entry.sets || []).map(s => Number(s.w || 0)));
    return w > best ? w : best;
  }, 0);
  return newBest > prevBest ? newBest : null;
}



// ── DELOAD INTELIGENTE ────────────────────────────────────────────────────────
function calcDeloadInfo(history) {
  if (!history||typeof history!=='object') return null;
  const dates=Object.keys(history).sort();
  if (dates.length<8) return null;
  const byWeek={};
  dates.forEach(d=>{const dt=new Date(d),wk=`${dt.getFullYear()}-${Math.floor((dt-new Date(dt.getFullYear(),0,1))/604800000)}`;byWeek[wk]=(byWeek[wk]||0)+1;});
  const activeWeeks=Object.values(byWeek).filter(c=>c>=2).length;
  if (activeWeeks<4) return null;
  const last30=dates.filter(d=>d>=new Date(Date.now()-30*864e5).toISOString().slice(0,10));
  for(let i=1;i<last30.length;i++){if((new Date(last30[i])-new Date(last30[i-1]))/864e5>8)return null;}
  return {weeks:activeWeeks};
}

              : <Button variant="accent" onClick={saveAll}>Concluir e Salvar 💪</Button>

      </div>

      {/* Último treino */}
      {lastPerf && (
        <div className="ds-card" style={{padding:'.85rem 1.1rem'}}>
          <div style={{fontSize:'.65rem',color:'#555',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:'.5rem'}}>Último Treino</div>
          <div className="grid gap-1.5">

  );

// ── COMPARTILHAR TREINO COMO IMAGEM (stories 9:16) ───────────────────────────
async function buildWorkoutImage(session, prefs) {
  const W=1080,H=1920;
  const c=document.createElement('canvas');c.width=W;c.height=H;
  const ctx=c.getContext('2d');
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#090a0c');bg.addColorStop(1,'#0d0f14');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='rgba(255,255,255,.03)';ctx.lineWidth=1;
  for(let x=0;x<W;x+=60){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=60){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  const rl=ctx.createLinearGradient(0,0,W,0);
  rl.addColorStop(0,'transparent');rl.addColorStop(.3,'#7a2a08');rl.addColorStop(.5,'#c4521e');rl.addColorStop(.7,'#7a2a08');rl.addColorStop(1,'transparent');
  ctx.fillStyle=rl;ctx.fillRect(0,0,W,5);
  ctx.textAlign='center';
  ctx.font='900 108px Barlow Condensed, Arial Black, sans-serif';
  ctx.fillStyle='#c0d4de';ctx.fillText('DARK',W/2-90,155);
  ctx.fillStyle='#c4521e';ctx.fillText('SET',W/2+96,155);
  ctx.fillStyle='rgba(255,255,255,.22)';ctx.font='30px monospace';
  ctx.fillText('SEU TREINO · SUA EVOLUÇÃO',W/2,202);
  const hoje=new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long'});
  ctx.fillStyle='rgba(255,255,255,.4)';ctx.font='34px Arial';
  ctx.fillText(hoje.toUpperCase(),W/2,270);
  ctx.fillStyle='#fff';ctx.font='900 72px Barlow Condensed, Arial Black, sans-serif';
  const pn=(session.planName||'TREINO LIVRE').toUpperCase();
  ctx.fillText(pn.length>22?pn.slice(0,22)+'…':pn,W/2,360);
  const sep=ctx.createLinearGradient(80,0,W-80,0);
  sep.addColorStop(0,'transparent');sep.addColorStop(.5,'rgba(196,82,30,.5)');sep.addColorStop(1,'transparent');
  ctx.strokeStyle=sep;ctx.lineWidth=1;ctx.setLineDash([6,5]);
  ctx.beginPath();ctx.moveTo(80,395);ctx.lineTo(W-80,395);ctx.stroke();ctx.setLineDash([]);
  const entries=session.entries||[];
  const startY=430,lineH=Math.min(108,(H-startY-270)/Math.max(entries.length,1));
  entries.forEach((en,i)=>{
    const y=startY+i*lineH;
    const valid=(en.sets||[]).filter(s=>s.r);
    const bestW=Math.max(0,...valid.map(s=>parseFloat(s.w)||0));
    const vol=valid.reduce((a,s)=>a+(parseFloat(s.w)||0)*(parseFloat(s.r)||0),0);
    ctx.fillStyle=i%2===0?'rgba(255,255,255,.06)':'rgba(255,255,255,.03)';
    ctx.beginPath();if(ctx.roundRect)ctx.roundRect(60,y,W-120,lineH-6,8);else ctx.rect(60,y,W-120,lineH-6);ctx.fill();
    ctx.fillStyle='#dce8f0';ctx.font='700 40px Barlow Condensed, Arial Narrow, sans-serif';ctx.textAlign='left';
    let nm=en.name||'';while(ctx.measureText(nm).width>W-340&&nm.length>4)nm=nm.slice(0,-1);if(nm!==en.name)nm+='…';
    ctx.fillText(nm,90,y+lineH*.52);
    ctx.fillStyle='rgba(196,82,30,.9)';ctx.font='700 30px Arial';ctx.textAlign='right';
    ctx.fillText(bestW>0?`${bestW}kg · ${valid.length}s · ${Math.round(vol)}vol`:`${valid.length}s`,W-90,y+lineH*.52);
  });
  const totalSets=entries.reduce((a,en)=>a+(en.sets||[]).filter(s=>s.r).length,0);
  const totalVol=entries.reduce((a,en)=>a+(en.sets||[]).reduce((b,s)=>b+(parseFloat(s.w)||0)*(parseFloat(s.r)||0),0),0);
  const bY=H-240;
  ctx.strokeStyle='rgba(196,82,30,.25)';ctx.lineWidth=1;ctx.setLineDash([5,5]);
  ctx.beginPath();ctx.moveTo(80,bY-16);ctx.lineTo(W-80,bY-16);ctx.stroke();ctx.setLineDash([]);
  [{l:'EXERCÍCIOS',v:String(entries.length)},{l:'SÉRIES',v:String(totalSets)},{l:'VOLUME',v:totalVol>0?Math.round(totalVol)+'kg':'—'}].forEach((st,i)=>{
    const x=W/6+i*(W/3);ctx.textAlign='center';
    ctx.fillStyle='#c4521e';ctx.font='900 68px Barlow Condensed, Arial Black, sans-serif';ctx.fillText(st.v,x,bY+55);
    ctx.fillStyle='rgba(255,255,255,.3)';ctx.font='26px monospace';ctx.fillText(st.l,x,bY+88);
  });
  ctx.fillStyle='rgba(255,255,255,.15)';ctx.font='24px monospace';ctx.textAlign='center';
  ctx.fillText('#DarkSet · darkset.app',W/2,H-55);
  return new Promise(res=>c.toBlob(res,'image/png',.92));
}

const ShareWorkoutBtn=({history,prefs,setToast,onDone,fullBtn=false})=>{

        await navigator.share({title:'Meu treino — DarkSet',text:`${sess.entries.length} exercícios 💪 #DarkSet`,files:[file]});

const History=({history,setHistory,prefs})=>{
  const [dateSearch,setDateSearch]=useState("");
  const [weekday,setWeekday]=useState("");
  const [planFilter,setPlanFilter]=useState("");
  const [detail,setDetail]=useState(null);
  const [exportMsg,setExportMsg]=useState(null);

  const parseNum=(v)=>{const n=parseFloat(String(v).replace(",","."));return isFinite(n)?n:0;};
  const volSets=(sets)=>sets.reduce((acc,s)=>acc+(parseNum(s.w)*parseNum(s.r)),0);
  const volSession=(obj)=>(obj.entries||[]).reduce((acc,en)=>acc+volSets(en.sets||[]),0);
  const toBR=(iso)=>{const [y,m,d]=iso.split("-");return `${d}/${m}/${y}`;};

  var _hdays=getDSPlan().perms.historyDays||30; var _hcut=new Date(); _hcut.setDate(_hcut.getDate()-_hdays);
  const entries=Object.entries(history).sort((a,b)=>a[0]>b[0]?-1:1).filter(function(x){return new Date(x[0])>=_hcut;});

  const prMap=useMemo(()=>{
    const map={};
    entries.forEach(([,obj])=>{
      (obj.entries||[]).forEach(en=>{
        (en.sets||[]).forEach(s=>{
          const w=parseNum(s.w),r=parseNum(s.r);
          if(!w||!r) return;
          const est=w*(1+r/30);
          if(!map[en.name]||est>map[en.name]) map[en.name]=est;
        });
      });
    });
    return map;
  },[entries.length]);

  const matchDate=(iso)=>{
    if(!dateSearch) return true;

  const filtered=entries.filter(([date,o])=>(!weekday||o.day===weekday)&&(!planFilter||o.planName===planFilter)&&matchDate(date));
  const planOptions=[...new Set(entries.map(([,o])=>o.planName).filter(Boolean))];

        </div>

              const w=parseNum(s.w),r=parseNum(s.r);

// ── ErrorBoundary — prevents full black screen on component crash ──
class ScreenErrorBoundary extends React.Component {
  constructor(props){ super(props); this.state={hasError:false,msg:''}; }
  static getDerivedStateFromError(e){ return {hasError:true,msg:e&&e.message?e.message:'Erro desconhecido'}; }
  componentDidCatch(e,info){ console.warn('[DarkSet] Screen crash:',e,info); }
  render(){
    if(this.state.hasError) return (
      <div style={{padding:'2rem 1rem',textAlign:'center'}}>
        <div style={{fontSize:'2rem',marginBottom:'.75rem'}}>⚠️</div>
        <div style={{fontWeight:700,fontSize:'1rem',marginBottom:'.4rem',color:'#f0f0f0'}}>Algo deu errado</div>
        <div style={{fontSize:'.78rem',color:'#555',marginBottom:'1.2rem'}}>{this.state.msg}</div>
        <button onClick={()=>this.setState({hasError:false,msg:''})}
          style={{background:'var(--color-accent)',border:'none',borderRadius:'8px',padding:'.55rem 1.4rem',color:'#fff',fontWeight:800,fontSize:'.88rem',cursor:'pointer'}}>
          Tentar novamente
        </button>
      </div>
    );
    return this.props.children;
  }
}

const Profile=({prefs,setPrefs,history,setToast=()=>{}})=>{

  const toggleTrainDay=d=>setTrainDays(prev=>prev.includes(d)?prev.filter(x=>x!==d):[...prev,d].sort((a,b)=>a-b));
  const [showTimer,setShowTimer]=useState(prefs.showTimer!==false);
  const [timerPreset,setTimerPreset]=useState(Number(prefs.timerPreset||60));
  const [rir,setRir]=useState(typeof prefs.rirDefault==='number'?prefs.rirDefault:2);
  const [theme,setTheme]=useState(prefs.theme||'dark');
  const [uploading,setUploading]=useState(false);
  const [uploadErr,setUploadErr]=useState(null);
  const [syncMsg,setSyncMsg]=useState('');
  // Progresso
  const [progressPhotos,setProgressPhotos]=useState(()=>{
    try{return JSON.parse(localStorage.getItem('darkset.progress')||'[]');}catch(_){return [];}
  });
  const [addingPhoto,setAddingPhoto]=useState(false);
  const [photoDate,setPhotoDate]=useState(new Date().toISOString().slice(0,10));
  const [photoLabel,setPhotoLabel]=useState('');
  const [pendingPhotoData,setPendingPhotoData]=useState(null);
  const photoRef=useRef(null);
  const fileRef=useRef(null);

  const dirty=(name!==prefs.name)||(avatarUrl!==(prefs.avatarUrl||null))||(unit!==prefs.unit)||(vibrate!==(prefs.vibrate!==false))||(showTimer!==(prefs.showTimer!==false))||(Number(timerPreset)!==Number(prefs.timerPreset||60))||(Number(rir)!==Number(typeof prefs.rirDefault==='number'?prefs.rirDefault:2))||JSON.stringify(trainDays)!==JSON.stringify(prefs.trainDays||[1,2,3,4,5,6]);
  const _profilePlanState = React.useMemo(()=>{ try{ return getDSPlan(); }catch(_){ return {tier:'free',isTrialActive:false,trialDaysLeft:0}; } }, []);

  const savePrefs=()=>setPrefs({name,avatarUrl,unit,vibrate,weeklyGoal:trainDays.length,trainDays,showTimer,timerPreset,rirDefault:rir,chartsPremium:!!prefs.chartsPremium,theme,goal:prefs.goal,gymMode:prefs.gymMode,gymLocation:prefs.gymLocation,gymWifi:prefs.gymWifi,playlists:prefs.playlists,onboarded:prefs.onboarded});

      const reader=new FileReader();
      reader.onload=ev=>{ setAvatarUrl(ev.target.result); setUploading(false); };
      reader.readAsDataURL(file);
    }catch(err){setUploadErr('Erro: '+(err.message||''));setUploading(false);}
  };

  const handleProgressPhoto=(e)=>{
    const file=e.target.files&&e.target.files[0];
    if(!file) return;
    const reader=new FileReader();
    reader.onload=ev=>{setPendingPhotoData(ev.target.result);setAddingPhoto(true);};
    reader.readAsDataURL(file);
    e.target.value='';
  };
  const saveProgressPhoto=()=>{
    if(!pendingPhotoData) return;
    const newPhotos=[...progressPhotos,{date:photoDate,label:photoLabel||'Foto',data:pendingPhotoData,id:Date.now()}];
    setProgressPhotos(newPhotos);
    try{localStorage.setItem('darkset.progress',JSON.stringify(newPhotos));}catch(_){}
    setAddingPhoto(false); setPendingPhotoData(null); setPhotoLabel('');
  };
  const deletePhoto=(id)=>{
    const updated=progressPhotos.filter(p=>p.id!==id);
    setProgressPhotos(updated);
    try{localStorage.setItem('darkset.progress',JSON.stringify(updated));}catch(_){}
  };

  const [profileUser,setProfileUser]=useState(()=>{try{return JSON.parse(localStorage.getItem('darkset.user'));}catch(_){return null;}});
  useEffect(()=>{
    const iv=setInterval(()=>{try{setProfileUser(JSON.parse(localStorage.getItem('darkset.user')));}catch(_){}},800);
    return ()=>clearInterval(iv);
  },[]);

  const doSync=async()=>{
    const uid=getUID();
    if(!uid){setSyncMsg('Faca login primeiro.');return;}
    if(!window._db){setSyncMsg('Firebase nao conectado.');return;}
    window._DS_LAST_ERROR=null;
    setSyncMsg('Sincronizando...');
    try{
      await window.DSSync.pull(uid);
      setSyncMsg(window._DS_LAST_ERROR?'Erro: '+window._DS_LAST_ERROR:'Sincronizado!');
      setTimeout(()=>setSyncMsg(''),3000);
    }catch(e){setSyncMsg('Erro: '+e.message);}
  };

  const uid=getUID();
  const displayImg=avatarUrl||null;
  const toBR=(iso)=>{if(!iso)return '';const[y,m,d]=iso.split('-');return d+'/'+m+'/'+y;};

  return (
    <div style={{marginTop:'1rem',display:'grid',gap:'1rem'}}>

      {/* Header */}
      <div className="ds-card" style={{padding:'1rem 1.1rem'}}>
        <div style={{display:'flex',alignItems:'center',gap:'1rem'}}>
          <div style={{position:'relative'}}>
            {displayImg
              ?<img src={displayImg} style={{width:'56px',height:'56px',borderRadius:'50%',border:'2px solid var(--color-border)',objectFit:'cover'}} alt="avatar"/>
              :<div style={{width:'56px',height:'56px',borderRadius:'50%',border:'2px solid var(--color-border)',background:'var(--color-card-soft)',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:'1.3rem',color:'var(--color-text-sub)'}}>{name?name.slice(0,2).toUpperCase():'DS'}</div>
            }
            <button onClick={()=>fileRef.current&&fileRef.current.click()} style={{position:'absolute',bottom:'-2px',right:'-2px',width:'20px',height:'20px',borderRadius:'50%',background:'var(--color-accent)',border:'2px solid var(--color-bg)',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',fontSize:'.65rem',color:'#fff',fontWeight:700}}>e</button>
            <input ref={fileRef} type="file" accept="image/*" style={{display:'none'}} onChange={handlePhotoChange}/>
          </div>
          <div style={{flex:1}}>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:'1.4rem',textTransform:'uppercase',letterSpacing:'.04em',lineHeight:1,color:'var(--color-text)'}}>{name||'Sem nome'}</div>
            <div style={{fontSize:'.7rem',color:'var(--color-text-sub)',marginTop:'2px'}}>Meta: {goal} treinos/semana</div>
            <div style={{marginTop:'5px',display:'flex',gap:'5px',flexWrap:'wrap'}}>
                {_profilePlanState.tier==='elite' ? <span style={{background:'linear-gradient(90deg,#e31b23,#b31217)',color:'#fff',fontSize:'.62rem',fontWeight:900,padding:'.15rem .5rem',borderRadius:'20px'}}>⚡ ELITE</span> : null}
                {_profilePlanState.tier==='darkgod' ? <span style={{background:'#0d0d0f',border:'1px solid #e31b23',color:'#e31b23',fontSize:'.62rem',fontWeight:900,padding:'.15rem .5rem',borderRadius:'20px'}}>👑 DARKGOD</span> : null}
                {(!_profilePlanState.tier||_profilePlanState.tier==='free')&&!_profilePlanState.isTrialActive ? <span style={{background:'rgba(255,255,255,.05)',color:'#555',fontSize:'.62rem',fontWeight:600,padding:'.15rem .5rem',borderRadius:'20px',cursor:'pointer'}} onClick={function(){window._showPaywall&&window._showPaywall('Recursos avançados');}}>Gratuito — Ver Elite ›</span> : null}
                {_profilePlanState.isTrialActive ? <span style={{background:'rgba(227,27,35,.15)',border:'1px solid rgba(227,27,35,.3)',color:'#e31b23',fontSize:'.62rem',fontWeight:700,padding:'.15rem .5rem',borderRadius:'20px'}}>✨ Trial Elite — {_profilePlanState.trialDaysLeft}d</span> : null}
              </div>
          </div>
        </div>
        {uploading&&<div style={{marginTop:'.5rem',fontSize:'.72rem',color:'var(--color-text-sub)'}}>Carregando...</div>}
        {uploadErr&&<div style={{marginTop:'.5rem',fontSize:'.72rem',color:'var(--color-accent)'}}>{uploadErr}</div>}
      </div>

      {/* Tabs */}
      <div className="mode-toggle">
        <button className={"mode-toggle-btn"+(tab==='config'?' active':'')} onClick={()=>setTab('config')}>Configurações</button>
        <button className={"mode-toggle-btn"+(tab==='progresso'?' active':'')} onClick={()=>setTab('progresso')}>Progresso</button>
      </div>

      {/* ── CONFIG ── */}
      {tab==='config'&&(
        <div className="ds-card" style={{padding:'1rem 1.1rem',display:'grid',gap:'1rem',background:'var(--color-card)'}}>

          <div>
            <div style={{fontSize:'.65rem',color:'var(--color-text-sub)',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:'.35rem'}}>Nome</div>
            <input style={{width:'100%',background:'rgba(0,0,0,.25)',border:'1px solid var(--color-border)',borderRadius:'8px',padding:'.55rem .85rem',fontSize:'.9rem',color:'var(--color-text)'}} placeholder="Seu nome" value={name} onChange={e=>setName(e.target.value)}/>
          </div>

          <div>
            <div style={{fontSize:'.65rem',color:'var(--color-text-sub)',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:'.4rem'}}>Tema</div>
            <div className="mode-toggle">
              <button className={"mode-toggle-btn"+(theme==='dark'?' active':'')} onClick={()=>changeTheme('dark')}>🌑 Dark</button>
              <button className={"mode-toggle-btn"+(theme==='light'?' active':'')} onClick={()=>changeTheme('light')}>☀️ Light</button>
            </div>
          </div>

          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <div style={{fontSize:'.65rem',color:'var(--color-text-sub)',textTransform:'uppercase',letterSpacing:'.07em'}}>Unidade</div>
            <div className="mode-toggle" style={{width:'auto'}}>
              <button className={"mode-toggle-btn"+(unit==='kg'?' active':'')} onClick={()=>setUnit('kg')}>kg</button>
              <button className={"mode-toggle-btn"+(unit==='lb'?' active':'')} onClick={()=>setUnit('lb')}>lb</button>
            </div>
          </div>

          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <div style={{fontSize:'.65rem',color:'var(--color-text-sub)',textTransform:'uppercase',letterSpacing:'.07em'}}>Vibração ao salvar</div>
            <Switch checked={vibrate} onChange={setVibrate}/>
          </div>

          <div>
            <div style={{fontSize:'.65rem',color:'var(--color-text-sub)',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:'.4rem'}}>Meta semanal</div>
            <div style={{display:'flex',gap:'.4rem'}}>
              {[3,4,5,6,7].map(n=>(
                <button key={n} onClick={()=>setGoal(n)} style={{flex:1,padding:'.4rem 0',borderRadius:'7px',background:goal===n?'var(--color-accent)':'rgba(0,0,0,.2)',border:goal===n?'none':'1px solid var(--color-border)',color:goal===n?'#fff':'var(--color-text-sub)',fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:'.9rem',cursor:'pointer'}}>{n}x</button>
              ))}
            </div>
          </div>

          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <div style={{fontSize:'.65rem',color:'var(--color-text-sub)',textTransform:'uppercase',letterSpacing:'.07em'}}>DarkTimer</div>
            <Switch checked={showTimer} onChange={setShowTimer}/>
          </div>

          <div>
            <div style={{fontSize:'.65rem',color:'var(--color-text-sub)',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:'.4rem'}}>Tempo padrão (s)</div>
            <div style={{display:'flex',gap:'.4rem'}}>
              {[30,45,60,90,120].map(n=>(
                <button key={n} onClick={()=>setTimerPreset(n)} style={{flex:1,padding:'.35rem 0',borderRadius:'7px',background:timerPreset===n?'var(--color-accent)':'rgba(0,0,0,.2)',border:timerPreset===n?'none':'1px solid var(--color-border)',color:timerPreset===n?'#fff':'var(--color-text-sub)',fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:'.78rem',cursor:'pointer'}}>{n}s</button>
              ))}
            </div>
          </div>

          <div>
            <div style={{fontSize:'.65rem',color:'var(--color-text-sub)',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:'.4rem'}}>RIR padrão</div>
            <div style={{display:'flex',gap:'.4rem'}}>
              {[0,1,2,3,4].map(n=>(
                <button key={n} onClick={()=>setRir(n)} style={{flex:1,padding:'.35rem 0',borderRadius:'7px',background:rir===n?'var(--color-accent)':'rgba(0,0,0,.2)',border:rir===n?'none':'1px solid var(--color-border)',color:rir===n?'#fff':'var(--color-text-sub)',fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:'.9rem',cursor:'pointer'}}>{n}</button>
              ))}
            </div>
          </div>

          <button disabled={!dirty||uploading} onClick={savePrefs} style={{background:dirty&&!uploading?'var(--color-accent)':'rgba(0,0,0,.15)',border:'none',borderRadius:'8px',padding:'.65rem',color:dirty&&!uploading?'#fff':'var(--color-text-sub)',fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:'1rem',textTransform:'uppercase',letterSpacing:'.05em',cursor:dirty&&!uploading?'pointer':'default',width:'100%',transition:'all .15s'}}>
            {dirty?'Salvar alterações':'Sem alterações'}
          </button>

          {/* Notificações */}
          <NotifSettings prefs={prefs} setPrefs={setPrefs} setToast={()=>{}}/>

          {/* Sync */}
          <div style={{borderTop:'1px solid var(--color-border)',paddingTop:'1rem',display:'grid',gap:'.5rem'}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <div>
                <div style={{fontSize:'.65rem',color:'var(--color-text-sub)',textTransform:'uppercase',letterSpacing:'.07em'}}>Sincronização</div>
                <div style={{fontSize:'.7rem',color:uid?'#4ade80':'var(--color-text-sub)',marginTop:'1px'}}>{uid?'Conectado':'Sem login'}</div>
              </div>
              <button onClick={doSync} disabled={!uid} style={{background:uid?'rgba(74,222,128,.1)':'rgba(0,0,0,.15)',border:uid?'1px solid rgba(74,222,128,.25)':'1px solid var(--color-border)',borderRadius:'7px',padding:'.4rem .85rem',color:uid?'#4ade80':'var(--color-text-sub)',fontSize:'.75rem',fontWeight:700,textTransform:'uppercase',cursor:uid?'pointer':'default'}}>
                Sincronizar
              </button>
            </div>
            {syncMsg&&<div style={{fontSize:'.72rem',color:syncMsg.startsWith('Erro')?'#e31b23':'#4ade80'}}>{syncMsg}</div>}
          </div>

          {/* Tutorial */}
          <div style={{borderTop:'1px solid var(--color-border)',paddingTop:'.85rem',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <div style={{fontSize:'.65rem',color:'var(--color-text-sub)',textTransform:'uppercase',letterSpacing:'.07em'}}>Tutorial</div>
            <button onClick={()=>{localStorage.removeItem('darkset.launched');window.location.reload();}} style={{background:'rgba(0,0,0,.15)',border:'1px solid var(--color-border)',borderRadius:'7px',padding:'.4rem .85rem',color:'var(--color-text-sub)',fontSize:'.72rem',fontWeight:700,textTransform:'uppercase',cursor:'pointer'}}>
              Ver novamente
            </button>
          </div>

        </div>
      )}

      {/* ── PROGRESSO ── */}
      {tab==='progresso'&&(
        <div style={{display:'grid',gap:'1rem'}}>
          <div className="ds-card" style={{padding:'1rem 1.1rem',background:'var(--color-card)'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'.75rem'}}>
              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:'1rem',textTransform:'uppercase',color:'var(--color-text)'}}>Fotos de Progresso</div>
              <button onClick={function(){
                  var _p=getDSPlan(); var max=_p.perms.maxPhotosPerDay||0;
                  if(max===0){ window._showPaywall&&window._showPaywall('Fotos de progresso'); return; }
                  var todayPics=progressPhotos.filter(function(x){return x.date===photoDate;});
                  if(todayPics.length>=max){ window._showPaywall&&window._showPaywall('Mais fotos hoje'); return; }
                  photoRef.current&&photoRef.current.click();
                }} style={{background:'var(--color-accent)',border:'none',borderRadius:'7px',padding:'.35rem .9rem',color:'#fff',fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:'.78rem',textTransform:'uppercase',cursor:'pointer'}}>+ Foto</button>
              <input ref={photoRef} type="file" accept="image/*" capture="environment" style={{display:'none'}} onChange={handleProgressPhoto}/>
            </div>

            {progressPhotos.length===0&&!addingPhoto&&(
              <div style={{textAlign:'center',padding:'2rem 1rem',color:'var(--color-text-sub)',fontSize:'.85rem'}}>
                <div style={{fontSize:'2rem',marginBottom:'.5rem'}}>📸</div>
                <div>Nenhuma foto ainda</div>
                <div style={{fontSize:'.72rem',marginTop:'.25rem',color:'#333'}}>Registre sua evolução mês a mês</div>
              </div>
            )}

            {progressPhotos.length>0&&(
              <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'.4rem',marginBottom:'.75rem'}}>
                {progressPhotos.map(p=>(
                  <div key={p.id} style={{position:'relative',borderRadius:'6px',overflow:'hidden',aspectRatio:'1',background:'var(--color-card-soft)'}}>
                    <img src={p.data} style={{width:'100%',height:'100%',objectFit:'cover'}} alt={p.label}/>
                    <div style={{position:'absolute',bottom:0,left:0,right:0,background:'linear-gradient(transparent,rgba(0,0,0,.85))',padding:'4px 5px'}}>
                      <div style={{fontSize:'.58rem',color:'#ddd',fontWeight:600}}>{toBR(p.date)}</div>
                      <div style={{fontSize:'.52rem',color:'#aaa'}}>{p.label}</div>
                    </div>
                    <button onClick={()=>deletePhoto(p.id)} style={{position:'absolute',top:'3px',right:'3px',background:'rgba(0,0,0,.75)',border:'none',borderRadius:'50%',width:'18px',height:'18px',color:'#e31b23',fontSize:'.7rem',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',lineHeight:1}}>×</button>
                  </div>
                ))}
              </div>
            )}

            {addingPhoto&&(
              <div style={{background:'var(--color-card-soft)',border:'1px solid var(--color-border)',borderRadius:'8px',padding:'.75rem',display:'grid',gap:'.5rem'}}>
                {pendingPhotoData&&<img src={pendingPhotoData} style={{width:'100%',maxHeight:'180px',objectFit:'cover',borderRadius:'6px'}} alt="preview"/>}
                <input type="date" value={photoDate} onChange={e=>setPhotoDate(e.target.value)} style={{background:'rgba(0,0,0,.25)',border:'1px solid var(--color-border)',borderRadius:'6px',padding:'.4rem .65rem',fontSize:'.85rem',color:'var(--color-text)'}}/>
                <input placeholder="Descrição (ex: Início, Mês 1...)" value={photoLabel} onChange={e=>setPhotoLabel(e.target.value)} style={{background:'rgba(0,0,0,.25)',border:'1px solid var(--color-border)',borderRadius:'6px',padding:'.4rem .65rem',fontSize:'.85rem',color:'var(--color-text)'}}/>
                <div style={{display:'flex',gap:'.4rem'}}>
                  <button onClick={saveProgressPhoto} style={{flex:1,background:'var(--color-accent)',border:'none',borderRadius:'7px',padding:'.45rem',color:'#fff',fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:'.85rem',textTransform:'uppercase',cursor:'pointer'}}>Salvar</button>
                  <button onClick={()=>{setAddingPhoto(false);setPendingPhotoData(null);}} style={{flex:1,background:'rgba(0,0,0,.15)',border:'1px solid var(--color-border)',borderRadius:'7px',padding:'.45rem',color:'var(--color-text-sub)',fontSize:'.82rem',cursor:'pointer'}}>Cancelar</button>
                </div>
              </div>
            )}
          </div>
        </div>
      )}


      {/* Conta */}
      <div className="ds-card" style={{padding:'1rem 1.1rem',display:'grid',gap:'.75rem'}}>
        <div style={{fontSize:'.65rem',color:'var(--color-text-sub)',textTransform:'uppercase',letterSpacing:'.07em'}}>Conta</div>
        {profileUser ? (
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:'.75rem'}}>
            <div style={{display:'flex',alignItems:'center',gap:'.65rem',minWidth:0}}>
              {profileUser.photoURL
                ? <img src={profileUser.photoURL} style={{width:'36px',height:'36px',borderRadius:'50%',border:'1px solid var(--color-border)',objectFit:'cover'}} alt=""/>
                : <div style={{width:'36px',height:'36px',borderRadius:'50%',border:'1px solid var(--color-border)',background:'rgba(227,27,35,.1)',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:'.9rem',color:'var(--color-accent)'}}>{(profileUser.displayName||profileUser.email||'U').slice(0,2).toUpperCase()}</div>
              }
              <div style={{minWidth:0}}>
                <div style={{fontWeight:700,fontSize:'.84rem',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{profileUser.displayName||'Usuário'}</div>
                <div style={{fontSize:'.68rem',color:'var(--color-text-sub)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{profileUser.email||''}</div>
              </div>
            </div>
            <button onClick={()=>window.DSAuth&&DSAuth.signOut()} style={{background:'rgba(248,113,113,.08)',border:'1px solid rgba(248,113,113,.2)',borderRadius:'8px',padding:'.4rem .85rem',color:'#f87171',fontSize:'.78rem',fontWeight:700,cursor:'pointer',flexShrink:0,whiteSpace:'nowrap'}}>Desconectar</button>
          </div>
        ) : (
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <div style={{fontSize:'.82rem',color:'var(--color-text-sub)'}}>Entre para sincronizar seus dados</div>
            <button onClick={()=>window.openAuthModal&&openAuthModal('signIn')} style={{background:'var(--color-accent)',border:'none',borderRadius:'8px',padding:'.45rem .9rem',color:'#fff',fontWeight:800,fontSize:'.8rem',cursor:'pointer'}}>Entrar</button>
          </div>
        )}
      </div>

      {/* Suporte */}
      <MeuPersonalSection setToast={setToast}/>
      <div className="ds-card" style={{padding:'1rem 1.1rem',display:'grid',gap:'.6rem'}}>
        <div style={{fontSize:'.65rem',color:'var(--color-text-sub)',textTransform:'uppercase',letterSpacing:'.07em'}}>Suporte</div>
        <div style={{fontSize:'.82rem',color:'var(--color-text-sub)',lineHeight:1.4}}>Encontrou um bug ou tem uma sugestão? Fale com a gente.</div>
        <a href="mailto:suporte@darksetapp.com" style={{display:'flex',alignItems:'center',gap:'.6rem',background:'rgba(255,255,255,.04)',border:'1px solid var(--color-border)',borderRadius:'9px',padding:'.65rem .85rem',textDecoration:'none',color:'var(--color-text)'}}>
          <span style={{fontSize:'1.1rem'}}>✉️</span>
          <div>
            <div style={{fontWeight:700,fontSize:'.84rem'}}>suporte@darksetapp.com</div>
            <div style={{fontSize:'.65rem',color:'var(--color-text-sub)',marginTop:'1px'}}>Respondemos em até 24h</div>
          </div>
        </a>
      </div>
    </div>
  );
};

function calcStreak(history, prefs) {
  const today = new Date();
  const trainDays = prefs?.trainDays || [1,2,3,4,5,6];
  let s = 0;
  const d = new Date(today);
  const todayKey = today.toISOString().slice(0,10);
  if (trainDays.includes(today.getDay()) && !history[todayKey]) d.setDate(d.getDate()-1);
  for (let i=0; i<90; i++) {
    const k = d.toISOString().slice(0,10);
    const isTrain = trainDays.includes(d.getDay());
    if (!isTrain) { d.setDate(d.getDate()-1); continue; }
    if (history[k]) { s++; d.setDate(d.getDate()-1); } else break;
  }
  return s;
}
function calcTotalVol(history) {
  const n = v => { const x=parseFloat(String(v).replace(',','.')); return isFinite(x)?x:0; };
  return Object.values(history).reduce((a,obj)=>
    a+(obj.entries||[]).reduce((b,en)=>b+(en.sets||[]).reduce((c,s)=>c+n(s.w)*n(s.r),0),0),0);
}
function calcPRCount(history) {
  const best = {};
  const n = v => { const x=parseFloat(String(v).replace(',','.')); return isFinite(x)?x:0; };
  let prs = 0;
  Object.entries(history).sort((a,b)=>a[0].localeCompare(b[0])).forEach(([,obj])=>{
    (obj.entries||[]).forEach(en=>{
      (en.sets||[]).forEach(s=>{
        const w=n(s.w),r=n(s.r); if(!w||!r) return;
        const est=w*(1+r/30);
        if(!best[en.name]||est>best[en.name]+0.01){best[en.name]=est;prs++;}
      });
    });
  });
  return prs;
}
function countUniqueEx(history) {
  const ex = new Set();
  Object.values(history).forEach(obj=>(obj.entries||[]).forEach(en=>ex.add(en.name)));
  return ex.size;
}
function hasEarlyWorkout(history) {
  return Object.entries(history).some(([,obj])=>{
    const d = new Date(obj.startTime||'');
    return !isNaN(d) && d.getHours() < 7;
  });
}
function countEarlyWorkouts(history) {
  return Object.entries(history).filter(([,obj])=>{
    const d = new Date(obj.startTime||'');
    return !isNaN(d) && d.getHours() < 7;
  }).length;
}
function hasPerfectWeek(history, prefs) {
  const trainDays = prefs?.trainDays || [1,2,3,4,5,6];
  for (let w=0; w<12; w++) {
    const d = new Date(); d.setDate(d.getDate() - d.getDay() - w*7 + 1);
    let perfect = true;
    for (let i=0; i<7; i++) {
      const dd = new Date(d); dd.setDate(d.getDate()+i);
      if (!trainDays.includes(dd.getDay())) continue;
      if (!history[dd.toISOString().slice(0,10)]) { perfect=false; break; }
    }
    if (perfect && trainDays.some(td=>{
      const dd=new Date(d); dd.setDate(d.getDate()+td); return history[dd.toISOString().slice(0,10)];
    })) return true;
  }
  return false;
}

const BarcodeScanner = ({onResult, onClose}) => {
  const videoRef  = React.useRef(null);
  const streamRef = React.useRef(null);
  const rafRef    = React.useRef(null);
  const fileRef   = React.useRef(null);

  const [status, setStatus]       = useState('requesting');
  // requesting | scanning | searching | ai_analyzing | preview | notfound
  const [manualCode, setManualCode] = useState('');
  const [camErr, setCamErr]         = useState(false);
  const [preview, setPreview]       = useState(null);
  const [editPrev, setEditPrev]     = useState({});
  const [portion, setPortion]       = useState('100'); // grams per portion for per-100g products

  const num = v => { const x = parseFloat(String(v||0).replace(',','.')); return isFinite(x)?x:0; };

  // ── Open Food Facts ──────────────────────────────────────────────────────
  const fetchProduct = React.useCallback(async (barcode) => {
    setStatus('searching');
    setPreview(null);
    try {
      const r = await fetch(
        'https://world.openfoodfacts.org/api/v2/product/'+barcode+
        '?fields=product_name,product_name_pt,brands,nutriments,serving_size,serving_quantity'
      );
      const data = await r.json();
      if (!data || (data.status !== 1 && data.status !== '1') || !data.product) {
        setStatus('notfound'); return;
      }
      const p = data.product;
      const n = p.nutriments || {};

      // Exhaustive field extraction - OFF uses many key variants
      const tryN = (...keys) => { for(const k of keys){ const v=num(n[k]); if(v>0) return v; } return 0; };
      const cal  = tryN('energy-kcal_100g','energy-kcal_serving','energy-kcal','energy_100g_kcal') ||
                   (tryN('energy_100g','energy_serving','energy') / 4.184);
      const prot = tryN('proteins_100g','protein_100g','proteins_serving','proteins','protein');
      const carb = tryN('carbohydrates_100g','carbohydrate_100g','carbohydrates_serving','carbohydrates','carbohydrate');
      const fat  = tryN('fat_100g','fats_100g','fat_serving','fat','fats','total-fat_100g');
      const fiber= tryN('fiber_100g','fibers_100g','fiber_serving','fiber','fibers');
      const name = p.product_name_pt || p.product_name || p.generic_name_pt || p.generic_name || 'Produto ' + barcode;
      const brand = (p.brands||'').split(',')[0].trim();
      // Prefer serving_quantity, then quantity parsed, then 100g default
      const servQty = num(p.serving_quantity) || 100;
      const hasNutrients = cal > 0 || prot > 0 || carb > 0 || fat > 0;

      const result = {
        name,
        cal100: cal, prot100: prot, carb100: carb, fat100: fat,
        calories: String(Math.round(cal  * servQty/100)),
        protein:  String(Math.round(prot * servQty/100)),
        carbs:    String(Math.round(carb * servQty/100)),
        fat:      String(Math.round(fat  * servQty/100)),
        note: [brand, p.serving_size?'porção: '+p.serving_size:'', !hasNutrients?'⚠️ macros não disponíveis nesta base':''].filter(Boolean).join(' · '),
        icon: '🛒',
        per100g: true,
        servQty,
        hasNutrients,
      };
      setPortion(String(servQty));
      setPreview(result);
      setEditPrev({...result});
      setStatus('preview');
    } catch(e) {
      console.warn('OFF error', e);
      setStatus('notfound');
    }
  }, []);

  // ── Busca por nome (fallback quando barcode não tem macros) ────────────
  const [nameSearch, setNameSearch] = useState('');
  const [nameResults, setNameResults] = useState([]);
  const [showNameSearch, setShowNameSearch] = useState(false);

  const [nameLoading, setNameLoading] = useState(false);
  const [nameNotFound, setNameNotFound] = useState(false);

  const searchByName = async (queryArg) => {
    const q = (queryArg !== undefined ? queryArg : nameSearch).trim();
    if (!q) return;
    setNameLoading(true); setNameNotFound(false); setNameResults([]);
    try {
      const r = await fetch(
        'https://world.openfoodfacts.org/cgi/search.pl?search_terms='+encodeURIComponent(q)+
        '&search_simple=1&action=process&json=1&page_size=10' +
        '&fields=product_name,product_name_pt,brands,nutriments,serving_size,serving_quantity,code'
      );
      if (!r.ok) throw new Error('HTTP '+r.status);
      const data = await r.json();
      const products = (data.products||[]).filter(p => p.product_name||p.product_name_pt);
      if (!products.length) { setNameNotFound(true); }
      else { setNameResults(products); }

      console.warn('name search error', e);
      setNameNotFound(true);
    }

  // ── Câmera ───────────────────────────────────────────────────────────────
  useEffect(() => {
    let cancelled = false;

      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 } }
        });
        if (cancelled) { stream.getTracks().forEach(t=>t.stop()); return; }
        streamRef.current = stream;
        if (videoRef.current) { videoRef.current.srcObject = stream; await videoRef.current.play(); }
        setStatus('scanning');
        if ('BarcodeDetector' in window) {
          const det = new BarcodeDetector({ formats: ['ean_13','ean_8','upc_a','upc_e','code_128','qr_code'] });
          const tick = async () => {
            if (cancelled || !videoRef.current) return;
            try {
              const codes = await det.detect(videoRef.current);
              if (codes.length) { stopCamera(); fetchProduct(codes[0].rawValue); return; }
            } catch(_) {}
            rafRef.current = requestAnimationFrame(tick);
          };
          rafRef.current = requestAnimationFrame(tick);
        }
      } catch(e) { if (!cancelled) { setCamErr(true); setStatus('notfound'); } }
    };
    start();
    return () => { cancelled = true; stopCamera(); };
  }, [fetchProduct]);

  const stopCamera = () => {
    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    if (streamRef.current) { streamRef.current.getTracks().forEach(t=>t.stop()); streamRef.current = null; }

  const accept = () => {
    onResult({
      name:     editPrev.name     || preview.name,
      calories: editPrev.calories || '0',
      protein:  editPrev.protein  || '0',
      carbs:    editPrev.carbs    || '0',
      fat:      editPrev.fat      || '0',
      note:     editPrev.note     || '',
      icon:     preview?.icon     || '🛒',
    });
  };

  const inPreview = status === 'preview';
  const inSearch  = status === 'searching' || status === 'ai_analyzing';

  return (
    <div style={{position:'fixed',inset:0,zIndex:10001,background:'#000',display:'flex',flexDirection:'column'}}>
      {/* Header */}
