                  <div style={{fontSize:'.72rem',color:'var(--color-text-sub)',marginTop:'.25rem'}}>{preset.description}</div>
                </div>
                <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:'.3rem',flexShrink:0}}>
                  <span style={{background:levelColor[preset.level]+'22',border:`1px solid ${levelColor[preset.level]}44`,borderRadius:'5px',padding:'.2rem .5rem',fontSize:'.6rem',fontWeight:700,color:levelColor[preset.level],textTransform:'uppercase',letterSpacing:'.05em'}}>{preset.level}</span>
                  <span style={{fontSize:'.6rem',color:'var(--color-text-sub)',fontWeight:600}}>{preset.days} dias/sem</span>
                </div>
              </div>

              {/* Day pills */}
              <div style={{display:'flex',flexWrap:'wrap',gap:'.35rem',marginBottom:'.75rem'}}>
                {DAYS.filter(d=>preset.byDay[d]&&preset.byDay[d].length>0).map(d=>(
                  <span key={d} style={{background:'rgba(227,27,35,.1)',border:'1px solid rgba(227,27,35,.2)',borderRadius:'5px',padding:'.2rem .5rem',fontSize:'.62rem',fontWeight:700,color:'var(--color-accent)',textTransform:'uppercase'}}>
                    {d.slice(0,3)} · {preset.byDay[d].length}ex
                  </span>
                ))}
              </div>

              {/* Preview modal trigger + import */}
              <div style={{display:'flex',gap:'.5rem'}}>
                <button onClick={()=>setPreviewPlan(previewPlan?.id===preset.id?null:preset)} style={{flex:1,background:'rgba(255,255,255,.04)',border:'1px solid #222',borderRadius:'8px',padding:'.5rem',color:'var(--color-text-sub)',fontSize:'.78rem',fontWeight:700,textTransform:'uppercase',cursor:'pointer'}}>
                  {previewPlan?.id===preset.id?'▲ Fechar':'▼ Ver exercícios'}
                </button>
                <button onClick={()=>importPreset(preset)} style={{flex:1,background:'var(--color-accent)',border:'none',borderRadius:'8px',padding:'.5rem',color:'#fff',fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:'.85rem',textTransform:'uppercase',cursor:'pointer',boxShadow:'0 0 12px rgba(227,27,35,.25)'}}>
                  + Usar esta ficha
                </button>
              </div>

              {/* Expandable preview */}
              {previewPlan?.id===preset.id&&(
                <div style={{marginTop:'.75rem',borderTop:'1px solid var(--color-border)',paddingTop:'.75rem',display:'grid',gap:'.5rem'}}>
                  {DAYS.filter(d=>preset.byDay[d]&&preset.byDay[d].length>0).map(d=>(
                    <div key={d}>
                      <div style={{fontSize:'.62rem',color:'var(--color-accent)',fontWeight:700,textTransform:'uppercase',letterSpacing:'.06em',marginBottom:'.25rem'}}>{d}</div>
                      {preset.byDay[d].map((e,i)=>(
                        <div key={i} style={{display:'flex',justifyContent:'space-between',padding:'.2rem 0',borderBottom:'1px solid rgba(255,255,255,.03)'}}>
                          <span style={{fontSize:'.78rem',color:'var(--color-text)'}}>{e.name}</span>
                          <span style={{fontSize:'.72rem',color:'var(--color-text-sub)',fontWeight:600}}>{e.setsPlanned}x</span>
                        </div>
                      ))}
                    </div>
                  ))}
                </div>
              )}
            </div>
          ))}
        </div>
      )}

      {showQR&&<QRScanner onResult={handleQRResult} onClose={()=>setShowQR(false)}/>}

      {sharePlan&&(
        <Modal onClose={()=>setSharePlan(null)}>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:'1.2rem',textTransform:'uppercase',marginBottom:'1rem'}}>{sharePlan.name}</div>
          <div id="qr-box" style={{margin:'0 auto .75rem',width:'180px',height:'180px',border:'1px solid #1e1e1e',borderRadius:'8px',overflow:'hidden'}}></div>
          <div style={{fontSize:'.7rem',color:'#444',marginBottom:'.5rem'}}>Escaneie o QR ou copie o link:</div>
          <div style={{display:'flex',gap:'.5rem'}}>
            <input id="share-link" readOnly value={makeImportLink(sharePlan)} style={{flex:1,background:'rgba(0,0,0,.4)',border:'1px solid #1a1a1a',borderRadius:'7px',padding:'.4rem .65rem',fontSize:'.72rem',color:'#888'}}/>
            <button onClick={()=>{document.getElementById('share-link').select();document.execCommand('copy');setToast("Link copiado");}} style={{background:'rgba(255,255,255,.06)',border:'1px solid #222',borderRadius:'7px',padding:'.4rem .75rem',color:'#ccc',fontSize:'.78rem',fontWeight:700,cursor:'pointer'}}>Copiar</button>
          </div>
          <div style={{fontSize:'.65rem',color:'#333',marginTop:'.5rem'}}>Apenas a estrutura da ficha. Sem dados pessoais.</div>
          <div style={{marginTop:'1rem',textAlign:'right'}}><button onClick={()=>setSharePlan(null)} style={{background:'rgba(255,255,255,.04)',border:'1px solid #222',borderRadius:'7px',padding:'.4rem .85rem',color:'#777',fontSize:'.78rem',cursor:'pointer'}}>Fechar</button></div>
        </Modal>
      )}

      {/* Modal: Visualizar Minha Ficha */}
      {previewPlan && (
        <Modal onClose={()=>setPreviewPlan(null)}>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:'1.1rem',textTransform:'uppercase',marginBottom:'.75rem',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span>{previewPlan.name}</span>
            <button onClick={()=>{setPreviewPlan(null);goto('builder',previewPlan.id);}} style={{background:'var(--color-accent)',border:'none',borderRadius:'7px',padding:'.3rem .75rem',color:'#fff',fontSize:'.72rem',fontWeight:800,cursor:'pointer',textTransform:'uppercase'}}>Editar</button>
          </div>
          <div style={{display:'flex',gap:'.3rem',flexWrap:'wrap',marginBottom:'.75rem'}}>
            {DAYS.map(d=>{const n=previewPlan.byDay?.[d]?.length||0;return(
              <span key={d} style={{padding:'.2rem .55rem',borderRadius:'6px',fontSize:'.7rem',fontWeight:700,
                background:n>0?'rgba(227,27,35,.1)':'rgba(0,0,0,.2)',
                border:n>0?'1px solid rgba(227,27,35,.2)':'1px solid #1a1a1a',
                color:n>0?'var(--color-accent)':'#333'}}>
                {d.slice(0,3)}{n>0?' '+n:''}
              </span>
            );})}
          </div>
          <div style={{maxHeight:'60vh',overflowY:'auto',display:'grid',gap:'.75rem'}}>
            {DAYS.filter(d=>(previewPlan.byDay?.[d]?.length||0)>0).map(d=>(
              <div key={d}>
                <div style={{fontSize:'.6rem',color:'var(--color-accent)',textTransform:'uppercase',letterSpacing:'.08em',fontWeight:700,marginBottom:'.4rem',borderBottom:'1px solid rgba(227,27,35,.15)',paddingBottom:'.3rem'}}>{d}</div>
                {(previewPlan.byDay[d]||[]).map((ex,i)=>{
                  const meta=EXS.find(e=>e.id===ex.exId||e.name===ex.name);
                  return(
                    <div key={i} style={{display:'flex',alignItems:'center',gap:'.55rem',padding:'.4rem 0',borderBottom:'1px solid rgba(255,255,255,.03)'}}>
                      <ExGifThumb exName={ex.name} onClick={()=>{}}/>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:'.84rem',fontWeight:700}}>{ex.name}</div>
                        <div style={{fontSize:'.63rem',color:'var(--color-text-sub)'}}>{ex.setsPlanned||3} séries{ex.repsTarget?' · '+ex.repsTarget+' reps':''} · {meta?.primary||''}{meta?.equipment?' · '+meta.equipment:''}</div>
                      </div>
                    </div>
                  );
                })}
              </div>
            ))}
          </div>
        </Modal>
      )}
    </div>
  );
};


// Builder
const Builder=({planId,plans,setPlans,setToast})=>{
  const plan=plans.list.find(p=>p.id===planId)||plans.list[0];
  const [day,setDay]=useState(DAYS[0]);
  const [filters,setFilters]=useState(()=>load(LS.filters,{q:"",m:"",s:"",e:"",d:""}));
  const [tab,setTab]=useState('ficha'); // 'ficha' | 'buscar'
  const {q,m,s,e,d}=filters;
  const [gifModal,setGifModal]=useState(null);
  const [detailEx,setDetailEx]=useState(null);

  useEffect(()=>save(LS.filters,filters),[filters]);

  const list=useMemo(()=>{
    const filtered = EXS.filter(ex=>{
      const nameOk=ex.name.toLowerCase().includes(q.toLowerCase());
      const mOk=!m||ex.primary===m;
      const sOk=!s||ex.subgroup===s;
      const eOk=!e||ex.equipment===e;
      const dOk=!d||ex.difficulty===d;
      return nameOk&&mOk&&sOk&&eOk&&dOk;
    });
    // Sort: by group order then alphabetically within group
    const GROUP_ORDER=["Peito","Ombro","Trapézio","Costas","Bíceps","Tríceps","Antebraço","Lombar","Quadríceps","Posterior de Coxa","Glúteo","Abdutores","Adutores","Panturrilha","Abdômen"];
    return filtered.sort((a,b)=>{
      const gi = GROUP_ORDER.indexOf(a.primary) - GROUP_ORDER.indexOf(b.primary);
      if(gi!==0) return gi;
      return a.name.localeCompare(b.name,'pt');
    });
  },[q,m,s,e,d]);

  const dayItems=plan?.byDay?.[day]||[];
  const canAdd=(ex)=>!dayItems.some(it=>it.exId===ex.id);

  const addEx=(ex,setsPlanned=3)=>{
    setPlans(p=>{
      const copy=JSON.parse(JSON.stringify(p));
      const pl=copy.list.find(x=>x.id===plan.id);
      const arr=pl.byDay[day];
      if(arr.some(it=>it.exId===ex.id)) return p;
      arr.push({exId:ex.id,name:ex.name,setsPlanned:Math.max(1,Number(setsPlanned)||3)});
      return copy;
    });
    setToast("+ "+ex.name);
  };
  const updateReps=(i,val)=>setPlans(p=>{const copy=JSON.parse(JSON.stringify(p));copy.list.find(x=>x.id===plan.id).byDay[day][i].repsTarget=val.trim();return copy;});
  const removeItem=(i)=>setPlans(p=>{const copy=JSON.parse(JSON.stringify(p));copy.list.find(x=>x.id===plan.id).byDay[day].splice(i,1);return copy;});
  const move=(i,dir)=>setPlans(p=>{
    const copy=JSON.parse(JSON.stringify(p));
    const arr=copy.list.find(x=>x.id===plan.id).byDay[day];
    const j=i+dir; if(j<0||j>=arr.length)return p;
    [arr[i],arr[j]]=[arr[j],arr[i]]; return copy;
  });
  const updateSets=(i,val)=>setPlans(p=>{
    const copy=JSON.parse(JSON.stringify(p));
    copy.list.find(x=>x.id===plan.id).byDay[day][i].setsPlanned=Math.max(1,Math.min(10,Number(val)||1));
    return copy;
  });

  const toggleSuperset=(i)=>setPlans(p=>{
    const copy=JSON.parse(JSON.stringify(p));
    const arr=copy.list.find(x=>x.id===plan.id).byDay[day];
    if(i<0||i>=arr.length-1) return p;
    const gA=arr[i].supersetGroup, gB=arr[i+1].supersetGroup;
    if(gA&&gA===gB){arr[i].supersetGroup=null;arr[i+1].supersetGroup=null;}
    else{const id='ss_'+Date.now().toString(36);arr[i].supersetGroup=id;arr[i+1].supersetGroup=id;}
    return copy;
  });
  const SUBS_BY=MUSCLES.reduce((acc,mu)=>{acc[mu]=[...new Set(EXS.filter(e=>e.primary===mu&&e.subgroup).map(e=>e.subgroup))];return acc;},{});

  const totalSets=dayItems.reduce((a,it)=>a+(it.setsPlanned||3),0);

  if(!plan) return <div style={{padding:'2rem',color:'#555',textAlign:'center'}}>Nenhuma ficha encontrada.</div>;

  return (
    <div style={{marginTop:'1rem',display:'grid',gap:'1rem'}}>

      {/* Topo: nome da ficha + seletor de dia */}
      <div className="ds-card" style={{padding:'.85rem 1.1rem'}}>
        <div className="flex items-center justify-between" style={{marginBottom:'.85rem'}}>
          <div>
            <div style={{fontSize:'.6rem',color:'#444',textTransform:'uppercase',letterSpacing:'.08em'}}>Editando ficha</div>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:'1.5rem',textTransform:'uppercase',letterSpacing:'.04em',lineHeight:1}}>{plan.name}</div>
          </div>
          <div style={{textAlign:'right'}}>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:'1.2rem',fontWeight:800,color:'var(--color-accent)',lineHeight:1}}>{dayItems.length}<span style={{fontSize:'.85rem',color:'#333'}}>ex</span></div>
            <div style={{fontSize:'.65rem',color:'#333'}}>{totalSets} séries</div>
          </div>
        </div>

        {/* Day pills */}
        <div style={{display:'flex',gap:'.4rem',flexWrap:'wrap',paddingBottom:'.3rem',paddingTop:'.6rem'}}>
          {DAYS.map(dy=>{
            const count=plan.byDay?.[dy]?.length||0;
            const active=day===dy;
            return (
              <button key={dy} onClick={()=>setDay(dy)} style={{
                flexShrink:0,padding:'.4rem .75rem',borderRadius:'8px',
                background:active?'var(--color-accent)':'rgba(0,0,0,.4)',
                border:active?'1px solid rgba(255,255,255,.08)':'1px solid #1a1a1a',
                color:active?'#fff':'#555',
                fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:'.85rem',
                textTransform:'uppercase',letterSpacing:'.04em',cursor:'pointer',
                position:'relative',overflow:'visible',marginTop:'6px'
              }}>
                {dy.slice(0,3)}
                {count>0&&<span style={{position:'absolute',top:'-8px',right:'-6px',background:active?'#fff':'var(--color-accent)',color:active?'var(--color-accent)':'#fff',borderRadius:'50%',width:'18px',height:'18px',fontSize:'.6rem',fontWeight:800,display:'flex',alignItems:'center',justifyContent:'center',zIndex:2,boxShadow:'0 0 0 2px var(--color-card)'}}>{count}</span>}
              </button>
            );
          })}
        </div>
      </div>

      {/* Tab toggle */}
      <div className="mode-toggle">
        <button className={"mode-toggle-btn"+(tab==="ficha"?" active":"")} onClick={()=>setTab("ficha")}>
          Ficha de {day.slice(0,3)} ({dayItems.length})
        </button>
        <button className={"mode-toggle-btn"+(tab==="buscar"?" active":"")} onClick={()=>setTab("buscar")}>
          + Adicionar Exercício
        </button>
      </div>

      {/* TAB: FICHA */}
      {tab==="ficha" && (
        <div className="ds-card" style={{padding:'1rem 1.1rem'}}>
          {dayItems.length===0 ? (
            <div style={{textAlign:'center',padding:'2rem 0'}}>
              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:'1.8rem',fontWeight:900,color:'#1a1a1a',textTransform:'uppercase',marginBottom:'.5rem'}}>Vazio</div>
              <div style={{color:'#333',fontSize:'.8rem',marginBottom:'1rem'}}>Nenhum exercício para {day}</div>
              <button onClick={()=>setTab("buscar")} style={{background:'var(--color-accent)',border:'none',borderRadius:'8px',color:'#fff',padding:'.6rem 1.2rem',fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:'.9rem',textTransform:'uppercase',letterSpacing:'.04em',cursor:'pointer'}}>
                + Adicionar Exercício
              </button>
            </div>
          ) : (
            <div style={{display:'grid',gap:'.3rem'}}>
              {dayItems.map((it,i)=>{
                const ssN=it.supersetGroup&&dayItems[i+1]?.supersetGroup===it.supersetGroup;
                const ssP=it.supersetGroup&&dayItems[i-1]?.supersetGroup===it.supersetGroup;
                const ssC='#8b5cf6';
                return (<React.Fragment key={i}>
                <div style={{display:'grid',gridTemplateColumns:'2rem 1fr 3.5rem 2.5rem 2.5rem',alignItems:'center',gap:'.5rem',
                  background:it.supersetGroup?'rgba(139,92,246,.07)':'rgba(0,0,0,.3)',
                  border:it.supersetGroup?'1px solid rgba(139,92,246,.4)':'1px solid #1a1a1a',
                  borderRadius:ssN?'10px 10px 0 0':ssP?'0 0 10px 10px':'10px',
                  borderBottom:ssN?'none':undefined,padding:'.6rem .75rem'}}>
                  <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:'1px'}}>
                    <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:'1.1rem',fontWeight:900,color:'#222',lineHeight:1}}>{i+1}</div>
                    {it.supersetGroup&&<span style={{fontSize:'.42rem',fontWeight:900,color:ssC,textTransform:'uppercase'}}>{ssP?'B':'A'}</span>}
                  </div>
                  <div style={{minWidth:0}}>
                    <div style={{fontWeight:600,fontSize:'.82rem',lineHeight:1.3,overflow:'hidden',display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical'}}>{it.name}</div>
                    <div style={{fontSize:'.65rem',color:'#444',marginTop:'2px'}}>{EXS.find(e=>e.id===it.exId)?.primary||''} · {EXS.find(e=>e.id===it.exId)?.equipment||''}</div>
                  </div>
                  <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:'2px'}}>
                    <input type="number" min="1" max="10" value={it.setsPlanned||3}
                      onChange={e=>updateSets(i,e.target.value)}
                      style={{width:'2.5rem',textAlign:'center',background:'rgba(0,0,0,.4)',border:'1px solid #1e1e1e',borderRadius:'6px',padding:'.3rem .2rem',fontSize:'.85rem',color:'#fff'}}/>
                    <div style={{fontSize:'.52rem',color:'#333',textTransform:'uppercase',letterSpacing:'.04em'}}>séries</div>
                  </div>
                  <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:'2px'}}>
                    <input type="text" maxLength={6} value={it.repsTarget||''} onChange={e=>updateReps(i,e.target.value)} placeholder="reps" style={{width:'3rem',textAlign:'center',background:'rgba(0,0,0,.4)',border:'1px solid #1e1e1e',borderRadius:'6px',padding:'.3rem .2rem',color:'#fff',fontSize:'.85rem'}}/>
                    <div style={{fontSize:'.52rem',color:'#333',textTransform:'uppercase',letterSpacing:'.04em'}}>reps</div>
                  </div>
                  <div style={{display:'flex',flexDirection:'column',gap:'3px'}}>
                    <button onClick={()=>move(i,-1)} disabled={i===0} style={{background:'none',border:'1px solid #1a1a1a',borderRadius:'4px',color:i===0?'#222':'#888',padding:'3px 7px',cursor:i===0?'default':'pointer',fontSize:'.8rem',lineHeight:1}}>↑</button>
                    <button onClick={()=>move(i,1)} disabled={i===dayItems.length-1} style={{background:'none',border:'1px solid #1a1a1a',borderRadius:'4px',color:i===dayItems.length-1?'#222':'#888',padding:'3px 7px',cursor:i===dayItems.length-1?'default':'pointer',fontSize:'.8rem',lineHeight:1}}>↓</button>
                  </div>
                  <button onClick={()=>removeItem(i)} style={{background:'rgba(227,27,35,.08)',border:'1px solid rgba(227,27,35,.2)',borderRadius:'6px',color:'#e31b23',padding:'.4rem .4rem',cursor:'pointer',fontSize:'.8rem',fontWeight:700,lineHeight:1,alignSelf:'center'}}>✕</button>
                </div>
                {i<dayItems.length-1&&<button onClick={()=>toggleSuperset(i)} style={{
                  display:'flex',alignItems:'center',justifyContent:'center',gap:'.35rem',width:'100%',
                  background:ssN?'rgba(139,92,246,.12)':'transparent',
                  border:ssN?'1px solid rgba(139,92,246,.3)':'1px dashed #1e1e1e',
                  borderRadius:'6px',padding:'.22rem',cursor:'pointer',
                  fontSize:'.6rem',fontWeight:700,letterSpacing:'.05em',textTransform:'uppercase',
                  color:ssN?ssC:'#2a2a2a',transition:'all .15s',
                }}>⛓ {ssN?'BISET ATIVO — toque para desfazer':'criar biset/superset com próximo'}</button>}
                </React.Fragment>);
              })}
            </div>
          )}
        </div>
      )}

      {/* TAB: BUSCAR */}
      {tab==="buscar" && (
        <div className="ds-card" style={{padding:'1rem 1.1rem'}}>
          {/* Search input */}
          <div style={{position:'relative',marginBottom:'.75rem'}}>
            <input
              style={{width:'100%',background:'rgba(0,0,0,.45)',border:'1px solid #1e1e1e',borderRadius:'8px',padding:'.6rem .85rem .6rem 2.2rem',fontSize:'.88rem',color:'#fff'}}
              placeholder="Buscar exercício por nome…"
              value={q} onChange={e=>setFilters({...filters,q:e.target.value})}
            />
            <span style={{position:'absolute',left:'.7rem',top:'50%',transform:'translateY(-50%)',color:'#333',pointerEvents:'none',fontSize:'.9rem'}}>⌕</span>
          </div>

          {/* Filter chips */}
          <div style={{display:'flex',gap:'.4rem',overflowX:'auto',marginBottom:'.75rem',scrollbarWidth:'none',paddingBottom:'.2rem'}}>
            <select style={{flexShrink:0,background:'rgba(0,0,0,.4)',border:'1px solid #1a1a1a',borderRadius:'7px',padding:'.35rem .6rem',fontSize:'.75rem',color:m?'#fff':'#555',cursor:'pointer'}}
              value={m} onChange={e=>{const v=e.target.value;setFilters({...filters,m:v,s:""});}}>
              <option value="">Músculo</option>{MUSCLES.map(x=><option key={x}>{x}</option>)}
            </select>
            <select style={{flexShrink:0,background:'rgba(0,0,0,.4)',border:'1px solid #1a1a1a',borderRadius:'7px',padding:'.35rem .6rem',fontSize:'.75rem',color:s?'#fff':'#555',cursor:'pointer',opacity:(!m||(SUBS_BY[m]||[]).length===0)?0.4:1}}
              value={s} onChange={e=>setFilters({...filters,s:e.target.value})} disabled={!m||(SUBS_BY[m]||[]).length===0}>
              <option value="">Subgrupo</option>{(m?SUBS_BY[m]:[]).map(x=><option key={x}>{x}</option>)}
            </select>
            <select style={{flexShrink:0,background:'rgba(0,0,0,.4)',border:'1px solid #1a1a1a',borderRadius:'7px',padding:'.35rem .6rem',fontSize:'.75rem',color:e?'#fff':'#555',cursor:'pointer'}}
              value={e} onChange={e2=>setFilters({...filters,e:e2.target.value})}>
              <option value="">Equipamento</option>{EQUIPS.map(x=><option key={x}>{x}</option>)}
            </select>
            <select style={{flexShrink:0,background:'rgba(0,0,0,.4)',border:'1px solid #1a1a1a',borderRadius:'7px',padding:'.35rem .6rem',fontSize:'.75rem',color:d?'#fff':'#555',cursor:'pointer'}}
              value={d} onChange={e3=>setFilters({...filters,d:e3.target.value})}>
              <option value="">Nível</option>{DIFFS.map(x=><option key={x}>{x}</option>)}
            </select>
            {(q||m||s||e||d)&&<button onClick={()=>setFilters({q:"",m:"",s:"",e:"",d:""})} style={{flexShrink:0,background:'rgba(227,27,35,.1)',border:'1px solid rgba(227,27,35,.2)',borderRadius:'7px',padding:'.35rem .65rem',fontSize:'.75rem',color:'#e31b23',cursor:'pointer',fontWeight:700}}>Limpar</button>}
          </div>

          {/* Results count */}
          <div style={{fontSize:'.65rem',color:'#333',marginBottom:'.5rem',textTransform:'uppercase',letterSpacing:'.06em'}}>{list.length} exercício(s)</div>

          {/* Exercise list grouped by muscle */}
          <div style={{display:'grid',gap:'.4rem',maxHeight:'360px',overflowY:'auto',paddingRight:'2px'}}>
            {(()=>{
              const rows=[];
              let lastGroup=null;
              list.forEach(ex=>{
                if(ex.primary!==lastGroup){
                  lastGroup=ex.primary;
                  rows.push(
                    <div key={'g_'+ex.primary} style={{padding:'.25rem .5rem',fontSize:'.6rem',fontWeight:800,color:'var(--color-accent)',textTransform:'uppercase',letterSpacing:'.1em',borderBottom:'1px solid rgba(227,27,35,.15)',marginTop:rows.length?'.3rem':0}}>
                      {ex.primary}
                    </div>
                  );
                }
                const added=!canAdd(ex);
                rows.push(
                  <div key={ex.id} style={{
                    display:'grid',gridTemplateColumns:'52px 1fr',alignItems:'center',gap:'.6rem',
                    background:added?'rgba(227,27,35,.04)':'rgba(0,0,0,.25)',
                    border:added?'1px solid rgba(227,27,35,.15)':'1px solid #151515',
                    borderRadius:'8px',padding:'.55rem .7rem',transition:'border-color .15s'
                  }}>
                    <ExGifThumb exName={ex.name} onClick={()=>setGifModal(ex.name)}/>
                    <div style={{minWidth:0}}>
                      <div style={{fontSize:'.84rem',fontWeight:700,color:added?'#e31b23':'var(--color-text)',lineHeight:1.2,marginBottom:'2px'}}>{ex.name}</div>
                      <div style={{fontSize:'.6rem',color:'var(--color-text-sub)'}}>{ex.equipment} · {ex.difficulty} · <span onClick={e=>{e.stopPropagation();setDetailEx(ex.name);}} style={{color:'var(--color-accent)',cursor:'pointer',fontWeight:700}}>detalhes</span></div>
                      {/* Select + Add button on same row */}
                      <div style={{display:'flex',gap:'.4rem',marginTop:'.45rem',alignItems:'center'}}>
                        {!added && (
                          <select
                            defaultValue="3"
                            id={"sets_"+ex.id}
                            style={{width:'3.2rem',background:'rgba(0,0,0,.4)',border:'1px solid #1a1a1a',borderRadius:'6px',padding:'.25rem .2rem',fontSize:'.78rem',color:'var(--color-text)',textAlign:'center'}}
                            onClick={ev=>ev.stopPropagation()}
                          >
                            {[1,2,3,4,5,6].map(n=><option key={n} value={n}>{n}x</option>)}
                          </select>
                        )}
                        <button
                          onClick={()=>{
                            if(added) return;
                            const sel=document.getElementById("sets_"+ex.id);
                            addEx(ex, sel?Number(sel.value):3);
                          }}
                          disabled={added}
                          style={{
                            flex:1,
                            background:added?'rgba(227,27,35,.07)':'var(--color-accent)',
                            border:added?'1px solid rgba(227,27,35,.2)':'none',
                            borderRadius:'7px',padding:'.32rem .5rem',
                            color:added?'var(--color-accent)':'#fff',
                            fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:'.78rem',
                            textTransform:'uppercase',cursor:added?'default':'pointer',
                        }}
                      >{added?'✓ NA FICHA':'+ ADICIONAR'}</button>
                      </div>
                    </div>
                  </div>
                );
              });
              if(list.length===0) rows.push(<div key="empty" style={{textAlign:'center',padding:'1.5rem',color:'var(--color-text-sub)',fontSize:'.85rem'}}>Nenhum exercício encontrado</div>);
              return rows;
            })()}
          </div>
        </div>
      )}
    {gifModal&&<ExGifModal exName={gifModal} onClose={()=>setGifModal(null)}/>}
    {detailEx&&<ExerciseDetail exName={detailEx} onClose={()=>setDetailEx(null)} history={{}}/>}
    </div>
  );
};

// CARDIO MODULE
// ═══════════════════════════════════════════════════════
const CARDIO_TYPES = [
  {id:'corrida',    name:'Corrida',      icon:'🏃', metrics:['distancia','tempo','pace']},
  {id:'bike',       name:'Bike',         icon:'🚴', metrics:['distancia','tempo','velocidade']},
  {id:'hiit',       name:'HIIT',         icon:'⚡', metrics:['tempo','rounds']},
  {id:'eliptico',   name:'Elíptico',     icon:'🔄', metrics:['tempo','calorias']},
  {id:'corda',      name:'Corda',        icon:'🪢', metrics:['tempo','rounds']},
  {id:'natacao',    name:'Natação',       icon:'🏊', metrics:['distancia','tempo']},
  {id:'caminhada',  name:'Caminhada',    icon:'🚶', metrics:['distancia','tempo']},
  {id:'escada',     name:'Escada',       icon:'🪜', metrics:['tempo','andares']},
  {id:'livre',      name:'Livre',        icon:'💪', metrics:['tempo','calorias']},
];

const CARDIO_HISTORY_KEY = 'darkset.cardio.history';
const loadCardioHistory = () => {
  try { return JSON.parse(localStorage.getItem(CARDIO_HISTORY_KEY)||'[]'); } catch(_){ return []; }
};
const saveCardioHistory = (data) => {
  try { localStorage.setItem(CARDIO_HISTORY_KEY, JSON.stringify(data)); } catch(_){}
};

const Cardio = ({goto, setToast}) => {
  const [view, setView] = useState('home'); // 'home' | 'session' | 'history'
  const [selectedType, setSelectedType] = useState(null);
  const [history, setHistory] = useState(loadCardioHistory);

  // Session state
  const [running, setRunning] = useState(false);
  const [elapsed, setElapsed] = useState(0);
  const [startTs, setStartTs] = useState(null);
  const [metrics, setMetrics] = useState({distancia:'', calorias:'', rounds:'', andares:'', pace:'', velocidade:''});
  const [notes, setNotes] = useState('');
  const timerRef = useRef(null);

  useEffect(()=>{
    if(running){
      timerRef.current = setInterval(()=>setElapsed(e=>e+1),1000);
    } else {
      clearInterval(timerRef.current);
    }
    return ()=>clearInterval(timerRef.current);
  },[running]);

  const startSession = (type) => {
    setSelectedType(type);
    setElapsed(0); setRunning(false); setMetrics({distancia:'',calorias:'',rounds:'',andares:'',pace:'',velocidade:''});
    setNotes(''); setStartTs(new Date().toISOString());
    setView('session');
  };

  const toggleTimer = () => setRunning(r=>!r);

  const resetTimer = () => { setRunning(false); setElapsed(0); };

  const saveSession = () => {
    const entry = {
      id: Date.now(),
      date: startTs||new Date().toISOString(),
      type: selectedType.id,
      typeName: selectedType.name,
      typeIcon: selectedType.icon,
      tempo: elapsed,
      metrics: {...metrics},
      notes,
    };
    const updated = [entry, ...history];
    setHistory(updated);
    saveCardioHistory(updated);
    setToast('Cardio salvo! 🏃');
    setView('home');
    setRunning(false); setElapsed(0);
  };

  const deleteEntry = (id) => {
    const updated = history.filter(h=>h.id!==id);
    setHistory(updated);
    saveCardioHistory(updated);
  };

  const fmt = (s) => {
    const h=Math.floor(s/3600), m=Math.floor((s%3600)/60), sec=s%60;
    return h>0?`${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`:`${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  };

  const toDate = (iso) => { try{ const d=new Date(iso); return d.toLocaleDateString('pt-BR'); }catch(_){return '';} };

  if(view==='session' && selectedType){
    const hasMetric = (m) => selectedType.metrics.includes(m);
    return (
      <div style={{marginTop:'1rem',display:'grid',gap:'1rem'}}>
        <div className="ds-card" style={{padding:'1rem 1.1rem'}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'.5rem'}}>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:'1.6rem',textTransform:'uppercase',letterSpacing:'.04em'}}>
              {selectedType.icon} {selectedType.name}
            </div>
            <button onClick={()=>{setView('home');setRunning(false);setElapsed(0);}} style={{background:'rgba(255,255,255,.04)',border:'1px solid var(--color-border)',borderRadius:'7px',padding:'.3rem .75rem',color:'var(--color-text-sub)',fontSize:'.75rem',fontWeight:700,cursor:'pointer'}}>Sair</button>
          </div>

          {/* Big timer */}
          <div style={{textAlign:'center',padding:'1.5rem 0'}}>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:'4.5rem',letterSpacing:'.04em',lineHeight:1,color:running?'var(--color-accent)':'var(--color-text)'}}>{fmt(elapsed)}</div>
            <div style={{fontSize:'.65rem',color:'var(--color-text-sub)',textTransform:'uppercase',letterSpacing:'.1em',marginTop:'.25rem'}}>tempo</div>
          </div>

          <div style={{display:'flex',gap:'.75rem',justifyContent:'center',marginBottom:'1rem'}}>
            <button onClick={toggleTimer} style={{flex:1,background:running?'rgba(227,27,35,.15)':'var(--color-accent)',border:running?'1px solid rgba(227,27,35,.3)':'none',borderRadius:'10px',padding:'.85rem',color:running?'var(--color-accent)':'#fff',fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:'1rem',textTransform:'uppercase',cursor:'pointer'}}>
              {running?'⏸ Pausar':'▶ Iniciar'}
            </button>
            <button onClick={resetTimer} style={{background:'rgba(255,255,255,.04)',border:'1px solid var(--color-border)',borderRadius:'10px',padding:'.85rem 1rem',color:'var(--color-text-sub)',fontSize:'.85rem',cursor:'pointer'}}>↺</button>
          </div>
        </div>

        {/* Metrics */}
        <div className="ds-card" style={{padding:'1rem 1.1rem',display:'grid',gap:'.75rem'}}>
          <div style={{fontSize:'.65rem',color:'var(--color-text-sub)',textTransform:'uppercase',letterSpacing:'.07em'}}>Dados do treino</div>

          {hasMetric('distancia')&&(
            <div>
              <div style={{fontSize:'.62rem',color:'var(--color-text-sub)',marginBottom:'.3rem'}}>Distância (km)</div>
              <input type="number" step="0.1" placeholder="0.0" value={metrics.distancia} onChange={e=>setMetrics(m=>({...m,distancia:e.target.value}))} style={{width:'100%',background:'rgba(0,0,0,.3)',border:'1px solid var(--color-border)',borderRadius:'8px',padding:'.55rem .85rem',fontSize:'1.1rem',color:'var(--color-text)',fontWeight:600}}/>
            </div>
          )}
          {hasMetric('calorias')&&(
            <div>
              <div style={{fontSize:'.62rem',color:'var(--color-text-sub)',marginBottom:'.3rem'}}>Calorias (kcal)</div>
              <input type="number" placeholder="0" value={metrics.calorias} onChange={e=>setMetrics(m=>({...m,calorias:e.target.value}))} style={{width:'100%',background:'rgba(0,0,0,.3)',border:'1px solid var(--color-border)',borderRadius:'8px',padding:'.55rem .85rem',fontSize:'1.1rem',color:'var(--color-text)',fontWeight:600}}/>
            </div>
          )}
          {hasMetric('rounds')&&(
            <div>
              <div style={{fontSize:'.62rem',color:'var(--color-text-sub)',marginBottom:'.3rem'}}>Rounds</div>
              <input type="number" placeholder="0" value={metrics.rounds} onChange={e=>setMetrics(m=>({...m,rounds:e.target.value}))} style={{width:'100%',background:'rgba(0,0,0,.3)',border:'1px solid var(--color-border)',borderRadius:'8px',padding:'.55rem .85rem',fontSize:'1.1rem',color:'var(--color-text)',fontWeight:600}}/>
            </div>
          )}
          {hasMetric('andares')&&(
            <div>
              <div style={{fontSize:'.62rem',color:'var(--color-text-sub)',marginBottom:'.3rem'}}>Andares</div>
              <input type="number" placeholder="0" value={metrics.andares} onChange={e=>setMetrics(m=>({...m,andares:e.target.value}))} style={{width:'100%',background:'rgba(0,0,0,.3)',border:'1px solid var(--color-border)',borderRadius:'8px',padding:'.55rem .85rem',fontSize:'1.1rem',color:'var(--color-text)',fontWeight:600}}/>
            </div>
          )}

          <div>
            <div style={{fontSize:'.62rem',color:'var(--color-text-sub)',marginBottom:'.3rem'}}>Observações</div>
            <textarea placeholder="Como foi o treino?" value={notes} onChange={e=>setNotes(e.target.value)} rows={2} style={{width:'100%',background:'rgba(0,0,0,.3)',border:'1px solid var(--color-border)',borderRadius:'8px',padding:'.55rem .85rem',fontSize:'.85rem',color:'var(--color-text)',resize:'none'}}/>
          </div>

          <button onClick={saveSession} style={{background:'var(--color-accent)',border:'none',borderRadius:'10px',padding:'.75rem',color:'#fff',fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:'1rem',textTransform:'uppercase',cursor:'pointer',boxShadow:'0 0 16px rgba(227,27,35,.3)'}}>
            Salvar Cardio ✓
          </button>
        </div>
      </div>
    );
  }

  if(view==='history'){
    return (
      <div style={{marginTop:'1rem',display:'grid',gap:'1rem'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:'1.5rem',textTransform:'uppercase'}}>Histórico Cardio</div>
          <button onClick={()=>setView('home')} style={{background:'rgba(255,255,255,.04)',border:'1px solid var(--color-border)',borderRadius:'7px',padding:'.35rem .85rem',color:'var(--color-text-sub)',fontSize:'.78rem',fontWeight:700,cursor:'pointer'}}>← Voltar</button>
        </div>
        {history.length===0&&(
          <div style={{textAlign:'center',padding:'3rem',color:'var(--color-text-sub)'}}>
            <div style={{fontSize:'3rem',marginBottom:'.5rem'}}>🏃</div>
            <div>Nenhum cardio registrado ainda</div>
          </div>
        )}
        {history.map(h=>(
          <div key={h.id} className="ds-card" style={{padding:'.85rem 1.1rem'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
              <div>
                <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:'1.1rem',textTransform:'uppercase'}}>{h.typeIcon} {h.typeName}</div>
                <div style={{fontSize:'.65rem',color:'var(--color-text-sub)',marginTop:'2px'}}>{toDate(h.date)}</div>
              </div>
              <button onClick={()=>deleteEntry(h.id)} style={{background:'rgba(227,27,35,.08)',border:'1px solid rgba(227,27,35,.2)',borderRadius:'6px',padding:'.25rem .5rem',color:'#e31b23',fontSize:'.75rem',cursor:'pointer'}}>×</button>
            </div>
            <div style={{display:'flex',gap:'1rem',marginTop:'.6rem',flexWrap:'wrap'}}>
              <div style={{textAlign:'center'}}>
                <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:'1.1rem',color:'var(--color-accent)'}}>{fmt(h.tempo||0)}</div>
                <div style={{fontSize:'.55rem',color:'var(--color-text-sub)',textTransform:'uppercase'}}>tempo</div>
              </div>
              {h.metrics.distancia&&<div style={{textAlign:'center'}}><div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:'1.1rem'}}>{h.metrics.distancia}km</div><div style={{fontSize:'.55rem',color:'var(--color-text-sub)',textTransform:'uppercase'}}>distância</div></div>}
              {h.metrics.calorias&&<div style={{textAlign:'center'}}><div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:'1.1rem'}}>{h.metrics.calorias}</div><div style={{fontSize:'.55rem',color:'var(--color-text-sub)',textTransform:'uppercase'}}>kcal</div></div>}
              {h.metrics.rounds&&<div style={{textAlign:'center'}}><div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:'1.1rem'}}>{h.metrics.rounds}x</div><div style={{fontSize:'.55rem',color:'var(--color-text-sub)',textTransform:'uppercase'}}>rounds</div></div>}
              {h.metrics.andares&&<div style={{textAlign:'center'}}><div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:'1.1rem'}}>{h.metrics.andares}</div><div style={{fontSize:'.55rem',color:'var(--color-text-sub)',textTransform:'uppercase'}}>andares</div></div>}
            </div>
            {h.notes&&<div style={{marginTop:'.5rem',fontSize:'.75rem',color:'var(--color-text-sub)',fontStyle:'italic'}}>"{h.notes}"</div>}
          </div>
        ))}
      </div>
    );
  }

  // Home view
  return (
    <div style={{marginTop:'1rem',display:'grid',gap:'1rem'}}>

// QR CODE SCANNER (for importing plans)
// ═══════════════════════════════════════════════════════════════════════════
const QRScanner = ({onResult, onClose}) => {
  const videoRef = useRef(null);
  const [error, setError] = useState(null);
  const [scanning, setScanning] = useState(false);

  useEffect(()=>{
    let stream = null;
    const start = async() => {
      try {
        stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
        if(videoRef.current) { videoRef.current.srcObject = stream; videoRef.current.play(); setScanning(true); }
      } catch(e) { setError('Câmera não disponível: '+e.message); }
    };
    start();
    return () => { if(stream) stream.getTracks().forEach(t=>t.stop()); };
  },[]);

  // Use BarcodeDetector API if available, else show manual input
  const [manual, setManual] = useState('');
  const hasBarcodeApi = typeof BarcodeDetector !== 'undefined';

  useEffect(()=>{
    if(!hasBarcodeApi || !scanning) return;
    const detector = new BarcodeDetector({formats:['qr_code']});
    const interval = setInterval(async()=>{
      if(!videoRef.current) return;
      try {
        const codes = await detector.detect(videoRef.current);
        if(codes.length>0) { clearInterval(interval); onResult(codes[0].rawValue); }
      } catch(_){}
    }, 500);
    return ()=>clearInterval(interval);
  },[scanning, hasBarcodeApi]);

  return (
    <Modal onClose={onClose}>
      <div style={{textAlign:'center'}}>
        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:'1.2rem',textTransform:'uppercase',marginBottom:'1rem'}}>Escanear QR Code</div>
        {error ? (
          <div style={{color:'var(--color-accent)',fontSize:'.85rem',padding:'1rem'}}>{error}</div>
        ) : (
          <div style={{position:'relative',borderRadius:'10px',overflow:'hidden',background:'#000',marginBottom:'1rem'}}>
            <video ref={videoRef} style={{width:'100%',maxHeight:'240px',objectFit:'cover',display:'block'}} muted playsInline/>
            <div style={{position:'absolute',inset:'20%',border:'2px solid var(--color-accent)',borderRadius:'8px',boxShadow:'0 0 0 9999px rgba(0,0,0,.5)'}}/>
          </div>
        )}
        {!hasBarcodeApi&&(
          <div style={{marginTop:'.75rem'}}>
            <div style={{fontSize:'.72rem',color:'var(--color-text-sub)',marginBottom:'.5rem'}}>Ou cole o link da ficha:</div>
            <div style={{display:'flex',gap:'.5rem'}}>
              <input placeholder="https://darksetoficial.netlify.app/?import=..." value={manual} onChange={e=>setManual(e.target.value)}
                style={{flex:1,background:'rgba(0,0,0,.3)',border:'1px solid var(--color-border)',borderRadius:'8px',padding:'.45rem .75rem',fontSize:'.82rem',color:'var(--color-text)'}}/>
              <button onClick={()=>manual&&onResult(manual)} style={{background:'var(--color-accent)',border:'none',borderRadius:'8px',padding:'.45rem .85rem',color:'#fff',fontWeight:700,fontSize:'.82rem',cursor:'pointer'}}>OK</button>
            </div>
          </div>
        )}
      </div>
    </Modal>
  );
};

// ── Detecta horário habitual de treino ──────────────────────────────────────
function detectTrainHour(history) {
  if (!history||typeof history!=='object') return null;
  const hours=[];
  Object.values(history).slice(-20).forEach(sess=>{
    if(sess.startedAt){const h=new Date(sess.startedAt).getHours();if(h>=4&&h<=23)hours.push(h);}
  });
  if(hours.length<3) return null;
  return Math.round(hours.reduce((a,b)=>a+b,0)/hours.length);
}

// NOTIFICAÇÕES DE TREINO
// ═══════════════════════════════════════════════════════════════════════════
const NotifSettings = ({prefs, setPrefs, setToast}) => {
  const [enabled, setEnabled] = useState(!!prefs.notifEnabled);
  const [hour, setHour] = useState(prefs.notifHour||7);
  const [min, setMin] = useState(prefs.notifMin||0);
  const [perm, setPerm] = useState(('Notification' in window) ? window.Notification.permission : 'default');

  const requestAndSave = async() => {
    if('Notification' in window){
      const p = await Notification.requestPermission();
      setPerm(p);
      if(p==='granted'){
        setEnabled(true);
        setPrefs(prev=>({...prev, notifEnabled:true, notifHour:hour, notifMin:min}));
        setToast('Lembrete ativado! ⏰');
        // Schedule via service worker if available
        scheduleNotif(hour,min);
      } else {
        setToast('Permissão negada. Ative nas configurações do celular.');
      }
    } else {
      setToast('Notificações não suportadas neste dispositivo');
    }
  };

  const disable = () => {
    setEnabled(false);
    setPrefs(prev=>({...prev, notifEnabled:false}));
    setToast('Lembrete desativado');
  };

  const scheduleNotif = (h,m) => {
    // Use SW periodic sync if available, else manual check
    if('serviceWorker' in navigator && navigator.serviceWorker.controller){
      navigator.serviceWorker.controller.postMessage({type:'scheduleNotif', hour:h, min:m});
    }
  };

  const fmtTime = (h,m) => `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;

  return (
    <div className="ds-card" style={{padding:'1rem 1.1rem',display:'grid',gap:'.85rem',background:'var(--color-card)'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:'1rem',textTransform:'uppercase'}}>Lembrete diário</div>
          <div style={{fontSize:'.7rem',color:'var(--color-text-sub)',marginTop:'2px'}}>
            {(()=>{const dh=detectTrainHour(window._DS_HIST||{});return dh!==null?`Horário detectado nos seus treinos: ${String(dh).padStart(2,'0')}:00`:'Te avisa na hora certa de treinar';})()}
          </div>
        </div>
        <Switch checked={enabled} onChange={v=>v?requestAndSave():disable()}/>
      </div>

      {enabled&&(
        <>
          <div>
            <div style={{fontSize:'.62rem',color:'var(--color-text-sub)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:'.4rem'}}>Horário do lembrete</div>
            <div style={{display:'flex',alignItems:'center',gap:'.5rem'}}>
              <input type="number" min={0} max={23} value={hour} onChange={e=>setHour(Number(e.target.value))}
                style={{width:'60px',background:'rgba(0,0,0,.25)',border:'1px solid var(--color-border)',borderRadius:'8px',padding:'.45rem .65rem',fontSize:'1.1rem',color:'var(--color-text)',fontWeight:700,textAlign:'center'}}/>
              <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:'1.2rem',color:'var(--color-text-sub)'}}>:</span>
              <input type="number" min={0} max={59} step={5} value={min} onChange={e=>setMin(Number(e.target.value))}
                style={{width:'60px',background:'rgba(0,0,0,.25)',border:'1px solid var(--color-border)',borderRadius:'8px',padding:'.45rem .65rem',fontSize:'1.1rem',color:'var(--color-text)',fontWeight:700,textAlign:'center'}}/>
              <button onClick={()=>{setPrefs(prev=>({...prev,notifHour:hour,notifMin:min}));scheduleNotif(hour,min);setToast('Horário salvo');}}
                style={{background:'var(--color-accent)',border:'none',borderRadius:'8px',padding:'.45rem .85rem',color:'#fff',fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:'.85rem',textTransform:'uppercase',cursor:'pointer'}}>
                Salvar
              </button>
            </div>
          </div>
          <div style={{fontSize:'.7rem',color:'#4ade80'}}>⏰ Lembrete ativo às {fmtTime(hour,min)} todos os dias</div>
        </>
      )}
      {perm==='denied'&&<div style={{fontSize:'.72rem',color:'var(--color-accent)'}}>Permissão negada. Ative nas configurações do sistema.</div>}
    </div>
  );
};

// ═══════════════════════════════════════════════════════════════════════════
// COMUNIDADE — Firebase-backed social/ranking
// ═══════════════════════════════════════════════════════════════════════════

const Community = ({history, setToast, prefs}) => {
  const getUID = () => { try { return JSON.parse(localStorage.getItem('darkset.user'))?.uid || null; } catch(_) { return null; } };
  const uid    = getUID();
  const db     = () => window._db || null;

  // ── Firestore helpers ──────────────────────────────────────────────────
  // squads/{code}           → { name, code, pass, createdAt, creatorUid }
  // squads/{code}/members/{uid} → { uid, name, avatar, joinedAt, role }
  // squads/{code}/chat/{msgId}  → { uid, name, avatar, text, ts }
  // squads/{code}/checkins/{date_uid} → { uid, name, avatar, ts, hadWorkout, date }

  const squadRef  = (code) => db()?.collection('squads').doc(code.toUpperCase());
  const membRef   = (code, u) => squadRef(code)?.collection('members').doc(u);
  const chatRef   = (code) => squadRef(code)?.collection('chat');
  const cinRef    = (code) => squadRef(code)?.collection('checkins');

  // ── State ──────────────────────────────────────────────────────────────
  const [tab, setTab]         = useState('feed');
  const [squad, setSquad]     = useState(() => { try { return JSON.parse(localStorage.getItem('ds.squad')) || null; } catch(_) { return null; } });
  const [loading, setLoading] = useState(false);
  const [members, setMembers] = useState([]);
  const [chatLog, setChatLog] = useState([]);
  const [checkins, setCheckins] = useState([]);  // flat array
  const [chatMsg, setChatMsg]   = useState('');
  const [showCreate, setShowCreate] = useState(false);
  const [showJoin, setShowJoin]     = useState(false);
  const [squadName, setSquadName]   = useState('');
  const [squadPass, setSquadPass]   = useState('');
  const [joinCode, setJoinCode]     = useState('');
  const [joinPass, setJoinPass]     = useState('');
  const [chatUnsub, setChatUnsub]   = useState(null);
  const [cinUnsub, setCinUnsub]     = useState(null);
  const [membUnsub, setMembUnsub]   = useState(null);
  const [notLogged, setNotLogged]   = useState(!uid);
  const [squadErr, setSquadErr]       = useState('');

  const myName   = prefs.name   || 'Usuário';
  const myAvatar = prefs.avatarUrl || null;
  const todayKey = new Date().toISOString().slice(0,10);

  // ── Live listeners ─────────────────────────────────────────────────────
  const startListeners = React.useCallback((code) => {
    if (!db()) return;

    // Members
    const uM = squadRef(code).collection('members')
      .onSnapshot(snap => {
        setMembers(snap.docs.map(d => d.data()));
      }, () => {});
    setMembUnsub(() => uM);

    // Chat (last 60 msgs ordered by ts)
    const uC = chatRef(code).orderBy('ts','asc').limitToLast(60)
      .onSnapshot(snap => {
        setChatLog(snap.docs.map(d => d.data()));
      }, () => {});
    setChatUnsub(() => uC);

    // Check-ins (last 30 days)
    const since = new Date(); since.setDate(since.getDate()-30);
    const sinceStr = since.toISOString().slice(0,10);
    const uCi = cinRef(code).where('date','>=',sinceStr)
      .onSnapshot(snap => {
        setCheckins(snap.docs.map(d => d.data()));
      }, () => {});
    setCinUnsub(() => uCi);
  }, []);

  const stopListeners = () => {
    chatUnsub?.(); setChatUnsub(null);
    cinUnsub?.();  setCinUnsub(null);
    membUnsub?.(); setMembUnsub(null);
  };

  // Attach listeners when squad loads
  useEffect(() => {
    if (squad?.code) startListeners(squad.code);
    return () => stopListeners();
  }, [squad?.code]);

  // ── Create squad ───────────────────────────────────────────────────────
  const waitForDb = () => new Promise((res, rej) => {
    let n = 0;
    const t = setInterval(() => {
      if (window._db) { clearInterval(t); res(window._db); }
      else if (++n > 30) { clearInterval(t); rej(new Error('Firebase não conectado. Verifique sua conexão.')); }
    }, 200);
  });

  const createSquad = async () => {
    if (!uid) { setSquadErr('Faça login primeiro (Perfil → Entrar).'); return; }
    if (!squadName.trim()) { setSquadErr('Digite um nome para o squad.'); return; }
    setLoading(true); setSquadErr('');
    try {
      const fdb = await waitForDb();
      const code = Math.random().toString(36).slice(2,8).toUpperCase();
      const sq = { name: squadName.trim(), code, pass: squadPass.trim(), createdAt: Date.now(), creatorUid: uid };
      await fdb.collection('squads').doc(code).set(sq);
      await fdb.collection('squads').doc(code).collection('members').doc(uid).set({ uid, name: myName, avatar: myAvatar, joinedAt: Date.now(), role: 'admin' });
      localStorage.setItem('ds.squad', JSON.stringify(sq));
      setSquad(sq); setShowCreate(false);
      setToast('Squad criado! Código: ' + code);
    } catch(e) {
      setSquadErr('Erro ao criar: ' + (e.message || e.code || String(e)));
    }
    setLoading(false);
  };

  // ── Join squad ─────────────────────────────────────────────────────────
  const joinSquad = async () => {
    if (!uid) { setSquadErr('Faça login primeiro (Perfil → Entrar).'); return; }
    const code = joinCode.trim().toUpperCase();
    if (code.length < 4) { setSquadErr('Código inválido.'); return; }
    setLoading(true); setSquadErr('');
    try {
      const fdb = await waitForDb();
      const snap = await fdb.collection('squads').doc(code).get();
      if (!snap.exists) { setSquadErr('Squad não encontrado. Verifique o código.'); setLoading(false); return; }
      const sq = snap.data();
      if (sq.pass && sq.pass.trim() && sq.pass.trim() !== joinPass.trim()) { setSquadErr('Senha incorreta.'); setLoading(false); return; }
      await fdb.collection('squads').doc(code).collection('members').doc(uid).set({ uid, name: myName, avatar: myAvatar, joinedAt: Date.now(), role: 'member' });
      localStorage.setItem('ds.squad', JSON.stringify(sq));
      setSquad(sq); setShowJoin(false);
      setToast('Entrou no squad ' + sq.name + '!');
    } catch(e) {
      setSquadErr('Erro: ' + (e.message || e.code || String(e)));
    }
    setLoading(false);
  };

  // ── Leave squad ────────────────────────────────────────────────────────
  const leaveSquad = async () => {
    if (!confirm('Sair do squad?')) return;
    // Remover do Firestore primeiro (com waitForDb para garantir conexão)
    if (uid && squad?.code) {
      try {
        const fdb = await waitForDb();
        await fdb.collection('squads').doc(squad.code.toUpperCase())
                 .collection('members').doc(uid).delete();
      } catch(e) {
        console.warn('leaveSquad Firestore error:', e);
      }
    }
    stopListeners();
    localStorage.removeItem('ds.squad');
    setSquad(null);
    setMembers([]); setChatLog([]); setCheckins([]);
    setToast('Saiu do squad');
  };

  // ── Send chat ──────────────────────────────────────────────────────────
  const sendChat = async () => {
    if (!chatMsg.trim() || !squad || !uid || !db()) return;
    const msg = { uid, name: myName, avatar: myAvatar, text: chatMsg.trim(), ts: Date.now() };
    setChatMsg('');
    try { await chatRef(squad.code).add(msg); } catch(_) {}
  };

  // ── Check-in ───────────────────────────────────────────────────────────
  const doCheckin = async () => {
    if (!squad || !uid || !db()) return;
    const alreadyDone = checkins.some(ci => ci.uid === uid && ci.date === todayKey);
    if (alreadyDone) { setToast('Já fez check-in hoje!'); return; }
    const ci = { uid, name: myName, avatar: myAvatar, ts: Date.now(), date: todayKey, hadWorkout: !!history[todayKey], weeklyGoal: prefs&&prefs.weeklyGoal||3 };
    try {
      await cinRef(squad.code).doc(todayKey + '_' + uid).set(ci);
      setToast(history[todayKey] ? '💪 Check-in com treino!' : '✅ Check-in feito!');
    } catch(_) {}
  };

  // ── Derived data ───────────────────────────────────────────────────────
  const ranking = useMemo(() => {
    const scores = {};
    checkins.forEach(ci => {
      if (!scores[ci.uid]) scores[ci.uid] = { uid:ci.uid, name:ci.name, avatar:ci.avatar, days:0, workouts:0, goal:ci.weeklyGoal||3 };
      scores[ci.uid].days++;
      if (ci.hadWorkout) scores[ci.uid].workouts++;
      if (ci.weeklyGoal) scores[ci.uid].goal = ci.weeklyGoal;
    });
    return Object.values(scores)
      .map(function(m){ return Object.assign({},m,{pct:Math.min(100,Math.round((m.workouts/(m.goal||3))*100))}); })
      .sort(function(a,b){ return b.pct-a.pct||b.workouts-a.workouts; });
  }, [checkins]);

  const todayCi = checkins.filter(ci => ci.date === todayKey);
  const myCheckedIn = todayCi.some(ci => ci.uid === uid);

  const fmtTime = ts => { const d = new Date(ts); return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); };
  const fmtDate = str => { if(!str) return ''; const [y,m,d] = str.split('-'); return `${d}/${m}`; };

  // Feed: all recent check-ins sorted by ts desc
  const feed = useMemo(() => [...checkins].sort((a,b) => b.ts - a.ts).slice(0, 40), [checkins]);

  // ── Not logged in ──────────────────────────────────────────────────────
  if (!uid) return (
    <div style={{marginTop:'1rem',display:'grid',gap:'1rem'}}>
      <div><div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:'1.8rem',textTransform:'uppercase',lineHeight:1}}>DARK<span style={{color:'var(--color-accent)'}}>SQUAD</span></div></div>
      <div style={{background:'var(--color-card)',border:'1px solid var(--color-border)',borderRadius:'12px',padding:'1.5rem',textAlign:'center'}}>
        <div style={{fontSize:'2rem',marginBottom:'.5rem'}}>🔐</div>
        <div style={{fontWeight:700,marginBottom:'.35rem'}}>Login necessário</div>
        <div style={{fontSize:'.78rem',color:'var(--color-text-sub)'}}>Faça login no seu perfil para usar o Squad</div>
      </div>
    </div>
  );

  // ── No squad — landing ─────────────────────────────────────────────────
  if (!squad) return (
    <div style={{marginTop:'1rem',display:'grid',gap:'1rem'}}>
      <div>
        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:'1.8rem',textTransform:'uppercase',lineHeight:1}}>DARK<span style={{color:'var(--color-accent)'}}>SQUAD</span></div>
        <div style={{fontSize:'.65rem',color:'var(--color-text-sub)',letterSpacing:'.08em',textTransform:'uppercase',marginTop:'2px'}}>Treine junto, evolua junto</div>
      </div>

      <button onClick={()=>setShowCreate(true)} style={{background:'var(--color-accent)',border:'none',borderRadius:'12px',padding:'1.1rem',textAlign:'left',cursor:'pointer',position:'relative',overflow:'hidden'}}>
        <div style={{position:'absolute',right:'-12px',top:'-12px',fontFamily:"'Barlow Condensed',sans-serif",fontSize:'5rem',fontWeight:900,color:'rgba(0,0,0,.15)',lineHeight:1,pointerEvents:'none'}}>+</div>
        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:'1.1rem',textTransform:'uppercase',color:'#fff'}}>Criar Squad</div>
        <div style={{fontSize:'.72rem',color:'rgba(255,255,255,.65)',marginTop:'.2rem'}}>Crie um grupo e convide amigos com código</div>
      </button>

      <button onClick={()=>setShowJoin(true)} style={{background:'var(--color-card)',border:'1px solid var(--color-border)',borderRadius:'12px',padding:'1.1rem',textAlign:'left',cursor:'pointer'}}>
        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:'1.1rem',textTransform:'uppercase'}}>Entrar com Código</div>
        <div style={{fontSize:'.72rem',color:'var(--color-text-sub)',marginTop:'.2rem'}}>Digite o código do squad que alguém criou</div>
      </button>

      {!db() && (
        <div style={{background:'rgba(248,113,113,.07)',border:'1px solid rgba(248,113,113,.2)',borderRadius:'10px',padding:'.75rem',fontSize:'.73rem',color:'#f87171',textAlign:'center'}}>
          ⚠️ Firebase não conectado. Aguarde ou recarregue a página.
        </div>
      )}

      {showCreate && (
        <Modal onClose={()=>{setShowCreate(false);setSquadErr('');}}>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:'1.1rem',textTransform:'uppercase',marginBottom:'.75rem'}}>Criar Squad</div>
          {squadErr && <div style={{color:'#f87171',fontSize:'.78rem',marginBottom:'.5rem',padding:'.35rem .6rem',background:'rgba(248,113,113,.08)',borderRadius:'6px'}}>{squadErr}</div>}
          <div style={{display:'grid',gap:'.6rem'}}>
            <input value={squadName} onChange={e=>setSquadName(e.target.value)} placeholder="Nome do squad..." autoFocus
              style={{background:'rgba(0,0,0,.3)',border:'1px solid var(--color-border)',borderRadius:'8px',padding:'.5rem .75rem',color:'var(--color-text)',fontSize:'.9rem',width:'100%'}}/>
            <div>
              <div style={{fontSize:'.6rem',color:'var(--color-text-sub)',textTransform:'uppercase',marginBottom:'3px'}}>Senha (opcional — deixe vazio para squad aberto)</div>
              <input value={squadPass} onChange={e=>setSquadPass(e.target.value)} placeholder="Senha..." type="password"
                style={{background:'rgba(0,0,0,.3)',border:'1px solid var(--color-border)',borderRadius:'8px',padding:'.5rem .75rem',color:'var(--color-text)',fontSize:'.9rem',width:'100%'}}/>
            </div>
            <button onClick={createSquad} disabled={loading}
              style={{background:'var(--color-accent)',border:'none',borderRadius:'8px',padding:'.65rem',color:'#fff',fontWeight:900,fontSize:'.9rem',cursor:'pointer',opacity:loading?.6:1}}>
              {loading ? 'Criando...' : 'Criar Squad'}
            </button>
          </div>
        </Modal>
      )}

      {showJoin && (
        <Modal onClose={()=>{setShowJoin(false);setSquadErr('');}}>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:'1.1rem',textTransform:'uppercase',marginBottom:'.75rem'}}>Entrar no Squad</div>
          {squadErr && <div style={{color:'#f87171',fontSize:'.78rem',marginBottom:'.5rem',padding:'.35rem .6rem',background:'rgba(248,113,113,.08)',borderRadius:'6px'}}>{squadErr}</div>}
          <div style={{display:'grid',gap:'.6rem'}}>
            <input value={joinCode} onChange={e=>setJoinCode(e.target.value.toUpperCase())} placeholder="Código (ex: AB3X9K)" autoFocus
              style={{background:'rgba(0,0,0,.3)',border:'1px solid var(--color-border)',borderRadius:'8px',padding:'.5rem .75rem',color:'var(--color-text)',fontSize:'.9rem',letterSpacing:'.1em',fontWeight:700,width:'100%'}}/>
            <input value={joinPass} onChange={e=>setJoinPass(e.target.value)} placeholder="Senha (se houver)" type="password"
              style={{background:'rgba(0,0,0,.3)',border:'1px solid var(--color-border)',borderRadius:'8px',padding:'.5rem .75rem',color:'var(--color-text)',fontSize:'.9rem',width:'100%'}}/>
            <button onClick={joinSquad} disabled={loading}
              style={{background:'var(--color-accent)',border:'none',borderRadius:'8px',padding:'.65rem',color:'#fff',fontWeight:900,fontSize:'.9rem',cursor:'pointer',opacity:loading?.6:1}}>
              {loading ? 'Entrando...' : 'Entrar'}
            </button>
          </div>
        </Modal>
      )}
    </div>
  );

  // ── Squad dashboard ────────────────────────────────────────────────────
  return (
    <div style={{marginTop:'1rem',display:'grid',gap:'1rem'}}>
      {/* Header */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:'1.6rem',textTransform:'uppercase',lineHeight:1}}>{squad.name}</div>
          <div style={{fontSize:'.65rem',color:'var(--color-text-sub)',marginTop:'2px'}}>
            Código: <span style={{color:'var(--color-accent)',fontWeight:700,letterSpacing:'.1em'}}>{squad.code}</span>
            {squad.pass && <span style={{marginLeft:'.5rem',color:'#4ade80',fontSize:'.6rem'}}>🔒 Privado</span>}
            <span style={{marginLeft:'.5rem',color:'#555'}}>· {members.length} membro{members.length!==1?'s':''}</span>
          </div>
        </div>
        <button onClick={leaveSquad} style={{background:'rgba(248,113,113,.08)',border:'1px solid rgba(248,113,113,.2)',borderRadius:'8px',padding:'.35rem .7rem',color:'#f87171',fontSize:'.7rem',fontWeight:700,cursor:'pointer'}}>Sair</button>
      </div>

      {/* Check-in button */}
      <button onClick={doCheckin} style={{
        background: myCheckedIn ? 'rgba(74,222,128,.06)' : 'var(--color-accent)',
        border: myCheckedIn ? '1px solid rgba(74,222,128,.3)' : 'none',
        borderRadius:'12px', padding:'.9rem 1rem', cursor:'pointer',
        display:'flex', alignItems:'center', justifyContent:'space-between'
      }}>
        <div style={{textAlign:'left'}}>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:'1rem',textTransform:'uppercase',color:myCheckedIn?'#4ade80':'#fff'}}>
            {myCheckedIn ? '✓ Check-in feito hoje!' : '📍 Fazer Check-in'}
          </div>
          <div style={{fontSize:'.7rem',color:myCheckedIn?'rgba(74,222,128,.6)':'rgba(255,255,255,.55)',marginTop:'1px'}}>
            {myCheckedIn ? (history[todayKey]?'Com treino':'Sem treino hoje') : 'Marque presença no squad'}
          </div>
        </div>
        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:'1.4rem',color:myCheckedIn?'#4ade80':'#fff'}}>
          {todayCi.length}
        </div>
      </button>

      {/* Tabs */}
      <div style={{display:'flex',background:'rgba(255,255,255,.04)',borderRadius:'10px',padding:'3px',gap:'3px'}}>
        {[['feed','📰 Feed'],['ranking','🏆 Rank'],['chat','💬 Chat'],['members','👥 Membros']].map(([t,l])=>(
          <button key={t} onClick={()=>setTab(t)} style={{flex:1,padding:'.38rem',borderRadius:'7px',border:'none',
            background:tab===t?'rgba(255,255,255,.1)':'transparent',
            color:tab===t?'var(--color-text)':'var(--color-text-sub)',
            fontWeight:700,fontSize:'.68rem',cursor:'pointer',letterSpacing:'-.01em'}}>
            {l}
          </button>
        ))}
      </div>

      {/* FEED */}
      {tab==='feed' && (
        <div style={{display:'grid',gap:'.4rem'}}>
          {feed.length===0
            ? <div style={{textAlign:'center',padding:'2rem',color:'var(--color-text-sub)',fontSize:'.85rem',background:'var(--color-card)',borderRadius:'12px',border:'1px solid var(--color-border)'}}>
                Nenhuma atividade ainda. Façam check-in!
              </div>
            : feed.map((ci,i)=>(
              <div key={ci.uid+ci.ts+i} style={{display:'flex',alignItems:'center',gap:'.65rem',background:'var(--color-card)',border:'1px solid var(--color-border)',borderRadius:'10px',padding:'.65rem .85rem'}}>
                {ci.avatar
                  ? <img src={ci.avatar} style={{width:'34px',height:'34px',borderRadius:'50%',objectFit:'cover',flexShrink:0}} alt=""/>
                  : <div style={{width:'34px',height:'34px',borderRadius:'50%',background:'rgba(227,27,35,.12)',border:'1px solid rgba(227,27,35,.2)',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:'.95rem',color:'var(--color-accent)',flexShrink:0}}>{(ci.name||'?').slice(0,2).toUpperCase()}</div>}
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:'.84rem',fontWeight:700,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{ci.name}</div>
                  <div style={{fontSize:'.68rem',color:'var(--color-text-sub)'}}>{ci.hadWorkout?'💪 Treinou':'✅ Check-in'} · {fmtDate(ci.date)}</div>
                </div>
                <div style={{fontSize:'.66rem',color:'#555',flexShrink:0}}>{fmtTime(ci.ts)}</div>
              </div>
            ))
          }
        </div>
      )}

      {/* RANKING */}
      {tab==='ranking' && (
        <div style={{display:'grid',gap:'.4rem'}}>
          <div style={{fontSize:'.58rem',color:'var(--color-text-sub)',textTransform:'uppercase',letterSpacing:'.06em'}}>Últimos 30 dias — por treinos</div>
          {ranking.length===0
            ? <div style={{textAlign:'center',padding:'2rem',color:'var(--color-text-sub)',fontSize:'.85rem',background:'var(--color-card)',borderRadius:'12px',border:'1px solid var(--color-border)'}}>Façam check-in para aparecer!</div>
            : ranking.map((m,i)=>{
              const medal = i===0?'🥇':i===1?'🥈':i===2?'🥉':'';
              const isMe = m.uid===uid;
              return (
                <div key={m.uid} style={{display:'flex',alignItems:'center',gap:'.65rem',
                  background:isMe?'rgba(227,27,35,.05)':'var(--color-card)',
                  border:isMe?'1px solid rgba(227,27,35,.2)':'1px solid var(--color-border)',
                  borderRadius:'10px',padding:'.6rem .85rem'}}>
                  <div style={{width:'26px',textAlign:'center',fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:'1rem',color:i<3?'#facc15':'#555',flexShrink:0}}>{medal||i+1}</div>
                  {m.avatar
                    ? <img src={m.avatar} style={{width:'30px',height:'30px',borderRadius:'50%',objectFit:'cover',flexShrink:0}} alt=""/>
                    : <div style={{width:'30px',height:'30px',borderRadius:'50%',background:'rgba(255,255,255,.06)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'.8rem',fontWeight:700,color:'#555',flexShrink:0}}>{(m.name||'?').slice(0,2).toUpperCase()}</div>}
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:'.84rem',fontWeight:700,color:isMe?'var(--color-accent)':'var(--color-text)'}}>{m.name}{isMe?' (você)':''}</div>
                    <div style={{fontSize:'.65rem',color:'var(--color-text-sub)'}}>{m.workouts}/{m.goal} treinos · {m.pct}% consistência</div>
                  </div>
                  <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:'1.1rem',color:i===0?'#facc15':i===1?'#c0c0c0':i===2?'#cd7f32':'#555',flexShrink:0}}>{m.pct}%</div>
                </div>
              );
            })
          }
        </div>
      )}

      {/* CHAT */}
      {tab==='chat' && (
        <div style={{display:'grid',gap:'.5rem'}}>
          <div style={{background:'var(--color-card)',border:'1px solid var(--color-border)',borderRadius:'12px',padding:'.5rem',height:'52vh',overflowY:'auto',display:'flex',flexDirection:'column',gap:'.35rem'}} id="chatBox">
            {chatLog.length===0
              ? <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',color:'#444',fontSize:'.82rem'}}>Seja o primeiro a mandar mensagem!</div>
              : chatLog.map((msg,i)=>{
                const isMe = msg.uid===uid;
                return (
                  <div key={msg.ts+i} style={{display:'flex',flexDirection:isMe?'row-reverse':'row',gap:'.35rem',alignItems:'flex-end'}}>
                    {!isMe && (msg.avatar
                      ? <img src={msg.avatar} style={{width:'22px',height:'22px',borderRadius:'50%',flexShrink:0}} alt=""/>
                      : <div style={{width:'22px',height:'22px',borderRadius:'50%',background:'rgba(255,255,255,.07)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'.6rem',fontWeight:700,flexShrink:0}}>{(msg.name||'?').slice(0,1)}</div>)}
                    <div style={{maxWidth:'75%'}}>
                      {!isMe && <div style={{fontSize:'.58rem',color:'#555',marginBottom:'2px',paddingLeft:'4px'}}>{msg.name}</div>}
                      <div style={{background:isMe?'var(--color-accent)':'rgba(255,255,255,.07)',borderRadius:isMe?'12px 12px 3px 12px':'12px 12px 12px 3px',padding:'.4rem .65rem'}}>
                        <div style={{fontSize:'.84rem',color:isMe?'#fff':'var(--color-text)',lineHeight:1.4,wordBreak:'break-word'}}>{msg.text}</div>
                      </div>
                      <div style={{fontSize:'.56rem',color:'#444',marginTop:'2px',textAlign:isMe?'right':'left',paddingLeft:isMe?0:'4px'}}>{fmtTime(msg.ts)}</div>
                    </div>
                  </div>
                );
              })
            }
          </div>
          <div style={{display:'flex',gap:'.4rem'}}>
            <input value={chatMsg} onChange={e=>setChatMsg(e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&!e.shiftKey&&sendChat()}
              placeholder="Mensagem..." maxLength={500}
              style={{flex:1,background:'rgba(0,0,0,.3)',border:'1px solid var(--color-border)',borderRadius:'8px',padding:'.5rem .7rem',color:'var(--color-text)',fontSize:'.88rem'}}/>
            <button onClick={sendChat} style={{background:'var(--color-accent)',border:'none',borderRadius:'8px',padding:'.5rem .85rem',color:'#fff',fontWeight:800,fontSize:'.95rem',cursor:'pointer'}}>→</button>
          </div>
        </div>
      )}

      {/* MEMBERS */}
      {tab==='members' && (
        <div style={{display:'grid',gap:'.4rem'}}>
          <div style={{fontSize:'.58rem',color:'var(--color-text-sub)',textTransform:'uppercase',letterSpacing:'.06em'}}>{members.length} membro{members.length!==1?'s':''}</div>
          {members.map((m,i)=>(
            <div key={m.uid||i} style={{display:'flex',alignItems:'center',gap:'.65rem',background:'var(--color-card)',border:'1px solid var(--color-border)',borderRadius:'10px',padding:'.6rem .85rem'}}>
              {m.avatar
                ? <img src={m.avatar} style={{width:'34px',height:'34px',borderRadius:'50%',objectFit:'cover',flexShrink:0}} alt=""/>
                : <div style={{width:'34px',height:'34px',borderRadius:'50%',background:'rgba(255,255,255,.06)',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:'.9rem',color:'#555',flexShrink:0}}>{(m.name||'?').slice(0,2).toUpperCase()}</div>}
              <div style={{flex:1}}>
                <div style={{fontSize:'.84rem',fontWeight:700}}>{m.name}{m.uid===uid?' (você)':''}</div>
                <div style={{fontSize:'.65rem',color:'var(--color-text-sub)'}}>{m.role==='admin'?'👑 Admin':'Membro'}</div>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
};



// ═══════════════════════════════════════════════════════════════════════════
// ONBOARDING — primeira vez no app
// ═══════════════════════════════════════════════════════════════════════════
// ── PR Celebration ───────────────────────────────────────────────────────────
const PRCelebration = ({exName, weight, onClose}) => {
  useEffect(() => {
    const t = setTimeout(onClose, 4000);
    return () => clearTimeout(t);
  }, []);
  return (
    <div onClick={onClose} style={{
      position:'fixed',inset:0,zIndex:99999,
      background:'rgba(0,0,0,.9)',
      display:'flex',flexDirection:'column',
      alignItems:'center',justifyContent:'center',
      gap:'1rem',padding:'2rem',cursor:'pointer'
    }}>
      <div style={{fontSize:'3.5rem'}}>🏆</div>
      <div style={{
        fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,
        fontSize:'2.5rem',textTransform:'uppercase',
        color:'#FFD700',textAlign:'center',lineHeight:1,
        textShadow:'0 0 40px rgba(255,215,0,.6)'
      }}>NOVO RECORDE!</div>
      <div style={{
        fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,
        fontSize:'1.1rem',textTransform:'uppercase',
