// ── PresetChecker: componente separado para checar refeições do preset ──────
const PresetChecker = ({plan, viewDate, setDiet, todayStr}) => {
  const checkedKey = 'ds_ck_'+viewDate+'_'+(plan.name||'').replace(/\s/g,'');
  const [checked, setChecked] = useState(() => load(checkedKey, []));

  useEffect(() => { save(checkedKey, checked); }, [checked, checkedKey]);

  const toggleCheck = (si) => {
    setChecked(prev => {
      const next = prev.includes(si) ? prev.filter(x=>x!==si) : [...prev, si];
      // Sync checked slots → diet log for this day
      const meals = (plan.slots||[])
        .filter((_,i) => next.includes(i))
        .map(slot => ({
          name: slot.label || '',
          time: slot.time || '',
          icon: '🍳',
          calories: String((slot.items||[]).reduce((a,it)=>a+(Number(it.calories)||0),0) || slot.calories || 0),
          protein:  String((slot.items||[]).reduce((a,it)=>a+(Number(it.protein)||0),0)  || slot.protein  || 0),
          carbs:    String((slot.items||[]).reduce((a,it)=>a+(Number(it.carbs)||0),0)    || slot.carbs    || 0),
          fat:      String((slot.items||[]).reduce((a,it)=>a+(Number(it.fat)||0),0)      || slot.fat      || 0),
          note: (slot.items||[]).map(i=>i.name).filter(Boolean).join(', '),
        }));
      setDiet(d => ({...d, [viewDate]: meals}));
      return next;
    });
  };

  const totalPlanCal = (plan.slots||[]).reduce((a,slot)=>
    a + (slot.items||[]).reduce((b,it)=>b+(Number(it.calories)||0),0), 0);
  const checkedCal = (plan.slots||[])
    .filter((_,i)=>checked.includes(i))
    .reduce((a,slot)=>a+(slot.items||[]).reduce((b,it)=>b+(Number(it.calories)||0),0),0);

  return (
    <div style={{display:'grid',gap:'.5rem'}}>
      {/* Progress bar */}
      <div style={{background:'var(--color-card)',border:'1px solid var(--color-border)',borderRadius:'10px',padding:'.7rem .85rem'}}>
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:'.4rem'}}>
          <span style={{fontSize:'.7rem',color:'var(--color-text-sub)'}}>Progresso do plano</span>
          <span style={{fontSize:'.7rem',fontWeight:700,color:'var(--color-accent)'}}>{checked.length}/{(plan.slots||[]).length} refeições · {checkedCal} kcal</span>
        </div>
        <div style={{height:'5px',background:'rgba(255,255,255,.07)',borderRadius:'4px',overflow:'hidden'}}>
          <div style={{height:'100%',width:(plan.slots?.length?Math.round(checked.length/(plan.slots.length)*100):0)+'%',background:'#4ade80',borderRadius:'4px',transition:'width .3s'}}/>
        </div>
      </div>
      {/* Slots */}
      {(plan.slots||[]).map((slot,si)=>{
        const isChecked = checked.includes(si);
        const slotCal = (slot.items||[]).reduce((a,it)=>a+(Number(it.calories)||0),0) || slot.calories || 0;
        const slotItems = (slot.items||[]).filter(i=>i.name).map(i=>i.name).join(', ');
        return (
          <button key={si} onClick={()=>toggleCheck(si)}
            style={{display:'grid',gridTemplateColumns:'28px 1fr auto',alignItems:'center',gap:'.6rem',
              background:isChecked?'rgba(74,222,128,.06)':'var(--color-card)',
              border:'1px solid '+(isChecked?'rgba(74,222,128,.3)':'var(--color-border)'),
              borderRadius:'12px',padding:'.75rem .85rem',cursor:'pointer',textAlign:'left',transition:'all .2s'}}>
            <div style={{width:'22px',height:'22px',borderRadius:'50%',border:'2px solid '+(isChecked?'#4ade80':'#333'),
              background:isChecked?'#4ade80':'transparent',display:'flex',alignItems:'center',justifyContent:'center',
              transition:'all .2s',flexShrink:0}}>
              {isChecked && <span style={{color:'#000',fontSize:'.75rem',fontWeight:900}}>✓</span>}
            </div>
            <div style={{minWidth:0}}>
              <div style={{fontWeight:700,fontSize:'.86rem',color:isChecked?'#4ade80':'var(--color-text)',
                textDecoration:isChecked?'line-through':'none'}}>{slot.label}</div>
              {(slot.time||slotItems) && <div style={{fontSize:'.63rem',color:'var(--color-text-sub)',marginTop:'1px',
                whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>
                {slot.time}{slot.time&&slotItems?' · ':''}{slotItems.slice(0,40)}
              </div>}
            </div>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:'.9rem',
              color:isChecked?'#4ade80':'var(--color-text-sub)',flexShrink:0}}>
              {slotCal>0 ? slotCal+' kcal' : ''}
            </div>
          </button>
        );
      })}
    </div>
  );
};

const Diet = ({setToast}) => {
  const todayStr = () => new Date().toISOString().slice(0,10);
  const [diet, setDiet]         = useState(() => load(DIET_LS, {}));
  const [goals, setGoals]       = useState(() => load('ds_diet_goals', {calories:2000,protein:150,carbs:250,fat:65}));
  const [plans, setDietPlans]   = useState(() => load('ds_diet_plans', []));
  const [viewDate, setViewDate] = useState(todayStr());
  const [tab, setTab]           = useState('log');        // 'log' | 'plans' | 'goals'
  const [showAdd, setShowAdd]   = useState(false);
  const [showGoals, setShowGoals] = useState(false);
  const [editIdx, setEditIdx]   = useState(null);
  const [form, setForm]         = useState({name:'',calories:'',protein:'',carbs:'',fat:'',time:'',icon:'🍳',note:''});
  const [planForm, setPlanForm] = useState({name:'', meals:[]});
  const [showPlanForm, setShowPlanForm] = useState(false);
  const [logMode, setLogMode]           = useState('free');   // 'free' | 'preset'
  const [activePlanIdx, setActivePlanIdx] = useState(null);
  const [showScanner, setShowScanner]   = useState(false);
  const [scanLoading, setScanLoading]   = useState(false);
  const [scanError, setScanError]       = useState('');
  const [barcodeInput, setBarcodeInput] = useState('');

  useEffect(() => save(DIET_LS, diet), [diet]);
  useEffect(() => save('ds_diet_goals', goals), [goals]);
  useEffect(() => save('ds_diet_plans', plans), [plans]);

  const dayMeals = diet[viewDate] || [];
  const totals = useMemo(() => dayMeals.reduce((acc,m) => ({
    calories: acc.calories+(Number(m.calories)||0),
    protein:  acc.protein +(Number(m.protein)||0),
    carbs:    acc.carbs   +(Number(m.carbs)||0),
    fat:      acc.fat     +(Number(m.fat)||0),
  }), {calories:0,protein:0,carbs:0,fat:0}), [dayMeals]);

  // Streak: dias consecutivos com ao menos 1 refeição
  const streak = useMemo(() => {
    let count = 0, d = new Date();
    while(true) {
      const k = d.toISOString().slice(0,10);
      if (diet[k]?.length > 0) { count++; d.setDate(d.getDate()-1); }
      else break;
    }
    return count;
  }, [diet]);

  // Últimos 7 dias para gráfico
  const weekData = useMemo(() => {
    const days = [];
    for (let i=6; i>=0; i--) {
      const d = new Date(); d.setDate(d.getDate()-i);
      const k = d.toISOString().slice(0,10);
      const cal = (diet[k]||[]).reduce((s,m)=>s+(Number(m.calories)||0),0);
      days.push({ label: ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'][d.getDay()], cal, today: i===0 });
    }
    return days;
  }, [diet]);
  const maxCal = Math.max(...weekData.map(d=>d.cal), goals.calories, 1);

  const resetForm = () => {
    const now = new Date();
    setForm({name:'',calories:'',protein:'',carbs:'',fat:'',
      time:String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0'),
      icon:'🍳',note:''});
    setEditIdx(null);
  };

  const openAdd = () => { resetForm(); setShowAdd(true); };
  const openEdit = (i) => { setForm({...dayMeals[i]}); setEditIdx(i); setShowAdd(true); };
  const saveMeal = () => {
    if(!form.name.trim()) { setToast('Informe o nome'); return; }
    setDiet(d => {
      const arr = [...(d[viewDate]||[])];
      if(editIdx!==null) arr[editIdx]={...form};
      else arr.push({...form});
      arr.sort((a,b)=>(a.time||'').localeCompare(b.time||''));
      return {...d,[viewDate]:arr};
    });
    setShowAdd(false);
    setToast(editIdx!==null?'Refeição atualizada ✓':'Adicionado ✓');
  };
  const deleteMeal = (i) => {
    if(!confirm('Excluir?')) return;
    setDiet(d=>{const arr=[...(d[viewDate]||[])];arr.splice(i,1);return {...d,[viewDate]:arr};});
  };

  // Apply plan to current day
  const applyPlan = (plan) => {
    if(!confirm('Aplicar plano "'+plan.name+'" para hoje? Substitui as refeições atuais.')) return;
    // Convert slots-based plan to day meals
    const meals = (plan.slots || plan.meals || []).map(slot => ({
      name: slot.label || slot.name || '',
      time: slot.time || '',
      icon: slot.icon || '🍳',
      calories: slot.items ? String(slot.items.reduce((a,i)=>a+(Number(i.calories)||0),0)) : String(slot.calories||0),
      protein:  slot.items ? String(slot.items.reduce((a,i)=>a+(Number(i.protein)||0),0))  : String(slot.protein||0),
      carbs:    slot.items ? String(slot.items.reduce((a,i)=>a+(Number(i.carbs)||0),0))    : String(slot.carbs||0),
      fat:      slot.items ? String(slot.items.reduce((a,i)=>a+(Number(i.fat)||0),0))      : String(slot.fat||0),
      note: slot.items ? slot.items.map(i=>i.name).filter(Boolean).join(', ') : (slot.note||''),
    })).filter(m => m.name);
    setDiet(d=>({...d,[todayStr()]:meals}));
    setToast('✅ Plano "'+plan.name+'" aplicado!');
    setTab('log'); setViewDate(todayStr());
  };

  const dateLabel = viewDate === todayStr() ? 'Hoje' : new Date(viewDate+'T12:00').toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'short'});
  const pct = (v,g) => Math.min(100, g>0 ? Math.round(v/g*100) : 0);

  const MacroBar = ({label, val, goal, color}) => (
    <div style={{flex:1}}>
      <div style={{display:'flex',justifyContent:'space-between',marginBottom:'3px'}}>
        <span style={{fontSize:'.6rem',color:'var(--color-text-sub)',textTransform:'uppercase'}}>{label}</span>
        <span style={{fontSize:'.6rem',color:val>=goal?'#4ade80':'var(--color-text-sub)'}}>{val}<span style={{opacity:.5}}>/{goal}g</span></span>
      </div>
      <div style={{height:'4px',background:'rgba(255,255,255,.07)',borderRadius:'4px',overflow:'hidden'}}>
        <div style={{height:'100%',width:pct(val,goal)+'%',background:color,borderRadius:'4px',transition:'width .4s'}}/>
      </div>
    </div>
  );

  return (
    <>
    {showScanner && (
      <BarcodeScanner
        onClose={()=>setShowScanner(false)}
        onResult={(product)=>{
          setForm(f=>({...f,...product}));
          setShowScanner(false);
          setShowAdd(true);
        }}
      />
    )}
    <div style={{marginTop:'1rem',display:'grid',gap:'1rem'}}>
      {/* Header */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:'1.8rem',textTransform:'uppercase',lineHeight:1}}>
            DARK<span style={{color:'var(--color-accent)'}}>DIET</span>
          </div>
          {streak > 0 && <div style={{fontSize:'.65rem',color:'#f59e0b',marginTop:'2px'}}>🔥 {streak} dia{streak!==1?'s':''} consecutivo{streak!==1?'s':''}</div>}
        </div>
        <button onClick={()=>setShowGoals(true)} style={{background:'rgba(255,255,255,.06)',border:'1px solid var(--color-border)',borderRadius:'8px',padding:'.4rem .7rem',color:'var(--color-text-sub)',fontSize:'.72rem',cursor:'pointer'}}>⚙️ Metas</button>
      </div>

      {/* Tabs */}
      <div style={{display:'flex',gap:'.4rem'}}>
        {[['log','📋 Registro'],['plans','📄 Planos'],].map(([k,l])=>(
          <button key={k} onClick={()=>setTab(k)} style={{flex:1,background:tab===k?'var(--color-accent)':'rgba(255,255,255,.05)',border:'none',borderRadius:'8px',padding:'.5rem',color:tab===k?'#fff':'var(--color-text-sub)',fontWeight:700,fontSize:'.78rem',cursor:'pointer'}}>
            {l}
          </button>
        ))}
      </div>

      {tab==='log' && <>
        {/* Mode toggle: Livre vs Preset */}
        <div style={{display:'flex',background:'rgba(255,255,255,.04)',borderRadius:'10px',padding:'3px',gap:'3px'}}>
          <button onClick={()=>setLogMode('free')} style={{flex:1,padding:'.42rem',borderRadius:'8px',border:'none',background:logMode==='free'?'rgba(255,255,255,.1)':'transparent',color:logMode==='free'?'var(--color-text)':'var(--color-text-sub)',fontWeight:700,fontSize:'.78rem',cursor:'pointer',transition:'all .2s'}}>
            ✏️ Dieta livre
          </button>
          <button onClick={()=>setLogMode('preset')} style={{flex:1,padding:'.42rem',borderRadius:'8px',border:'none',background:logMode==='preset'?'var(--color-accent)':'transparent',color:logMode==='preset'?'#fff':'var(--color-text-sub)',fontWeight:700,fontSize:'.78rem',cursor:'pointer',transition:'all .2s'}}>
            📋 Usar preset
          </button>
        </div>

        {/* Date nav */}
        <div style={{display:'flex',alignItems:'center',gap:'.5rem'}}>
          <button onClick={()=>{const d=new Date(viewDate+'T12:00');d.setDate(d.getDate()-1);setViewDate(d.toISOString().slice(0,10));}} style={{background:'rgba(255,255,255,.05)',border:'1px solid var(--color-border)',borderRadius:'8px',width:'34px',height:'34px',color:'var(--color-text)',cursor:'pointer',fontSize:'1rem'}}>‹</button>
          <div style={{flex:1,textAlign:'center',fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:'1rem',textTransform:'uppercase'}}>{dateLabel}</div>
          <button onClick={()=>{const d=new Date(viewDate+'T12:00');d.setDate(d.getDate()+1);const t=todayStr();const nd=d.toISOString().slice(0,10);if(nd<=t)setViewDate(nd);}} style={{background:'rgba(255,255,255,.05)',border:'1px solid var(--color-border)',borderRadius:'8px',width:'34px',height:'34px',color:viewDate===todayStr()?'#333':'var(--color-text)',cursor:'pointer',fontSize:'1rem'}} disabled={viewDate===todayStr()}>›</button>
        </div>

        {/* Calorias + macros resumo */}
        <div style={{background:'var(--color-card)',border:'1px solid var(--color-border)',borderRadius:'14px',padding:'1rem'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end',marginBottom:'.5rem'}}>
            <div>
              <div style={{fontSize:'.6rem',color:'var(--color-text-sub)',textTransform:'uppercase',letterSpacing:'.06em'}}>Calorias</div>
              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:'1.8rem',lineHeight:1,color:totals.calories>=goals.calories?'#4ade80':'var(--color-text)'}}>{totals.calories}</div>
            </div>
            <div style={{fontSize:'.7rem',color:'var(--color-text-sub)'}}>meta: {goals.calories} kcal</div>
          </div>
          <div style={{height:'6px',background:'rgba(255,255,255,.07)',borderRadius:'6px',overflow:'hidden',marginBottom:'.85rem'}}>
            <div style={{height:'100%',width:pct(totals.calories,goals.calories)+'%',background:totals.calories>goals.calories?'#f87171':'var(--color-accent)',borderRadius:'6px',transition:'width .4s'}}/>
          </div>
          <div style={{display:'flex',gap:'.75rem'}}>
            <MacroBar label="Proteína" val={totals.protein} goal={goals.protein} color="#60a5fa"/>
            <MacroBar label="Carbs"    val={totals.carbs}   goal={goals.carbs}   color="#f59e0b"/>
            <MacroBar label="Gordura"  val={totals.fat}     goal={goals.fat}     color="#a78bfa"/>
          </div>
        </div>

        {/* Gráfico semanal */}
        <div style={{background:'var(--color-card)',border:'1px solid var(--color-border)',borderRadius:'14px',padding:'1rem'}}>
          <div style={{fontSize:'.62rem',color:'var(--color-text-sub)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:'.75rem'}}>Calorias — últimos 7 dias</div>
          <div style={{display:'flex',alignItems:'flex-end',gap:'4px',height:'64px'}}>
            {weekData.map((d,i)=>(
              <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:'3px'}}>
                <div style={{width:'100%',borderRadius:'3px 3px 0 0',background:d.today?'var(--color-accent)':'rgba(255,255,255,.15)',height:Math.max(3,Math.round(d.cal/maxCal*52))+'px',transition:'height .3s'}}/>
                <div style={{fontSize:'.55rem',color:d.today?'var(--color-accent)':'var(--color-text-sub)'}}>{d.label}</div>
              </div>
            ))}
          </div>
        </div>

        {/* ── MODO LIVRE ── */}
        {logMode==='free' && <>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <div style={{fontSize:'.62rem',color:'var(--color-text-sub)',textTransform:'uppercase',letterSpacing:'.06em'}}>Refeições ({dayMeals.length})</div>
            <button onClick={openAdd} style={{background:'var(--color-accent)',border:'none',borderRadius:'8px',padding:'.4rem .85rem',color:'#fff',fontWeight:800,fontSize:'.78rem',cursor:'pointer'}}>+ Adicionar</button>
          </div>
          {dayMeals.length===0
            ? <div style={{textAlign:'center',padding:'2rem',color:'var(--color-text-sub)',fontSize:'.82rem',background:'var(--color-card)',borderRadius:'12px',border:'1px solid var(--color-border)'}}>
                Nenhuma refeição registrada hoje
              </div>
            : dayMeals.map((m,i)=>(
              <div key={i} style={{background:'var(--color-card)',border:'1px solid var(--color-border)',borderRadius:'12px',padding:'.85rem'}}>
                <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:'.5rem'}}>
                  <div style={{display:'flex',alignItems:'center',gap:'.6rem',flex:1,minWidth:0}}>
                    <span style={{fontSize:'1.3rem'}}>{m.icon||'🍳'}</span>
                    <div style={{minWidth:0}}>
                      <div style={{fontWeight:700,fontSize:'.88rem',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{m.name}</div>
                      <div style={{fontSize:'.7rem',color:'var(--color-text-sub)'}}>{m.time||''} {m.note?'· '+m.note:''}</div>
                    </div>
                  </div>
                  <div style={{textAlign:'right',flexShrink:0}}>
                    <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:'1rem',color:'var(--color-accent)'}}>{m.calories||0} kcal</div>
                    <div style={{fontSize:'.65rem',color:'var(--color-text-sub)'}}>P:{m.protein||0} C:{m.carbs||0} G:{m.fat||0}</div>
                  </div>
                </div>
                <div style={{display:'flex',gap:'.4rem',marginTop:'.6rem'}}>
                  <button onClick={()=>openEdit(i)} style={{flex:1,background:'rgba(255,255,255,.05)',border:'1px solid var(--color-border)',borderRadius:'7px',padding:'.35rem',color:'var(--color-text-sub)',fontSize:'.72rem',cursor:'pointer'}}>✏️ Editar</button>
                  <button onClick={()=>deleteMeal(i)} style={{background:'rgba(227,27,35,.1)',border:'1px solid rgba(227,27,35,.2)',borderRadius:'7px',padding:'.35rem .6rem',color:'#e31b23',fontSize:'.72rem',cursor:'pointer'}}>🗑</button>
                </div>
              </div>
            ))
          }
        </>}

        {/* ── MODO PRESET ── */}
        {logMode==='preset' && <>
          {plans.length===0
            ? <div style={{textAlign:'center',padding:'2rem 1rem',background:'var(--color-card)',border:'1px solid var(--color-border)',borderRadius:'12px',color:'var(--color-text-sub)',fontSize:'.82rem'}}>
                <div style={{fontSize:'1.5rem',marginBottom:'.5rem'}}>📋</div>
                Nenhum plano criado ainda.<br/>Crie um plano na aba <strong>Planos</strong> para usar aqui.
              </div>
            : <>
                {/* Plan selector */}
                <div style={{display:'flex',gap:'.4rem',flexWrap:'wrap'}}>
                  {plans.map((plan,pi)=>(
                    <button key={pi} onClick={()=>setActivePlanIdx(pi===activePlanIdx?null:pi)}
                      style={{padding:'.35rem .75rem',borderRadius:'8px',border:'1px solid '+(pi===activePlanIdx?'var(--color-accent)':'var(--color-border)'),background:pi===activePlanIdx?'rgba(227,27,35,.1)':'rgba(255,255,255,.04)',color:pi===activePlanIdx?'var(--color-accent)':'var(--color-text-sub)',fontSize:'.78rem',fontWeight:700,cursor:'pointer'}}>
                      {plan.name}
                    </button>
                  ))}
                </div>

                {activePlanIdx!==null && plans[activePlanIdx] && (
                  <PresetChecker
                    plan={plans[activePlanIdx]}
                    viewDate={viewDate}
                    setDiet={setDiet}
                    todayStr={todayStr}
                  />
                )}
              </>
          }
        </>}
      </>}

      {tab==='plans' && <>
        {/* Plans list */}
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div style={{fontSize:'.62rem',color:'var(--color-text-sub)',textTransform:'uppercase',letterSpacing:'.06em'}}>Planos DarkDiet</div>
          <button onClick={()=>{
            setPlanForm({
              name:'',
              slots:[
                {label:'Café da manhã', time:'07:00', items:[], checked:false},
                {label:'Refeição 1',    time:'10:00', items:[], checked:false},
                {label:'Almoço',        time:'12:30', items:[], checked:false},
                {label:'Refeição 2',    time:'15:30', items:[], checked:false},
                {label:'Jantar',        time:'19:00', items:[], checked:false},
                {label:'Refeição 3',    time:'21:30', items:[], checked:false},
              ]
            });
            var _p3=getDSPlan(); if(plans.length>=(_p3.perms.maxDietPlans||1)){ window._showPaywall&&window._showPaywall('Criar mais planos de dieta'); return; }
            setShowPlanForm(true);
          }} style={{background:'var(--color-accent)',border:'none',borderRadius:'8px',padding:'.4rem .85rem',color:'#fff',fontWeight:800,fontSize:'.78rem',cursor:'pointer'}}>+ Novo Plano</button>
        </div>
        {plans.length===0
          ? <div style={{textAlign:'center',padding:'2rem 1rem',color:'var(--color-text-sub)',fontSize:'.82rem',background:'var(--color-card)',borderRadius:'12px',border:'1px solid var(--color-border)'}}>
              <div style={{fontSize:'1.5rem',marginBottom:'.5rem'}}>📄</div>
              Crie planos com refeições pré-definidas e aplique com um clique
            </div>
          : plans.map((plan,pi)=>{
            const planCal = plan.slots ? plan.slots.reduce((a,s)=>a+s.items.reduce((b,it)=>b+(Number(it.calories)||0),0),0) : 0;
            const slotCount = plan.slots ? plan.slots.length : 0;
            return (
              <div key={pi} style={{background:'var(--color-card)',border:'1px solid var(--color-border)',borderRadius:'12px',padding:'.9rem'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'.5rem'}}>
                  <div>
                    <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:'1.05rem',textTransform:'uppercase'}}>{plan.name}</div>
                    <div style={{fontSize:'.68rem',color:'var(--color-text-sub)',marginTop:'1px'}}>{planCal} kcal · {slotCount} refeições</div>
                  </div>
                  <div style={{display:'flex',gap:'.35rem'}}>
                    <button onClick={()=>{setPlanForm({...plan, _editIdx:pi});setShowPlanForm(true);}}
                      style={{background:'rgba(255,255,255,.06)',border:'1px solid var(--color-border)',borderRadius:'7px',padding:'.3rem .55rem',color:'var(--color-text-sub)',fontSize:'.72rem',cursor:'pointer'}}>✏️</button>
                    <button onClick={()=>{setDietPlans(p=>p.filter((_,i)=>i!==pi));setToast('Plano removido');}}
                      style={{background:'rgba(227,27,35,.08)',border:'1px solid rgba(227,27,35,.2)',borderRadius:'7px',padding:'.3rem .5rem',color:'#e31b23',fontSize:'.72rem',cursor:'pointer'}}>🗑</button>
                  </div>
                </div>
                {plan.slots && plan.slots.slice(0,3).map((slot,si)=>(
                  <div key={si} style={{display:'flex',alignItems:'center',gap:'.4rem',marginBottom:'3px'}}>
                    <span style={{fontSize:'.65rem',color:'var(--color-accent)',fontWeight:700,minWidth:'40px'}}>{slot.time}</span>
                    <span style={{fontSize:'.72rem',color:'var(--color-text-sub)'}}>{slot.label}</span>
                    {slot.items.length>0 && <span style={{fontSize:'.65rem',color:'#555'}}>· {slot.items.map(i=>i.name).join(', ').slice(0,30)}</span>}
                  </div>
                ))}
                {plan.slots && plan.slots.length>3 && <div style={{fontSize:'.65rem',color:'#444',marginBottom:'.5rem'}}>+ {plan.slots.length-3} mais...</div>}
                <button onClick={()=>applyPlan(plan)} style={{width:'100%',marginTop:'.5rem',background:'var(--color-accent)',border:'none',borderRadius:'8px',padding:'.5rem',color:'#fff',fontWeight:800,fontSize:'.82rem',cursor:'pointer'}}>▶ Aplicar hoje</button>
              </div>
            );
          })
        }
      </>}
      {/* Modal: Metas */}
      {showGoals && (
        <Modal onClose={()=>setShowGoals(false)}>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:'1.1rem',textTransform:'uppercase',marginBottom:'1rem'}}>Metas diárias</div>
          {[['calories','Calorias (kcal)'],['protein','Proteína (g)'],['carbs','Carboidratos (g)'],['fat','Gordura (g)']].map(([k,l])=>(
            <div key={k} style={{marginBottom:'.7rem'}}>
              <div style={{fontSize:'.62rem',color:'var(--color-text-sub)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:'3px'}}>{l}</div>
              <input type="number" value={goals[k]} onChange={e=>setGoals(g=>({...g,[k]:Number(e.target.value)}))}
                style={{width:'100%',background:'rgba(0,0,0,.25)',border:'1px solid var(--color-border)',borderRadius:'8px',padding:'.5rem .75rem',color:'var(--color-text)',fontSize:'.9rem'}}/>
            </div>
          ))}
          <button onClick={()=>{setShowGoals(false);setToast('Metas salvas ✓');}} style={{width:'100%',background:'var(--color-accent)',border:'none',borderRadius:'9px',padding:'.7rem',color:'#fff',fontWeight:800,fontSize:'.88rem',cursor:'pointer',marginTop:'.5rem'}}>Salvar metas</button>
        </Modal>
      )}

      {/* Modal: Criar/Editar Plano */}
      {showPlanForm && (
        <Modal onClose={()=>setShowPlanForm(false)}>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:'1.1rem',textTransform:'uppercase',marginBottom:'.75rem'}}>
            {planForm._editIdx!==undefined ? 'Editar Plano' : 'Novo Plano DarkDiet'}
          </div>
          {/* Plan name */}
          <div style={{marginBottom:'.85rem'}}>
            <div style={{fontSize:'.6rem',color:'var(--color-text-sub)',textTransform:'uppercase',marginBottom:'3px'}}>Nome do plano</div>
            <input value={planForm.name} onChange={e=>setPlanForm(p=>({...p,name:e.target.value}))}
              placeholder="Ex: Cutting, Bulking, Dia de descanso..."
              style={{width:'100%',background:'rgba(0,0,0,.25)',border:'1px solid var(--color-border)',borderRadius:'8px',padding:'.5rem .75rem',color:'var(--color-text)',fontSize:'.88rem'}}/>
          </div>
          {/* Slots */}
          <div style={{fontSize:'.6rem',color:'var(--color-text-sub)',textTransform:'uppercase',marginBottom:'.5rem'}}>Refeições</div>
          <div style={{display:'grid',gap:'.5rem',maxHeight:'55vh',overflowY:'auto',paddingRight:'2px'}}>
            {(planForm.slots||[]).map((slot,si)=>(
              <div key={si} style={{background:'rgba(255,255,255,.04)',border:'1px solid var(--color-border)',borderRadius:'10px',padding:'.6rem .75rem'}}>
                {/* Slot header */}
                <div style={{display:'flex',gap:'.4rem',alignItems:'center',marginBottom:'.45rem'}}>
                  <input value={slot.time} type="text" placeholder="00:00" maxLength={5} onChange={e=>{
                    setPlanForm(p=>{const s=[...p.slots];s[si]={...s[si],time:e.target.value};return {...p,slots:s};});
                  }} style={{background:'rgba(0,0,0,.3)',border:'1px solid var(--color-border)',borderRadius:'6px',padding:'.3rem .4rem',color:'var(--color-accent)',fontSize:'.78rem',fontWeight:700,width:'68px',textAlign:'center'}}/>
                  <input value={slot.label} onChange={e=>{
                    setPlanForm(p=>{const s=[...p.slots];s[si]={...s[si],label:e.target.value};return {...p,slots:s};});
                  }} style={{flex:1,background:'rgba(0,0,0,.25)',border:'1px solid var(--color-border)',borderRadius:'6px',padding:'.3rem .5rem',color:'var(--color-text)',fontSize:'.82rem',fontWeight:700}}/>
                  {/* Move up/down */}
                  <button onClick={()=>{
                    if(si===0) return;
                    setPlanForm(p=>{const s=[...p.slots];[s[si-1],s[si]]=[s[si],s[si-1]];return {...p,slots:s};});
                  }} disabled={si===0} style={{background:'rgba(255,255,255,.05)',border:'1px solid var(--color-border)',borderRadius:'6px',padding:'.28rem .4rem',color:si===0?'#2a2a2a':'#aaa',cursor:si===0?'default':'pointer',fontSize:'.85rem',opacity:si===0?0.3:1}}>↑</button>
                  <button onClick={()=>{
                    if(si>=(planForm.slots.length-1)) return;
                    setPlanForm(p=>{const s=[...p.slots];[s[si],s[si+1]]=[s[si+1],s[si]];return {...p,slots:s};});
                  }} disabled={si>=(planForm.slots||[]).length-1} style={{background:'rgba(255,255,255,.05)',border:'1px solid var(--color-border)',borderRadius:'6px',padding:'.28rem .4rem',color:si>=(planForm.slots||[]).length-1?'#2a2a2a':'#aaa',cursor:'pointer',fontSize:'.85rem',opacity:si>=(planForm.slots||[]).length-1?0.3:1}}>↓</button>
                  <button onClick={()=>{
                    setPlanForm(p=>{const s=p.slots.filter((_,i)=>i!==si);return {...p,slots:s};});
                  }} style={{background:'rgba(227,27,35,.08)',border:'1px solid rgba(227,27,35,.2)',borderRadius:'6px',padding:'.28rem .45rem',color:'#e31b23',cursor:'pointer',fontSize:'.72rem'}}>✕</button>
                </div>
                {/* Items inside slot */}
                {slot.items && slot.items.map((item,ii)=>(
                  <div key={ii} style={{display:'flex',gap:'.35rem',alignItems:'center',marginBottom:'.3rem'}}>
                    <input value={item.name} onChange={e=>{
                      setPlanForm(p=>{const s=[...p.slots];const its=[...s[si].items];its[ii]={...its[ii],name:e.target.value};s[si]={...s[si],items:its};return {...p,slots:s};});

// DARKSET PLAN SYSTEM — Global via window._DS_PLAN
// ══════════════════════════════════════════════════════════════════════════
const DS_PLANS = {
  free:    { maxFichas:1,   maxDietPlans:1,   maxPhotosPerDay:0,   historyDays:30,   charts:false, swap:false },
  elite:   { maxFichas:10,  maxDietPlans:10,  maxPhotosPerDay:3,   historyDays:9999, charts:true,  swap:true  },
  darkgod: { maxFichas:999, maxDietPlans:999, maxPhotosPerDay:999, historyDays:9999, charts:true,  swap:true  },
};

function getDSPlan() {
  try {
    if(!getUID()) return { tier:'free', perms:DS_PLANS.free, isTrialActive:false, trialDaysLeft:0, trialUsed:false };
    const pd = JSON.parse(localStorage.getItem('ds.planData') || 'null');
    if (!pd) return { tier:'free', perms:DS_PLANS.free, isTrialActive:false, trialDaysLeft:0, trialUsed:false };
    const now = Date.now();
    const isTrialActive = !!(pd.trialEnd && now < pd.trialEnd);
    const tier = isTrialActive ? (pd.trialTier||'elite') : (pd.tier||'free');
    const trialDaysLeft = pd.trialEnd ? Math.max(0, Math.ceil((pd.trialEnd - now)/86400000)) : 0;
    return { tier, perms: DS_PLANS[tier]||DS_PLANS.free, isTrialActive, trialDaysLeft, trialUsed:!!(pd.trialEnd) };
  } catch(_) {
    return { tier:'free', perms:DS_PLANS.free, isTrialActive:false, trialDaysLeft:0, trialUsed:false };
  }
}

function startDSTrial() {
  if(!getUID()){ window.openAuthModal&&window.openAuthModal('signIn'); return false; }
  localStorage.setItem('ds.planData', JSON.stringify({ tier:'free', trialTier:'elite', trialEnd: Date.now()+7*86400000 }));
  return true;
}

const ADMIN_UID = '3bZqslCsHxQIugjq9Tfd758hpu12';

const AdminPanel = ({setToast}) => {
  const [tab, setTab] = React.useState('requests');
  const [requests, setRequests] = React.useState([]);
  const [users, setUsers] = React.useState([]);
  const [stats, setStats] = React.useState(null);
  const [loading, setLoading] = React.useState(true);
  const [searchQ, setSearchQ] = React.useState('');

  var loadAll = function(){
    if(!window._db){ setLoading(false); return; }
    setLoading(true);
    var promises = [
      window._db.collection('personal_requests').orderBy('createdAt','desc').get().catch(function(){ return {docs:[]}; }),
      window._db.collection('users').limit(200).get().catch(function(){ return {docs:[]}; }),
      window._db.collection('personal_links').where('active','==',true).get().catch(function(){ return {docs:[]}; }),
    ];
    Promise.all(promises).then(function(results){
      var reqDocs = results[0].docs.map(function(d){ return Object.assign({id:d.id},d.data()); });
      var userDocs = results[1].docs.map(function(d){ return Object.assign({id:d.id},d.data()); });
      var linkDocs = results[2].docs.map(function(d){ return d.data(); });
      setRequests(reqDocs);
      setUsers(userDocs);
      // Stats
      var personals = userDocs.filter(function(u){ return u.role==='personal'; });
      setStats({
        totalUsers: userDocs.length,
        totalPersonals: personals.length,
        totalLinks: linkDocs.length,
        pendingRequests: reqDocs.filter(function(r){ return r.status==='pending'; }).length,
      });
      setLoading(false);
    });
  };

  React.useEffect(function(){ loadAll(); }, []);

  var approvePersonal = function(req){
    if(!window._db) return;
    window._db.collection('users').doc(req.uid).set({role:'personal'},{merge:true})
      .then(function(){
        return window._db.collection('personal_requests').doc(req.id).update({status:'approved',approvedAt:Date.now()});
      })
      .then(function(){
        setRequests(function(prev){ return prev.map(function(r){ return r.id===req.id?Object.assign({},r,{status:'approved'}):r; }); });
        setToast('✅ '+req.nome+' aprovado como Personal!');
        loadAll();
      })
      .catch(function(e){ setToast('Erro: '+(e.message||'')); });
  };

  var revokePersonal = function(uid, nome){
    if(!confirm('Revogar acesso Personal de '+nome+'?')) return;
    window._db.collection('users').doc(uid).update({role:''})
      .then(function(){
        setToast('Acesso revogado de '+nome);
        loadAll();
      })
      .catch(function(e){ setToast('Erro: '+(e.message||'')); });
  };

    if(!confirm('Rejeitar solicitação de '+req.nome+'?')) return;

      </div>

      {loading && <div style={{textAlign:'center',padding:'3rem',color:'#444'}}>Carregando…</div>}

      {/* ── SOLICITAÇÕES ── */}
      {!loading && tab==='requests' && (
        <div>
          {requests.length===0 && <div style={{textAlign:'center',padding:'2.5rem',color:'#444',border:'1px dashed #1a1a1a',borderRadius:'12px'}}>Nenhuma solicitação ainda</div>}
          {requests.map(function(r,i){
            var statusEl = r.status==='approved'
              ? <span style={S.greenBadge}>✅ Aprovado</span>
              : r.status==='rejected'
              ? <span style={S.grayBadge}>✕ Rejeitado</span>
              : <span style={S.badge()}>⏳ Pendente</span>;
            return (
              <div key={i} style={S.card}>
                <div style={{display:'flex',alignItems:'flex-start',gap:'.75rem'}}>
                  <div style={{fontSize:'1.5rem',flexShrink:0}}>👨‍💼</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:'flex',alignItems:'center',gap:'.5rem',flexWrap:'wrap',marginBottom:'.3rem'}}>
                      <span style={{fontWeight:700,fontSize:'.95rem'}}>{r.nome||'(sem nome)'}</span>
                      {statusEl}
                    </div>
                    <div style={{fontSize:'.75rem',color:'#666',marginBottom:'.1rem'}}>📧 {r.email||'—'}</div>
                    <div style={{fontSize:'.75rem',color:'var(--color-accent)',fontWeight:700,fontFamily:'monospace',marginBottom:'.1rem'}}>CREF {r.cref||'—'}</div>
                    {r.msg && <div style={{fontSize:'.75rem',color:'#555',fontStyle:'italic',marginTop:'.3rem',borderLeft:'2px solid #222',paddingLeft:'.5rem'}}>"{r.msg}"</div>}
                    <div style={{fontSize:'.65rem',color:'#333',marginTop:'.4rem'}}>{r.createdAt?new Date(r.createdAt).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}):''}</div>
                  </div>
                  {r.status==='pending' && r.uid && (
                    <div style={{display:'flex',flexDirection:'column',gap:'.4rem',flexShrink:0}}>
                      <button onClick={function(){ approvePersonal(r); }} style={S.btn()}>✅ Aprovar</button>
                      <button onClick={function(){ rejectRequest(r); }} style={S.btn('rgba(255,255,255,.06)')}>✕ Rejeitar</button>
                    </div>
                  )}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* ── USUÁRIOS ── */}
      {!loading && tab==='users' && (
        <div>
          <input value={searchQ} onChange={function(e){ setSearchQ(e.target.value); }}
            placeholder="🔍 Buscar por nome ou email…"
            style={{width:'100%',background:'rgba(0,0,0,.3)',border:'1px solid rgba(255,255,255,.07)',borderRadius:'9px',padding:'.55rem .85rem',color:'#fff',fontSize:'.88rem',outline:'none',marginBottom:'.75rem'}}/>
          {users
            .filter(function(u){
              if(!searchQ) return true;
              var q = searchQ.toLowerCase();
              return (u.name||'').toLowerCase().includes(q) || (u.email||'').toLowerCase().includes(q);
            })
            .sort(function(a,b){ return (b.updatedAt||0)-(a.updatedAt||0); })
            .slice(0,100)
            .map(function(u,i){
              var isPersonalUser = u.role==='personal';
              var isAdminUser = u.id===ADMIN_UID;
              return (
                <div key={i} style={S.card}>
                  <div style={{display:'flex',alignItems:'center',gap:'.75rem'}}>
                    <div style={{width:'36px',height:'36px',borderRadius:'50%',background:'linear-gradient(135deg,#1a1a1a,#111)',border:'2px solid rgba(255,255,255,.06)',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'.9rem'}}>
                      {u.photoURL?<img src={u.photoURL} style={{width:'100%',height:'100%',objectFit:'cover',borderRadius:'50%'}} alt=""/>:'👤'}
                    </div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:'flex',alignItems:'center',gap:'.4rem',flexWrap:'wrap'}}>
                        <span style={{fontWeight:700,fontSize:'.9rem',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{u.name||'(sem nome)'}</span>
                        {isAdminUser && <span style={{background:'rgba(250,204,21,.1)',border:'1px solid rgba(250,204,21,.3)',borderRadius:'20px',padding:'.1rem .45rem',fontSize:'.58rem',fontWeight:700,color:'#facc15'}}>👑 ADMIN</span>}
                        {isPersonalUser && !isAdminUser && <span style={S.greenBadge}>👨‍💼 Personal</span>}
                      </div>
                      <div style={{fontSize:'.7rem',color:'#555',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{u.email||u.id}</div>
                    </div>
                    {isPersonalUser && !isAdminUser && (
                      <button onClick={function(){ revokePersonal(u.id, u.name||u.email||u.id); }}
                        style={{background:'rgba(227,27,35,.08)',border:'1px solid rgba(227,27,35,.15)',borderRadius:'8px',padding:'.35rem .6rem',color:'#e31b23',fontSize:'.72rem',cursor:'pointer',flexShrink:0,fontWeight:700}}>
                        Revogar
                      </button>
                    )}
                    {!isPersonalUser && !isAdminUser && (
                      <button onClick={function(){
                        if(!confirm('Aprovar '+( u.name||u.email||u.id)+' como Personal?')) return;
                        window._db.collection('users').doc(u.id).set({role:'personal'},{merge:true})
                          .then(function(){ setToast('✅ Personal aprovado!'); loadAll(); })
                          .catch(function(e){ setToast('Erro: '+(e.message||'')); });
                      }} style={S.btn()}>
                        + Personal
                      </button>
                    )}
                  </div>
                </div>
              );
            })
          }
        </div>
      )}

      {/* ── STATS ── */}
      {!loading && tab==='stats' && stats && (
        <div style={{display:'grid',gap:'.75rem'}}>
          {[
            {icon:'👥', label:'Total de Usuários Cadastrados', value:stats.totalUsers, desc:'Contas ativas no Firebase'},
            {icon:'👨‍💼', label:'Personais Ativos', value:stats.totalPersonals, desc:'Usuários com role=personal'},
            {icon:'🔗', label:'Vínculos Personal↔Aluno', value:stats.totalLinks, desc:'Conexões ativas'},
            {icon:'📬', label:'Solicitações Pendentes', value:stats.pendingRequests, desc:'Aguardando sua aprovação'},
          ].map(function(s,i){ return (
            <div key={i} style={{background:'rgba(255,255,255,.02)',border:'1px solid rgba(255,255,255,.07)',borderRadius:'14px',padding:'1.1rem 1.25rem',display:'flex',alignItems:'center',gap:'1rem'}}>
              <div style={{fontSize:'1.8rem',flexShrink:0}}>{s.icon}</div>
              <div style={{flex:1}}>
                <div style={{fontSize:'.78rem',color:'#666',marginBottom:'.2rem'}}>{s.label}</div>
                <div style={{fontSize:'.65rem',color:'#333'}}>{s.desc}</div>
              </div>
              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:'2rem',color:'var(--color-accent)',lineHeight:1,flexShrink:0}}>{s.value}</div>
            </div>
          ); })}
          <div style={{fontSize:'.65rem',color:'#333',textAlign:'center',marginTop:'.5rem'}}>
            Última atualização: {new Date().toLocaleTimeString('pt-BR')} · Clique em "Atualizar" para recarregar
          </div>
        </div>
      )}
    </div>
  );
};

const PersonalRequestScreen = ({prefs, setToast}) => {
  const [cref, setCref] = React.useState('');
  const [msg, setMsg] = React.useState('');
  const [sent, setSent] = React.useState(false);

  var validarCref = function(v){ return /^\d{6}-[GPTR]\/[A-Z]{2}$/.test(v.trim().toUpperCase()); };

  var enviar = function(){
    var v = cref.trim().toUpperCase();
    if(!validarCref(v)){ setToast('CREF inválido. Formato: 123456-G/SP'); return; }
    var nome = prefs.name||'';
    var uid = (function(){ try{ var u=JSON.parse(localStorage.getItem('darkset.user')||'null'); return u&&u.uid?u.uid:''; }catch(_){ return ''; } })();
    var email = (function(){ try{ var u=JSON.parse(localStorage.getItem('darkset.user')||'null'); return u&&u.email?u.email:''; }catch(_){ return ''; } })();
    // Salva solicitação no Firestore
    if(window._db){
      window._db.collection('personal_requests').doc(uid||v).set({
        nome:nome, email:email, cref:v, msg:msg.trim(), uid:uid, createdAt:Date.now(), status:'pending'
      }).then(function(){ setSent(true); }).catch(function(){ setSent(true); }); // mostra sucesso mesmo se falhar o DB
    } else { setSent(true); }
  };

  if(sent) return (
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',minHeight:'60vh',padding:'2rem',textAlign:'center',gap:'1rem'}}>
      <div style={{fontSize:'3rem'}}>✅</div>
      <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:'1.6rem',textTransform:'uppercase',letterSpacing:'.04em'}}>Solicitação enviada!</div>
      <div style={{fontSize:'.9rem',color:'#888',maxWidth:'280px',lineHeight:1.6}}>
        Vamos analisar seus dados e em até <strong style={{color:'#fff'}}>3 dias úteis</strong> liberamos seu acesso ao modo Personal.
      </div>
      <div style={{fontSize:'.78rem',color:'#555',marginTop:'.5rem'}}>Fique de olho no seu email 📧</div>
    </div>
  );

  return (
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',padding:'2rem 1.5rem',maxWidth:'360px',margin:'0 auto'}}>
      <div style={{textAlign:'center',marginBottom:'2rem'}}>
        <div style={{fontSize:'2.5rem',marginBottom:'.5rem'}}>👨‍💼</div>
        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:'1.8rem',textTransform:'uppercase',letterSpacing:'.04em',lineHeight:1,marginBottom:'.4rem'}}>
          DARK<span style={{color:'var(--color-accent)'}}>SET</span> Personal
        </div>
        <div style={{fontSize:'.85rem',color:'#888',lineHeight:1.6}}>
          Use o DarkSet como ferramenta profissional. Monte e envie fichas para seus alunos, acompanhe a evolução deles e compartilhe resultados.
        </div>
      </div>

      <div style={{width:'100%',background:'rgba(255,255,255,.02)',border:'1px solid rgba(255,255,255,.07)',borderRadius:'16px',padding:'1.5rem',display:'grid',gap:'.85rem'}}>
        <div style={{fontSize:'.62rem',color:'var(--color-text-sub)',textTransform:'uppercase',letterSpacing:'.1em',fontWeight:700,textAlign:'center'}}>Solicitar Acesso</div>

        <div>
          <div style={{fontSize:'.72rem',color:'#555',marginBottom:'.3rem'}}>Número CREF</div>
          <input value={cref} onChange={function(e){ setCref(e.target.value.toUpperCase()); }} placeholder="123456-G/SP" maxLength={11}
            style={{width:'100%',background:'rgba(0,0,0,.35)',border:'1px solid rgba(255,255,255,.08)',borderRadius:'10px',padding:'.75rem',color:'#fff',fontSize:'1rem',textAlign:'center',letterSpacing:'.12em',fontFamily:'monospace',outline:'none'}}/>
          <div style={{fontSize:'.62rem',color:'#444',marginTop:'.3rem'}}>G=Graduado · P=Especialista · T=Mestre · R=Doutor</div>
        </div>

        <div>
          <div style={{fontSize:'.72rem',color:'#555',marginBottom:'.3rem'}}>Mensagem (opcional)</div>
          <textarea value={msg} onChange={function(e){ setMsg(e.target.value); }} placeholder="Conte um pouco sobre você e como vai usar o DarkSet…" rows={3}
            style={{width:'100%',background:'rgba(0,0,0,.35)',border:'1px solid rgba(255,255,255,.08)',borderRadius:'10px',padding:'.75rem',color:'#fff',fontSize:'.88rem',resize:'vertical',outline:'none'}}/>
        </div>

        <button onClick={enviar}
          style={{background:'var(--color-accent)',border:'none',borderRadius:'12px',padding:'.85rem',color:'#fff',fontWeight:900,fontSize:'1rem',fontFamily:"'Barlow Condensed',sans-serif",textTransform:'uppercase',letterSpacing:'.05em',cursor:'pointer',boxShadow:'0 4px 20px rgba(227,27,35,.25)'}}>
          Enviar Solicitação
        </button>

        <div style={{fontSize:'.68rem',color:'#444',textAlign:'center',lineHeight:1.5}}>
          Após envio, resposta em até 3 dias úteis.<br/>
          Dúvidas: <span style={{color:'#666'}}>suporte@darksetapp.com</span>
        </div>
      </div>
    </div>
  );
};

// ── Tela de entrada / cadastro ──
const PersonalLogin = ({onUnlock, setToast}) => {
  const [step, setStep] = React.useState('init');
  const [pwd, setPwd] = React.useState('');
  const [pinA, setPinA] = React.useState('');
  const [pinB, setPinB] = React.useState('');
  const [crefVal, setCrefVal] = React.useState('');
  const [error, setError] = React.useState('');
  const [checking, setChecking] = React.useState(false);

  React.useEffect(function(){
    var hasPin = !!localStorage.getItem('ds.pt_pin');
    var hasCref = !!localStorage.getItem('ds.pt_cref');
    if(hasPin && hasCref){ setStep('pin_entrar'); }
    else if(hasPin){ setStep('cref'); }
    else { setStep('senha'); }
  }, []);

  var validarCref = function(v){ return /^\d{6}-[GPTR]\/[A-Z]{2}$/.test(v.trim().toUpperCase()); };

  var tentarSenha = function(){
    var p = pwd.trim();
    if(!p){ setError('Digite sua senha'); return; }
    setChecking(true); setError('');
    var auth = window._auth;
    var cu = auth ? auth.currentUser : null;
    var user = (function(){ try{ return JSON.parse(localStorage.getItem('darkset.user')||'null'); }catch(_){ return null; } })();
    if(cu && user && user.email && window.firebase && window.firebase.auth && window.firebase.auth.EmailAuthProvider){
      var cred = window.firebase.auth.EmailAuthProvider.credential(user.email, p);
      cu.reauthenticateWithCredential(cred)
        .then(function(){
          setChecking(false); setPwd(''); setError('');
          if(localStorage.getItem('ds.pt_cref')){ onUnlock(); } else { setStep('cref'); }
        })
        .catch(function(e){
          setChecking(false);
          if(e.code==='auth/wrong-password'||e.code==='auth/invalid-credential'){ setError('Senha incorreta'); }
          else if(e.code==='auth/too-many-requests'){ setError('Muitas tentativas. Aguarde.'); }
          else { setStep('pin_criar'); setPwd(''); setError(''); }
        });
    } else {
      setChecking(false); setStep('pin_criar'); setPwd(''); setError('');
    }
  };

  var criarPin = function(){
    if(pinA.length < 4){ setError('PIN deve ter ao menos 4 caracteres'); return; }
    if(pinA !== pinB){ setError('Os PINs não coincidem'); return; }
    localStorage.setItem('ds.pt_pin', pinA);
    setPinA(''); setPinB(''); setError('');
    if(localStorage.getItem('ds.pt_cref')){ onUnlock(); } else { setStep('cref'); }
  };

  var entrarPin = function(){
    var p = pwd.trim();
    if(!p){ setError('Digite seu PIN'); return; }
    if(p === localStorage.getItem('ds.pt_pin')){
      setPwd(''); setError('');
      if(localStorage.getItem('ds.pt_cref')){ onUnlock(); } else { setStep('cref'); }
    } else { setError('PIN incorreto'); }
  };

  var salvarCref = function(){
    var v = crefVal.trim().toUpperCase();
    if(!validarCref(v)){ setError('Formato inválido. Exemplo: 123456-G/SP'); return; }
    setChecking(true); setError('');
    var uid = (function(){ try{ var u=JSON.parse(localStorage.getItem('darkset.user')||'null'); return u&&u.uid?u.uid:''; }catch(_){ return ''; } })();
    var doSave = function(){
      localStorage.setItem('ds.pt_cref', v);
      setChecking(false);
      onUnlock();
    };
    if(window._db){
      window._db.collection('personals').where('cref','==',v).get()
        .then(function(snap){
          if(!snap.empty && snap.docs[0].id !== uid){ setChecking(false); setError('Este CREF já está cadastrado em outra conta.'); return; }
          window._db.collection('personals').doc(uid||v).set({cref:v,uid:uid,createdAt:Date.now()},{merge:true})
            .then(doSave).catch(doSave);
        }).catch(doSave);
    } else { doSave(); }
  };

  // Shared inline styles
  var S = {
    wrap: {minHeight:'70vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'2rem 1.5rem'},
    logo: {fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:'2.6rem',textTransform:'uppercase',letterSpacing:'.04em',lineHeight:1},
    sub:  {fontSize:'.65rem',color:'var(--color-text-sub)',letterSpacing:'.18em',textTransform:'uppercase',marginTop:'.2rem',marginBottom:'2rem'},
    card: {width:'100%',maxWidth:'320px',background:'rgba(255,255,255,.03)',border:'1px solid rgba(255,255,255,.07)',borderRadius:'16px',padding:'1.75rem'},
    inp:  {width:'100%',background:'rgba(0,0,0,.35)',border:'1px solid rgba(255,255,255,.08)',borderRadius:'10px',padding:'.8rem',color:'#fff',fontSize:'1rem',textAlign:'center',outline:'none',display:'block',marginBottom:'.7rem'},
    inpE: {width:'100%',background:'rgba(0,0,0,.35)',border:'1px solid var(--color-accent)',borderRadius:'10px',padding:'.8rem',color:'#fff',fontSize:'1rem',textAlign:'center',outline:'none',display:'block',marginBottom:'.7rem'},
    btn:  {width:'100%',background:'var(--color-accent)',border:'none',borderRadius:'10px',padding:'.8rem',color:'#fff',fontWeight:900,fontSize:'.95rem',fontFamily:"'Barlow Condensed',sans-serif",textTransform:'uppercase',letterSpacing:'.06em',cursor:'pointer',display:'block',marginBottom:'.5rem'},
    btn2: {width:'100%',background:'rgba(255,255,255,.05)',border:'1px solid rgba(255,255,255,.08)',borderRadius:'10px',padding:'.75rem',color:'#aaa',fontWeight:700,fontSize:'.88rem',cursor:'pointer',display:'block',marginBottom:'.5rem'},
    ghost:{background:'none',border:'none',color:'rgba(255,255,255,.25)',fontSize:'.72rem',cursor:'pointer',width:'100%',padding:'.35rem'},
    err:  {fontSize:'.75rem',color:'var(--color-accent)',textAlign:'center',lineHeight:1.4,padding:'.4rem .6rem',background:'rgba(227,27,35,.08)',borderRadius:'8px',marginBottom:'.7rem'},
    lbl:  {fontSize:'.72rem',color:'var(--color-text-sub)',textAlign:'center',lineHeight:1.5,marginBottom:'.7rem'},
  };

  var Logo = (
    <div style={{textAlign:'center',marginBottom:'1.5rem'}}>
      <div style={S.logo}>DARK<span style={{color:'var(--color-accent)'}}>SET</span></div>
      <div style={S.sub}>Modo Personal Trainer</div>
    </div>
  );

  if(step==='init') return <div style={{minHeight:'70vh',display:'flex',alignItems:'center',justifyContent:'center'}}><div style={{color:'#444',fontSize:'.85rem'}}>Carregando…</div></div>;

  if(step==='senha') return (
    <div style={S.wrap}>
      {Logo}
      <div style={S.card}>
        <div style={S.lbl}>Digite a senha da sua conta para ativar o modo Personal</div>
        <input type="password" value={pwd} placeholder="Senha do app" autoFocus
          style={error ? S.inpE : S.inp}
          onChange={function(e){ setPwd(e.target.value); setError(''); }}
          onKeyDown={function(e){ if(e.key==='Enter') tentarSenha(); }}/>
        {error && <div style={S.err}>{error}</div>}
        <button style={S.btn} onClick={tentarSenha} disabled={checking}>{checking?'Verificando…':'Continuar'}</button>
        <button style={S.btn2} onClick={function(){ setStep('pin_criar'); setError(''); setPwd(''); }}>Conta Google — Criar PIN</button>
      </div>
    </div>
  );

  if(step==='pin_criar') return (
    <div style={S.wrap}>
      {Logo}
      <div style={S.card}>
        <div style={{textAlign:'center',marginBottom:'.75rem'}}>
          <div style={{fontSize:'1.6rem',marginBottom:'.3rem'}}>🔐</div>
          <div style={{fontWeight:700,fontSize:'1rem',color:'#f0f0f0',marginBottom:'.3rem'}}>Criar PIN</div>
          <div style={S.lbl}>Escolha um PIN de ao menos 4 caracteres</div>
        </div>
        <input type="password" value={pinA} placeholder="Novo PIN"
          style={S.inp}
          onChange={function(e){ setPinA(e.target.value); setError(''); }}
          onKeyDown={function(e){ if(e.key==='Enter'){ var el=document.getElementById('pt-pin-b'); if(el){el.focus();} } }}/>
        <input id="pt-pin-b" type="password" value={pinB} placeholder="Confirmar PIN"
          style={S.inp}
          onChange={function(e){ setPinB(e.target.value); setError(''); }}
          onKeyDown={function(e){ if(e.key==='Enter') criarPin(); }}/>
        {error && <div style={S.err}>{error}</div>}
        <button style={S.btn} onClick={criarPin}>Salvar PIN</button>
        <button style={S.ghost} onClick={function(){ setStep('senha'); setPinA(''); setPinB(''); setError(''); }}>← Voltar</button>
      </div>
    </div>
  );

  if(step==='pin_entrar') return (
    <div style={S.wrap}>
      {Logo}
      <div style={S.card}>
        <div style={S.lbl}>Digite seu PIN para entrar no modo Personal</div>
        <input type="password" value={pwd} placeholder="PIN" autoFocus
          style={error ? S.inpE : S.inp}
          onChange={function(e){ setPwd(e.target.value); setError(''); }}
          onKeyDown={function(e){ if(e.key==='Enter') entrarPin(); }}/>
        {error && <div style={S.err}>{error}</div>}
        <button style={S.btn} onClick={entrarPin}>Entrar</button>
        <button style={S.ghost} onClick={function(){
          if(confirm('Redefinir PIN? Você voltará para a tela de senha.')){
            localStorage.removeItem('ds.pt_pin'); setStep('senha'); setPwd(''); setError('');
          }
        }}>Esqueci o PIN</button>
      </div>
    </div>
  );

  // step === 'cref'
  return (
    <div style={S.wrap}>
      {Logo}
      <div style={S.card}>
        <div style={{textAlign:'center',marginBottom:'.75rem'}}>
          <div style={{fontSize:'1.6rem',marginBottom:'.3rem'}}>🪪</div>
          <div style={{fontWeight:700,fontSize:'1rem',color:'#f0f0f0',marginBottom:'.3rem'}}>Registro CREF</div>
          <div style={S.lbl}>Digite seu número de registro no Conselho Regional de Educação Física</div>
        </div>
        <div style={{background:'rgba(0,0,0,.25)',borderRadius:'8px',padding:'.5rem .85rem',textAlign:'center',marginBottom:'.7rem'}}>
          <div style={{fontFamily:'monospace',fontSize:'.9rem',color:'#555',marginBottom:'.1rem'}}>123456-G/SP</div>
          <div style={{fontSize:'.62rem',color:'#333'}}>G=Graduado · P=Especialista · T=Mestre · R=Doutor</div>
        </div>
        <input type="text" value={crefVal} placeholder="000000-G/UF" autoFocus maxLength={11}
          style={Object.assign({},error?S.inpE:S.inp,{letterSpacing:'.12em',fontFamily:'monospace'})}
          onChange={function(e){ setCrefVal(e.target.value.toUpperCase()); setError(''); }}
          onKeyDown={function(e){ if(e.key==='Enter') salvarCref(); }}/>
        {error && <div style={S.err}>{error}</div>}
        <button style={S.btn} onClick={salvarCref} disabled={checking}>{checking?'Verificando…':'Ativar Modo Personal'}</button>
        <div style={{fontSize:'.62rem',color:'#333',textAlign:'center'}}>O CREF é verificado para evitar cadastros duplicados</div>
      </div>
    </div>
  );
};

const PersonalStudentsTab = ({students, loading, uid, prefs, setToast, onOpenStudent}) => {
  const [inviteCode, setInviteCode] = React.useState(null);
  const [inviteLoading, setInviteLoading] = React.useState(false);
  var cref = localStorage.getItem('ds.pt_cref') || '';

  var generateInvite = function(){
    if(!uid||!window._db) return;
    setInviteLoading(true);
    if(students.length>=10){ setToast('Limite de 10 alunos'); setInviteLoading(false); return; }
    var code = 'PT-'+Math.random().toString(36).slice(2,7).toUpperCase();
    window._db.collection('personal_invites').doc(code).set({
      personalUid:uid, personalName:prefs.name||'Personal',
      code:code, used:false, createdAt:Date.now(), expiresAt:Date.now()+7*24*60*60*1000
    }).then(function(){ setInviteCode(code); setInviteLoading(false); })
      .catch(function(){ setToast('Erro ao gerar convite.'); setInviteLoading(false); });
  };

  var copyInvite = function(){
    if(navigator.clipboard) navigator.clipboard.writeText('Código DarkSet Personal: '+inviteCode+'\n\nAbra o app → Perfil → Meu Personal → cole o código.');
    setToast('Código copiado!');
  };

  var removeStudent = function(link){
    if(!window._db||!confirm('Remover '+link.name+'?')) return;
    window._db.collection('personal_links').doc(link.id).update({active:false})
      .then(function(){ setToast('Aluno removido'); })
      .catch(function(){ setToast('Erro ao remover'); });
  };

  var [editingName, setEditingName] = React.useState(null); // linkId being edited

  var saveStudentName = function(link){
    if(!editNameVal.trim()){ setEditingName(null); return; }
    window._db.collection('personal_links').doc(link.id).update({studentName: editNameVal.trim()})
      .then(function(){ setToast('Nome atualizado'); setEditingName(null); })
      .catch(function(){ setToast('Erro ao salvar'); });

  return (
    <div style={{padding:'1rem',maxWidth:'520px',margin:'0 auto'}}>

      {/* Perfil do Personal */}
      <div style={{background:'linear-gradient(135deg,rgba(227,27,35,.08),rgba(0,0,0,0))',border:'1px solid rgba(227,27,35,.15)',borderRadius:'14px',padding:'1rem 1.25rem',marginBottom:'1rem',display:'flex',alignItems:'center',gap:'1rem'}}>
        <div style={{width:'44px',height:'44px',borderRadius:'50%',background:'linear-gradient(135deg,#e31b23,#8b0000)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1.2rem',flexShrink:0}}>👨‍💼</div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:'1.05rem',textTransform:'uppercase',letterSpacing:'.04em'}}>{prefs.name||'Personal'}</div>
          {cref && <div style={{fontSize:'.72rem',color:'var(--color-accent)',fontWeight:700,marginTop:'.1rem'}}>CREF {cref}</div>}
          <div style={{fontSize:'.68rem',color:'#555',marginTop:'.1rem'}}>{students.length}/10 alunos</div>
        </div>
        <button onClick={function(){
          if(confirm('Alterar CREF?')){ localStorage.removeItem('ds.pt_cref'); window.location.reload(); }

        </button>

        <div style={{fontSize:'.62rem',color:'var(--color-text-sub)',textTransform:'uppercase',letterSpacing:'.1em',marginBottom:'.5rem',fontWeight:700}}>Convidar Aluno</div>
        {inviteCode ? (
          <div style={{background:'rgba(227,27,35,.06)',border:'1px solid rgba(227,27,35,.18)',borderRadius:'12px',padding:'.9rem'}}>
            <div style={{fontSize:'.7rem',color:'var(--color-text-sub)',marginBottom:'.4rem'}}>Compartilhe com seu aluno · válido 7 dias</div>
            <div style={{display:'flex',alignItems:'center',gap:'.75rem',marginBottom:'.4rem'}}>
              <div style={{flex:1,fontFamily:'monospace',fontSize:'1.4rem',fontWeight:900,letterSpacing:'.12em',color:'var(--color-accent)'}}>{inviteCode}</div>
              <button onClick={copyInvite} style={{background:'var(--color-accent)',border:'none',borderRadius:'8px',padding:'.45rem .85rem',color:'#fff',fontWeight:700,fontSize:'.82rem',cursor:'pointer',flexShrink:0}}>Copiar</button>
            </div>
            <button onClick={function(){ setInviteCode(null); }} style={{background:'none',border:'none',color:'#444',fontSize:'.72rem',cursor:'pointer',textDecoration:'underline'}}>Gerar novo</button>
          </div>
        ) : (
          <button onClick={generateInvite} disabled={inviteLoading||students.length>=10}
            style={{width:'100%',background:'var(--color-accent)',border:'none',borderRadius:'12px',padding:'.75rem',color:'#fff',fontWeight:900,fontSize:'.92rem',fontFamily:"'Barlow Condensed',sans-serif",textTransform:'uppercase',letterSpacing:'.05em',cursor:'pointer',opacity:students.length>=10?.4:1}}>
            {inviteLoading?'Gerando…':'+ Gerar Código de Convite'}

      </div>

      {/* Lista */}
      <div style={{fontSize:'.62rem',color:'var(--color-text-sub)',textTransform:'uppercase',letterSpacing:'.1em',marginBottom:'.5rem',fontWeight:700}}>Seus Alunos</div>

        <div style={{textAlign:'center',padding:'2rem',color:'#333'}}>Carregando…</div>

        <div style={{textAlign:'center',padding:'2.5rem 1rem',color:'#333',borderRadius:'12px',border:'1px dashed #1e1e1e'}}>
          <div style={{fontSize:'2.5rem',marginBottom:'.6rem'}}>👥</div>
          <div style={{fontSize:'.85rem',color:'#555',fontWeight:600}}>Nenhum aluno ainda</div>
          <div style={{fontSize:'.75rem',color:'#333',marginTop:'.3rem'}}>Gere um código e compartilhe</div>
        </div>
      ) : students.map(function(s,i){ return (
        <div key={i} style={{background:'rgba(255,255,255,.02)',border:'1px solid rgba(255,255,255,.06)',borderRadius:'12px',padding:'.85rem 1rem',marginBottom:'.5rem'}}>
          {/* Modo edição — linha inteira */}
          {editingName===s.id ? (
            <div>
              <div style={{display:'flex',alignItems:'center',gap:'.6rem',marginBottom:'.5rem'}}>
                <div style={{width:'36px',height:'36px',borderRadius:'50%',background:'linear-gradient(135deg,#1a1a1a,#111)',border:'2px solid var(--color-accent)',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'.9rem'}}>👤</div>
                <div style={{flex:1,fontSize:'.7rem',color:'var(--color-text-sub)'}}>Editando nome do aluno</div>
              </div>
              <div style={{display:'flex',gap:'.5rem'}}>
                <input value={editNameVal} autoFocus
                  onChange={function(e){ setEditNameVal(e.target.value); }}
                  onKeyDown={function(e){ if(e.key==='Enter') saveStudentName(s); if(e.key==='Escape') setEditingName(null); }}
                  style={{flex:1,background:'rgba(0,0,0,.4)',border:'1px solid var(--color-accent)',borderRadius:'9px',padding:'.55rem .75rem',color:'#fff',fontSize:'.95rem',fontWeight:700,outline:'none'}}/>
                <button onClick={function(){ saveStudentName(s); }}
                  style={{background:'var(--color-accent)',border:'none',borderRadius:'9px',padding:'.55rem .9rem',color:'#fff',fontSize:'.9rem',cursor:'pointer',fontWeight:900,flexShrink:0}}>✓</button>
                <button onClick={function(){ setEditingName(null); }}
                  style={{background:'rgba(255,255,255,.06)',border:'1px solid rgba(255,255,255,.08)',borderRadius:'9px',padding:'.55rem .75rem',color:'#555',fontSize:'.9rem',cursor:'pointer',flexShrink:0}}>✕</button>

          ) : (
            /* Modo normal */
            <div style={{display:'flex',alignItems:'center',gap:'.75rem'}}>
              <div style={{width:'40px',height:'40px',borderRadius:'50%',background:'linear-gradient(135deg,#1a1a1a,#111)',border:'2px solid rgba(255,255,255,.06)',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1rem'}}>
                {s.photoURL?<img src={s.photoURL} style={{width:'100%',height:'100%',objectFit:'cover',borderRadius:'50%'}}/>:'👤'}

                  <div style={{fontWeight:700,fontSize:'.9rem',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{s.name}</div>
                  <button onClick={function(){ setEditingName(s.id); setEditNameVal(s.name); }}

                </div>
                <div style={{fontSize:'.7rem',color:'var(--color-text-sub)',marginTop:'.1rem'}}>{s.lastWorkout?'Último: '+s.lastWorkout:'Sem treinos'}</div>

    </div>

};

const PersonalBuilderTab = ({students, personalName, setToast}) => {
  const EMPTY_DAYS = {'Segunda':[],'Terça':[],'Quarta':[],'Quinta':[],'Sexta':[],'Sábado':[],'Domingo':[]};
  const [selUid, setSelUid] = React.useState('');
  const [planName, setPlanName] = React.useState('Nova Ficha');
  const [byDay, setByDay] = React.useState(JSON.parse(JSON.stringify(EMPTY_DAYS)));
  const [activeDay, setActiveDay] = React.useState('Segunda');
  const [tab, setTab] = React.useState('ficha');
  const [filters, setFilters] = React.useState({q:'',m:'',s:'',e:'',d:''});
  const [saving, setSaving] = React.useState(false);
  const [sentPlans, setSentPlans] = React.useState([]);
  const [loadingPlans, setLoadingPlans] = React.useState(false);
  const {q,m,e} = filters;
  var selStudent = students.find(function(s){ return s.studentUid===selUid; });

  var list = React.useMemo(function(){
    var filtered = EXS.filter(function(ex){
      return ex.name.toLowerCase().includes(q.toLowerCase()) &&
        (!m||ex.primary===m) && (!e||ex.equipment===e);
    });
    var GROUP_ORDER=["Peito","Ombro","Trapézio","Costas","Bíceps","Tríceps","Antebraço","Lombar","Quadríceps","Posterior de Coxa","Glúteo","Abdutores","Adutores","Panturrilha","Abdômen"];
    return filtered.sort(function(a,b){
      var gi=GROUP_ORDER.indexOf(a.primary)-GROUP_ORDER.indexOf(b.primary);
      return gi!==0?gi:a.name.localeCompare(b.name,'pt');
    });
  }, [q,m,e]);

  var dayItems = byDay[activeDay]||[];
  var totalExs = Object.values(byDay).reduce(function(a,b){ return a+b.length; },0);

  React.useEffect(function(){
    if(!selUid||!window._db){ setSentPlans([]); return; }
    setLoadingPlans(true);
    window._db.collection('personal_plans').doc(selUid).collection('plans').get()
      .then(function(snap){ setSentPlans(snap.docs.map(function(d){ return d.data(); })); setLoadingPlans(false); })
      .catch(function(){ setLoadingPlans(false); });
  }, [selUid]);

  var resetForm = function(){ setPlanName('Nova Ficha'); setByDay(JSON.parse(JSON.stringify(EMPTY_DAYS))); setActiveDay('Segunda'); setTab('ficha'); setFilters({q:'',m:'',s:'',e:'',d:''}); };
  var addEx = function(ex){
    setByDay(function(prev){
      var n=JSON.parse(JSON.stringify(prev));
      if(!n[activeDay].some(function(it){ return it.name===ex.name; }))
        n[activeDay].push({exId:ex.id||ex.name, name:ex.name, setsPlanned:3, repsTarget:'12'});
      return n;
    });
    setToast('+ '+ex.name);
    // Permanece na aba de busca — não muda para ficha
  };
  var removeEx = function(idx){ setByDay(function(p){ var n=JSON.parse(JSON.stringify(p)); n[activeDay].splice(idx,1); return n; }); };
  var updateSets = function(idx,val){ setByDay(function(p){ var n=JSON.parse(JSON.stringify(p)); n[activeDay][idx].setsPlanned=Math.max(1,Math.min(10,parseInt(val)||1)); return n; }); };
  var updateReps = function(idx,val){ setByDay(function(p){ var n=JSON.parse(JSON.stringify(p)); n[activeDay][idx].repsTarget=val; return n; }); };
  var moveEx = function(idx,dir){ setByDay(function(p){ var n=JSON.parse(JSON.stringify(p)); var arr=n[activeDay]; var j=idx+dir; if(j<0||j>=arr.length) return p; var tmp=arr[idx]; arr[idx]=arr[j]; arr[j]=tmp; return n; }); };
  var deletePlan = function(planId){
    if(!confirm('Remover esta ficha?')) return;
    window._db.collection('personal_plans').doc(selUid).collection('plans').doc(planId).delete()
      .then(function(){ setSentPlans(function(p){ return p.filter(function(x){ return x.id!==planId; }); }); setToast('Ficha removida'); })
      .catch(function(){ setToast('Erro ao remover'); });
  };
  var reloadPlans = function(){
    if(!selUid||!window._db) return;
    window._db.collection('personal_plans').doc(selUid).collection('plans').get()
      .then(function(snap){ setSentPlans(snap.docs.map(function(d){ return d.data(); })); })
      .catch(function(){});
  };

  var save = function(){
    if(!selUid){ setToast('Selecione um aluno'); return; }
    if(!planName.trim()){ setToast('Dê um nome à ficha'); return; }
    if(totalExs===0){ setToast('Adicione ao menos um exercício'); return; }
    setSaving(true);
    var p={id:'pt_'+Date.now(),name:planName.trim(),byDay:byDay,fromPersonal:true,personalName:personalName||'Personal',createdAt:Date.now()};
    window._db.collection('personal_plans').doc(selUid).collection('plans').doc(p.id).set(p)
      .then(function(){
        setToast('✅ Ficha enviada para '+(selStudent?selStudent.name:'aluno')+'!');
        resetForm();
        setSaving(false);
        reloadPlans(); // recarrega lista de fichas
      })
      .catch(function(e){ setToast('Erro: '+(e.code||e.message||'Verifique regras do Firestore')); setSaving(false); });
  };

  if(students.length===0) return (
    <div style={{padding:'1.5rem',textAlign:'center',color:'#444',margin:'2rem 1rem',borderRadius:'12px',border:'1px dashed #1e1e1e'}}>
      <div style={{fontSize:'2.5rem',marginBottom:'.6rem'}}>👥</div>
      <div style={{fontSize:'.9rem',color:'#555',fontWeight:600}}>Nenhum aluno vinculado</div>
      <div style={{fontSize:'.78rem',color:'#333',marginTop:'.3rem'}}>Vá para Alunos e convide seus alunos primeiro</div>
    </div>
  );

  var MUSCLES_LIST = [...new Set(EXS.map(function(ex){ return ex.primary; }).filter(Boolean))].sort();
  var equipments = [...new Set(EXS.map(function(ex){ return ex.equipment; }).filter(Boolean))].sort();

  return (
    <div style={{padding:'1rem 1rem 6rem',maxWidth:'640px',margin:'0 auto'}}>

      {/* Aluno */}
      <PersonalStudentPicker students={students} selectedUid={selUid} onSelect={function(u){ setSelUid(u); resetForm(); }}/>

      {!!selUid && (<div>

        {/* Fichas enviadas */}
        {!loadingPlans && sentPlans.length>0 && (
          <div style={{marginBottom:'1.25rem'}}>
            <div style={{fontSize:'.62rem',color:'var(--color-text-sub)',textTransform:'uppercase',letterSpacing:'.1em',marginBottom:'.5rem',fontWeight:700}}>Fichas Enviadas</div>
            {sentPlans.map(function(f,i){ return (
              <div key={i} style={{background:'rgba(255,255,255,.02)',border:'1px solid rgba(255,255,255,.06)',borderRadius:'10px',padding:'.75rem 1rem',marginBottom:'.35rem',display:'flex',alignItems:'center',gap:'.75rem'}}>
                <span style={{fontSize:'1.1rem'}}>📋</span>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:'.9rem'}}>{f.name}</div>
                  <div style={{fontSize:'.72rem',color:'#555'}}>{Object.values(f.byDay||{}).reduce(function(a,b){ return a+b.length; },0)} exercícios</div>
                </div>
                <button onClick={function(){ deletePlan(f.id); }} style={{background:'rgba(255,255,255,.04)',border:'1px solid rgba(255,255,255,.07)',borderRadius:'8px',padding:'.35rem .6rem',color:'#555',cursor:'pointer',fontSize:'.82rem'}}>✕</button>
              </div>
            ); })}
          </div>
        )}

        {/* Nome da ficha */}
        <input value={planName} onChange={function(e){ setPlanName(e.target.value); }}
          style={{width:'100%',background:'rgba(0,0,0,.3)',border:'1px solid rgba(255,255,255,.07)',borderRadius:'10px',padding:'.7rem .9rem',color:'#fff',fontSize:'1.05rem',fontWeight:700,marginBottom:'1rem',outline:'none'}}/>

        {/* Tabs ficha/exercícios */}
        <div style={{display:'flex',gap:'.4rem',marginBottom:'1rem'}}>
          {[{id:'ficha',label:'📋 Ficha ('+(totalExs)+')'},{id:'buscar',label:'🔍 Exercícios'}].map(function(t){ return (
            <button key={t.id} onClick={function(){ setTab(t.id); }}
              style={{flex:1,background:tab===t.id?'var(--color-accent)':'rgba(255,255,255,.04)',border:'1px solid '+(tab===t.id?'var(--color-accent)':'rgba(255,255,255,.07)'),borderRadius:'9px',padding:'.55rem',color:tab===t.id?'#fff':'#666',fontWeight:700,fontSize:'.82rem',cursor:'pointer'}}>
              {t.label}
            </button>
          ); })}
        </div>

        {/* Dias */}
        <div style={{display:'flex',gap:'.3rem',marginBottom:'1rem',overflowX:'auto',paddingBottom:'.25rem'}}>
          {DAYS.map(function(dd){ var cnt=byDay[dd]?byDay[dd].length:0; return (
            <button key={dd} onClick={function(){ setActiveDay(dd); }}
              style={{flexShrink:0,background:activeDay===dd?'var(--color-accent)':'rgba(255,255,255,.04)',border:'1px solid '+(activeDay===dd?'var(--color-accent)':'rgba(255,255,255,.07)'),borderRadius:'8px',padding:'.4rem .6rem',color:activeDay===dd?'#fff':'#666',fontWeight:700,fontSize:'.75rem',cursor:'pointer',position:'relative',minWidth:'42px',textAlign:'center'}}>
              {dd.slice(0,3)}
              {cnt>0&&<span style={{position:'absolute',top:'-6px',right:'-6px',background:'var(--color-accent)',color:'#fff',borderRadius:'50%',width:'16px',height:'16px',fontSize:'.52rem',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:900,border:'2px solid #080808'}}>{cnt}</span>}
            </button>
          ); })}
        </div>

        {/* ── ABA FICHA ── */}
        {tab==='ficha' && (<div>
          {dayItems.length===0 ? (
            <div style={{textAlign:'center',padding:'2rem',color:'#333',fontSize:'.88rem',border:'1px dashed #1a1a1a',borderRadius:'10px',marginBottom:'1rem'}}>
              Nenhum exercício em {activeDay} · Clique em "Exercícios" para adicionar
            </div>
          ) : dayItems.map(function(it,idx){ return (
            <div key={idx} style={{background:'rgba(255,255,255,.02)',border:'1px solid rgba(255,255,255,.07)',borderRadius:'12px',padding:'1rem',marginBottom:'.6rem'}}>
              <div style={{display:'flex',alignItems:'flex-start',gap:'.75rem'}}>
                {/* Setas de ordem */}
                <div style={{display:'flex',flexDirection:'column',gap:'.3rem',paddingTop:'.1rem',flexShrink:0}}>
                  <button onClick={function(){ moveEx(idx,-1); }}
                    style={{background:'rgba(255,255,255,.06)',border:'1px solid rgba(255,255,255,.08)',borderRadius:'6px',width:'28px',height:'28px',color:'#aaa',cursor:'pointer',fontSize:'1rem',display:'flex',alignItems:'center',justifyContent:'center',lineHeight:1}}>▲</button>
                  <button onClick={function(){ moveEx(idx,1); }}
                    style={{background:'rgba(255,255,255,.06)',border:'1px solid rgba(255,255,255,.08)',borderRadius:'6px',width:'28px',height:'28px',color:'#aaa',cursor:'pointer',fontSize:'1rem',display:'flex',alignItems:'center',justifyContent:'center',lineHeight:1}}>▼</button>
                </div>
                {/* Nome + campos */}
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:700,fontSize:'.95rem',marginBottom:'.6rem',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{it.name}</div>
                  <div style={{display:'flex',gap:'.6rem',alignItems:'center',flexWrap:'wrap'}}>
                    <div style={{display:'flex',flexDirection:'column',gap:'.2rem'}}>
                      <span style={{fontSize:'.62rem',color:'#555',textTransform:'uppercase',letterSpacing:'.06em'}}>Séries</span>
                      <input type="number" value={it.setsPlanned||3} min="1" max="10"
                        onChange={function(e){ updateSets(idx,e.target.value); }}
                        style={{width:'52px',background:'rgba(0,0,0,.4)',border:'1px solid rgba(255,255,255,.1)',borderRadius:'8px',padding:'.45rem .4rem',color:'#fff',fontSize:'.95rem',textAlign:'center',outline:'none',fontWeight:700}}/>

const PersonalChartsTab = ({students, personalName, setToast}) => {

  const [hist, setHist] = React.useState({});

      .then(function(doc){
        if(doc.exists){ var p=doc.data().payload?JSON.parse(doc.data().payload):{};setHist(p); }
        else setHist({});
        setLoading(false);
      }).catch(function(){ setLoading(false); });
  }, [selUid]);

  var entries = Object.entries(hist).sort(function(a,b){ return a[0].localeCompare(b[0]); });
  var totalWorkouts = entries.length;
  var totalVol = entries.reduce(function(a,e){ return a+(e[1].entries||[]).reduce(function(b,en){ return b+(en.sets||[]).reduce(function(c,s){ return c+(parseFloat(s.w)||0)*(parseInt(s.r)||0); },0); },0); },0);
  var lastDate = entries.length ? entries[entries.length-1][0] : '—';

  var weeklyLabels=[], weeklyVals=[];
  (function(){
    var wk={};
    entries.forEach(function(e){
      var d=new Date(e[0]+'T00:00'); var s=new Date(d); s.setDate(d.getDate()-((d.getDay()+6)%7));
      var w=s.toISOString().slice(0,10);
      var vol=(e[1].entries||[]).reduce(function(a,en){ return a+(en.sets||[]).reduce(function(b,sv){ return b+(parseFloat(sv.w)||0)*(parseInt(sv.r)||0); },0); },0);
      wk[w]=(wk[w]||0)+vol;
    });
    var sorted=Object.entries(wk).sort(function(a,b){ return a[0].localeCompare(b[0]); }).slice(-12);
    weeklyLabels=sorted.map(function(x){ return x[0].slice(5); });

  React.useEffect(function(){

    if(!canvas||!weeklyLabels.length) return;
